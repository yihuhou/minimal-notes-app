      function normalizeJournalPrivateHighlightsPayload(value) {
        const source = value && typeof value === "object" ? value : {};
        return {
          locationAliases: normalizeJournalLocationAliases(source.locationAliases),
          keywordGroups: normalizeJournalKeywordGroups(source.keywordGroups),
          patternRules: normalizeJournalPatternRules(source.patternRules),
          suppressions: normalizeJournalSuppressions(source.suppressions)
        };
      }

      function normalizeJournalLocationAliases(value) {
        const aliases = {};
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return aliases;
        }

        Object.keys(value).forEach(function (key) {
          const source = String(key || "").trim();
          const label = String(value[key] || "").trim();
          if (source && label) {
            aliases[source] = label;
          }
        });
        return aliases;
      }

      function normalizeJournalKeywordGroups(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value.map(function (group) {
          if (!group || typeof group !== "object") {
            return null;
          }

          const label = String(group.label || "").trim();
          const className = String(group.className || "").trim();
          const words = normalizeJournalWords(group.words);
          if (!label || !className || !words.length) {
            return null;
          }

          return {
            label: label,
            className: className,
            words: words
          };
        }).filter(Boolean);
      }

      function normalizeJournalWords(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        const words = [];
        value.forEach(function (item) {
          const word = String(item || "").trim();
          if (word && words.indexOf(word) === -1) {
            words.push(word);
          }
        });
        return words;
      }

      function normalizeJournalPatternRules(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value.map(function (rule) {
          if (!rule || typeof rule !== "object") {
            return null;
          }

          const label = String(rule.label || "").trim();
          const className = String(rule.className || "").trim();
          const pattern = String(rule.pattern || "").trim();
          if (!label || !className || !pattern) {
            return null;
          }

          try {
            new RegExp(pattern, "i");
          } catch (error) {
            console.warn("Invalid private journal pattern ignored", pattern, error);
            return null;
          }

          return {
            label: label,
            className: className,
            pattern: pattern
          };
        }).filter(Boolean);
      }

      function normalizeJournalSuppressions(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value.map(function (item) {
          if (!item || typeof item !== "object") {
            return null;
          }

          const label = String(item.label || "").trim();
          const tokenPattern = String(item.tokenPattern || "").trim();
          const beforePattern = String(item.beforePattern || "").trim();
          const afterPattern = String(item.afterPattern || "").trim();
          const reason = String(item.reason || "").trim();
          if (!tokenPattern) {
            return null;
          }

          try {
            new RegExp("^(?:" + tokenPattern + ")$", "i");
            if (beforePattern) {
              new RegExp("(?:" + beforePattern + ")$", "i");
            }
            if (afterPattern) {
              new RegExp("^(?:" + afterPattern + ")", "i");
            }
          } catch (error) {
            console.warn("Invalid private journal suppression ignored", tokenPattern, error);
            return null;
          }

          return {
            label: label,
            tokenPattern: tokenPattern,
            beforePattern: beforePattern,
            afterPattern: afterPattern,
            reason: reason
          };
        }).filter(Boolean);
      }

      function getJournalPrivateHighlightsSignature(value) {
        if (!value) {
          return "";
        }

        const hasAliases = Object.keys(value.locationAliases || {}).length > 0;
        const hasGroups = Array.isArray(value.keywordGroups) && value.keywordGroups.length > 0;
        const hasRules = Array.isArray(value.patternRules) && value.patternRules.length > 0;
        const hasSuppressions = Array.isArray(value.suppressions) && value.suppressions.length > 0;
        if (!hasAliases && !hasGroups && !hasRules && !hasSuppressions) {
          return "";
        }

        return JSON.stringify({
          locationAliases: value.locationAliases || {},
          keywordGroups: value.keywordGroups || [],
          patternRules: value.patternRules || [],
          suppressions: value.suppressions || []
        });
      }

      function normalizeHealthSummaryPayload(value) {
        const entry = selectLatestHealthSummaryEntry(value);
        if (!entry) {
          return null;
        }

        const updatedAt = entry.generatedAt || entry.updatedAt || entry.savedAt || entry.date
          || (entry.window && entry.window.endDate);
        const summary = normalizeHealthSummaryText(entry.summary || entry.text || "", 180);
        if (!summary) {
          return null;
        }
        const notices = Array.isArray(entry.notices) ? entry.notices : value.notices;

        return {
          label: normalizeHealthSummaryText(entry.label || entry.title || "健康小结", 28) || "健康小结",
          updatedText: formatHealthSummaryUpdatedAt(updatedAt),
          updatedTitle: formatHealthSummaryFullDate(updatedAt),
          summary: summary,
          trainingSuggestion: normalizeHealthSummaryTrainingSuggestion(entry.trainingSuggestion || value.trainingSuggestion),
          advice: normalizeHealthSummaryList(entry.advice || entry.suggestions).slice(0, 2),
          metrics: normalizeHealthSummaryMetrics(entry.metrics).slice(0, 3),
          notices: normalizeHealthSummaryList(notices, 120).slice(0, 3)
        };
      }

      function selectLatestHealthSummaryEntry(value) {
        if (!value || typeof value !== "object") {
          return null;
        }

        const candidates = [];
        ["entries", "summaries", "history", "days"].forEach(function (key) {
          if (Array.isArray(value[key])) {
            value[key].forEach(function (entry) {
              if (entry && typeof entry === "object") {
                candidates.push(entry);
              }
            });
          }
        });

        if (value.summary || value.text) {
          candidates.push(value);
        }

        let latest = null;
        let latestTime = -Infinity;
        candidates.forEach(function (entry, index) {
          if (!entry.summary && !entry.text) {
            return;
          }

          const time = getHealthSummaryEntryTime(entry);
          if (!latest || time > latestTime || (time === latestTime && index > 0)) {
            latest = entry;
            latestTime = time;
          }
        });

        return latest;
      }

      function getHealthSummaryEntryTime(entry) {
        const values = [
          entry.generatedAt,
          entry.updatedAt,
          entry.savedAt,
          entry.date,
          entry.window && entry.window.endDate
        ];

        for (let index = 0; index < values.length; index += 1) {
          const time = parseHealthSummaryDateTime(values[index]);
          if (Number.isFinite(time)) {
            return time;
          }
        }

        return 0;
      }

      function parseHealthSummaryDateTime(value) {
        if (typeof value !== "string" || !value.trim()) {
          return NaN;
        }

        const text = value.trim();
        const dateOnly = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (dateOnly) {
          return new Date(
            Number(dateOnly[1]),
            Number(dateOnly[2]) - 1,
            Number(dateOnly[3])
          ).getTime();
        }

        const date = new Date(text);
        return date.getTime();
      }

      function renderHealthSummary(summary) {
        healthSummaryLabel.textContent = summary.updatedText
          ? summary.label + " · " + summary.updatedText
          : summary.label;
        healthSummaryLabel.title = summary.updatedTitle
          ? "更新时间：" + summary.updatedTitle
          : "";
        healthSummaryText.textContent = summary.summary;

        healthSummaryMetrics.innerHTML = "";
        summary.metrics.forEach(function (metric) {
          const item = document.createElement("span");
          const label = document.createElement("span");
          const value = document.createElement("strong");
          item.className = "health-summary-metric";
          if (metric.note) {
            item.title = metric.note;
          }
          label.className = "health-summary-metric-label";
          label.textContent = metric.label;
          value.className = "health-summary-metric-value";
          value.textContent = metric.value;
          item.appendChild(label);
          item.appendChild(value);
          healthSummaryMetrics.appendChild(item);
        });
        healthSummaryMetrics.hidden = !summary.metrics.length;

        renderHealthSummaryTraining(summary.trainingSuggestion);

        healthSummaryAdvice.innerHTML = "";
        summary.advice.forEach(function (text) {
          const item = document.createElement("li");
          item.textContent = text;
          healthSummaryAdvice.appendChild(item);
        });
        healthSummaryAdvice.hidden = !summary.advice.length;

        healthSummaryNotices.innerHTML = "";
        summary.notices.forEach(function (text) {
          const item = document.createElement("li");
          item.textContent = text;
          healthSummaryNotices.appendChild(item);
        });
        healthSummaryNotices.hidden = !summary.notices.length;
        healthSummary.hidden = false;
      }

      function clearHealthSummaryTraining() {
        if (!healthSummaryTraining) {
          return;
        }

        healthSummaryTraining.hidden = true;
        healthSummaryTrainingLabel.textContent = "今日训练";
        healthSummaryTrainingTitle.textContent = "";
        healthSummaryTrainingMeta.textContent = "";
        healthSummaryTrainingReason.textContent = "";
        healthSummaryTrainingPlan.innerHTML = "";
        healthSummaryTrainingPlan.hidden = true;
      }

      function renderHealthSummaryTraining(training) {
        clearHealthSummaryTraining();
        if (!training || (!training.title && !training.reason && !training.plan.length)) {
          return;
        }

        healthSummaryTrainingLabel.textContent = training.label || "今日训练";
        healthSummaryTrainingTitle.textContent = training.title || "";
        healthSummaryTrainingMeta.textContent = formatHealthSummaryTrainingMeta(training);
        healthSummaryTrainingReason.textContent = training.reason || "";

        training.plan.forEach(function (text) {
          const item = document.createElement("li");
          item.textContent = text;
          healthSummaryTrainingPlan.appendChild(item);
        });
        healthSummaryTrainingPlan.hidden = !training.plan.length;
        healthSummaryTraining.hidden = false;
      }

      function formatHealthSummaryTrainingMeta(training) {
        return [
          training.categoryLabel,
          training.duration,
          training.intensity
        ].filter(Boolean).join(" · ");
      }

      function normalizeHealthSummaryText(value, maxLength) {
        const text = String(value || "").replace(/\s+/g, " ").trim();
        const limit = maxLength || 120;
        const chars = Array.from(text);
        if (chars.length <= limit) {
          return text;
        }

        return chars.slice(0, Math.max(0, limit - 3)).join("") + "...";
      }

      function normalizeHealthSummaryList(value, maxLength) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value.map(function (item) {
          return normalizeHealthSummaryText(item, maxLength || 90);
        }).filter(Boolean);
      }

      function normalizeHealthSummaryTrainingSuggestion(value) {
        if (!value || typeof value !== "object") {
          return null;
        }

        const category = normalizeHealthSummaryText(value.category || value.type || value.kind || "", 18);
        const training = {
          label: normalizeHealthSummaryText(value.label || "今日训练", 16) || "今日训练",
          category: category,
          categoryLabel: normalizeHealthSummaryTrainingCategory(category, value.categoryLabel),
          title: normalizeHealthSummaryText(value.title || value.name || "", 32),
          duration: normalizeHealthSummaryText(value.duration || value.time || "", 18),
          intensity: normalizeHealthSummaryText(value.intensity || value.effort || "", 18),
          reason: normalizeHealthSummaryText(value.reason || value.rationale || value.note || "", 90),
          plan: normalizeHealthSummaryList(value.plan || value.steps || value.items, 34).slice(0, 3)
        };

        if (!training.title && !training.reason && !training.plan.length) {
          return null;
        }
        return training;
      }

      function normalizeHealthSummaryTrainingCategory(category, explicitLabel) {
        const direct = normalizeHealthSummaryText(explicitLabel || "", 18);
        if (direct) {
          return direct;
        }

        const key = String(category || "").toLowerCase();
        if (key === "cardio" || key === "aerobic") {
          return "有氧";
        }
        if (key === "strength") {
          return "力量";
        }
        if (key === "supportive" || key === "mobility") {
          return "支持性";
        }
        if (key === "rest" || key === "recovery") {
          return "恢复";
        }
        return normalizeHealthSummaryText(category, 18);
      }

      function normalizeHealthSummaryMetrics(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value.map(function (item) {
          if (!item || typeof item !== "object") {
            return null;
          }

          const label = normalizeHealthSummaryText(item.label || item.name || "", 18);
          const metricValue = normalizeHealthSummaryText(item.value || item.text || "", 24);
          const note = normalizeHealthSummaryText(item.note || item.detail || "", 80);
          if (!label || !metricValue) {
            return null;
          }

          return {
            label: label,
            value: metricValue,
            note: note
          };
        }).filter(Boolean);
      }

      function formatHealthSummaryUpdatedAt(value) {
        if (!isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        const dayOffset = getHealthSummaryCalendarDayOffset(date, new Date());
        if (dayOffset === 0) {
          return "今天更新";
        }

        if (dayOffset === 1) {
          return "昨天更新";
        }

        return (date.getMonth() + 1) + "月" + date.getDate() + "日更新";
      }

      function getHealthSummaryCalendarDayOffset(date, referenceDate) {
        const dayMs = 24 * 60 * 60 * 1000;
        const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
        const referenceStart = new Date(
          referenceDate.getFullYear(),
          referenceDate.getMonth(),
          referenceDate.getDate()
        ).getTime();
        return Math.round((referenceStart - dateStart) / dayMs);
      }

      function formatHealthSummaryFullDate(value) {
        if (!isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        const minutes = String(date.getMinutes()).padStart(2, "0");
        return date.getFullYear() + "年"
          + (date.getMonth() + 1) + "月"
          + date.getDate() + "日 "
          + date.getHours() + ":" + minutes;
      }

      async function writeCurrentRecordsToRemote() {
        if (state.remote.format === "v4" && state.remote.path.endsWith("/manifest.json")) {
          return writeCurrentRecordsToRemoteV4();
        }
        return writeCurrentRecordsToRemoteLegacy();
      }

      async function writeCurrentRecordsToRemoteLegacy() {
        if (!state.remote.enabled) {
          return false;
        }
        if (isProtectedRemoteWritePath(state.remote.path)) {
          state.remote.error = "GitHub 同步路径不能指向私有词表";
          state.remote.writeInFlight = false;
          state.remote.writeQueued = false;
          updateStorageStatus();
          return false;
        }

        const activeIdeaDraft = getActiveIdeaPaneDraft();
        const revisionAtWriteStart = state.recordsRevision;
        let recordsSnapshot = getRecordsPayloadSnapshot();
        applyIdeaPaneDraftToRecords(recordsSnapshot.records, activeIdeaDraft);
        let baseSha = state.remote.sha;
        let payloadAt = "";

        state.remote.writeInFlight = true;
        updateStorageStatus();

        try {
          const body = {
            message: "Update minimal notes records",
            branch: state.remote.branch || DEFAULT_REMOTE_BRANCH
          };
          const refreshBodyContent = function () {
            const syncedAt = new Date().toISOString();
            const payload = buildRecordsPayload({ syncedAt: syncedAt }, recordsSnapshot);
            payloadAt = getPayloadTimestamp(payload) || syncedAt;
            body.content = encodeBase64Utf8(JSON.stringify(payload, null, 2));
          };
          refreshBodyContent();

          let response = null;
          for (let attempt = 0; attempt < REMOTE_WRITE_MAX_ATTEMPTS; attempt += 1) {
            const writeSha = attempt === 0 ? baseSha : state.remote.sha;
            if (writeSha) {
              body.sha = writeSha;
            } else {
              delete body.sha;
            }

            const legacyPath = state.remote.path.endsWith("/manifest.json") ? LEGACY_REMOTE_PATH : state.remote.path;
            response = await fetch(getRemotePathContentsUrl(legacyPath, false), {
              method: "PUT",
              headers: getRemoteHeaders(true),
              body: JSON.stringify(body),
              cache: "no-store"
            });

            if (response.ok) {
              break;
            }

            if (!isRemoteShaConflict(response) || attempt >= REMOTE_WRITE_MAX_ATTEMPTS - 1) {
              throw await createRemoteHttpError(response, "GitHub 写入失败");
            }

            const latest = await fetchRemoteRecords({ conditional: false });
            state.remote.sha = latest.sha || "";
            state.remote.etag = latest.etag || "";
            if (!latest.missing) {
              recordsSnapshot = mergeRecordsPayloads(latest, recordsSnapshot);
              applyIdeaPaneDraftToRecords(recordsSnapshot.records, activeIdeaDraft);
              if (state.recordsRevision === revisionAtWriteStart
                && !state.remote.writeQueued
                && !recordsPayloadContentEqual(getRecordsPayloadSnapshot(), recordsSnapshot)) {
                state.records = recordsSnapshot.records;
                state.deletedRecords = recordsSnapshot.deletedRecords;
                state.recurrenceCompletionArchive = recordsSnapshot.recurrenceCompletionArchive;
                state.journalStats = recordsSnapshot.journalStats;
                reconcileEditingStateAfterRecordsUpdate();
                saveLocalRecords();
                queueSyncFileWrite();
                render();
              }
              if (!latest.needsSanitizedWrite && recordsPayloadContentEqual(latest, recordsSnapshot)) {
                markRemoteNoopWriteAsSynced(latest, revisionAtWriteStart);
                return true;
              }
              refreshBodyContent();
            }
            await waitForRemoteWriteRetry(attempt);
          }

          if (!response || !response.ok) {
            throw await createRemoteHttpError(response, "GitHub 写入失败");
          }

          const data = await response.json();
          state.remote.sha = data && data.content && typeof data.content.sha === "string" ? data.content.sha : state.remote.sha;
          state.remote.etag = "";
          state.remote.lastSyncAt = new Date().toISOString();
          state.remote.lastPayloadAt = payloadAt;
          state.localPayloadAt = payloadAt;
          state.remote.staleSha = baseSha || state.remote.staleSha;
          state.remote.pushLocalNext = state.recordsRevision !== revisionAtWriteStart || state.remote.writeQueued;
          state.remote.checkedThisSession = true;
          state.remote.error = "";
          saveRemoteSyncSettingsToLocal();
          updateStorageStatus();
          return true;
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 写入失败", error);
          updateStorageStatus();
          return false;
        } finally {
          state.remote.writeInFlight = false;
          updateStorageStatus();
        }
      }

      async function fetchRemoteV4CommitLayout() {
        const expectedHeadOid = await fetchRemoteBranchHeadOid();
        const manifestResult = await fetchRemoteJsonFile(state.remote.path, {
          conditional: false,
          ref: expectedHeadOid
        });
        if (manifestResult.missing) {
          throw new Error("GitHub v4 存储尚未就绪");
        }
        const manifest = manifestResult.value;
        if (!manifest || manifest.version !== 4 || !manifest.hot || !manifest.hot.path
          || !manifest.openRevisionShard || !manifest.openTrashShard) {
          throw new Error("GitHub v4 manifest 格式不正确");
        }
        const openResults = await Promise.all([
          fetchRemoteJsonFile(manifest.hot.path, { conditional: false, ref: expectedHeadOid }),
          fetchRemoteJsonFile(manifest.openRevisionShard, { conditional: false, ref: expectedHeadOid }),
          fetchRemoteJsonFile(manifest.openTrashShard, { conditional: false, ref: expectedHeadOid })
        ]);
        const hotResult = openResults[0];
        const revisionResult = openResults[1];
        const trashResult = openResults[2];
        if (hotResult.missing || revisionResult.missing || trashResult.missing) {
          throw new Error("GitHub v4 hot 或开放分片不存在");
        }
        const hot = hotResult.value;
        if (!hot || hot.version !== 4 || hot.generation !== manifest.generation) {
          throw new Error("GitHub v4 manifest 与 hot.json 不一致");
        }
        state.remote.format = "v4";
        state.remote.manifest = manifest;
        state.remote.hot = hot;
        state.remote.manifestSha = manifestResult.sha || "";
        state.remote.manifestEtag = manifestResult.etag || "";
        state.remote.hotSha = hotResult.sha || "";
        state.remote.hotEtag = hotResult.etag || "";
        state.remote.sha = state.remote.hotSha;
        state.remote.etag = state.remote.hotEtag;
        const payload = RECORDS_STORE.payloadFromV4Hot(hot);
        const files = {};
        files[state.remote.path] = manifest;
        files[manifest.hot.path] = hot;
        files[manifest.openRevisionShard] = revisionResult.value;
        files[manifest.openTrashShard] = trashResult.value;
        return {
          layout: RECORDS_STORE.layoutFromFiles(state.remote.path, manifest, files),
          payload: Object.assign({}, payload, {
            missing: false,
            sha: hotResult.sha || "",
            etag: hotResult.etag || "",
            format: "v4",
            payloadAt: getPayloadTimestamp(payload)
          }),
          expectedHeadOid: expectedHeadOid
        };
      }

      async function fetchRemoteBranchHeadOid() {
        const response = await fetch(getRemoteGitRefUrl(), {
          headers: getRemoteHeaders(false),
          cache: "no-store"
        });
        if (!response.ok) {
          throw await createRemoteHttpError(response, "GitHub 分支 HEAD 读取失败");
        }
        const data = await response.json();
        const oid = data && data.object && typeof data.object.sha === "string" ? data.object.sha : "";
        if (!oid) {
          throw new Error("GitHub 分支 HEAD 响应缺少 commit OID");
        }
        return oid;
      }

      async function commitRemoteV4FilesAtomically(writes, expectedHeadOid) {
        if (!expectedHeadOid) {
          throw new Error("GitHub v4 原子提交缺少 expectedHeadOid");
        }
        const additions = (Array.isArray(writes) ? writes : []).map(function (write) {
          return {
            path: write.path,
            contents: encodeBase64Utf8(RECORDS_STORE.jsonText(write.value))
          };
        });
        if (!additions.length) {
          return expectedHeadOid;
        }
        const body = {
          query: REMOTE_V4_ATOMIC_COMMIT_MUTATION,
          variables: {
            input: {
              branch: {
                repositoryNameWithOwner: state.remote.repo,
                branchName: state.remote.branch || DEFAULT_REMOTE_BRANCH
              },
              expectedHeadOid: expectedHeadOid,
              message: { headline: "Update minimal notes v4" },
              fileChanges: { additions: additions }
            }
          }
        };
        const response = await fetch("https://api.github.com/graphql", {
          method: "POST",
          headers: getRemoteHeaders(true),
          body: JSON.stringify(body),
          cache: "no-store"
        });
        let data = null;
        try {
          data = await response.json();
        } catch (error) {
          data = null;
        }
        const graphQLErrors = data && Array.isArray(data.errors) ? data.errors : [];
        if (!response.ok || graphQLErrors.length) {
          const messages = graphQLErrors.map(function (entry) {
            return entry && typeof entry.message === "string" ? entry.message : "";
          }).filter(Boolean);
          const atomicError = new Error(messages.length
            ? "GitHub v4 原子提交失败：" + messages.join("；")
            : "GitHub v4 原子提交失败（HTTP " + response.status + "）");
          atomicError.status = response.status;
          atomicError.retryableV4Conflict = graphQLErrors.some(function (entry) {
            return entry && entry.type === "STALE_DATA";
          });
          throw atomicError;
        }
        const commit = data && data.data && data.data.createCommitOnBranch
          && data.data.createCommitOnBranch.commit;
        if (!commit || typeof commit.oid !== "string" || !commit.oid) {
          throw new Error("GitHub v4 原子提交响应缺少 commit OID");
        }
        return commit.oid;
      }

      async function writeCurrentRecordsToRemoteV4() {
        if (!state.remote.enabled) {
          return false;
        }
        const activeIdeaDraft = getActiveIdeaPaneDraft();
        const revisionAtWriteStart = state.recordsRevision;
        let recordsSnapshot = getRecordsPayloadSnapshot();
        applyIdeaPaneDraftToRecords(recordsSnapshot.records, activeIdeaDraft);
        state.remote.writeInFlight = true;
        updateStorageStatus();

        try {
          for (let attempt = 0; attempt < REMOTE_WRITE_MAX_ATTEMPTS; attempt += 1) {
            const remote = await fetchRemoteV4CommitLayout();
            recordsSnapshot = mergeRecordsPayloads(remote.payload, recordsSnapshot);
            applyIdeaPaneDraftToRecords(recordsSnapshot.records, activeIdeaDraft);
            const syncedAt = new Date().toISOString();
            const payload = buildRecordsPayload({ syncedAt: syncedAt }, recordsSnapshot);
            const reconciled = RECORDS_STORE.reconcileV3Payload(remote.layout, payload, { now: syncedAt });
            if (!reconciled.newRevisions.length
              && v4CommitPayloadContentEqual(remote.payload, reconciled.payload)) {
              markRemoteNoopWriteAsSynced(remote.payload, revisionAtWriteStart);
              return true;
            }
            try {
              await commitRemoteV4FilesAtomically(reconciled.writes, remote.expectedHeadOid);
            } catch (error) {
              if (error && error.retryableV4Conflict && attempt < REMOTE_WRITE_MAX_ATTEMPTS - 1) {
                await waitForRemoteWriteRetry(attempt);
                continue;
              }
              throw error;
            }

            state.remote.manifest = reconciled.layout.manifest;
            state.remote.hot = reconciled.layout.hot;
            state.remote.manifestSha = "";
            state.remote.manifestEtag = "";
            state.remote.hotSha = "";
            state.remote.hotEtag = "";
            state.remote.sha = "";
            state.remote.etag = "";
            state.remote.lastSyncAt = new Date().toISOString();
            state.remote.lastPayloadAt = getPayloadTimestamp(reconciled.payload) || syncedAt;
            state.localPayloadAt = state.remote.lastPayloadAt;
            state.remote.staleSha = "";
            state.remote.checkedThisSession = true;
            state.remote.error = "";
            state.remote.pushLocalNext = state.recordsRevision !== revisionAtWriteStart || state.remote.writeQueued;
            if (state.recordsRevision === revisionAtWriteStart && !state.remote.writeQueued) {
              state.records = reconciled.payload.records.map(normalizeImportedRecord).filter(Boolean);
              state.deletedRecords = normalizeDeletedRecordEntries(reconciled.payload.deletedRecords);
              state.recurrenceCompletionArchive = normalizeRecurrenceCompletionArchiveEntries(reconciled.payload.recurrenceCompletionArchive);
              state.journalStats = normalizeJournalStats(reconciled.payload.journalStats);
              reconcileEditingStateAfterRecordsUpdate();
              saveLocalRecords({ payloadSyncedAt: syncedAt });
              render();
            }
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            return true;
          }
          throw new Error("GitHub v4 写入冲突重试次数已用完");
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 写入失败", error);
          updateStorageStatus();
          return false;
        } finally {
          state.remote.writeInFlight = false;
          updateStorageStatus();
        }
      }

      function markRemoteNoopWriteAsSynced(remotePayload, revisionAtWriteStart) {
        const remotePayloadAt = remotePayload && (remotePayload.payloadAt || getPayloadTimestamp(remotePayload));
        state.remote.sha = remotePayload && remotePayload.sha ? remotePayload.sha : state.remote.sha;
        state.remote.etag = remotePayload && remotePayload.etag ? remotePayload.etag : state.remote.etag;
        state.remote.lastSyncAt = new Date().toISOString();
        state.remote.lastPayloadAt = remotePayloadAt || state.remote.lastPayloadAt;
        state.localPayloadAt = remotePayloadAt || state.localPayloadAt;
        state.remote.staleSha = "";
        state.remote.pushLocalNext = state.recordsRevision !== revisionAtWriteStart || state.remote.writeQueued;
        state.remote.checkedThisSession = true;
        state.remote.error = "";
        saveRemoteSyncSettingsToLocal();
        updateStorageStatus();
      }

      function queueRemoteWrite() {
        if (!state.remote.enabled) {
          return;
        }

        state.remote.pushLocalNext = true;
        state.remote.writeQueued = true;
        saveRemoteSyncSettingsToLocal();
        window.clearTimeout(remoteWriteTimer);
        remoteWriteTimer = window.setTimeout(function () {
          remoteWriteTimer = null;
          writeQueuedRemote();
        }, REMOTE_WRITE_DEBOUNCE);
        updateStorageStatus();
      }

      async function writeQueuedRemote() {
        if (!state.remote.enabled) {
          return;
        }
        if (hasActiveDirtyIdeaPaneDraft()) {
          state.remote.writeQueued = true;
          window.clearTimeout(remoteWriteTimer);
          remoteWriteTimer = window.setTimeout(function () {
            remoteWriteTimer = null;
            writeQueuedRemote();
          }, 1000);
          updateStorageStatus();
          return;
        }

        if (state.remote.writeInFlight) {
          window.clearTimeout(remoteWriteTimer);
          remoteWriteTimer = window.setTimeout(function () {
            remoteWriteTimer = null;
            writeQueuedRemote();
          }, 300);
          updateStorageStatus();
          return;
        }

        if (state.remote.readInFlight) {
          window.clearTimeout(remoteWriteTimer);
          remoteWriteTimer = window.setTimeout(function () {
            remoteWriteTimer = null;
            writeQueuedRemote();
          }, 300);
          updateStorageStatus();
          return;
        }

        while (state.remote.writeQueued) {
          if (hasActiveDirtyIdeaPaneDraft()) {
            window.clearTimeout(remoteWriteTimer);
            remoteWriteTimer = window.setTimeout(function () {
              remoteWriteTimer = null;
              writeQueuedRemote();
            }, 1000);
            updateStorageStatus();
            return;
          }
          state.remote.writeQueued = false;
          const ok = await writeCurrentRecordsToRemote();
          if (!ok) {
            setStatus(state.remote.error + "；已保存在当前浏览器。");
            return;
          }
        }
      }

      function getRemoteContentsUrl(withRef) {
        return getRemotePathContentsUrl(state.remote.path, withRef);
      }

      function getRemotePathContentsUrl(pathValue, withRef, refValue) {
        const parts = state.remote.repo.split("/");
        const owner = encodeURIComponent(parts[0]);
        const repo = encodeURIComponent(parts[1]);
        const path = encodeRemotePath(pathValue);
        const base = "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path;
        if (!withRef) {
          return base;
        }

        return base + "?ref=" + encodeURIComponent(refValue || state.remote.branch || DEFAULT_REMOTE_BRANCH);
      }

      function getRemoteGitRefUrl() {
        const parts = state.remote.repo.split("/");
        const owner = encodeURIComponent(parts[0]);
        const repo = encodeURIComponent(parts[1]);
        const refPath = encodeRemotePath("heads/" + (state.remote.branch || DEFAULT_REMOTE_BRANCH));
        return "https://api.github.com/repos/" + owner + "/" + repo + "/git/ref/" + refPath;
      }

      function getRemoteHeaders(includeJsonContentType) {
        const headers = {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer " + state.remote.token
        };

        if (includeJsonContentType) {
          headers["Content-Type"] = "application/json";
        }

        return headers;
      }

      function isRemoteShaConflict(response) {
        return Boolean(response && (response.status === 409 || response.status === 422));
      }

      function waitForRemoteWriteRetry(attempt) {
        return new Promise(function (resolve) {
          window.setTimeout(resolve, Math.min(1200, 200 + attempt * 250));
        });
      }

      async function createRemoteHttpError(response, fallback) {
        if (!response) {
          return new Error(fallback);
        }

        let message = "";
        try {
          const data = await response.json();
          message = data && typeof data.message === "string" ? data.message : "";
        } catch (error) {
          try {
            message = await response.text();
          } catch (innerError) {
            message = "";
          }
        }

        const error = new Error(fallback + "：" + response.status + (message ? " " + message : ""));
        error.status = response.status;
        error.githubMessage = message;
        return error;
      }

      function formatRemoteError(fallback, error) {
        const message = error && error.message ? String(error.message) : "";
        if (/load failed|failed to fetch|networkerror|cancelled|internet connection/i.test(message)) {
          if (isLocalFilePage()) {
            return fallback + "：网络请求失败。请用 https 页面打开，不要从手机本地文件直接打开 HTML。";
          }

          if (isHttpPage()) {
            return fallback + "：网络请求失败。请用 https 页面打开后再试。";
          }

          return fallback + "：网络请求失败。请检查网络、GitHub token 权限，或稍后重试。";
        }

        if (message) {
          return message;
        }

        return fallback;
      }

      function isLocalFilePage() {
        return Boolean(window.location && window.location.protocol === "file:");
      }

      function isHttpPage() {
        return Boolean(window.location && window.location.protocol === "http:");
      }

      function normalizeRemoteRepo(value) {
        let text = String(value || "").trim();
        text = text.replace(/^https:\/\/github\.com\//i, "");
        text = text.replace(/\.git$/i, "");
        text = text.replace(/^\/+|\/+$/g, "");
        const parts = text.split("/").filter(Boolean);
        if (parts.length < 2) {
          return "";
        }

        return parts[0] + "/" + parts[1];
      }

      function normalizeRemoteBranch(value) {
        return String(value || "").trim() || DEFAULT_REMOTE_BRANCH;
      }

      function normalizeRemotePath(value) {
        return String(value || "").trim().replace(/^\/+/, "") || DEFAULT_REMOTE_PATH;
      }

      function isProtectedRemoteWritePath(value) {
        const path = normalizeRemotePath(value).replace(/\\/g, "/").toLowerCase();
        return path === JOURNAL_PRIVATE_HIGHLIGHTS_PATH.toLowerCase()
          || path === HEALTH_SUMMARY_PATH.toLowerCase()
          || path === HEALTH_CALENDAR_PATH.toLowerCase()
          || path === HEALTH_HISTORY_PATH.toLowerCase();
      }

      function encodeRemotePath(path) {
        return normalizeRemotePath(path).split("/").map(encodeURIComponent).join("/");
      }

      function encodeBase64Utf8(text) {
        const bytes = new TextEncoder().encode(text);
        let binary = "";
        bytes.forEach(function (byte) {
          binary += String.fromCharCode(byte);
        });
        return window.btoa(binary);
      }

      function decodeBase64Utf8(value) {
        const binary = window.atob(String(value || "").replace(/\s/g, ""));
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return new TextDecoder().decode(bytes);
      }

      function recordsPayloadContentEqual(left, right) {
        return recordsEqual(left && left.records, right && right.records)
          && deletedRecordsEqual(left && left.deletedRecords, right && right.deletedRecords)
          && recurrenceCompletionArchivesEqual(
            left && left.recurrenceCompletionArchive,
            right && right.recurrenceCompletionArchive
          )
          && journalStatsEqual(left && left.journalStats, right && right.journalStats);
      }

      function v4CommitPayloadContentEqual(left, right) {
        function comparableTombstones(value) {
          return normalizeDeletedRecordEntries(value).map(function (entry) {
            return {
              recordId: entry.recordId,
              deletedAt: entry.deletedAt,
              purged: Boolean(entry.purged)
            };
          });
        }
        return recordsEqual(left && left.records, right && right.records)
          && RECORDS_STORE.stableStringify(comparableTombstones(left && left.deletedRecords))
            === RECORDS_STORE.stableStringify(comparableTombstones(right && right.deletedRecords))
          && recurrenceCompletionArchivesEqual(
            left && left.recurrenceCompletionArchive,
            right && right.recurrenceCompletionArchive
          )
          && journalStatsEqual(left && left.journalStats, right && right.journalStats);
      }

      function mergeRecordsPayloads(localPayload, incomingPayload) {
        const deletedRecords = mergeDeletedRecordEntries(
          localPayload && localPayload.deletedRecords,
          incomingPayload && incomingPayload.deletedRecords
        );
        const deletedById = mapDeletedRecordsById(deletedRecords);
        const recordsById = new Map();
        const recordOrder = [];

        mergeRecordListIntoMap(localPayload && localPayload.records, recordsById, recordOrder, false);
        mergeRecordListIntoMap(incomingPayload && incomingPayload.records, recordsById, recordOrder, true);

        const records = recordOrder
          .map(function (id) {
            return recordsById.get(id);
          })
          .filter(function (record) {
            return record && !isRecordRemovedByDeleteEntry(record, deletedById.get(record.id));
          });

        return {
          records: records,
          deletedRecords: deletedRecords,
          recurrenceCompletionArchive: mergeRecurrenceCompletionArchiveEntries(
            localPayload && localPayload.recurrenceCompletionArchive,
            incomingPayload && incomingPayload.recurrenceCompletionArchive
          ),
          journalStats: mergeJournalStats(
            localPayload && localPayload.journalStats,
            incomingPayload && incomingPayload.journalStats
          )
        };
      }

      function mergeRecordListIntoMap(records, recordsById, recordOrder, preserveSourcePosition) {
        if (!Array.isArray(records)) {
          return;
        }

        const normalizedRecords = records
          .map(normalizeImportedRecord)
          .filter(function (record) {
            return record && record.id;
          });
        normalizedRecords.forEach(function (normalized, index) {
          if (!recordsById.has(normalized.id)) {
            insertRecordIdPreservingSourceNeighbors(
              normalized.id,
              normalizedRecords,
              index,
              recordOrder,
              Boolean(preserveSourcePosition)
            );
          }
          recordsById.set(normalized.id, mergeRecordVersions(recordsById.get(normalized.id), normalized));
        });
      }

      function insertRecordIdPreservingSourceNeighbors(id, sourceRecords, sourceIndex, recordOrder, preserveSourcePosition) {
        if (!preserveSourcePosition) {
          recordOrder.push(id);
          return;
        }

        for (let index = sourceIndex - 1; index >= 0; index -= 1) {
          const previousId = sourceRecords[index] && sourceRecords[index].id;
          const previousOrderIndex = recordOrder.indexOf(previousId);
          if (previousOrderIndex !== -1) {
            recordOrder.splice(previousOrderIndex + 1, 0, id);
            return;
          }
        }

        for (let index = sourceIndex + 1; index < sourceRecords.length; index += 1) {
          const nextId = sourceRecords[index] && sourceRecords[index].id;
          const nextOrderIndex = recordOrder.indexOf(nextId);
          if (nextOrderIndex !== -1) {
            recordOrder.splice(nextOrderIndex, 0, id);
            return;
          }
        }

        recordOrder.push(id);
      }

      function mergeRecordVersions(left, right) {
        if (!left) {
          return cloneRecordForMerge(right);
        }
        if (!right) {
          return cloneRecordForMerge(left);
        }

        const rightMergeTime = getRecordMergeTimestamp(right);
        const leftMergeTime = getRecordMergeTimestamp(left);
        const winner = rightMergeTime > leftMergeTime
          || (rightMergeTime === leftMergeTime
            && typeof right.headRevisionId === "string"
            && right.headRevisionId
            && right.headRevisionId !== left.headRevisionId)
          ? right
          : left;
        const merged = cloneRecordForMerge(winner);
        merged.history = mergeHistoryEntryLists(left.history, right.history, merged);
        merged.recurrenceCompletions = mergeRecurrenceCompletionEntries(
          left.recurrenceCompletions,
          right.recurrenceCompletions
        );
        return normalizeImportedRecord(merged) || merged;
      }

      function cloneRecordForMerge(record) {
        return JSON.parse(JSON.stringify(record || {}));
      }

      function mergeHistoryEntryLists(left, right, fallbackRecord) {
        const entriesByKey = new Map();
        normalizeHistoryEntries([].concat(left || [], right || []), fallbackRecord).forEach(function (entry) {
          entriesByKey.set(JSON.stringify([
            entry.action,
            entry.at,
            entry.text,
            entry.type,
            entry.eventAt,
            entry.recurrence,
            entry.prepared,
            entry.completed
          ]), entry);
        });
        return Array.from(entriesByKey.values()).sort(function (a, b) {
          return new Date(a.at).getTime() - new Date(b.at).getTime();
        });
      }

      function mergeRecurrenceCompletionEntries(left, right) {
        const entriesByKey = new Map();
        normalizeRecurrenceCompletionEntries([].concat(left || [], right || [])).forEach(function (entry) {
          entriesByKey.set(JSON.stringify(entry), entry);
        });
        return Array.from(entriesByKey.values()).sort(function (a, b) {
          return new Date(a.completedAt).getTime() - new Date(b.completedAt).getTime();
        });
      }

      function mergeDeletedRecordEntries(left, right) {
        const entriesById = new Map();
        normalizeDeletedRecordEntries([].concat(left || [], right || [])).forEach(function (entry) {
          const existing = entriesById.get(entry.recordId);
          if (!existing
            || new Date(entry.deletedAt).getTime() > new Date(existing.deletedAt).getTime()
            || (entry.deletedAt === existing.deletedAt
              && getRecordMergeTimestamp(entry.record) >= getRecordMergeTimestamp(existing.record))) {
            entriesById.set(entry.recordId, entry);
          }
        });
        return Array.from(entriesById.values()).sort(function (a, b) {
          return new Date(a.deletedAt).getTime() - new Date(b.deletedAt).getTime();
        });
      }

      function mergeRecurrenceCompletionArchiveEntries(left, right) {
        const entriesByKey = new Map();
        normalizeRecurrenceCompletionArchiveEntries([].concat(left || [], right || [])).forEach(function (entry) {
          entriesByKey.set(JSON.stringify(entry), entry);
        });
        return Array.from(entriesByKey.values()).sort(function (a, b) {
          return new Date(a.deletedAt).getTime() - new Date(b.deletedAt).getTime();
        });
      }

      function mapDeletedRecordsById(entries) {
        const result = new Map();
        normalizeDeletedRecordEntries(entries).forEach(function (entry) {
          result.set(entry.recordId, entry);
        });
        return result;
      }

      function isRecordRemovedByDeleteEntry(record, deleteEntry) {
        if (!record || !deleteEntry || !isValidDate(deleteEntry.deletedAt)) {
          return false;
        }

        return new Date(deleteEntry.deletedAt).getTime() >= getRecordMergeTimestamp(record);
      }

      function getRecordMergeTimestamp(record) {
        if (!record || typeof record !== "object") {
          return 0;
        }

        const times = [record.createdAt, record.updatedAt]
          .concat((Array.isArray(record.history) ? record.history : [])
            .filter(function (entry) {
              return !isSyntheticMergeOnlyHistoryAction(entry && entry.action);
            })
            .map(function (entry) {
              return entry && entry.at;
            }))
          .concat((Array.isArray(record.recurrenceCompletions) ? record.recurrenceCompletions : []).map(function (entry) {
            return entry && entry.completedAt;
          }))
          .filter(isValidDate)
          .map(function (value) {
            return new Date(value).getTime();
          });
        if (!times.length) {
          return 0;
        }

        return Math.max.apply(null, times);
      }

      function isSyntheticMergeOnlyHistoryAction(action) {
        return action === "auto_completed" || action === "auto_reverted";
      }

      function recordsEqual(left, right) {
        function comparable(records) {
          return (Array.isArray(records) ? records : []).map(function (record) {
            const normalized = normalizeImportedRecord(record);
            if (!normalized) {
              return null;
            }
            return {
              state: RECORDS_STORE.canonicalizeRecord(normalized),
              headRevisionId: typeof normalized.headRevisionId === "string" ? normalized.headRevisionId : ""
            };
          }).filter(Boolean);
        }
        return RECORDS_STORE.stableStringify(comparable(left)) === RECORDS_STORE.stableStringify(comparable(right));
      }

      function deletedRecordsEqual(left, right) {
        return JSON.stringify(normalizeDeletedRecordEntries(left))
          === JSON.stringify(normalizeDeletedRecordEntries(right));
      }

      function recurrenceCompletionArchivesEqual(left, right) {
        return JSON.stringify(normalizeRecurrenceCompletionArchiveEntries(left))
          === JSON.stringify(normalizeRecurrenceCompletionArchiveEntries(right));
      }

      function journalStatsEqual(left, right) {
        return JSON.stringify(getComparableJournalStats(left)) === JSON.stringify(getComparableJournalStats(right));
      }

      function getComparableJournalStats(value) {
        const normalized = normalizeJournalStats(value);
        if (!hasJournalStats(normalized)) {
          return {};
        }

        const comparable = JSON.parse(JSON.stringify(normalized));
        delete comparable.updatedAt;
        if (comparable.gTeacher && comparable.gTeacher.feedback) {
          Object.keys(comparable.gTeacher.feedback).forEach(function (recordId) {
            delete comparable.gTeacher.feedback[recordId].at;
            if (comparable.gTeacher.feedback[recordId].aspects) {
              Object.keys(comparable.gTeacher.feedback[recordId].aspects).forEach(function (aspect) {
                delete comparable.gTeacher.feedback[recordId].aspects[aspect].at;
              });
            }
          });
        }
        return comparable;
      }

      function mergeJournalStats(left, right) {
        const normalizedLeft = normalizeJournalStats(left);
        const normalizedRight = normalizeJournalStats(right);
        const hasLeft = hasJournalStats(normalizedLeft);
        const hasRight = hasJournalStats(normalizedRight);

        if (!hasLeft) {
          return hasRight ? normalizedRight : {};
        }
        if (!hasRight) {
          return normalizedLeft;
        }

        const leftUpdatedAt = getJournalStatsUpdatedTime(normalizedLeft);
        const rightUpdatedAt = getJournalStatsUpdatedTime(normalizedRight);
        const preferred = rightUpdatedAt > leftUpdatedAt ? normalizedRight : normalizedLeft;
        const merged = JSON.parse(JSON.stringify(preferred));
        if (!merged.ritual) {
          merged.ritual = normalizedLeft.ritual || normalizedRight.ritual;
        }
        const gTeacher = mergeGTeacherStats(normalizedLeft.gTeacher, normalizedRight.gTeacher, preferred.gTeacher);
        if (gTeacher) {
          merged.gTeacher = gTeacher;
        } else {
          delete merged.gTeacher;
        }
        return normalizeJournalStats(merged);
      }

      function mergeGTeacherStats(left, right, preferred) {
        const normalizedLeft = normalizeGTeacherStats(left);
        const normalizedRight = normalizeGTeacherStats(right);
        const normalizedPreferred = normalizeGTeacherStats(preferred) || normalizedRight || normalizedLeft;
        if (!normalizedPreferred) {
          return null;
        }

        const result = {
          enabled: normalizedPreferred.enabled !== false
        };
        const feedback = mergeGTeacherFeedbackMaps(
          normalizedLeft && normalizedLeft.feedback,
          normalizedRight && normalizedRight.feedback
        );
        if (Object.keys(feedback).length) {
          result.feedback = feedback;
        }
        return result;
      }

      function mergeGTeacherFeedbackMaps(left, right) {
        const merged = {};
        [left, right].forEach(function (source) {
          const normalized = normalizeGTeacherFeedbackMap(source);
          Object.keys(normalized).forEach(function (recordId) {
            const incoming = normalized[recordId];
            const existing = merged[recordId];
            merged[recordId] = mergeGTeacherFeedbackEntry(existing, incoming);
          });
        });
        return merged;
      }

      function mergeGTeacherFeedbackEntry(left, right) {
        if (!left) {
          return right;
        }
        if (!right) {
          return left;
        }

        const leftTime = getGTeacherFeedbackEntryTime(left);
        const rightTime = getGTeacherFeedbackEntryTime(right);
        const preferred = rightTime >= leftTime ? right : left;
        const merged = Object.assign({}, preferred);
        const aspects = mergeGTeacherFeedbackAspects(left.aspects, right.aspects);
        if (Object.keys(aspects).length) {
          merged.aspects = aspects;
        } else {
          delete merged.aspects;
        }
        return normalizeGTeacherFeedbackEntry(merged) || merged;
      }

      function mergeGTeacherFeedbackAspects(left, right) {
        const merged = {};
        [left, right].forEach(function (source) {
          const aspects = normalizeGTeacherFeedbackAspects(source);
          Object.keys(aspects).forEach(function (aspect) {
            const incoming = aspects[aspect];
            const existing = merged[aspect];
            const incomingTime = isValidDate(incoming.at) ? new Date(incoming.at).getTime() : 0;
            const existingTime = existing && isValidDate(existing.at) ? new Date(existing.at).getTime() : 0;
            if (!existing || incomingTime >= existingTime) {
              merged[aspect] = incoming;
            }
          });
        });
        return merged;
      }

      function getGTeacherFeedbackEntryTime(entry) {
        const times = [];
        if (isValidDate(entry && entry.at)) {
          times.push(new Date(entry.at).getTime());
        }
        const aspects = normalizeGTeacherFeedbackAspects(entry && entry.aspects);
        Object.keys(aspects).forEach(function (aspect) {
          if (isValidDate(aspects[aspect].at)) {
            times.push(new Date(aspects[aspect].at).getTime());
          }
        });
        return times.length ? Math.max.apply(null, times) : 0;
      }

      function getJournalStatsUpdatedTime(value) {
        return isValidDate(value && value.updatedAt) ? new Date(value.updatedAt).getTime() : 0;
      }

      function hasJournalStats(value) {
        return Boolean(value && typeof value === "object" && !Array.isArray(value) && (value.ritual || value.gTeacher));
      }

      function normalizeJournalStats(value) {
        const source = value && typeof value === "object" && !Array.isArray(value) ? value : {};
        const ritual = normalizeJournalRitualStats(source.ritual);
        const gTeacher = normalizeGTeacherStats(source.gTeacher);
        const result = {};
        if (ritual) {
          result.ritual = ritual;
        }
        if (gTeacher) {
          result.gTeacher = gTeacher;
        }
        if ((ritual || gTeacher) && isValidDate(source.updatedAt)) {
          result.updatedAt = new Date(source.updatedAt).toISOString();
        }
        return Object.keys(result).length ? result : {};
      }

      function normalizeJournalRitualStats(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return null;
        }

        const baseCount = Math.floor(Number(value.baseCount));
        const startDay = normalizeLocalDayKey(value.startDay || value.startDate);
        const label = String(value.label || "").trim();
        if (!Number.isFinite(baseCount) || baseCount < 0 || !startDay || !label) {
          return null;
        }

        const dayBoundaryHour = normalizeDayBoundaryHour(value.dayBoundaryHour);
        const result = {
          baseCount: baseCount,
          startDay: startDay,
          dayBoundaryHour: dayBoundaryHour,
          label: label
        };
        const icon = String(value.icon || "").trim();
        const title = String(value.title || "").trim();
        const color = normalizeHexColor(value.color);
        if (icon) {
          result.icon = icon;
        }
        if (title) {
          result.title = title;
        }
        if (color) {
          result.color = color;
        }
        return result;
      }

      function normalizeGTeacherStats(value) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          return null;
        }
        const feedback = normalizeGTeacherFeedbackMap(value.feedback);
        const result = {
          enabled: value.enabled !== false
        };
        if (Object.keys(feedback).length) {
          result.feedback = feedback;
        }
        return result;
      }

      function normalizeGTeacherFeedbackMap(value) {
        const source = value && typeof value === "object" && !Array.isArray(value) ? value : {};
        const result = {};
        Object.keys(source).sort().forEach(function (recordId) {
          const id = String(recordId || "").trim();
          const normalized = normalizeGTeacherFeedbackEntry(source[recordId]);
          if (id && normalized) {
            result[id] = normalized;
          }
        });
        return result;
      }

      function normalizeGTeacherFeedbackEntry(entry) {
        if (!entry || typeof entry !== "object" || Array.isArray(entry)) {
          return null;
        }

        const feedbackValue = normalizeGTeacherFeedbackValue(entry.value);
        const aspects = normalizeGTeacherFeedbackAspects(entry.aspects);
        const aspectTimes = Object.keys(aspects)
          .map(function (aspect) {
            return isValidDate(aspects[aspect].at) ? new Date(aspects[aspect].at).getTime() : 0;
          })
          .filter(Boolean);
        const at = isValidDate(entry.at)
          ? new Date(entry.at).toISOString()
          : (aspectTimes.length ? new Date(Math.max.apply(null, aspectTimes)).toISOString() : "");
        if ((!feedbackValue && !Object.keys(aspects).length) || !at) {
          return null;
        }

        const normalized = {
          at: at
        };
        if (feedbackValue) {
          normalized.value = feedbackValue;
        }
        if (Object.keys(aspects).length) {
          normalized.aspects = aspects;
        }
        if (isValidDate(entry.createdAt)) {
          normalized.createdAt = new Date(entry.createdAt).toISOString();
        }
        const textPreview = String(entry.textPreview || "").replace(/\s+/g, " ").trim().slice(0, 180);
        if (textPreview) {
          normalized.textPreview = textPreview;
        }
        return normalized;
      }

      function normalizeGTeacherFeedbackAspects(value) {
        const source = value && typeof value === "object" && !Array.isArray(value) ? value : {};
        const result = {};
        G_TEACHER_FEEDBACK_ASPECTS.forEach(function (aspect) {
          const entry = source[aspect];
          if (!entry || typeof entry !== "object" || Array.isArray(entry)) {
            return;
          }
          const feedbackValue = normalizeGTeacherFeedbackValue(entry.value);
          const at = isValidDate(entry.at) ? new Date(entry.at).toISOString() : "";
          if (!feedbackValue || feedbackValue === "deleted" || !at) {
            return;
          }
          result[aspect] = {
            value: feedbackValue,
            at: at
          };
        });
        return result;
      }

      function normalizeGTeacherFeedbackValue(value) {
        const source = String(value || "").trim();
        return G_TEACHER_FEEDBACK_VALUES.includes(source) ? source : "";
      }

      function normalizeGTeacherFeedbackAspect(value) {
        const source = String(value || "").trim();
        return G_TEACHER_FEEDBACK_ASPECTS.includes(source) ? source : "";
      }

      function getGTeacherFeedbackValue(recordId, aspect) {
        const stats = normalizeJournalStats(state.journalStats);
        const feedback = stats.gTeacher && stats.gTeacher.feedback
          ? stats.gTeacher.feedback
          : {};
        const entry = feedback[String(recordId || "")];
        const feedbackAspect = normalizeGTeacherFeedbackAspect(aspect);
        if (feedbackAspect && entry && entry.aspects && entry.aspects[feedbackAspect]) {
          const aspectValue = normalizeGTeacherFeedbackValue(entry.aspects[feedbackAspect].value);
          return aspectValue === "cleared" ? "" : aspectValue;
        }
        const value = normalizeGTeacherFeedbackValue(entry && entry.value);
        return value === "cleared" ? "" : value;
      }

      function hasGTeacherFeedback(recordId) {
        const stats = normalizeJournalStats(state.journalStats);
        const feedback = stats.gTeacher && stats.gTeacher.feedback
          ? stats.gTeacher.feedback
          : {};
        return hasActiveGTeacherFeedbackEntry(feedback[String(recordId || "")]);
      }

      function hasActiveGTeacherFeedbackEntry(entry) {
        if (!entry) {
          return false;
        }
        const value = normalizeGTeacherFeedbackValue(entry.value);
        if (value && value !== "cleared") {
          return true;
        }
        const aspects = normalizeGTeacherFeedbackAspects(entry.aspects);
        return Object.keys(aspects).some(function (aspect) {
          return aspects[aspect].value && aspects[aspect].value !== "cleared";
        });
      }

      function formatGTeacherFeedbackLabel(value, aspect) {
        const prefix = aspect === "content" ? "内容" : (aspect === "wording" ? "措辞" : "");
        if (value === "like") {
          return prefix + "喜欢";
        }
        if (value === "dislike") {
          return prefix + "不喜欢";
        }
        if (value === "deleted") {
          return "最不喜欢";
        }
        return "";
      }

      function normalizeDayBoundaryHour(value) {
        const hour = Math.floor(Number(value));
        return Number.isFinite(hour) && hour >= 0 && hour <= 23 ? hour : 0;
      }

      function normalizeLocalDayKey(value) {
        const source = String(value || "").trim();
        const match = source.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) {
          return "";
        }

        const year = Number(match[1]);
        const month = Number(match[2]);
        const day = Number(match[3]);
        const date = new Date(year, month - 1, day);
        if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) {
          return "";
        }
        return source;
      }

      function normalizeHexColor(value) {
        const source = String(value || "").trim();
        return /^#[0-9a-f]{6}$/i.test(source) ? source : "";
      }

      function getRecordsSnapshot(records) {
        return JSON.stringify({
          records: Array.isArray(records) ? records : state.records || [],
          deletedRecords: normalizeDeletedRecordEntries(state.deletedRecords),
          recurrenceCompletionArchive: normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive),
          journalStats: normalizeJournalStats(state.journalStats)
        });
      }

      function getRecordsPayloadSnapshot() {
        return JSON.parse(JSON.stringify({
          records: state.records || [],
          deletedRecords: normalizeDeletedRecordEntries(state.deletedRecords),
          recurrenceCompletionArchive: normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive),
          journalStats: normalizeJournalStats(state.journalStats)
        }));
      }

      function getPayloadTimestamp(payload) {
        if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
          return "";
        }

        const times = [payload.syncedAt, payload.savedAt, payload.exportedAt]
          .filter(isValidDate)
          .map(function (value) {
            return new Date(value).getTime();
          });
        if (!times.length) {
          return "";
        }

        return new Date(Math.max.apply(null, times)).toISOString();
      }

      function isStaleRemoteResult(result) {
        if (!result || result.missing) {
          return false;
        }

        // Payload timestamps are produced by different devices and clients,
        // so their ordering cannot prove that a GitHub response is stale.
        // Only an exact blob SHA remembered immediately before this session's
        // own successful write is safe to skip.
        return Boolean(
          state.remote.staleSha
          && result.sha
          && result.sha === state.remote.staleSha
        );
      }

      function render() {
        scheduleAutoCompletionRefresh();
        const visible = getVisibleRecords();
        renderFilters();
        renderSummary(visible);
        renderGTeacherPanel();
        renderList(visible);
        updateGTeacherTagAlignment();
        renderIdeaPane();
        updateJournalBottomJump();
      }

      function scheduleGTeacherTagAlignmentUpdate() {
        if (gTeacherTagAlignmentFrame) {
          return;
        }

        gTeacherTagAlignmentFrame = requestAnimationFrame(function () {
          gTeacherTagAlignmentFrame = 0;
          updateGTeacherTagAlignment();
        });
      }

      function updateGTeacherTagAlignment() {
        const items = recordList.querySelectorAll(".item.g-teacher");
        items.forEach(function (item) {
          const tags = item.querySelector(".item-tags");
          const text = item.querySelector(".item-text");
          if (!tags || !text) {
            item.classList.remove("tags-inline");
            return;
          }

          const tagsRect = tags.getBoundingClientRect();
          const textRect = text.getBoundingClientRect();
          const sameLine = textRect.top < tagsRect.bottom - 1 && textRect.bottom > tagsRect.top + 1;
          item.classList.toggle("tags-inline", sameLine);
        });
      }

      function scheduleJournalBottomJumpUpdate() {
        if (!journalBottomJump || journalBottomJumpFrame) {
          return;
        }

        journalBottomJumpFrame = requestAnimationFrame(function () {
          journalBottomJumpFrame = 0;
          updateJournalBottomJumpIntent();
          updateJournalBottomJump();
        });
      }

      function updateJournalBottomJumpIntent() {
        const scrollY = getWindowScrollY();
        const delta = scrollY - journalBottomJumpLastScrollY;
        journalBottomJumpLastScrollY = scrollY;
        if (state.filter !== "journal" || scrollY <= 4) {
          journalBottomJumpShowIntent = false;
          return;
        }

        if (delta > 4) {
          journalBottomJumpShowIntent = true;
          return;
        }

        if (delta < -4) {
          journalBottomJumpShowIntent = false;
        }
      }

      function updateJournalBottomJump() {
        if (!journalBottomJump) {
          return;
        }

        const footer = getSummaryFooter();
        const scrollHeight = getDocumentScrollHeight();
        const scrollY = getWindowScrollY();
        const scrollable = scrollHeight > window.innerHeight + 96;
        if (state.filter !== "journal" || !footer || !scrollable || !journalBottomJumpShowIntent) {
          journalBottomJump.hidden = true;
          return;
        }

        const rect = footer.getBoundingClientRect();
        const footerVisible = rect.top <= window.innerHeight - 76;
        const atBottom = scrollY + window.innerHeight >= scrollHeight - 24;
        journalBottomJump.hidden = footerVisible || atBottom;
      }

      function jumpToJournalSummary() {
        const footer = getSummaryFooter();
        if (!footer) {
          return;
        }

        const reduceMotion = window.matchMedia
          && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        try {
          footer.scrollIntoView({
            behavior: reduceMotion ? "auto" : "smooth",
            block: "center"
          });
        } catch (error) {
          footer.scrollIntoView(false);
        }
        window.setTimeout(updateJournalBottomJump, reduceMotion ? 0 : 350);
      }

      function getSummaryFooter() {
        if (!summaryText) {
          return null;
        }

        return summaryText.closest ? summaryText.closest(".footer") : summaryText;
      }

      function getWindowScrollY() {
        return window.pageYOffset || document.documentElement.scrollTop || 0;
      }

      function getDocumentScrollHeight() {
        return Math.max(
          document.documentElement.scrollHeight,
          document.body ? document.body.scrollHeight : 0
        );
      }

      function resetJournalBottomJumpIntent() {
        journalBottomJumpShowIntent = false;
        journalBottomJumpLastScrollY = getWindowScrollY();
        if (journalBottomJump) {
          journalBottomJump.hidden = true;
        }
      }

      function renderFilters() {
        const buttons = filters.querySelectorAll("button[data-filter]");
        buttons.forEach(function (button) {
          const active = button.dataset.filter === state.filter;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", String(active));
        });
      }

      function renderSummary(visible) {
        const unfinishedCount = state.records.filter(function (record) {
          return !isVisuallyCompleted(record) && !isPassiveRecord(record);
        }).length;
        const totalVisibleCount = state.records.filter(function (record) {
          return !isRecordHiddenByTemporaryPrivacy(record);
        }).length;
        openCount.textContent = String(unfinishedCount);

        if (state.filter === "journal") {
          const journalRecords = state.records.filter(function (record) {
            return record.type === "journal" && !isRecordHiddenByTemporaryPrivacy(record);
          });
          const userJournalRecords = journalRecords.filter(function (record) {
            return !isGTeacherRecord(record);
          });
          const gTeacherRecords = journalRecords.filter(isGTeacherRecord);
          const visibleUserJournalRecords = visible.filter(function (record) {
            return record.type === "journal" && !isGTeacherRecord(record);
          });
          const journalWordCount = userJournalRecords.reduce(function (total, record) {
            return total + countTextCharacters(record.text);
          }, 0);
          const journalDayCount = countJournalDays(userJournalRecords);
          const journalRitualStats = getJournalRitualStats();
          const journalRitualCount = journalRitualStats
            ? journalRitualStats.baseCount + countJournalRitualDays(userJournalRecords, journalRitualStats)
            : null;
          const countText = visibleUserJournalRecords.length === userJournalRecords.length
            ? "我的日记 " + formatSummaryNumber(userJournalRecords.length) + " 条"
            : "我的日记共 " + formatSummaryNumber(userJournalRecords.length) + " 条，当前显示 " + formatSummaryNumber(visibleUserJournalRecords.length) + " 条";
          const gTeacherText = gTeacherRecords.length
            ? " · G老师 " + formatSummaryNumber(gTeacherRecords.length) + " 条"
            : "";
          renderJournalSummaryText(countText, journalDayCount, journalWordCount, journalRitualStats, journalRitualCount, gTeacherText);
          return;
        }

        summaryText.textContent = "共 " + totalVisibleCount + " 条，当前显示 " + visible.length + " 条";
      }

      function renderJournalSummaryText(countText, journalDayCount, journalWordCount, ritualStats, ritualCount, suffixText) {
        const summaryPrefix = countText + " · " + formatSummaryNumber(journalDayCount) + " 天";
        const suffix = suffixText || "";
        if (!ritualStats) {
          summaryText.textContent = summaryPrefix + " · " + formatSummaryNumber(journalWordCount) + " 字" + suffix;
          return;
        }

        const ritualText = formatSummaryNumber(ritualCount) + " " + ritualStats.label;
        const ritual = document.createElement("span");
        const icon = document.createElement("span");

        ritual.className = "journal-ritual-count";
        if (ritualStats.title) {
          ritual.title = ritualStats.title;
        }
        if (ritualStats.icon) {
          icon.className = "journal-ritual-icon";
          icon.setAttribute("aria-hidden", "true");
          icon.textContent = ritualStats.icon;
          if (ritualStats.color) {
            icon.style.color = ritualStats.color;
          }
          ritual.appendChild(icon);
        }

        ritual.appendChild(document.createTextNode(ritualText));

        summaryText.textContent = "";
        summaryText.appendChild(document.createTextNode(summaryPrefix + " · "));
        summaryText.appendChild(ritual);
        summaryText.appendChild(document.createTextNode(" · " + formatSummaryNumber(journalWordCount) + " 字" + suffix));
      }

      function renderGTeacherPanel() {
        if (!gTeacherPanel) {
          return;
        }

        const journalFocus = state.filter === "journal";
        const hasGTeacherRecords = hasGTeacherJournalRecords();
        gTeacherPanel.hidden = !journalFocus || !hasGTeacherRecords;
        if (!hasGTeacherRecords) {
          state.journalViewMode = "with";
        }
        if (!journalFocus || !hasGTeacherRecords) {
          return;
        }

        gTeacherEnabledToggle.checked = isGTeacherEnabled();

        const mode = normalizeGTeacherViewMode(state.journalViewMode);
        state.journalViewMode = mode;
        gTeacherControls.querySelectorAll("button[data-g-teacher-mode]").forEach(function (button) {
          const active = button.dataset.gTeacherMode === mode;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", String(active));
        });
      }

      function normalizeGTeacherViewMode(value) {
        return G_TEACHER_VIEW_MODES.includes(value) ? value : "with";
      }

      function isGTeacherEnabled() {
        const stats = normalizeJournalStats(state.journalStats);
        return !(stats.gTeacher && stats.gTeacher.enabled === false);
      }

      function setGTeacherEnabled(enabled) {
        const stats = normalizeJournalStats(state.journalStats);
        const gTeacher = normalizeGTeacherStats(stats.gTeacher) || { enabled: true };
        gTeacher.enabled = Boolean(enabled);
        stats.gTeacher = gTeacher;
        stats.updatedAt = new Date().toISOString();
        state.journalStats = stats;
        persist();
        render();
        setStatus(enabled ? "G老师自动写入已开启。" : "G老师自动写入已暂停。");
      }

      function getJournalRitualStats() {
        const stats = normalizeJournalStats(state.journalStats);
        return stats.ritual || null;
      }

      function countJournalDays(records) {
        const days = new Set();
        (records || []).forEach(function (record) {
          const dayKey = getJournalDayKey(record);
          if (dayKey) {
            days.add(dayKey);
          }
        });
        return days.size;
      }

      function countJournalRitualDays(records, ritualStats) {
        const days = new Set();
        (records || []).forEach(function (record) {
          const dayKey = getJournalRitualDayKey(record, ritualStats);
          if (dayKey && dayKey >= ritualStats.startDay) {
            days.add(dayKey);
          }
        });
        return days.size;
      }

      function getJournalDayKey(record) {
        const value = getJournalDateValue(record);
        if (!value || !isValidDate(value)) {
          return "";
        }

        return formatLocalDayKey(new Date(value));
      }

      function getJournalRitualDayKey(record, ritualStats) {
        const value = normalizeDateTime(record && record.createdAt) || normalizeDateTime(record && record.updatedAt);
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        if (ritualStats && ritualStats.dayBoundaryHour > 0 && date.getHours() < ritualStats.dayBoundaryHour) {
          date.setDate(date.getDate() - 1);
        }
        return formatLocalDayKey(date);
      }

      function formatLocalDayKey(date) {
        if (!date || !isValidDate(date)) {
          return "";
        }

        const pad = function (number) {
          return String(number).padStart(2, "0");
        };
        return [date.getFullYear(), pad(date.getMonth() + 1), pad(date.getDate())].join("-");
      }

      function countTextCharacters(text) {
        return Array.from(String(text || "").replace(/\s+/g, "")).length;
      }

      function isGTeacherRecord(record) {
        if (!record || typeof record !== "object") {
          return false;
        }
        const id = typeof record.id === "string" ? record.id : "";
        if (G_TEACHER_ID_PATTERN.test(id)) {
          return true;
        }
        const text = typeof record.text === "string" ? record.text.trim() : "";
        return text.endsWith(G_TEACHER_SIGNATURE);
      }

      function hasGTeacherJournalRecords() {
        return (state.records || []).some(function (record) {
          return record.type === "journal" && isGTeacherRecord(record);
        });
      }

      function formatSummaryNumber(value) {
        return Number(value || 0).toLocaleString("zh-CN");
      }

      function renderList(visible) {
        const activeInlineEditDraft = getActiveInlineEditDraft();
        const conflictMap = buildConflictMap(state.records);

        if (!visible.length) {
          recordListRenderInProgress = true;
          try {
            recordList.innerHTML = '<div class="empty">没有匹配的记录。可以直接在上方写下第一条。</div>';
          } finally {
            recordListRenderInProgress = false;
          }
          return;
        }

        recordListRenderInProgress = true;
        try {
          recordList.innerHTML = visible.map(function (record) {
            return renderItem(record, conflictMap[record.id] || []);
          }).join("");
        } finally {
          recordListRenderInProgress = false;
        }
        restoreInlineEditDraft(activeInlineEditDraft);
      }

      function renderItem(record, conflicts) {
        const readOnly = isRecordReadOnly(record);
        const editLocked = isRecordEditLocked(record);
        const deleteLocked = isRecordDeleteLocked(record);
        const toggleDisabled = isRecordToggleDisabled(record);
        const editing = state.editingId === record.id && !editLocked;
        const urgent = hasUrgencyTag(record);
        const classes = [
          "item",
          record.type,
          isGTeacherRecord(record) ? "g-teacher" : "",
          readOnly ? "readonly" : "",
          isPrepared(record) ? "prepared" : "",
          isVisuallyCompleted(record) ? "completed" : "",
          isAutoCompletionPending(record) ? "auto-completed" : "",
          urgent ? "upcoming" : ""
        ].filter(Boolean).join(" ");
        const toggleMeta = getToggleMeta(record);

        return [
          '<article class="' + classes + '" data-id="' + escapeHtml(record.id) + '">',
