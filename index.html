      function populateRemoteSyncPanel() {
        remoteRepoInput.value = state.remote.repo || DEFAULT_REMOTE_REPO;
        remoteBranchInput.value = state.remote.branch || DEFAULT_REMOTE_BRANCH;
        remotePathInput.value = state.remote.path || DEFAULT_REMOTE_PATH;
        remoteTokenInput.value = "";
        remoteTokenInput.placeholder = state.remote.token
          ? (state.remote.temporary ? "临时 token 已启用，留空不变" : "token 已保存，留空不变")
          : "GitHub token";
      }

      function loadRemoteSyncSettings() {
        try {
          const raw = localStorage.getItem(REMOTE_SYNC_STORAGE_KEY);
          if (!raw) {
            return;
          }

          const saved = JSON.parse(raw);
          const repo = normalizeRemoteRepo(saved.repo || "");
          const branch = normalizeRemoteBranch(saved.branch || "");
          const path = normalizeRemotePath(saved.path || "");
          const token = typeof saved.token === "string" ? saved.token.trim() : "";
          if (!repo || !path || !token) {
            return;
          }

          state.remote.enabled = true;
          state.remote.repo = repo;
          state.remote.branch = branch || DEFAULT_REMOTE_BRANCH;
          state.remote.path = path;
          state.remote.token = token;
          state.remote.sha = typeof saved.sha === "string" ? saved.sha : "";
          state.remote.lastSyncAt = typeof saved.lastSyncAt === "string" ? saved.lastSyncAt : "";
          state.remote.lastPayloadAt = typeof saved.lastPayloadAt === "string" ? saved.lastPayloadAt : "";
          state.remote.staleSha = typeof saved.staleSha === "string" ? saved.staleSha : "";
          state.remote.pushLocalNext = Boolean(saved.pushLocalNext);
          state.remote.temporary = false;
          state.remote.temporaryStartedAt = "";
        } catch (error) {
          console.error(error);
        }
      }

      function saveRemoteSyncSettingsToLocal() {
        if (!state.remote.enabled || state.remote.temporary) {
          localStorage.removeItem(REMOTE_SYNC_STORAGE_KEY);
          return;
        }

        localStorage.setItem(REMOTE_SYNC_STORAGE_KEY, JSON.stringify({
          repo: state.remote.repo,
          branch: state.remote.branch,
          path: state.remote.path,
          token: state.remote.token,
          sha: state.remote.sha,
          lastSyncAt: state.remote.lastSyncAt,
          lastPayloadAt: state.remote.lastPayloadAt,
          staleSha: state.remote.staleSha,
          pushLocalNext: Boolean(state.remote.pushLocalNext)
        }));
      }

      async function saveRemoteSyncSettings() {
        await applyRemoteSyncSettings({ temporary: false });
      }

      async function startTemporaryRemoteSync() {
        await applyRemoteSyncSettings({ temporary: true });
      }

      async function applyRemoteSyncSettings(options) {
        const opts = options || {};
        const repo = normalizeRemoteRepo(remoteRepoInput.value);
        const branch = normalizeRemoteBranch(remoteBranchInput.value);
        const path = normalizeRemotePath(remotePathInput.value);
        const inputToken = (remoteTokenInput.value || "").trim();
        const fallbackToken = state.remote.temporary
          ? (opts.temporary ? state.remote.token : "")
          : state.remote.token;
        const token = inputToken || fallbackToken;

        if (!repo || !path || !token) {
          setStatus("请填写 GitHub 仓库、路径和 token。");
          return;
        }

        state.remote.enabled = true;
        state.remote.repo = repo;
        state.remote.branch = branch || DEFAULT_REMOTE_BRANCH;
        state.remote.path = path;
        state.remote.token = token;
        state.remote.sha = "";
        state.remote.lastSyncAt = "";
        state.remote.lastPayloadAt = "";
        state.remote.staleSha = "";
        state.remote.pushLocalNext = false;
        state.remote.error = "";
        state.remote.temporary = Boolean(opts.temporary);
        state.remote.temporaryStartedAt = state.remote.temporary
          ? (state.remote.temporaryStartedAt || new Date().toISOString())
          : "";
        state.sessionOnly = Boolean(opts.temporary);
        state.remote.panelOpen = false;
        remoteSyncPanel.hidden = true;
        if (state.sessionOnly) {
          localStorage.removeItem(STORAGE_KEY);
        }
        saveRemoteSyncSettingsToLocal();
        populateRemoteSyncPanel();
        updateStorageStatus();
        await startRemoteSync(true);
        setStatus(state.remote.temporary ? "已开启临时同步，过往日记已隐藏。" : "已保存 GitHub 同步。");
      }

      function clearRemoteSyncSettings() {

        if (!ok) {

        resetRemoteSyncState();

      }

      function resetRemoteSyncState() {
        state.remote.enabled = false;
        state.remote.token = "";
        state.remote.sha = "";
        state.remote.lastSyncAt = "";
        state.remote.lastPayloadAt = "";
        state.remote.staleSha = "";
        state.remote.pushLocalNext = false;
        state.remote.error = "";
        state.remote.temporary = false;

      async function secureExit() {
        const ok = window.confirm("安全退出会清除此浏览器里的记录缓存、GitHub token 和云盘文件授权；不会删除 GitHub 上的数据文件。是否继续？");
        if (!ok) {

        state.remote.branch = DEFAULT_REMOTE_BRANCH;
        state.remote.path = DEFAULT_REMOTE_PATH;

        remoteSyncPanel.hidden = true;

        state.records = [];
        state.deletedRecords = [];
        state.recurrenceCompletionArchive = [];
        state.recordsRevision = 0;
        state.localPayloadAt = "";
        state.filter = "all";
        state.search = "";
        state.editingId = null;
        state.composing = false;
        state.composerExpanded = false;
        state.sessionOnly = false;
        quickInput.value = "";
        quickEventAt.value = "";
        quickType.value = "auto";
        searchInput.value = "";

      async function startRemoteSync(runNow) {
        window.clearInterval(remotePollTimer);
        if (!state.remote.enabled) {
          return;
        }

        if (runNow) {
          await syncRemoteRecords({ createIfMissing: true });
        }

        remotePollTimer = window.setInterval(function () {
          syncRemoteRecords({ silent: true });
        }, REMOTE_SYNC_INTERVAL);
      }

      async function syncRemoteRecords(options) {
        if (!state.remote.enabled) {
          toggleRemoteSyncPanel(true);
          setStatus("请先设置 GitHub 同步。");
          return;
        }

        if (state.remote.writeInFlight || state.remote.writeQueued) {
          setStatus("GitHub 同步正在进行。");
          return;
        }

        const opts = options || {};

        try {
          state.remote.error = "";
          updateStorageStatus();

          if (state.remote.pushLocalNext) {
            const ok = await writeCurrentRecordsToRemote();
            if (ok && !opts.silent) {
              setStatus("已将本地恢复结果写回 GitHub。");
            } else if (!ok && !opts.silent) {
              setStatus(state.remote.error + "。");
            }
            return;
          }

          const revisionBeforeFetch = state.recordsRevision;
          const recordsBeforeFetch = getRecordsSnapshot();
          const result = await fetchRemoteRecords();
          if (revisionBeforeFetch !== state.recordsRevision
            || recordsBeforeFetch !== getRecordsSnapshot()
            || state.remote.pushLocalNext
            || state.remote.writeInFlight
            || state.remote.writeQueued) {
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("本地有新改动，已跳过 GitHub 旧数据。");
            }
            return;
          }

          if (result.missing) {
            if (opts.createIfMissing || state.records.length || state.deletedRecords.length || state.recurrenceCompletionArchive.length) {
              const ok = await writeCurrentRecordsToRemote();
              if (ok && !opts.silent) {
                setStatus("已创建 GitHub 数据文件。");
              } else if (!ok && !opts.silent) {
                setStatus(state.remote.error + "。");
              }
              return;
            }

            if (!opts.silent) {
              setStatus("GitHub 数据文件不存在。");
            }
            return;
          }

          if (isStaleRemoteResult(result)) {
            state.remote.staleSha = result.sha || state.remote.staleSha;
            state.remote.error = "";
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 返回了旧数据，已跳过。");
            }
            return;
          }

          const recordsChanged = !recordsEqual(state.records, result.records);
          const deletedRecordsChanged = !deletedRecordsEqual(state.deletedRecords, result.deletedRecords);
          const archiveChanged = !recurrenceCompletionArchivesEqual(
            state.recurrenceCompletionArchive,
            result.recurrenceCompletionArchive
          );
          if ((recordsChanged || deletedRecordsChanged || archiveChanged) && isRemoteOlderThanLocal(result)) {
            state.remote.sha = result.sha || state.remote.sha;
            state.remote.lastSyncAt = new Date().toISOString();
            state.remote.lastPayloadAt = state.localPayloadAt || state.remote.lastPayloadAt;
            state.remote.staleSha = result.sha || state.remote.staleSha;
            state.remote.error = "";
            state.remote.pushLocalNext = true;
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            queueRemoteWrite();
            if (!opts.silent) {
              setStatus("GitHub 数据比本地旧，已保留本地并准备写回。");
            }
            return;
          }

          state.remote.sha = result.sha;
          state.remote.lastSyncAt = new Date().toISOString();
          state.remote.lastPayloadAt = result.payloadAt || state.remote.lastPayloadAt;
          state.remote.staleSha = "";
          state.remote.error = "";

          if (!recordsChanged && !deletedRecordsChanged && !archiveChanged) {
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 已是最新。");
            }
            return;
          }

          if ((recordsChanged || deletedRecordsChanged || archiveChanged)
            && !state.remote.lastSyncAt
            && state.records.length
            && result.records.length
            && !window.confirm("GitHub 数据会覆盖当前本地内容，是否继续？")) {
            setStatus("已取消 GitHub 同步。");
            return;
          }

          state.records = result.records;
          state.deletedRecords = result.deletedRecords;
          state.recurrenceCompletionArchive = result.recurrenceCompletionArchive;
          state.editingId = null;
          saveLocalRecords({
            payloadSavedAt: result.savedAt,
            payloadSyncedAt: result.syncedAt
          });
          queueSyncFileWrite();
          saveRemoteSyncSettingsToLocal();
          render();
          updateStorageStatus();

          if (!opts.silent) {
            setStatus("已从 GitHub 同步。");
          }
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 同步失败", error);
          updateStorageStatus();
          if (!opts.silent) {
            setStatus(state.remote.error + "。");
          }
        }
      }

      async function fetchRemoteRecords() {
        const response = await fetch(getRemoteContentsUrl(true), {
          headers: getRemoteHeaders(false),
          cache: "no-store"
        });

        if (response.status === 404) {
          return {
            missing: true,
            records: [],
            deletedRecords: [],
            recurrenceCompletionArchive: [],
            sha: ""
          };
        }

        if (!response.ok) {
          throw await createRemoteHttpError(response, "GitHub 读取失败");
        }

        const data = await response.json();
        const text = decodeBase64Utf8(String(data.content || ""));
        const payload = parseRecordsEnvelope(text);
        return {
          missing: false,
          records: payload.records,
          deletedRecords: payload.deletedRecords,
          recurrenceCompletionArchive: payload.recurrenceCompletionArchive,
          sha: typeof data.sha === "string" ? data.sha : "",
          savedAt: payload.savedAt,
          syncedAt: payload.syncedAt,
          payloadAt: payload.payloadAt
        };
      }

      async function writeCurrentRecordsToRemote() {
        if (!state.remote.enabled) {
          return false;
        }

        const revisionAtWriteStart = state.recordsRevision;
        const recordsSnapshot = getRecordsPayloadSnapshot();
        const baseSha = state.remote.sha;
        const syncedAt = new Date().toISOString();
        const payload = buildRecordsPayload({ syncedAt: syncedAt }, recordsSnapshot);
        const payloadAt = getPayloadTimestamp(payload) || syncedAt;

        state.remote.writeInFlight = true;
        updateStorageStatus();

        try {
          const body = {
            message: "Update minimal notes records",
            content: encodeBase64Utf8(JSON.stringify(payload, null, 2)),
            branch: state.remote.branch || DEFAULT_REMOTE_BRANCH
          };

          let response = null;
          for (let attempt = 0; attempt < REMOTE_WRITE_MAX_ATTEMPTS; attempt += 1) {
            const writeSha = attempt === 0 ? baseSha : state.remote.sha;
            if (writeSha) {
              body.sha = writeSha;
            } else {
              delete body.sha;
            }

            response = await fetch(getRemoteContentsUrl(false), {
              method: "PUT",
              headers: getRemoteHeaders(true),
              body: JSON.stringify(body),
              cache: "no-store"
            });

            if (response.ok) {
              break;
            }

            if (!isRemoteShaConflict(response) || attempt >= REMOTE_WRITE_MAX_ATTEMPTS - 1) {
              throw await createRemoteHttpError(response, "GitHub 写入失败");
            }

            const latest = await fetchRemoteRecords();
            state.remote.sha = latest.sha || "";
            await waitForRemoteWriteRetry(attempt);
          }

          if (!response || !response.ok) {
            throw await createRemoteHttpError(response, "GitHub 写入失败");
          }

          const data = await response.json();
          state.remote.sha = data && data.content && typeof data.content.sha === "string" ? data.content.sha : state.remote.sha;
          state.remote.lastSyncAt = new Date().toISOString();
          state.remote.lastPayloadAt = payloadAt;
          state.localPayloadAt = payloadAt;
          state.remote.staleSha = baseSha || state.remote.staleSha;
          state.remote.pushLocalNext = state.recordsRevision !== revisionAtWriteStart || state.remote.writeQueued;
          state.remote.error = "";
          saveRemoteSyncSettingsToLocal();
          updateStorageStatus();
          return true;
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 写入失败", error);
          updateStorageStatus();
          return false;
        } finally {
          state.remote.writeInFlight = false;
          updateStorageStatus();
        }
      }

      function queueRemoteWrite() {
        if (!state.remote.enabled) {
          return;
        }

        state.remote.pushLocalNext = true;
        state.remote.writeQueued = true;
        saveRemoteSyncSettingsToLocal();
        window.clearTimeout(remoteWriteTimer);
        remoteWriteTimer = window.setTimeout(function () {
          remoteWriteTimer = null;
          writeQueuedRemote();
        }, 700);
        updateStorageStatus();
      }

      async function writeQueuedRemote() {
        if (!state.remote.enabled) {
          return;
        }

        if (state.remote.writeInFlight) {
          window.clearTimeout(remoteWriteTimer);
          remoteWriteTimer = window.setTimeout(function () {
            remoteWriteTimer = null;
            writeQueuedRemote();
          }, 300);
          updateStorageStatus();
          return;
        }

        while (state.remote.writeQueued) {
          state.remote.writeQueued = false;
          const ok = await writeCurrentRecordsToRemote();
          if (!ok) {
            setStatus(state.remote.error + "；已保存在当前浏览器。");
            return;
          }
        }
      }

      function getRemoteContentsUrl(withRef) {
        const parts = state.remote.repo.split("/");
        const owner = encodeURIComponent(parts[0]);
        const repo = encodeURIComponent(parts[1]);
        const path = encodeRemotePath(state.remote.path);
        const base = "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path;
        if (!withRef) {
          return base;
        }

        return base + "?ref=" + encodeURIComponent(state.remote.branch || DEFAULT_REMOTE_BRANCH);
      }

      function getRemoteHeaders(includeJsonContentType) {
        const headers = {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer " + state.remote.token
        };

        if (includeJsonContentType) {
          headers["Content-Type"] = "application/json";
        }

        return headers;
      }

      function isRemoteShaConflict(response) {
        return Boolean(response && (response.status === 409 || response.status === 422));
      }

      function waitForRemoteWriteRetry(attempt) {
        return new Promise(function (resolve) {
          window.setTimeout(resolve, Math.min(1200, 200 + attempt * 250));
        });
      }

      async function createRemoteHttpError(response, fallback) {
        if (!response) {
          return new Error(fallback);
        }

        let message = "";
        try {
          const data = await response.json();
          message = data && typeof data.message === "string" ? data.message : "";
        } catch (error) {
          try {
            message = await response.text();
          } catch (innerError) {
            message = "";
          }
        }

        const error = new Error(fallback + "：" + response.status + (message ? " " + message : ""));
        error.status = response.status;
        error.githubMessage = message;
        return error;
      }

      function formatRemoteError(fallback, error) {
        const message = error && error.message ? String(error.message) : "";
        if (/load failed|failed to fetch|networkerror|cancelled|internet connection/i.test(message)) {
          if (isLocalFilePage()) {
            return fallback + "：网络请求失败。请用 https 页面打开，不要从手机本地文件直接打开 HTML。";
          }

          if (isHttpPage()) {
            return fallback + "：网络请求失败。请用 https 页面打开后再试。";
          }

          return fallback + "：网络请求失败。请检查网络、GitHub token 权限，或稍后重试。";
        }

        if (message) {
          return message;
        }

        return fallback;
      }

      function isLocalFilePage() {
        return Boolean(window.location && window.location.protocol === "file:");
      }

      function isHttpPage() {
        return Boolean(window.location && window.location.protocol === "http:");
      }

      function normalizeRemoteRepo(value) {
        let text = String(value || "").trim();
        text = text.replace(/^https:\/\/github\.com\//i, "");
        text = text.replace(/\.git$/i, "");
        text = text.replace(/^\/+|\/+$/g, "");
        const parts = text.split("/").filter(Boolean);
        if (parts.length < 2) {
          return "";
        }

        return parts[0] + "/" + parts[1];
      }

      function normalizeRemoteBranch(value) {
        return String(value || "").trim() || DEFAULT_REMOTE_BRANCH;
      }

      function normalizeRemotePath(value) {
        return String(value || "").trim().replace(/^\/+/, "") || DEFAULT_REMOTE_PATH;
      }

      function encodeRemotePath(path) {
        return normalizeRemotePath(path).split("/").map(encodeURIComponent).join("/");
      }

      function encodeBase64Utf8(text) {
        const bytes = new TextEncoder().encode(text);
        let binary = "";
        bytes.forEach(function (byte) {
          binary += String.fromCharCode(byte);
        });
        return window.btoa(binary);
      }

      function decodeBase64Utf8(value) {
        const binary = window.atob(String(value || "").replace(/\s/g, ""));
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return new TextDecoder().decode(bytes);
      }

      function recordsEqual(left, right) {
        return JSON.stringify(left || []) === JSON.stringify(right || []);
      }

      function deletedRecordsEqual(left, right) {
        return JSON.stringify(normalizeDeletedRecordEntries(left))
          === JSON.stringify(normalizeDeletedRecordEntries(right));
      }

      function recurrenceCompletionArchivesEqual(left, right) {
        return JSON.stringify(normalizeRecurrenceCompletionArchiveEntries(left))
          === JSON.stringify(normalizeRecurrenceCompletionArchiveEntries(right));
      }

      function getRecordsSnapshot(records) {
        return JSON.stringify({
          records: Array.isArray(records) ? records : state.records || [],
          deletedRecords: normalizeDeletedRecordEntries(state.deletedRecords),
          recurrenceCompletionArchive: normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive)
        });
      }

      function getRecordsPayloadSnapshot() {
        return JSON.parse(JSON.stringify({
          records: state.records || [],
          deletedRecords: normalizeDeletedRecordEntries(state.deletedRecords),
          recurrenceCompletionArchive: normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive)
        }));
      }

      function getPayloadTimestamp(payload) {
        if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
          return "";
        }

        const times = [payload.syncedAt, payload.savedAt, payload.exportedAt]
          .filter(isValidDate)
          .map(function (value) {
            return new Date(value).getTime();
          });
        if (!times.length) {
          return "";
        }

        return new Date(Math.max.apply(null, times)).toISOString();
      }

      function isStaleRemoteResult(result) {
        if (!result || result.missing) {
          return false;
        }

        const lastPayloadTime = isValidDate(state.remote.lastPayloadAt)
          ? new Date(state.remote.lastPayloadAt).getTime()
          : 0;
        const resultPayloadTime = isValidDate(result.payloadAt)
          ? new Date(result.payloadAt).getTime()
          : 0;
        const matchesKnownStaleSha = Boolean(
          state.remote.staleSha
          && result.sha
          && result.sha === state.remote.staleSha
        );

        if (matchesKnownStaleSha && (!lastPayloadTime || !resultPayloadTime || resultPayloadTime <= lastPayloadTime)) {
          return true;
        }

        return Boolean(lastPayloadTime && resultPayloadTime && resultPayloadTime < lastPayloadTime);
      }

      function isRemoteOlderThanLocal(result) {
        const localDeletedRecords = normalizeDeletedRecordEntries(state.deletedRecords);
        const remoteDeletedRecords = normalizeDeletedRecordEntries(result && result.deletedRecords);
        const localArchive = normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive);
        const remoteArchive = normalizeRecurrenceCompletionArchiveEntries(result && result.recurrenceCompletionArchive);
        const hasLocalData = state.records.length || localDeletedRecords.length || localArchive.length;
        if (!result || result.missing || !hasLocalData) {
          return false;
        }

        const localPayloadTime = isValidDate(state.localPayloadAt)
          ? new Date(state.localPayloadAt).getTime()
          : 0;
        const resultPayloadTime = isValidDate(result.payloadAt)
          ? new Date(result.payloadAt).getTime()
          : 0;

        const hasRemoteData = (Array.isArray(result.records) ? result.records.length : 0)
          || remoteDeletedRecords.length
          || remoteArchive.length;
        return Boolean(localPayloadTime && (!hasRemoteData || !resultPayloadTime || resultPayloadTime < localPayloadTime));
      }

      function render() {
        syncAutoCompletionState();
        const visible = getVisibleRecords();
        renderFilters();
        renderSummary(visible);
        renderList(visible);
        renderIdeaPane();
      }

      function renderFilters() {
        const buttons = filters.querySelectorAll("button[data-filter]");
        buttons.forEach(function (button) {
          const active = button.dataset.filter === state.filter;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", String(active));
        });
      }

      function renderSummary(visible) {
        const unfinishedCount = state.records.filter(function (record) {
          return !isVisuallyCompleted(record) && !isPassiveRecord(record);
        }).length;
        const totalVisibleCount = state.records.filter(function (record) {
          return !isRecordHiddenByTemporaryPrivacy(record);
        }).length;
        openCount.textContent = String(unfinishedCount);
        summaryText.textContent = "共 " + totalVisibleCount + " 条，当前显示 " + visible.length + " 条";
      }

      function renderList(visible) {
        const conflictMap = buildConflictMap(state.records);

        if (!visible.length) {
          recordList.innerHTML = '<div class="empty">没有匹配的记录。可以直接在上方写下第一条。</div>';
          return;
        }

        recordList.innerHTML = visible.map(function (record) {
          return renderItem(record, conflictMap[record.id] || []);
        }).join("");
      }

      function renderItem(record, conflicts) {
        const readOnly = isRecordReadOnly(record);
        const toggleDisabled = isRecordToggleDisabled(record);
        const editing = state.editingId === record.id && !readOnly;
        const urgent = hasUrgencyTag(record);
        const classes = [
          "item",
          record.type,
          readOnly ? "readonly" : "",
          isPrepared(record) ? "prepared" : "",
          isVisuallyCompleted(record) ? "completed" : "",
          isAutoCompletionPending(record) ? "auto-completed" : "",
          urgent ? "upcoming" : ""
        ].filter(Boolean).join(" ");
        const toggleMeta = getToggleMeta(record);

        return [
          '<article class="' + classes + '" data-id="' + escapeHtml(record.id) + '">',
          '<button type="button" class="toggle ' + escapeHtml(toggleMeta.className) + '" data-action="toggle" data-id="' + escapeHtml(record.id) + '" aria-label="' + escapeHtml(toggleMeta.ariaLabel) + '" title="' + escapeHtml(toggleMeta.title) + '"' + (toggleDisabled ? ' disabled aria-disabled="true"' : "") + '>',
          toggleMeta.symbol,
          "</button>",
          '<div class="item-main">',
          editing ? renderInlineEdit(record) : renderDisplay(record, urgent, conflicts),
          "</div>",
          '<div class="item-actions">',
          readOnly ? "" : '<button type="button" class="icon-btn danger" data-action="delete" data-id="' + escapeHtml(record.id) + '" aria-label="删除" title="删除">×</button>',
          "</div>",
          "</article>"
        ].join("");
      }

      function renderDisplay(record, urgent, conflicts) {
        const displayText = getDisplayText(record);
        const readOnly = isRecordReadOnly(record);
        const parts = [];
        parts.push(readOnly
          ? '<div class="item-line" title="' + escapeHtml(buildItemTitle(record)) + '">'
          : '<div class="item-line" data-action="open-edit" data-id="' + escapeHtml(record.id) + '" tabindex="0" title="' + escapeHtml(buildItemTitle(record)) + '">');
        parts.push('<span class="item-tags">');
        parts.push('<span class="badge">' + TYPE_LABELS[record.type] + "</span>");
        if (urgent) {
          parts.push('<span class="badge strong">' + escapeHtml(getUpcomingLabel(record)) + "</span>");
        }
        if (isRecurringRecord(record)) {
          parts.push('<span class="code-token token-repeat">' + escapeHtml(formatRecurrenceLabel(record.recurrence)) + "</span>");
        }
        if (record.eventAt) {
          parts.push('<span class="code-token token-time">' + escapeHtml(formatRecordTimeToken(record)) + "</span>");
        }
        if (conflicts && conflicts.length) {
          conflicts.forEach(function (conflict) {
            parts.push(renderConflictWarning(record.id, conflict));
          });
        }
        if (isPrepared(record) && !isAutoCompletionPending(record)) {
          parts.push('<span class="code-token token-prepared">已准备</span>');
        }
        if (isAutoCompletionPending(record)) {
          parts.push('<span class="code-token token-auto">已结束</span>');
          parts.push('<button type="button" class="code-token token-action" data-action="confirm-auto-complete" data-id="' + escapeHtml(record.id) + '" title="确认自动完成">确认</button>');
          parts.push('<button type="button" class="code-token token-action" data-action="revert-auto-complete" data-id="' + escapeHtml(record.id) + '" title="恢复为未完成">revert</button>');
        }
        if (record.type === "journal") {
          parts.push('<span class="code-token token-muted">' + escapeHtml(formatJournalDateToken(record)) + "</span>");
          if (readOnly) {
            parts.push('<span class="code-token token-muted">只读</span>');
          }
        }
        if (record.completed && record.type !== "journal") {
          parts.push('<span class="code-token token-muted">' + (isPassiveRecord(record) ? "archived" : "done") + "</span>");
        }
        parts.push("</span>");
        parts.push('<span class="item-text">' + renderDisplayTextHtml(record) + "</span>");
        parts.push("</div>");
        return parts.join("");
      }

      function renderIdeaPane() {
        if (!ideaPane) {
          return;
        }

        const journalFocus = state.filter === "journal";
        const ideas = getOpenIdeas();
        const hasIdeas = ideas.length > 0;
        const shouldShowIdeaPane = hasIdeas || journalFocus;

        document.body.classList.toggle("journal-focus", journalFocus);
        workspace.classList.toggle("journal-focus", journalFocus);
        workspace.classList.toggle("has-ideas", shouldShowIdeaPane);
        setIdeaPanePrivacyMode(journalFocus);

        if (!shouldShowIdeaPane) {
          ideaPane.innerHTML = "";
          return;
        }

        if (!hasIdeas) {
          ideaPane.innerHTML = journalFocus ? '<div class="journal-idea-veil" aria-hidden="true"></div>' : "";
          return;
        }

        ideaPane.innerHTML = ideas.map(renderIdeaCard).join("");
        syncIdeaPaneHeights();
      }

      function setIdeaPanePrivacyMode(enabled) {
        if (!ideaPane) {
          return;
        }

        if (enabled) {
          ideaPane.setAttribute("inert", "");
          ideaPane.setAttribute("aria-hidden", "true");
          return;
        }

        ideaPane.removeAttribute("inert");
        ideaPane.removeAttribute("aria-hidden");
      }

      function renderIdeaCard(record) {
        const editedAt = getLatestHistoryAt(record, "edited");
        const meta = [
          '<span class="idea-card-hint">创建于 ' + escapeHtml(formatDateTime(record.createdAt)) + "</span>"
        ];
        if (editedAt) {
          meta.push('<span class="idea-card-hint">编辑于 ' + escapeHtml(formatDateTime(editedAt)) + "</span>");
        }

        return [
          '<article class="idea-card" data-id="' + escapeHtml(record.id) + '">',
          '<div class="idea-card-head">',
          '<span class="idea-card-label">想法</span>',
          '<span class="idea-card-hint">' + escapeHtml(summarizeIdeaLength(record.text)) + '</span>',
          '</div>',
          '<div class="idea-card-meta">' + meta.join("") + "</div>",
          '<div class="idea-card-editor">',
          '<textarea data-role="idea-pane-text" data-id="' + escapeHtml(record.id) + '" spellcheck="false" aria-label="编辑想法">' + escapeHtml(record.text) + '</textarea>',
          '</div>',
          '<div class="idea-card-foot">',
          '<span>Ctrl/Cmd + Enter 收起焦点</span>',
          '</div>',
          '</article>'
        ].join("");
      }

      function getOpenIdeas() {
        return state.records
          .filter(function (record) {
            return record.type === "idea" && !record.completed;
          })
          .sort(sortRecords);
      }

      function syncIdeaPaneHeights() {
        const inputs = ideaPane.querySelectorAll('[data-role="idea-pane-text"]');
        inputs.forEach(autoSizeIdeaInput);
      }

      function autoSizeIdeaInput(input) {
        if (!input) {
          return;
        }

        const lineHeight = parseFloat(window.getComputedStyle(input).lineHeight) || 25;
        const minHeight = Math.ceil(lineHeight + 2);
        input.style.height = "auto";
        const nextHeight = Math.max(input.scrollHeight, minHeight);
        input.style.height = nextHeight + "px";
        input.style.overflowY = "hidden";
      }

      function summarizeIdeaLength(text) {
        const source = String(text || "");
        const lines = source ? source.split(/\r?\n/).length : 0;
        const chars = source.length;
        if (lines > 1) {
          return lines + " 行 / " + chars + " 字";
        }
        return chars + " 字";
      }

      function getToggleMeta(record) {
        if (isRecordReadOnly(record)) {
          return {
            className: "readonly",
            symbol: "•",
            ariaLabel: "只读日记",
            title: "3 天以外的日记只读"
          };
        }

        if (record && record.type === "journal") {
          return {
            className: "readonly",
            symbol: "",
            ariaLabel: "日记不支持完成",
            title: "日记不支持完成或归档"
          };
        }

        if (isAutoCompletionPending(record)) {
          return {
            className: "done",
            symbol: "✓",
            ariaLabel: "确认自动完成",
            title: "已自动完成，点击确认"
          };
        }

        if (supportsPreparedState(record)) {
          if (record.completed) {
            return {
              className: "done",
              symbol: "✓",
              ariaLabel: "重置日程状态",
              title: "已完成，点击重置为未开始"
            };
          }

          if (isPrepared(record)) {
            return {
              className: "partial",
              symbol: "•",
              ariaLabel: "标记日程已完成",
              title: "已准备，点击标记为已完成"
            };
          }

          return {
            className: "",
            symbol: "",
            ariaLabel: "标记日程已准备",
            title: "未开始，点击标记为已准备"
          };
        }

        const completionLabel = isPassiveRecord(record) ? "归档" : "完成";
        return {
          className: record.completed ? "done" : "",
          symbol: record.completed ? "✓" : "",
          ariaLabel: record.completed ? "取消" + completionLabel : completionLabel,
          title: record.completed ? "取消" + completionLabel : completionLabel
        };
      }

      function renderConflictWarning(id, conflict) {
        return '<button type="button" class="code-token token-warning conflict-warning" data-action="ignore-conflict" data-id="' + escapeHtml(id) + '" data-conflict-key="' + escapeHtml(conflict.key) + '" title="' + escapeHtml(conflict.title) + '">warning</button>';
      }

      function renderInlineEdit(record) {
        return [
          '<div class="item-inline-edit">',
          '<textarea data-role="edit-inline-text" class="item-inline-input" rows="1" spellcheck="false" aria-label="编辑记录">' + escapeHtml(record.text) + '</textarea>',
          '<span class="code-token token-muted">Enter 保存 / Esc 取消</span>',
          "</div>"
        ].join("");
      }

      function buildItemTitle(record) {
        const parts = ["创建于 " + formatDateTime(record.createdAt)];
        const preparedAt = getLatestHistoryAt(record, "prepared");
        const completedAt = getLatestHistoryAt(record, "completed");
        const editedAt = getLatestHistoryAt(record, "edited");
        const reopenedAt = getLatestHistoryAt(record, "reopened");

        if (isRecurringRecord(record)) {
          parts.push("周期 " + formatRecurrenceLabel(record.recurrence));
        }
        if (preparedAt) {
          parts.push("准备于 " + formatDateTime(preparedAt));
        }
        if (completedAt) {
          parts.push("完成于 " + formatDateTime(completedAt));
        }
        if (editedAt) {
          parts.push("编辑于 " + formatDateTime(editedAt));
        }
        if (reopenedAt) {
          parts.push("重新打开于 " + formatDateTime(reopenedAt));
        }

        return parts.join(" | ");
      }

      function formatRecordTimeToken(record) {
        if (!record.eventAt) {
          return "";
        }

        if (record.type === "deadline" && !hasExplicitTimeToken(record.text)) {
          return formatCompactDateOnly(record.eventAt) + " 前";
        }

        if (!hasExplicitTimeToken(record.text) && isMidnightDateTime(record.eventAt)) {
          return formatCompactDateOnly(record.eventAt);
        }

        return formatCompactDateTime(record.eventAt);
      }

      function formatCompactDateTime(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        const pad = function (num) {
          return String(num).padStart(2, "0");
        };

        return [
          date.getMonth() + 1,
          "/",
          date.getDate(),
          " ",
          pad(date.getHours()),
          ":",
          pad(date.getMinutes())
        ].join("");
      }

      function formatCompactDateOnly(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        return [date.getMonth() + 1, "/", date.getDate()].join("");
      }

      function formatJournalDateToken(record) {
        const value = getJournalDateValue(record);
        if (!value) {
          return "日记";
        }

        const date = new Date(value);
        const now = new Date();
        const datePart = date.getFullYear() === now.getFullYear()
          ? [date.getMonth() + 1, "/", date.getDate()].join("")
          : [date.getFullYear(), "/", date.getMonth() + 1, "/", date.getDate()].join("");
        const weekday = formatWeekdayToken(date);
        return weekday ? datePart + " " + weekday : datePart;
      }

      function getJournalDateValue(record) {
        const baseValue = normalizeDateTime(record && record.createdAt) || normalizeDateTime(record && record.updatedAt);
        if (!baseValue) {
          return "";
        }

        const date = new Date(baseValue);
        if (shouldBackdateJournalDate(date)) {
          date.setDate(date.getDate() - 1);
        }
        return date.toISOString();
      }

      function shouldBackdateJournalDate(date) {
        return Boolean(date
          && isValidDate(date)
          && date.getHours() < JOURNAL_ROLLOVER_HOUR);
      }

      function formatWeekdayToken(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const labels = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
        return labels[new Date(value).getDay()];
      }

      function isMidnightDateTime(value) {
        if (!value || !isValidDate(value)) {
          return false;
        }

        const date = new Date(value);
        return date.getHours() === 0 && date.getMinutes() === 0;
      }

      function hasExplicitWeekdayToken(text) {
        return /(?:周|星期)[一二三四五六日天]/.test(String(text || ""));
      }

      function supportsPreparedState(record) {
        return Boolean(record) && record.type === "meeting";
      }

      function isPrepared(record) {
        return supportsPreparedState(record) && Boolean(record.prepared) && !record.completed;
      }

      function isPassiveRecord(record) {
        return Boolean(record) && (record.type === "idea" || record.type === "journal");
      }

      function isRecordHiddenByTemporaryPrivacy(record) {
        if (!state.remote.temporary || !record || record.type !== "journal") {
          return false;
        }

        const cutoff = normalizeDateTime(state.remote.temporaryStartedAt);
        const createdAt = normalizeDateTime(record.createdAt);
        if (!cutoff || !createdAt) {
          return true;
        }

        return new Date(createdAt).getTime() < new Date(cutoff).getTime();
      }

      function isRecordReadOnly(record) {
        return isJournalReadOnly(record);
      }

      function isRecordToggleDisabled(record) {
        return Boolean(record && record.type === "journal") || isRecordReadOnly(record);
      }

      function isJournalReadOnly(record) {
        if (!record || record.type !== "journal") {
          return false;
        }

        const createdAt = normalizeDateTime(record.createdAt);
        if (!createdAt) {
          return false;
        }

        return Date.now() - new Date(createdAt).getTime() > JOURNAL_EDIT_WINDOW_MS;
      }

      function getDisplayText(record) {
        const rawText = record && typeof record.text === "string" ? record.text.trim() : "";
        if (isRecurringRecord(record)) {
          return getRecurringDisplayText(record, rawText);
        }

        const source = rawText;
        if (!source || !record || !isValidDate(record.eventAt)) {
          return source;
        }

        const dynamicDateText = replaceDynamicRelativeDateText(source, record.eventAt);
        if (dynamicDateText !== source) {
          return dynamicDateText;
        }

        if (hasExplicitWeekdayToken(source)) {
          return source;
        }

        if (!hasDisplayDateToken(source) && hasExplicitTimeToken(source)) {
          const datePrefix = formatRelativeDatePrefix(record.eventAt) || formatDotDateWithWeekday(record.eventAt);
          if (datePrefix) {
            return joinDisplayPrefix(datePrefix, source);
          }
        }

        const rangeText = injectWeekdayRangeIntoText(source, record.eventAt);
        if (rangeText !== source) {
          return rangeText;
        }

        const weekday = formatWeekdayToken(record.eventAt);
        if (!weekday) {
          return source;
        }

        return injectWeekdayIntoText(source, weekday);
      }

      function renderDisplayTextHtml(record) {
        if (record && record.type === "journal") {

      }

      function isLocationToken(token) {

        }

        return Boolean(getLocationAliasLabel(source))
          || isDiningHallFloorToken(source)
          || /^[\u4e00-\u9fa5]{2,3}\s*[A-Za-z]?\d{3,4}$/.test(source)
          || /^(?:[\u4e00-\u9fa5]{1,8}\s*)?[A-Za-z]?\d{2,4}\s*(?:会议室|教室|报告厅|办公室|实验室|研讨室|活动室|房间|室|厅)$/.test(source)
          || /^[\u4e00-\u9fa5]{1,8}(?:食堂|餐厅|饭店|咖啡馆|图书馆|办公室|实验室|会议室|教室|报告厅|礼堂|体育馆|活动室|研讨室|中心|校区|广场|大厦|酒店|宾馆)$/.test(source);
      }

      function renderLocationTokenHtml(location) {
        const source = String(location || "").trim();
        const locationLabel = getLocationAliasLabel(source) || getDiningHallFloorLabel(source);
        const titleAttr = locationLabel ? ' title="' + escapeHtml(locationLabel) + '"' : "";
        return '<span class="code-inline-location"' + titleAttr + ">" + escapeHtml(location) + "</span>";
      }

      function getLocationAliasLabel(location) {
        const source = String(location || "").trim();
        return Object.prototype.hasOwnProperty.call(LOCATION_ALIASES, source)
          ? LOCATION_ALIASES[source]
          : "";
      }

      function getLocationAliasPatternSource() {
        return Object.keys(LOCATION_ALIASES).map(escapeRegExp).join("|");
      }

      function isDiningHallFloorToken(token) {
        const source = String(token || "").trim();
        return new RegExp("^" + getDiningHallFloorPatternSource() + "$").test(source);
      }

      function getDiningHallFloorLabel(location) {
        const source = String(location || "").trim();
        const match = source.match(/^([\u4e00-\u9fa5]{1,8}区)\s*(?:食堂\s*)?([0-9一二两三四五六七八九十]{1,3})\s*(楼|层)$/);
        return match ? match[1] + "食堂" + match[2] + match[3] : "";
      }

      function getDiningHallFloorPatternSource() {
        return "[\\u4e00-\\u9fa5]{1,8}区\\s*(?:食堂\\s*)?[0-9一二两三四五六七八九十]{1,3}\\s*(?:楼|层)";

      function getJournalGroupedWordPatternSource(groups) {
        const words = [];
        groups.forEach(function(group) {
          group.words.forEach(function(word) {
            if (!words.includes(word)) {

            }

        return words
          .sort(function(a, b) {

          .map(escapeRegExp)
          .join("|");
      }

      function getJournalKeywordPatternSource() {

      }

      function getJournalKeywordTokenInfo(token) {
        return getJournalGroupedTokenInfo(JOURNAL_KEYWORD_GROUPS, token);
      }

      function getJournalPatternRuleSource() {
        return JOURNAL_PATTERN_RULES.map(function(rule) {
          return rule.pattern;
        }).join("|");
      }

      function getJournalPatternTokenInfo(token) {
        const source = String(token || "").trim();
        for (let index = 0; index < JOURNAL_PATTERN_RULES.length; index += 1) {
          const rule = JOURNAL_PATTERN_RULES[index];
          if (new RegExp("^" + rule.pattern + "$", "i").test(source)) {
            return {
              label: rule.label,
              className: rule.className
            };
          }
        }

        return null;
      }

      function getJournalGroupedTokenInfo(groups, token) {
        const source = String(token || "").trim().toLowerCase();
        for (let index = 0; index < groups.length; index += 1) {
          const group = groups[index];
          const hasWord = group.words.some(function(word) {
            return String(word || "").trim().toLowerCase() === source;

          if (hasWord) {

              className: group.className
            };
          }

      }

      function getJournalTimePatternSource() {

        if (!match) {

      function inferUpdateFromText(text, record) {
        const source = String(text || "").trim();
        const ideaMatch = source.match(/^\s*(?:想法|idea)\s*(?:[:：]\s*)?(.*)$/i);
        if (ideaMatch) {

            eventAt: "",
            recurrence: null

        const journalText = parseJournalCommandText(source);
        if (journalText) {
          return {
            text: journalText,
            type: "journal",
            eventAt: "",
            recurrence: null

            type: "journal",
            eventAt: "",

          type: record.type,
          eventAt: isTimedType(record.type) ? record.eventAt || "" : "",
          recurrence: null

      }

      function getVisibleRecords() {
        const keyword = state.search.toLowerCase();
        return state.records
          .slice()
          .sort(sortVisibleRecords)
          .filter(function (record) {

            } else if (state.filter === "all") {

            } else if (state.filter === "journal") {

            }

      function sortVisibleRecords(a, b) {

      }

      function sortRecords(a, b) {

        const bAutoPending = isAutoCompletionPending(b);
        const aCompleted = isCompletionSortingRecord(a);
        const bCompleted = isCompletionSortingRecord(b);

      function getCompletedSortTimestamp(record) {

        }

        }

          return { bucket: 0, value: endAt - nowTime };

        }

      function getCarryForwardRecurringSortEventAt(record, nowTime) {

        if (!eventAtValue || !isValidDate(eventAtValue)) {

        }

        if (!isRecurringRecord(record) || record.completed || record.type === "deadline") {

        }

        const currentEndAt = getTimedSortEndAt(record, eventAtValue);
        if ((currentEndAt != null && currentEndAt >= now.getTime())

        }

      }

      function getTimedSortStartAt(record, eventAtValue) {
        const eventAt = eventAtValue || (record && record.eventAt);
        if (!record || !isValidDate(eventAt)) {

        }

        const start = new Date(eventAt);
        if (isUntimedDateRecordAt(record, eventAt)) {

        return start.getTime();

      function getTimedSortEndAt(record, eventAtValue) {

        if (!record || !eventAt) {

        }

          return endAt ? endAt.getTime() : null;

          && !isPassiveRecord(record)

        }
        if (isPrepared(record)) {

        }
        if (record.completed) {

        return recurringLabel;

      function isCompletionDisplayRecord(record) {

        record.autoCompleteRef = "";
        record.autoCompletedAt = "";
        return changed;
      }

      function syncAutoCompletionState() {

        state.records.forEach(function (record) {

            record.autoCompleteRef = currentRef;
            record.autoCompletedAt = now;

        const rangeInfo = extractDateRangeInfo(record.text, eventAt);

        if (isMidnightDateTime(eventAt) && !hasExplicitTimeToken(record.text)) {

      function buildConflictMap(records) {

            map[left.record.id].push({

              title: buildConflictTitle(right.record)

            map[right.record.id].push({

              title: buildConflictTitle(left.record)
            });

        }

        return map;

      function isConflictCandidate(record) {

      function isConflictRecordType(record) {

          if (end.getTime() <= start.getTime()) {

      function getTimePeriodPatternSource() {

        }
        if (/^\d+$/.test(source)) {
          return parseInt(source, 10);
        }
        if (!/^[零〇一二两三四五六七八九十]+$/.test(source)) {
          return null;
        }

        const parsed = parseChineseNumber(source);
        if (parsed || /^(?:零|〇)$/.test(source)) {
          return parsed;
        }
        return null;
      }

      function parseMinuteToken(value) {
        const source = String(value || "").trim();
        if (!source) {
          return 0;
        }
        if (source.indexOf("半") >= 0) {
          return 30;
        }
        if (source.indexOf("一刻") >= 0) {
          return 15;
        }
        if (source.indexOf("三刻") >= 0) {
          return 45;
        }

        const minutes = parseTimeNumberToken(source.replace(/分/g, ""));
        return minutes == null ? null : clampMinute(minutes);
      }

      function parsePointTimeFragment(text, fallbackPeriodLabel) {
        const source = String(text || "");
        const pointPattern = "(" + getTimePeriodPatternSource() + ")?\\s*(" + getTimeNumberPatternSource() + ")\\s*点(?:\\s*(" + getMinuteTokenPatternSource() + "))?";
        const pointMatch = source.match(new RegExp(pointPattern));
        if (!pointMatch) {
          return null;
        }

        const hours = parseTimeNumberToken(pointMatch[2]);
        const minutes = parseMinuteToken(pointMatch[3]);
        if (hours == null || minutes == null) {
          return null;
        }

        return {
          hours: clampHour(applyTimePeriod(hours, pointMatch[1] || fallbackPeriodLabel || "")),
          minutes: minutes
        };
      }

      function parseTimeFragment(text, fallbackPeriodLabel) {
        const source = String(text || "");
        const periodLabel = extractTimePeriodLabel(source) || fallbackPeriodLabel || "";
        const hmMatch = source.match(new RegExp("(" + getTimeNumberPatternSource() + ")\\s*[:：]\\s*(" + getTimeNumberPatternSource() + ")"));
        if (hmMatch) {
          const hours = parseTimeNumberToken(hmMatch[1]);
          const minutes = parseTimeNumberToken(hmMatch[2]);
          if (hours == null || minutes == null) {
            return null;
          }

          return {
            hours: clampHour(applyTimePeriod(hours, periodLabel)),
            minutes: clampMinute(minutes)
          };
        }

        return parsePointTimeFragment(source, periodLabel);
      }

      function buildConflictTitle(otherRecord) {
        const timeLabel = formatRecordTimeToken(otherRecord);
        return '与「' + summarizeConflictText(getDisplayText(otherRecord)) + '」'
          + (timeLabel ? "（" + timeLabel + "）" : "")
          + "可能时间冲突，点击忽略这组提醒。";
      }

      function summarizeConflictText(text) {
        const source = String(text || "").trim();
        if (source.length <= 18) {
          return source;
        }
        return source.slice(0, 18) + "…";
      }

      function createConflictKey(leftId, rightId) {
        return [leftId, rightId].sort().join("::");
      }

      function isConflictIgnored(leftRecord, rightRecord, key) {
        const leftKeys = normalizeConflictKeys(leftRecord && leftRecord.ignoredConflictKeys);
        const rightKeys = normalizeConflictKeys(rightRecord && rightRecord.ignoredConflictKeys);
        return leftKeys.indexOf(key) >= 0 || rightKeys.indexOf(key) >= 0;
      }

      function ignoreConflict(id, key) {
        if (!id || !key) {
          return;
        }

        const ids = key.split("::");
        if (ids.length !== 2) {
          return;
        }

        let changed = false;
        state.records.forEach(function (record) {
          if (ids.indexOf(record.id) === -1) {
            return;
          }

          const keys = normalizeConflictKeys(record.ignoredConflictKeys);
          if (keys.indexOf(key) === -1) {
            keys.push(key);
            record.ignoredConflictKeys = keys;
            record.updatedAt = new Date().toISOString();
            changed = true;
          }
        });

        if (!changed) {
          return;
        }

        persist();
        render();
        setStatus("已忽略这组时间冲突提醒。");
      }

      function hasUrgencyTag(record) {
        if (!isTimedType(record.type) || !record.eventAt || record.completed) {
          return false;
        }

        const upcomingAt = getUpcomingComparisonAt(record);
        if (!upcomingAt) {
          return false;
        }

        const diff = upcomingAt.getTime() - Date.now();
        return isOverdueUrgencyRecord(record, diff) || (diff >= 0 && diff <= 24 * 60 * 60 * 1000);
      }

      function isOverdueUrgencyRecord(record, diff) {
        return diff < 0 && (record.type === "deadline" || isRecurringRecord(record));
      }

      function getUpcomingComparisonAt(record) {
        if (!record || !isValidDate(record.eventAt)) {
          return null;
        }

        const start = new Date(record.eventAt);
        if (isUntimedDateRecord(record) && start.getTime() <= Date.now()) {
          return getDefaultEventEndAt(record) || start;
        }

        return start;
      }

      function getUpcomingLabel(record) {
        const upcomingAt = getUpcomingComparisonAt(record);
        if (!upcomingAt) {
          return "";
        }

        const nowTime = Date.now();
        const diff = upcomingAt.getTime() - nowTime;
        const startsIn = new Date(record.eventAt).getTime() - nowTime;
        const hours = diff / (60 * 60 * 1000);
        const baseLabel = record.type === "deadline" ? "截止" : (record.type === "todo" ? "待办" : "日程");
        if (isOverdueUrgencyRecord(record, diff)) {
          return "已过期";
        }
        if (record.type === "todo") {
          return "24 小时内";
        }
        if (record.type === "deadline" && hours <= 2) {
          return "即将截止";
        }
        if (record.type !== "deadline" && !isUntimedDateRecord(record) && startsIn >= 0 && startsIn / (60 * 60 * 1000) <= 2) {
          return "即将开始";
        }
        if (hours <= 24) {
          return record.type === "deadline" ? "24h内截止" : "24 小时内";
        }
        return baseLabel;
      }

      function inferTypeAndText(text, explicitEventAt, manualType, contextualType) {
        const naturalInfo = extractNaturalDateInfo(text);
        const recurrenceInfo = extractRecurrenceInfo(text);
        const autoTimedType = inferTimedTypeFromText(text);

        if (manualType && manualType !== "auto") {
          if (manualType === "idea") {
            return {
              text: text,
              type: "idea",
              eventAt: "",
              recurrence: null
            };
          }

          if (manualType === "journal") {
            return {
              text: parseJournalCommandText(text) || text,
              type: "journal",
              eventAt: "",
              recurrence: null
            };
          }

          const resolvedManualEventAt = recurrenceInfo
            ? resolveRecurringEventAt(manualType, explicitEventAt, naturalInfo, recurrenceInfo, text)
            : resolveTimedEventAt(manualType, explicitEventAt, naturalInfo);
          return {
            text: text,
            type: manualType,
            eventAt: resolvedManualEventAt,
            recurrence: recurrenceInfo
          };
        }

        const ideaMatch = text.match(/^\s*(?:想法|idea)\s*(?:[:：]\s*)?(.*)$/i);
        if (ideaMatch) {
          return {
            text: (ideaMatch[1] || "").trim() || text.trim(),
            type: "idea",
            eventAt: "",
            recurrence: null
          };
        }

        const journalText = parseJournalCommandText(text);
        if (journalText) {
          return {
            text: journalText,
            type: "journal",
            eventAt: "",
            recurrence: null
          };
        }

        if (contextualType === "journal") {
          return {
            text: text,
            type: "journal",
            eventAt: "",
            recurrence: null
          };
        }

        if (recurrenceInfo) {
          const recurringType = isDeadlineHintText(text) ? "deadline" : "todo";
          return {
            text: text,
            type: recurringType,
            eventAt: resolveRecurringEventAt(recurringType, explicitEventAt, naturalInfo, recurrenceInfo, text),
            recurrence: recurrenceInfo
          };
        }

        if (explicitEventAt || naturalInfo.hasTemporalHint) {
          return {
            text: text,
            type: autoTimedType,
            eventAt: resolveTimedEventAt(autoTimedType, explicitEventAt, naturalInfo),
            recurrence: null
          };
        }

        return {
          text: text,
          type: "todo",
          eventAt: explicitEventAt,
          recurrence: null
        };
      }

      function isTimedType(type) {
        return type === "todo" || type === "meeting" || type === "deadline";
      }

      function isDeadlineHintText(text) {
        const source = String(text || "");
        if (/(?:\bddl\b|deadline|截止|截至|过期|到期|失效|期满|有效期)/i.test(source)) {
          return true;
        }

        const dateOrTimePattern = "(?:今天|明天|后天|大后天|今晚|今早|明早|明晚|周[一二三四五六日天]|星期[一二三四五六日天]|\\d{4}(?:年|[\\/.-])\\d{1,2}(?:月|[\\/.-])\\d{1,2}|\\d{1,2}(?:月|[\\/.-])\\d{1,2}(?:日|号)?|" + getTimeFragmentPatternSource() + ")";
        return new RegExp(dateOrTimePattern + "\\s*(?:前|之前)").test(source);
      }

      function inferTimedTypeFromText(text) {
        return isDeadlineHintText(text) ? "deadline" : "meeting";
      }

      function resolveTimedEventAt(type, explicitEventAt, naturalInfo) {
        if (!isTimedType(type)) {
          return "";
        }

        if (explicitEventAt) {
          return explicitEventAt;
        }

        if (naturalInfo.eventAt) {
          return naturalInfo.eventAt;
        }

        if (naturalInfo.date) {
          return type === "deadline"
            ? toEndOfDayIso(naturalInfo.date)
            : toStartOfDayIso(naturalInfo.date);
        }

        return "";
      }

      function resolveRecurringEventAt(type, explicitEventAt, naturalInfo, recurrenceInfo, text, referenceNow) {
        const recurrence = normalizeRecurrenceInfo(recurrenceInfo);
        if (!recurrence) {
          return "";
        }

        if (explicitEventAt) {
          return explicitEventAt;
        }

        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const anchorInfo = parseRecurrenceAnchorInfo(text, now);
        if (!anchorInfo && naturalInfo && naturalInfo.eventAt) {
          return naturalInfo.eventAt;
        }

        const date = anchorInfo
          ? getInitialRecurrenceDate(recurrence, text, now)
          : naturalInfo && naturalInfo.date
          ? new Date(naturalInfo.date.getTime())
          : getInitialRecurrenceDate(recurrence, text, now);
        if (!date || !isValidDate(date)) {
          return "";
        }

        const timeInfo = parseTimeFromText(text);
        if (timeInfo.matched) {
          date.setHours(timeInfo.hours, timeInfo.minutes, 0, 0);
        } else if (timeInfo.defaultHours != null) {
          date.setHours(timeInfo.defaultHours, timeInfo.defaultMinutes || 0, 0, 0);
        } else if (type === "deadline") {
          date.setHours(23, 59, 0, 0);
        } else {
          date.setHours(0, 0, 0, 0);
        }

        return date.toISOString();
      }

      function extractRecurrenceInfo(text) {
        const source = String(text || "").trim();
        if (!source) {
          return null;
        }

        if (/(?:每(?:个)?工作日|每周\s*(?:一|1)\s*(?:到|至|-|~|～)\s*(?:周)?(?:五|5))/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "weekly",
            interval: 1,
            mode: "fixed",
            weekdays: [0, 1, 2, 3, 4],
            label: "每个工作日"
          });
        }

        const yearlyFixed = source.match(/每(?:年|年度)\s*([0-9一二两三四五六七八九十]{1,3})\s*月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)?/);
        if (yearlyFixed) {
          const month = parsePositiveIntegerToken(yearlyFixed[1]);
          const monthDay = parsePositiveIntegerToken(yearlyFixed[2]);
          if (isValidMonth(month) && isValidMonthDay(monthDay)) {
            return normalizeRecurrenceInfo({
              frequency: "yearly",
              interval: 1,
              mode: "fixed",
              month: month,
              monthDay: monthDay
            });
          }
        }

        const monthlyFixed = source.match(/每(?:个)?月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/)
          || source.match(/每月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/);
        if (monthlyFixed) {
          const monthDay = parsePositiveIntegerToken(monthlyFixed[1]);
          if (isValidMonthDay(monthDay)) {
            return normalizeRecurrenceInfo({
              frequency: "monthly",
              interval: 1,
              mode: "fixed",
              monthDay: monthDay
            });
          }
        }

        if (/每(?:个)?月\s*(?:底|末)|每月\s*(?:底|末)/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "monthly",
            interval: 1,
            mode: "fixed",
            monthDay: "last",
            label: "每月底"
          });
        }

        const weeklyFixed = source.match(/每(?:周|星期|礼拜)\s*((?:(?:周|星期|礼拜)?[一二三四五六日天末]\s*[、,，和及]?\s*)+)(?!\s*(?:次|回|趟))/);
        if (weeklyFixed) {
          const weekdays = parseWeekdayList(weeklyFixed[1]);
          if (weekdays.length) {
            return normalizeRecurrenceInfo({
              frequency: "weekly",
              interval: 1,
              mode: "fixed",
              weekdays: weekdays
            });
          }
        }

        if (/(?:每天|每日|天天|\bdaily\b|\bevery day\b)/i.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "daily",
            interval: 1,
            mode: "fixed"
          });
        }

        const intervalMatch = source.match(/每(?:隔)?\s*([0-9一二两三四五六七八九十]+)\s*(天|日|周|星期|礼拜|个月|月|年)/);
        if (intervalMatch) {
          const interval = parsePositiveIntegerToken(intervalMatch[1]);
          const frequency = unitToRecurrenceFrequency(intervalMatch[2]);
          if (interval && frequency) {
            return normalizeRecurrenceInfo({
              frequency: frequency,
              interval: interval,
              mode: "sliding"
            });
          }
        }

        const oncePerMatch = source.match(/([0-9一二两三四五六七八九十]+)?\s*(天|日|周|星期|礼拜|个月|月|年)\s*(?:一?次|一回|一趟)/);
        if (oncePerMatch && oncePerMatch[2]) {
          const interval = oncePerMatch[1] ? parsePositiveIntegerToken(oncePerMatch[1]) : 1;
          const frequency = unitToRecurrenceFrequency(oncePerMatch[2]);
          if (interval && frequency) {
            return normalizeRecurrenceInfo({
              frequency: frequency,
              interval: interval,
              mode: "sliding"
            });
          }
        }

        if (/每(?:周|星期|礼拜)(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "weekly",
            interval: 1,
            mode: "sliding"
          });
        }

        if (/每(?:个)?月(?:一次|一回|一趟)?|每月(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "monthly",
            interval: 1,
            mode: "sliding"
          });
        }

        if (/每(?:年|年度)(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "yearly",
            interval: 1,
            mode: "sliding"
          });
        }

        return null;
      }

      function normalizeRecurrenceInfo(value) {
        if (!value || typeof value !== "object") {
          return null;
        }

        const frequency = ["daily", "weekly", "monthly", "yearly"].includes(value.frequency)
          ? value.frequency
          : "";
        if (!frequency) {
          return null;
        }

        const interval = Math.max(1, Math.min(365, parseInt(value.interval, 10) || 1));
        const mode = value.mode === "sliding" ? "sliding" : "fixed";
        const weekdays = Array.isArray(value.weekdays)
          ? uniqueSortedNumbers(value.weekdays, 0, 6)
          : [];
        const month = isValidMonth(parseInt(value.month, 10)) ? parseInt(value.month, 10) : 0;
        let monthDay = "";
        if (value.monthDay === "last") {
          monthDay = "last";
        } else if (isValidMonthDay(parseInt(value.monthDay, 10))) {
          monthDay = parseInt(value.monthDay, 10);
        }

        return {
          frequency: frequency,
          interval: interval,
          mode: mode,
          weekdays: weekdays,
          monthDay: monthDay,
          month: month,
          label: typeof value.label === "string" ? value.label.slice(0, 24) : ""
        };
      }

      function isRecurringRecord(record) {
        return Boolean(record && normalizeRecurrenceInfo(record.recurrence));
      }

      function recurrencesEqual(left, right) {
        return JSON.stringify(normalizeRecurrenceInfo(left)) === JSON.stringify(normalizeRecurrenceInfo(right));
      }

      function pushRecurrenceCompletion(record, completion) {
        if (!record || !completion) {
          return;
        }

        const entries = normalizeRecurrenceCompletionEntries(record.recurrenceCompletions);
        const normalized = normalizeRecurrenceCompletionEntry(completion);
        if (!normalized) {
          return;
        }

        entries.push(normalized);
        record.recurrenceCompletions = entries;
      }

      function archiveDeletedRecord(record, deletedAt) {
        const archivedRecord = normalizeImportedRecord(record);
        if (!archivedRecord) {
          return false;
        }

        pushHistory(archivedRecord, "deleted", deletedAt);
        const entry = normalizeDeletedRecordEntry({
          recordId: archivedRecord.id,
          deletedAt: deletedAt,
          record: archivedRecord
        });
        if (!entry) {
          return false;
        }

        const entries = normalizeDeletedRecordEntries(state.deletedRecords);
        entries.push(entry);
        state.deletedRecords = entries;
        return true;
      }

      function normalizeDeletedRecordEntries(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value
          .map(normalizeDeletedRecordEntry)
          .filter(Boolean)
          .sort(function (a, b) {
            return new Date(a.deletedAt).getTime() - new Date(b.deletedAt).getTime();
          });
      }

      function normalizeDeletedRecordEntry(value) {
        if (!value || typeof value !== "object" || !isValidDate(value.deletedAt)) {
          return null;
        }

        const fallbackId = typeof value.recordId === "string" && value.recordId ? value.recordId : "";
        const sourceRecord = value.record && typeof value.record === "object" ? value.record : value;
        const recordSource = fallbackId && (!sourceRecord.id || typeof sourceRecord.id !== "string")
          ? Object.assign({}, sourceRecord, { id: fallbackId })
          : sourceRecord;
        const record = normalizeImportedRecord(recordSource);
        if (!record) {

        return {
          recordId: fallbackId || record.id,
          deletedAt: new Date(value.deletedAt).toISOString(),
          record: record

      }

      function archiveRecurrenceCompletions(record, deletedAt) {
        const entry = createRecurrenceCompletionArchiveEntry(record, deletedAt);
        if (!entry) {
          return false;
        }

        const entries = normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive);
        entries.push(entry);
        state.recurrenceCompletionArchive = entries;
        return true;
      }

      function createRecurrenceCompletionArchiveEntry(record, deletedAt) {
        if (!record) {
          return null;
        }

        return normalizeRecurrenceCompletionArchiveEntry({
          recordId: record.id,
          deletedAt: deletedAt,
          text: typeof record.text === "string" ? record.text : "",
          displayText: getDisplayText(record),
          type: typeof record.type === "string" ? record.type : "",
          createdAt: record.createdAt,
          updatedAt: record.updatedAt,
          recurrence: record.recurrence,
          recurrenceLabel: formatRecurrenceLabel(record.recurrence),
          completions: record.recurrenceCompletions
        });
      }

      function normalizeRecurrenceCompletionEntries(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value
          .map(normalizeRecurrenceCompletionEntry)
          .filter(Boolean)
          .sort(function (a, b) {
            return new Date(a.completedAt).getTime() - new Date(b.completedAt).getTime();
          });
      }

      function normalizeRecurrenceCompletionEntry(value) {
        if (!value || typeof value !== "object" || !isValidDate(value.completedAt)) {
          return null;
        }

        return {
          occurrenceAt: normalizeDateTime(value.occurrenceAt),
          completedAt: new Date(value.completedAt).toISOString(),
          nextEventAt: normalizeDateTime(value.nextEventAt),
          text: typeof value.text === "string" ? value.text : "",
          displayText: typeof value.displayText === "string" ? value.displayText : "",
          recurrenceLabel: typeof value.recurrenceLabel === "string" ? value.recurrenceLabel : ""
        };
      }

      function normalizeRecurrenceCompletionArchiveEntries(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value
          .map(normalizeRecurrenceCompletionArchiveEntry)
          .filter(Boolean)
          .sort(function (a, b) {
            return new Date(a.deletedAt).getTime() - new Date(b.deletedAt).getTime();
          });
      }

      function normalizeRecurrenceCompletionArchiveEntry(value) {
        if (!value || typeof value !== "object" || !isValidDate(value.deletedAt)) {
          return null;
        }

        const completions = normalizeRecurrenceCompletionEntries(value.completions);
        if (!completions.length) {
          return null;
        }

        const recurrence = normalizeRecurrenceInfo(value.recurrence);
        return {
          recordId: typeof value.recordId === "string" ? value.recordId : "",
          deletedAt: new Date(value.deletedAt).toISOString(),
          text: typeof value.text === "string" ? value.text : "",
          displayText: typeof value.displayText === "string" ? value.displayText : "",
          type: typeof value.type === "string" ? value.type : "",
          createdAt: normalizeDateTime(value.createdAt),
          updatedAt: normalizeDateTime(value.updatedAt),
          recurrence: recurrence,
          recurrenceLabel: typeof value.recurrenceLabel === "string" && value.recurrenceLabel
            ? value.recurrenceLabel
            : formatRecurrenceLabel(recurrence),
          completions: completions
        };
      }

      function completeAndAdvanceRecurringRecord(record, completedAt) {
        const nextEventAt = getNextRecurrenceEventAt(record, completedAt);
        if (!nextEventAt) {
          return false;
        }

        const completedOccurrence = {
          occurrenceAt: normalizeDateTime(record.eventAt),
          completedAt: completedAt,
          nextEventAt: nextEventAt,
          text: typeof record.text === "string" ? record.text : "",
          displayText: getDisplayText(record),
          recurrenceLabel: formatRecurrenceLabel(record.recurrence)
        };

        record.prepared = false;
        record.completed = true;
        clearAutoCompleteState(record);
        record.updatedAt = completedAt;
        pushHistory(record, "completed", completedAt);
        pushRecurrenceCompletion(record, completedOccurrence);

        const nextText = stripRecurrenceInitialPhrase(record.text);
        if (nextText) {
          record.text = nextText;
        }
        record.eventAt = nextEventAt;
        record.prepared = false;
        record.completed = false;
        record.ignoredConflictKeys = [];
        record.updatedAt = completedAt;
        pushHistory(record, "recurrence_advanced", completedAt);
        return true;
      }

      function getNextRecurrenceEventAt(record, completedAtValue) {
        const recurrence = normalizeRecurrenceInfo(record && record.recurrence);
        if (!recurrence) {
          return "";
        }

        const completedAt = isValidDate(completedAtValue) ? new Date(completedAtValue) : new Date();
        const currentEventAt = isValidDate(record && record.eventAt)
          ? new Date(record.eventAt)
          : new Date(completedAt.getTime());
        const next = recurrence.mode === "sliding"
          ? getNextSlidingRecurrenceEventAt(recurrence, currentEventAt, completedAt)
          : getNextFixedRecurrenceEventAt(recurrence, currentEventAt, completedAt);

        return next && isValidDate(next) ? next.toISOString() : "";
      }

      function getNextSlidingRecurrenceEventAt(recurrence, currentEventAt, completedAt) {
        const base = new Date(completedAt.getTime());
        copyTimeParts(base, currentEventAt);
        return addRecurrenceUnits(base, recurrence.frequency, recurrence.interval);
      }

      function getNextFixedRecurrenceEventAt(recurrence, currentEventAt, completedAt) {
        const threshold = new Date(Math.max(currentEventAt.getTime(), completedAt.getTime()));
        return getFirstFixedOccurrenceAfter(recurrence, threshold, currentEventAt);
      }

      function getFirstFixedOccurrenceAfter(recurrence, threshold, timeSource) {
        if (recurrence.frequency === "daily") {
          let candidate = makeDateWithTime(threshold, timeSource);
          while (candidate.getTime() <= threshold.getTime()) {
            candidate.setDate(candidate.getDate() + recurrence.interval);
          }
          return candidate;
        }

        if (recurrence.frequency === "weekly") {

        if (recurrence.frequency === "monthly") {

              threshold.getFullYear(),
              threshold.getMonth(),
              recurrence.monthDay,
              timeSource
            );
            while (candidate.getTime() <= threshold.getTime()) {

            }
            return candidate;
          }

          let candidate = new Date(timeSource.getTime());
          while (candidate.getTime() <= threshold.getTime()) {

          return candidate;
        }

        if (recurrence.frequency === "yearly") {
          if (recurrence.month && recurrence.monthDay) {

              threshold.getFullYear(),
              recurrence.month - 1,
              recurrence.monthDay,
              timeSource
            );
            while (candidate.getTime() <= threshold.getTime()) {

                candidate.getFullYear() + recurrence.interval,
                recurrence.month - 1,
                recurrence.monthDay,
                timeSource

            }
            return candidate;
          }

        return null;
      }

      function getInitialRecurrenceDate(recurrence, text, referenceNow) {
        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const anchorInfo = parseRecurrenceAnchorInfo(text, now);
        if (anchorInfo) {
          const anchorDate = new Date(anchorInfo.date.getTime());
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          if (anchorInfo.relation === "previous") {

          }
          if (anchorDate.getTime() >= today.getTime()) {

          }
          return getNextOccurrenceFromAnchor(recurrence, anchorDate, today, true);

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (recurrence.mode === "sliding") {

        }

        if (recurrence.frequency === "monthly" && recurrence.monthDay) {

            today.getMonth(),
            recurrence.monthDay,
            today
          );
          return candidate.getTime() < today.getTime()

        }

            today.getFullYear(),
            recurrence.month - 1,
            recurrence.monthDay,
            today
          );
          return candidate.getTime() < today.getTime()
            ? makeMonthlyOccurrence(today.getFullYear() + recurrence.interval, recurrence.month - 1, recurrence.monthDay, today)

        }

      }

      function parseRecurrenceInitialDate(text, referenceNow) {

      }

      function parseRecurrenceAnchorInfo(text, referenceNow) {
        const source = String(text || "");
        if (!source) {
          return null;
        }

        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const previousPattern = /(?:上一次|上次|上回|上一回|上一期|上期|最近一次|最近一回|最近一期|上轮|上一轮|上个周期|上一周期|上次完成|上次执行|上次做|上次是)/g;
        const previousContext = getRecurrenceAnchorContext(source, previousPattern);
        if (previousContext) {
          const previousDate = parseAnchorDateFromText(previousContext, now, "previous");

              date: previousDate
            };
          }
        }

        const startPattern = /(?:第一次|首次|首回|第一回|第一期|首期|首个|从|自|自从|开始|起始|起始日期|开始日期|开始于|起于|起)/g;
        const startContext = getRecurrenceAnchorContext(source, startPattern);
        if (startContext) {
          const startDate = parseAnchorDateFromText(startContext, now, "start");
          if (startDate) {

              relation: "start",
              date: startDate
            };
          }
        }

      function getRecurrenceAnchorContext(source, pattern) {

          const end = Math.min(source.length, index + match[0].length + 72);

          }

        return "";
