        const text = decodeBase64Utf8(String(data.content || ""));
        const payload = parseRecordsEnvelope(text);
        return {
          missing: false,
          records: payload.records,
          sha: typeof data.sha === "string" ? data.sha : "",
          savedAt: payload.savedAt,
          syncedAt: payload.syncedAt,
          payloadAt: payload.payloadAt
        };
      }

      async function writeCurrentRecordsToRemote() {
        if (!state.remote.enabled) {
          return false;
        }

        const revisionAtWriteStart = state.recordsRevision;
        const recordsSnapshot = getRecordsPayloadSnapshot();
        const baseSha = state.remote.sha;
        const syncedAt = new Date().toISOString();
        const payload = buildRecordsPayload({ syncedAt: syncedAt }, recordsSnapshot);
        const payloadAt = getPayloadTimestamp(payload) || syncedAt;

        state.remote.writeInFlight = true;
        updateStorageStatus();

        try {
          const body = {
            message: "Update minimal notes records",
            content: encodeBase64Utf8(JSON.stringify(payload, null, 2)),
            branch: state.remote.branch || DEFAULT_REMOTE_BRANCH
          };

          if (baseSha) {
            body.sha = baseSha;
          }

          let response = await fetch(getRemoteContentsUrl(false), {
            method: "PUT",
            headers: getRemoteHeaders(true),
            body: JSON.stringify(body)
          });

          if (response.status === 409 || response.status === 422) {
            const latest = await fetchRemoteRecords();
            state.remote.sha = latest.sha || "";
            if (state.remote.sha) {
              body.sha = state.remote.sha;
            } else {
              delete body.sha;
            }
            response = await fetch(getRemoteContentsUrl(false), {
              method: "PUT",
              headers: getRemoteHeaders(true),
              body: JSON.stringify(body)
            });
          }

          if (!response.ok) {
            throw await createRemoteHttpError(response, "GitHub 写入失败");
          }

          const data = await response.json();
          state.remote.sha = data && data.content && typeof data.content.sha === "string" ? data.content.sha : state.remote.sha;
          state.remote.lastSyncAt = new Date().toISOString();
          state.remote.lastPayloadAt = payloadAt;
          state.localPayloadAt = payloadAt;
          state.remote.staleSha = baseSha || state.remote.staleSha;
          state.remote.pushLocalNext = state.recordsRevision !== revisionAtWriteStart || state.remote.writeQueued;
          state.remote.error = "";
          saveRemoteSyncSettingsToLocal();
          updateStorageStatus();
          return true;
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 写入失败", error);
          updateStorageStatus();
          return false;
        } finally {
          state.remote.writeInFlight = false;
          updateStorageStatus();
        }
      }

      function queueRemoteWrite() {
        if (!state.remote.enabled) {
          return;
        }

        state.remote.pushLocalNext = true;
        state.remote.writeQueued = true;
        saveRemoteSyncSettingsToLocal();
        window.clearTimeout(remoteWriteTimer);
        remoteWriteTimer = window.setTimeout(function () {
          remoteWriteTimer = null;
          writeQueuedRemote();
        }, 700);
        updateStorageStatus();
      }

      async function writeQueuedRemote() {
        if (!state.remote.enabled) {
          return;
        }

        if (state.remote.writeInFlight) {
          window.clearTimeout(remoteWriteTimer);
          remoteWriteTimer = window.setTimeout(function () {
            remoteWriteTimer = null;
            writeQueuedRemote();
          }, 300);
          updateStorageStatus();
          return;
        }

        while (state.remote.writeQueued) {
          state.remote.writeQueued = false;
          const ok = await writeCurrentRecordsToRemote();
          if (!ok) {
            setStatus(state.remote.error + "；已保存在当前浏览器。");
            return;
          }
        }
      }

      function getRemoteContentsUrl(withRef) {
        const parts = state.remote.repo.split("/");
        const owner = encodeURIComponent(parts[0]);
        const repo = encodeURIComponent(parts[1]);
        const path = encodeRemotePath(state.remote.path);
        const base = "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path;
        if (!withRef) {
          return base;
        }

        return base + "?ref=" + encodeURIComponent(state.remote.branch || DEFAULT_REMOTE_BRANCH);
      }

      function getRemoteHeaders(includeJsonContentType) {
        const headers = {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer " + state.remote.token
        };

        if (includeJsonContentType) {
          headers["Content-Type"] = "application/json";
        }

        return headers;
      }

      async function createRemoteHttpError(response, fallback) {
        let message = "";
        try {
          const data = await response.json();
          message = data && typeof data.message === "string" ? data.message : "";
        } catch (error) {
          try {
            message = await response.text();
          } catch (innerError) {
            message = "";
          }
        }

        const error = new Error(fallback + "：" + response.status + (message ? " " + message : ""));
        error.status = response.status;
        error.githubMessage = message;
        return error;
      }

      function formatRemoteError(fallback, error) {
        const message = error && error.message ? String(error.message) : "";
        if (/load failed|failed to fetch|networkerror|cancelled|internet connection/i.test(message)) {
          return fallback + "：网络请求失败。请用 https 页面打开，不要从手机本地文件直接打开 HTML。";
        }

        if (message) {
          return message;
        }

        return fallback;
      }

      function normalizeRemoteRepo(value) {
        let text = String(value || "").trim();
        text = text.replace(/^https:\/\/github\.com\//i, "");
        text = text.replace(/\.git$/i, "");
        text = text.replace(/^\/+|\/+$/g, "");
        const parts = text.split("/").filter(Boolean);
        if (parts.length < 2) {
          return "";
        }

        return parts[0] + "/" + parts[1];
      }

      function normalizeRemoteBranch(value) {
        return String(value || "").trim() || DEFAULT_REMOTE_BRANCH;
      }

      function normalizeRemotePath(value) {
        return String(value || "").trim().replace(/^\/+/, "") || DEFAULT_REMOTE_PATH;
      }

      function encodeRemotePath(path) {
        return normalizeRemotePath(path).split("/").map(encodeURIComponent).join("/");
      }

      function encodeBase64Utf8(text) {
        const bytes = new TextEncoder().encode(text);
        let binary = "";
        bytes.forEach(function (byte) {
          binary += String.fromCharCode(byte);
        });
        return window.btoa(binary);
      }

      function decodeBase64Utf8(value) {
        const binary = window.atob(String(value || "").replace(/\s/g, ""));
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return new TextDecoder().decode(bytes);
      }

      function recordsEqual(left, right) {
        return JSON.stringify(left || []) === JSON.stringify(right || []);
      }

      function getRecordsSnapshot(records) {
        return JSON.stringify(Array.isArray(records) ? records : state.records || []);
      }

      function getRecordsPayloadSnapshot() {
        return JSON.parse(getRecordsSnapshot());
      }

      function getPayloadTimestamp(payload) {
        if (!payload || typeof payload !== "object" || Array.isArray(payload)) {
          return "";
        }

        const times = [payload.syncedAt, payload.savedAt, payload.exportedAt]
          .filter(isValidDate)
          .map(function (value) {
            return new Date(value).getTime();
          });
        if (!times.length) {
          return "";
        }

        return new Date(Math.max.apply(null, times)).toISOString();
      }

      function isStaleRemoteResult(result) {
        if (!result || result.missing) {
          return false;
        }

        const lastPayloadTime = isValidDate(state.remote.lastPayloadAt)
          ? new Date(state.remote.lastPayloadAt).getTime()
          : 0;
        const resultPayloadTime = isValidDate(result.payloadAt)
          ? new Date(result.payloadAt).getTime()
          : 0;
        const matchesKnownStaleSha = Boolean(
          state.remote.staleSha
          && result.sha
          && result.sha === state.remote.staleSha
        );

        if (matchesKnownStaleSha && (!lastPayloadTime || !resultPayloadTime || resultPayloadTime <= lastPayloadTime)) {
          return true;
        }

        return Boolean(lastPayloadTime && resultPayloadTime && resultPayloadTime < lastPayloadTime);
      }

      function isRemoteOlderThanLocal(result) {
        if (!result || result.missing || !state.records.length || !result.records.length) {
          return false;
        }

        const localPayloadTime = isValidDate(state.localPayloadAt)
          ? new Date(state.localPayloadAt).getTime()
          : 0;
        const resultPayloadTime = isValidDate(result.payloadAt)
          ? new Date(result.payloadAt).getTime()
          : 0;

        return Boolean(localPayloadTime && resultPayloadTime && resultPayloadTime < localPayloadTime);
      }

      function render() {
        syncAutoCompletionState();
        const visible = getVisibleRecords();
        renderFilters();
        renderSummary(visible);
        renderList(visible);
        renderIdeaPane();
      }

      function renderFilters() {
        const buttons = filters.querySelectorAll("button[data-filter]");
        buttons.forEach(function (button) {
          const active = button.dataset.filter === state.filter;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", String(active));
        });
      }

      function renderSummary(visible) {
        const unfinishedCount = state.records.filter(function (record) {
          return !isVisuallyCompleted(record) && record.type !== "idea";
        }).length;
        openCount.textContent = String(unfinishedCount);
        summaryText.textContent = "共 " + state.records.length + " 条，当前显示 " + visible.length + " 条";
      }

      function renderList(visible) {
        const conflictMap = buildConflictMap(state.records);

        if (!visible.length) {
          recordList.innerHTML = '<div class="empty">没有匹配的记录。可以直接在上方写下第一条。</div>';
          return;
        }

        recordList.innerHTML = visible.map(function (record) {
          return renderItem(record, conflictMap[record.id] || []);
        }).join("");
      }

      function renderItem(record, conflicts) {
        const editing = state.editingId === record.id;
        const upcoming = isUpcomingMeeting(record);
        const classes = [
          "item",
          record.type,
          isPrepared(record) ? "prepared" : "",
          isVisuallyCompleted(record) ? "completed" : "",
          isAutoCompletionPending(record) ? "auto-completed" : "",
          upcoming ? "upcoming" : ""
        ].filter(Boolean).join(" ");
        const toggleMeta = getToggleMeta(record);

        return [
          '<article class="' + classes + '" data-id="' + escapeHtml(record.id) + '">',
          '<button type="button" class="toggle ' + escapeHtml(toggleMeta.className) + '" data-action="toggle" data-id="' + escapeHtml(record.id) + '" aria-label="' + escapeHtml(toggleMeta.ariaLabel) + '" title="' + escapeHtml(toggleMeta.title) + '">',
          toggleMeta.symbol,
          "</button>",
          '<div class="item-main">',
          editing ? renderInlineEdit(record) : renderDisplay(record, upcoming, conflicts),
          "</div>",
          '<div class="item-actions">',
          '<button type="button" class="icon-btn danger" data-action="delete" data-id="' + escapeHtml(record.id) + '" aria-label="删除" title="删除">×</button>',
          "</div>",
          "</article>"
        ].join("");
      }

      function renderDisplay(record, upcoming, conflicts) {
        const displayText = getDisplayText(record);
        const parts = [];
        parts.push('<div class="item-line" data-action="open-edit" data-id="' + escapeHtml(record.id) + '" tabindex="0" title="' + escapeHtml(buildItemTitle(record)) + '">');
        parts.push('<span class="item-tags">');
        parts.push('<span class="badge">' + TYPE_LABELS[record.type] + "</span>");
        if (upcoming) {
          parts.push('<span class="badge strong">' + escapeHtml(getUpcomingLabel(record)) + "</span>");
        }
        if (isRecurringRecord(record)) {
          parts.push('<span class="code-token token-repeat">' + escapeHtml(formatRecurrenceLabel(record.recurrence)) + "</span>");
        }
        if (record.eventAt) {
          parts.push('<span class="code-token token-time">' + escapeHtml(formatRecordTimeToken(record)) + "</span>");
        }
        if (conflicts && conflicts.length) {
          conflicts.forEach(function (conflict) {
            parts.push(renderConflictWarning(record.id, conflict));
          });
        }
        if (isPrepared(record) && !isAutoCompletionPending(record)) {
          parts.push('<span class="code-token token-prepared">已准备</span>');
        }
        if (isAutoCompletionPending(record)) {
          parts.push('<span class="code-token token-auto">已结束</span>');
          parts.push('<button type="button" class="code-token token-action" data-action="confirm-auto-complete" data-id="' + escapeHtml(record.id) + '" title="确认自动完成">确认</button>');
          parts.push('<button type="button" class="code-token token-action" data-action="revert-auto-complete" data-id="' + escapeHtml(record.id) + '" title="恢复为未完成">revert</button>');
        }
        if (record.completed) {
          parts.push('<span class="code-token token-muted">' + (record.type === "idea" ? "archived" : "done") + "</span>");
        }
        parts.push("</span>");
        parts.push('<span class="item-text">' + highlightRecordText(displayText) + "</span>");
        parts.push("</div>");
        return parts.join("");
      }

      function renderIdeaPane() {
        if (!ideaPane) {
          return;
        }

        const ideas = getOpenIdeas();
        const hasIdeas = ideas.length > 0;
        workspace.classList.toggle("has-ideas", hasIdeas);

        if (!hasIdeas) {
          ideaPane.innerHTML = "";
          return;
        }

        ideaPane.innerHTML = ideas.map(renderIdeaCard).join("");
        syncIdeaPaneHeights();
      }

      function renderIdeaCard(record) {
        const editedAt = getLatestHistoryAt(record, "edited");
        const meta = [
          '<span class="idea-card-hint">创建于 ' + escapeHtml(formatDateTime(record.createdAt)) + "</span>"
        ];
        if (editedAt) {
          meta.push('<span class="idea-card-hint">编辑于 ' + escapeHtml(formatDateTime(editedAt)) + "</span>");
        }

        return [
          '<article class="idea-card" data-id="' + escapeHtml(record.id) + '">',
          '<div class="idea-card-head">',
          '<span class="idea-card-label">想法</span>',
          '<span class="idea-card-hint">' + escapeHtml(summarizeIdeaLength(record.text)) + '</span>',
          '</div>',
          '<div class="idea-card-meta">' + meta.join("") + "</div>",
          '<div class="idea-card-editor">',
          '<textarea data-role="idea-pane-text" data-id="' + escapeHtml(record.id) + '" spellcheck="false" aria-label="编辑想法">' + escapeHtml(record.text) + '</textarea>',
          '</div>',
          '<div class="idea-card-foot">',
          '<span>Ctrl/Cmd + Enter 收起焦点</span>',
          '</div>',
          '</article>'
        ].join("");
      }

      function getOpenIdeas() {
        return state.records
          .filter(function (record) {
            return record.type === "idea" && !record.completed;
          })
          .sort(sortRecords);
      }

      function syncIdeaPaneHeights() {
        const inputs = ideaPane.querySelectorAll('[data-role="idea-pane-text"]');
        inputs.forEach(autoSizeIdeaInput);
      }

      function autoSizeIdeaInput(input) {
        if (!input) {
          return;
        }

        const lineHeight = parseFloat(window.getComputedStyle(input).lineHeight) || 25;
        const minHeight = Math.ceil(lineHeight + 2);
        input.style.height = "auto";
        const nextHeight = Math.max(input.scrollHeight, minHeight);
        input.style.height = nextHeight + "px";
        input.style.overflowY = "hidden";
      }

      function summarizeIdeaLength(text) {
        const source = String(text || "");
        const lines = source ? source.split(/\r?\n/).length : 0;
        const chars = source.length;
        if (lines > 1) {
          return lines + " 行 / " + chars + " 字";
        }
        return chars + " 字";
      }

      function getToggleMeta(record) {
        if (isAutoCompletionPending(record)) {
          return {
            className: "done",
            symbol: "✓",
            ariaLabel: "确认自动完成",
            title: "已自动完成，点击确认"
          };
        }

        if (supportsPreparedState(record)) {
          if (record.completed) {
            return {
              className: "done",
              symbol: "✓",
              ariaLabel: "重置日程状态",
              title: "已完成，点击重置为未开始"
            };
          }

          if (isPrepared(record)) {
            return {
              className: "partial",
              symbol: "•",
              ariaLabel: "标记日程已完成",
              title: "已准备，点击标记为已完成"
            };
          }

          return {
            className: "",
            symbol: "",
            ariaLabel: "标记日程已准备",
            title: "未开始，点击标记为已准备"
          };
        }

        const completionLabel = record.type === "idea" ? "归档" : "完成";
        return {
          className: record.completed ? "done" : "",
          symbol: record.completed ? "✓" : "",
          ariaLabel: record.completed ? "取消" + completionLabel : completionLabel,
          title: record.completed ? "取消" + completionLabel : completionLabel
        };
      }

      function renderConflictWarning(id, conflict) {
        return '<button type="button" class="code-token token-warning conflict-warning" data-action="ignore-conflict" data-id="' + escapeHtml(id) + '" data-conflict-key="' + escapeHtml(conflict.key) + '" title="' + escapeHtml(conflict.title) + '">warning</button>';
      }

      function renderInlineEdit(record) {
        return [
          '<div class="item-inline-edit">',
          '<textarea data-role="edit-inline-text" class="item-inline-input" rows="1" spellcheck="false" aria-label="编辑记录">' + escapeHtml(record.text) + '</textarea>',
          '<span class="code-token token-muted">Enter 保存 / Esc 取消</span>',
          "</div>"
        ].join("");
      }

      function buildItemTitle(record) {
        const parts = ["创建于 " + formatDateTime(record.createdAt)];
        const preparedAt = getLatestHistoryAt(record, "prepared");
        const completedAt = getLatestHistoryAt(record, "completed");
        const editedAt = getLatestHistoryAt(record, "edited");
        const reopenedAt = getLatestHistoryAt(record, "reopened");

        if (isRecurringRecord(record)) {
          parts.push("周期 " + formatRecurrenceLabel(record.recurrence));
        }
        if (preparedAt) {
          parts.push("准备于 " + formatDateTime(preparedAt));
        }
        if (completedAt) {
          parts.push("完成于 " + formatDateTime(completedAt));
        }
        if (editedAt) {
          parts.push("编辑于 " + formatDateTime(editedAt));
        }
        if (reopenedAt) {
          parts.push("重新打开于 " + formatDateTime(reopenedAt));
        }

        return parts.join(" | ");
      }

      function formatRecordTimeToken(record) {
        if (!record.eventAt) {
          return "";
        }

        if (record.type === "deadline" && !hasExplicitTimeToken(record.text)) {
          return formatCompactDateOnly(record.eventAt) + " 前";
        }

        if (!hasExplicitTimeToken(record.text) && isMidnightDateTime(record.eventAt)) {
          return formatCompactDateOnly(record.eventAt);
        }

        return formatCompactDateTime(record.eventAt);
      }

      function formatCompactDateTime(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        const pad = function (num) {
          return String(num).padStart(2, "0");
        };

        return [
          date.getMonth() + 1,
          "/",
          date.getDate(),
          " ",
          pad(date.getHours()),
          ":",
          pad(date.getMinutes())
        ].join("");
      }

      function formatCompactDateOnly(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        return [date.getMonth() + 1, "/", date.getDate()].join("");
      }

      function formatWeekdayToken(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const labels = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
        return labels[new Date(value).getDay()];
      }

      function isMidnightDateTime(value) {
        if (!value || !isValidDate(value)) {
          return false;
        }

        const date = new Date(value);
        return date.getHours() === 0 && date.getMinutes() === 0;
      }

      function hasExplicitWeekdayToken(text) {
        return /(?:周|星期)[一二三四五六日天]/.test(String(text || ""));
      }

      function supportsPreparedState(record) {
        return Boolean(record) && record.type === "meeting";
      }

      function isPrepared(record) {
        return supportsPreparedState(record) && Boolean(record.prepared) && !record.completed;
      }

      function getDisplayText(record) {
        const source = record && typeof record.text === "string" ? record.text.trim() : "";
        if (!source || !record || !isValidDate(record.eventAt) || hasExplicitWeekdayToken(source)) {
          return source;
        }

        const rangeText = injectWeekdayRangeIntoText(source, record.eventAt);
        if (rangeText !== source) {
          return rangeText;
        }

        const weekday = formatWeekdayToken(record.eventAt);
        if (!weekday) {
          return source;
        }

        return injectWeekdayIntoText(source, weekday);
      }

      function injectWeekdayIntoText(source, weekday) {
        const fullDateText = insertWeekdayAfterPattern(
          source,
          /(\d{4}\s*(?:年|[\/.-])\s*\d{1,2}\s*(?:月|[\/.-])\s*\d{1,2}\s*(?:日|号)?)/,
          " " + weekday
        );
        if (fullDateText !== source) {
          return fullDateText;
        }

        const monthDayText = insertWeekdayAfterPattern(
          source,
          /(\d{1,2}\s*(?:月|[\/.-])\s*\d{1,2}\s*(?:日|号)?)/,
          " " + weekday
        );
        if (monthDayText !== source) {
          return monthDayText;
        }

        return insertWeekdayAfterPattern(source, /(大后天|后天|明天|今天|今日)/, weekday);
      }

      function injectWeekdayRangeIntoText(source, startValue) {
        const rangeInfo = extractDateRangeInfo(source, startValue);
        if (!rangeInfo) {
          return source;
        }

        const weekdayRange = formatWeekdayToken(rangeInfo.startDate) + "至" + formatWeekdayToken(rangeInfo.endDate);
        const insertAt = rangeInfo.index + rangeInfo.length;
        return source.slice(0, insertAt) + " " + weekdayRange + source.slice(insertAt);
      }

      function extractDateRangeInfo(source, startValue) {
        if (!source || !isValidDate(startValue)) {
          return null;
        }

        const startDate = new Date(startValue);
        const weekdayRange = extractWeekdayRangeInfo(source, startDate);
        if (weekdayRange) {
          return weekdayRange;
        }

        let match = source.match(/(\d{1,2})\s*(?:月|[\/.-])\s*(\d{1,2})\s*(?:日|号)?\s*(?:到|至|-|~|～)\s*(\d{1,2})\s*(?:月|[\/.-])\s*(\d{1,2})\s*(?:日|号)?/);
        if (match && match.index != null) {
          const year = startDate.getFullYear();
          const rangeStart = new Date(year, Number(match[1]) - 1, Number(match[2]));
          const rangeEnd = new Date(year, Number(match[3]) - 1, Number(match[4]));
          if (rangeEnd.getTime() < rangeStart.getTime()) {
            rangeEnd.setFullYear(rangeEnd.getFullYear() + 1);
          }
          return {
            index: match.index,
            length: match[0].length,
            startDate: rangeStart,
            endDate: rangeEnd
          };
        }

        match = source.match(/(\d{1,2})\s*(?:月|[\/.-])\s*(\d{1,2})\s*(?:日|号)?\s*(?:到|至|-|~|～)\s*(\d{1,2})\s*(?:日|号)?(?!\s*(?:月|[\/.-]))/);
        if (match && match.index != null) {
          const year = startDate.getFullYear();
          const rangeStart = new Date(year, Number(match[1]) - 1, Number(match[2]));
          const rangeEnd = new Date(year, Number(match[1]) - 1, Number(match[3]));
          if (rangeEnd.getTime() < rangeStart.getTime()) {
            rangeEnd.setMonth(rangeEnd.getMonth() + 1);
          }
          return {
            index: match.index,
            length: match[0].length,
            startDate: rangeStart,
            endDate: rangeEnd
          };
        }

        return null;
      }

      function extractWeekdayRangeInfo(source, startDate) {
        const match = String(source || "").match(/(?:(下周|本周|这周)\s*)?(?:(周|星期)\s*)?([一二三四五六日天])\s*(?:到|至|-|~|～)\s*(?:(周|星期)\s*)?([一二三四五六日天])/);
        if (!match || match.index == null || !(match[1] || match[2] || match[4])) {
          return null;
        }

        const startIndex = weekdayToIndex(match[3]);
        const endIndex = weekdayToIndex(match[5]);
        if (startIndex == null || endIndex == null) {
          return null;
        }

        const rangeStart = getSameWeekDate(startDate, startIndex);
        const rangeEnd = new Date(rangeStart.getTime());
        let endOffset = endIndex - startIndex;
        if (endOffset < 0) {
          endOffset += 7;
        }
        rangeEnd.setDate(rangeStart.getDate() + endOffset);

        return {
          index: match.index,
          length: match[0].length,
          startDate: rangeStart,
          endDate: rangeEnd
        };
      }

      function getSameWeekDate(anchorDate, weekdayIndex) {
        const date = new Date(anchorDate);
        const currentIndex = (date.getDay() + 6) % 7;
        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() + weekdayIndex - currentIndex);
        return date;
      }

      function insertWeekdayAfterPattern(source, pattern, suffix) {
        const match = String(source || "").match(pattern);
        if (!match || match.index == null) {
          return source;
        }

        const insertAt = match.index + match[0].length;
        return source.slice(0, insertAt) + suffix + source.slice(insertAt);
      }

      function highlightRecordText(text) {
        const source = String(text || "");
        const tokenPattern = /(想法[:：]?|(?:凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚)\s*(?:\d{1,2}[:：]\d{2}|\d{1,2}\s*点(?:半|[0-5]?\d\s*分?)?)|今天|明天|后天|大后天|今晚|今早|明早|明晚|下周[一二三四五六日天]|本周[一二三四五六日天]|这周[一二三四五六日天]|周[一二三四五六日天]|星期[一二三四五六日天]|凌晨|早上|今晨|上午|中午|今午|下午|傍晚|晚上|截止|截至|过期|到期|失效|期满|有效期|DDL|ddl|deadline|之前|前|(?:[在去到]\s*)?(?:[\u4e00-\u9fa5]{2,3}\s*[A-Za-z]?\d{3,4}|[A-Za-z]?\d{2,4}\s*(?:会议室|教室|报告厅|办公室|实验室|研讨室|活动室|房间|室|厅)|[\u4e00-\u9fa5]{1,8}(?:食堂|餐厅|饭店|咖啡馆|图书馆|办公室|实验室|会议室|教室|报告厅|礼堂|体育馆|活动室|研讨室|中心|校区|广场|大厦|酒店|宾馆))(?!\d|\s*(?:字|词|页|元|块|个|人|次|篇|本|分钟|小时|天|周|月|年|%))|\d{1,2}[:：]\d{2}|\d{1,2}\s*点(?:半|[0-5]?\d\s*分?)?|\d{4}(?:年|[\/.-])\d{1,2}(?:月|[\/.-])\d{1,2}|\d{1,2}(?:月|[\/.-])\d{1,2}(?:日|号)?|\d{1,2}(?:日|号))/g;
        let lastIndex = 0;
        let html = "";
        let match;

        while ((match = tokenPattern.exec(source)) !== null) {
          const token = match[0];
          const index = match.index;
          html += escapeHtml(source.slice(lastIndex, index));
          html += wrapHighlightedToken(token, source, index);
          lastIndex = index + token.length;
        }

        html += escapeHtml(source.slice(lastIndex));
        return html;
      }

      function wrapHighlightedToken(token, source, index) {
        if (/^想法/.test(token) || isDeadlineKeywordToken(token, source, index)) {
          return '<span class="code-inline-keyword">' + escapeHtml(token) + "</span>";
        }

        const locationWithPrefix = splitLocationPrefix(token);
        if (locationWithPrefix) {
          return escapeHtml(locationWithPrefix.prefix)
            + '<span class="code-inline-location">' + escapeHtml(locationWithPrefix.location) + "</span>";
        }

        if (isLocationToken(token)) {
          return '<span class="code-inline-location">' + escapeHtml(token) + "</span>";
        }

        if (isRejectedLocationLikeToken(token)) {
          return escapeHtml(token);
        }

        if (isTimeHighlightToken(token)) {
          return '<span class="code-inline-time">' + escapeHtml(token) + "</span>";
        }

        if (String(token || "").trim() === "前") {
          return escapeHtml(token);
        }

        return '<span class="code-inline-date">' + escapeHtml(token) + "</span>";
      }

      function isTimeHighlightToken(token) {
        const source = String(token || "").trim();
        return /^\d{1,2}[:：]\d{2}$/.test(source)
          || /点/.test(source)
          || /^(?:凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚)(?:\s*(?:\d{1,2}[:：]\d{2}|\d{1,2}\s*点(?:半|[0-5]?\d\s*分?)?))?$/.test(source);
      }

      function isLocationToken(token) {
        const source = String(token || "").trim();
        if (isRejectedLocationLikeToken(source)) {
          return false;
        }

        return /^[\u4e00-\u9fa5]{2,3}\s*[A-Za-z]?\d{3,4}$/.test(source)
          || /^(?:[\u4e00-\u9fa5]{1,8}\s*)?[A-Za-z]?\d{2,4}\s*(?:会议室|教室|报告厅|办公室|实验室|研讨室|活动室|房间|室|厅)$/.test(source)
          || /^[\u4e00-\u9fa5]{1,8}(?:食堂|餐厅|饭店|咖啡馆|图书馆|办公室|实验室|会议室|教室|报告厅|礼堂|体育馆|活动室|研讨室|中心|校区|广场|大厦|酒店|宾馆)$/.test(source);
      }

      function isRejectedLocationLikeToken(token) {
        return /^(?:加到|写到|改到|做到|达到|减到|补到|扩到|增至|加至)\s*[A-Za-z]?\d{3,4}$/.test(String(token || "").trim());
      }

      function splitLocationPrefix(token) {
        const source = String(token || "");
        if (!/^[在去到]/.test(source)) {
          return null;
        }

        const location = source.slice(1).trim();
        if (!isLocationToken(location)) {
          return null;
        }

        return {
          prefix: source.slice(0, source.indexOf(location)),
          location: location
        };
      }

      function isDeadlineKeywordToken(token, source, index) {
        const normalized = String(token || "").trim();
        if (/^(截止|截至|过期|到期|失效|期满|有效期|DDL|ddl|deadline|之前)$/i.test(normalized)) {
          return true;
        }

        return normalized === "前" && isDeadlineBeforeMarker(source, index);
      }

      function isDeadlineBeforeMarker(source, index) {
        if (typeof index !== "number") {
          return false;
        }

        return /(?:今天|明天|后天|大后天|今晚|今早|明早|明晚|下周[一二三四五六日天]|本周[一二三四五六日天]|这周[一二三四五六日天]|周[一二三四五六日天]|星期[一二三四五六日天]|\d{4}(?:年|[\/.-])\d{1,2}(?:月|[\/.-])\d{1,2}|\d{1,2}(?:月|[\/.-])\d{1,2}(?:日|号)?|\d{1,2}\s*点(?:半|[0-5]?\d\s*分?)?|\d{1,2}[:：]\d{2})\s*$/.test(String(source || "").slice(0, index));
      }

      function inferUpdateFromText(text, record) {
        const source = String(text || "").trim();
        const ideaMatch = source.match(/^\s*(?:想法|idea)\s*(?:[:：]\s*)?(.*)$/i);
        if (ideaMatch) {
          return {
            text: (ideaMatch[1] || "").trim() || source,
            type: "idea",
            eventAt: "",
            recurrence: null
          };
        }

        const recurrenceInfo = extractRecurrenceInfo(source);
        if (recurrenceInfo) {
          const recurrenceChanged = !recurrencesEqual(record && record.recurrence, recurrenceInfo);
          const naturalInfo = extractNaturalDateInfo(source);
          const shouldResolveEventAt = recurrenceChanged
            || Boolean(parseRecurrenceAnchorInfo(source))
            || (recurrenceInfo.mode === "sliding" && hasExplicitCalendarDateToken(source));
          const inferredType = isDeadlineHintText(source)
            ? "deadline"
            : (record && record.type === "meeting" ? "meeting" : "todo");
          const resolvedEventAt = shouldResolveEventAt
            ? resolveRecurringEventAt(inferredType, "", naturalInfo, recurrenceInfo, source)
            : normalizeDateTime(record && record.eventAt)
              || resolveRecurringEventAt(inferredType, "", naturalInfo, recurrenceInfo, source);

          return {
            text: source,
            type: inferredType,
            eventAt: resolvedEventAt,
            recurrence: recurrenceInfo
          };
        }

        const naturalInfo = extractNaturalDateInfo(source);
        if (naturalInfo.hasTemporalHint) {
          const inferredType = inferTimedTypeFromText(source);
          return {
            text: source,
            type: inferredType,
            eventAt: resolveTimedEventAt(inferredType, "", naturalInfo) || record.eventAt || "",
            recurrence: null
          };
        }

        return {
          text: source,
          type: record.type,
          eventAt: isTimedType(record.type) ? record.eventAt || "" : "",
          recurrence: null
        };
      }

      function getVisibleRecords() {
        const keyword = state.search.toLowerCase();
        return state.records
          .slice()
          .sort(sortVisibleRecords)
          .filter(function (record) {
            if (state.filter === "completed") {
              if (!isVisuallyCompleted(record)) {
                return false;
              }
            } else if (state.filter === "all") {
              if (record.type === "idea") {
                return false;
              }
            } else if (state.filter !== "all") {
              if (record.completed || record.type !== state.filter) {
                return false;
              }
            }

            if (!keyword) {
              return true;
            }

            const haystack = [
              getDisplayText(record),
              TYPE_LABELS[record.type],
              getStatusSearchText(record),
              record.eventAt ? formatDateTime(record.eventAt) : ""
            ].join(" ").toLowerCase();

            return haystack.includes(keyword);
          });
      }

      function sortVisibleRecords(a, b) {
        return sortRecords(a, b);
      }

      function sortRecords(a, b) {
        const aAutoPending = isAutoCompletionPending(a);
        const bAutoPending = isAutoCompletionPending(b);
        const nowTime = Date.now();
        if (aAutoPending !== bAutoPending) {
          return aAutoPending ? -1 : 1;
        }

        if (aAutoPending && bAutoPending) {
          return getAutoCompletionSortScore(a) - getAutoCompletionSortScore(b);
        }

        if (a.completed !== b.completed) {
          return a.completed ? 1 : -1;
        }

        if (a.completed && b.completed) {
          return getCompletedSortTimestamp(b) - getCompletedSortTimestamp(a);
        }

        const timedPriorityComparison = compareTimedPriority(a, b, nowTime);
        if (timedPriorityComparison !== 0) {
          return timedPriorityComparison;
        }

        return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
      }

      function getCompletedSortTimestamp(record) {
        const completedAt = getLatestHistoryAt(record, "completed");
        if (isValidDate(completedAt)) {
          return new Date(completedAt).getTime();
        }

        if (isValidDate(record && record.updatedAt)) {
          return new Date(record.updatedAt).getTime();
        }

        if (isValidDate(record && record.createdAt)) {
          return new Date(record.createdAt).getTime();
        }

        return 0;
      }

      function compareTimedPriority(left, right, nowTime) {
        const leftMeta = getTimedPriorityMeta(left, nowTime);
        const rightMeta = getTimedPriorityMeta(right, nowTime);
        if (leftMeta.bucket !== rightMeta.bucket) {
          return leftMeta.bucket - rightMeta.bucket;
        }
        if (leftMeta.value !== rightMeta.value) {
          return leftMeta.value - rightMeta.value;
        }
        return 0;
      }

      function getTimedPriorityMeta(record, nowTime) {
        if (!hasScheduledEvent(record) || record.completed) {
          return { bucket: 3, value: 0 };
        }

        if (isAutoCompletionPending(record)) {
          return { bucket: 2, value: Number.MAX_SAFE_INTEGER };
        }

        const startAt = new Date(record.eventAt).getTime();
        const endAt = getTimedSortEndAt(record);
        if (record.type === "deadline") {
          return { bucket: 1, value: startAt - nowTime };
        }

        if (endAt != null && startAt <= nowTime && nowTime < endAt) {
          return { bucket: 0, value: endAt - nowTime };
        }

        if (startAt >= nowTime) {
          return { bucket: 1, value: startAt - nowTime };
        }

        const sortAnchor = endAt != null && endAt > startAt ? endAt : startAt;
        return { bucket: 2, value: nowTime - sortAnchor };
      }

      function getTimedSortEndAt(record) {
        if (!record || !record.eventAt) {
          return null;
        }

        if (record.type === "meeting") {
          const endAt = getMeetingEndAt(record);
          return endAt ? endAt.getTime() : null;
        }

        if (isRecurringRecord(record)) {
          const endAt = getDefaultEventEndAt(record);
          return endAt ? endAt.getTime() : null;
        }

        return null;
      }

      function hasScheduledEvent(record) {
        return Boolean(record
          && record.eventAt
          && (isTimedType(record.type) || isRecurringRecord(record))
          && isValidDate(record.eventAt));
      }

      function getStatusSearchText(record) {
        const recurringLabel = isRecurringRecord(record) ? "循环 " + formatRecurrenceLabel(record.recurrence) : "";
        if (isAutoCompletionPending(record)) {
          return ["已结束 待确认", recurringLabel].filter(Boolean).join(" ");
        }
        if (isPrepared(record)) {
          return ["已准备", recurringLabel].filter(Boolean).join(" ");
        }
        if (record.completed) {
          return ["已完成", recurringLabel].filter(Boolean).join(" ");
        }
        return recurringLabel;
      }

      function isVisuallyCompleted(record) {
        return Boolean(record && (record.completed || isAutoCompletionPending(record)));
      }

      function getAutoCompleteRef(record) {
        if (!record) {
          return "";
        }
        return [record.eventAt || "", record.text || ""].join("|");
      }

      function clearAutoCompleteState(record) {
        if (!record) {
          return false;
        }

        const changed = Boolean(record.autoCompleteState || record.autoCompleteRef || record.autoCompletedAt);
        record.autoCompleteState = "";
        record.autoCompleteRef = "";
        record.autoCompletedAt = "";
        return changed;
      }

      function syncAutoCompletionState() {
        const now = new Date().toISOString();
        let changed = false;

        state.records.forEach(function (record) {
          if (!supportsPreparedState(record) || !record.eventAt) {
            if (clearAutoCompleteState(record)) {
              changed = true;
            }
            return;
          }

          const currentRef = getAutoCompleteRef(record);
          if (record.autoCompleteRef && record.autoCompleteRef !== currentRef) {
            clearAutoCompleteState(record);
            changed = true;
          }

          if (record.completed) {
            if (clearAutoCompleteState(record)) {
              changed = true;
            }
            return;
          }

          if (!shouldAutoCompleteMeeting(record)) {
            if (record.autoCompleteState === "pending") {
              clearAutoCompleteState(record);
              changed = true;
            }
            return;
          }

          if (record.autoCompleteState === "reverted" && record.autoCompleteRef === currentRef) {
            return;
          }

          if (record.autoCompleteState !== "pending") {
            record.autoCompleteState = "pending";
            record.autoCompleteRef = currentRef;
            record.autoCompletedAt = now;
            pushHistory(record, "auto_completed", now);
            changed = true;
          }
        });

        if (changed) {
          persist({
            preservePayloadTime: true,
            skipSyncFile: true,
            skipRemote: true
          });
        }
      }

      function isAutoCompletionPending(record) {
        return supportsPreparedState(record)
          && !record.completed
          && record.autoCompleteState === "pending"
          && record.autoCompleteRef === getAutoCompleteRef(record);
      }

      function shouldAutoCompleteMeeting(record) {
        const endAt = getMeetingEndAt(record);
        return Boolean(endAt) && endAt.getTime() <= Date.now();
      }

      function getAutoCompletionSortScore(record) {
        const endAt = getMeetingEndAt(record);
        if (!endAt) {
          return Number.MAX_SAFE_INTEGER;
        }
        return Date.now() - endAt.getTime();
      }

      function getMeetingEndAt(record) {
        if (!record || record.type !== "meeting" || !isValidDate(record.eventAt)) {
          return null;
        }

        const start = new Date(record.eventAt);
        const rangeInfo = extractDateRangeInfo(record.text, record.eventAt);
        if (rangeInfo) {
          const end = new Date(rangeInfo.endDate);
          end.setHours(23, 59, 0, 0);
          return end;
        }

        const end = new Date(start.getTime());
        const range = extractTimeRangeFromText(record.text);
        if (range) {
          end.setHours(range.hours, range.minutes, 0, 0);
          if (end.getTime() <= start.getTime()) {
            end.setTime(start.getTime() + 60 * 60 * 1000);
          }
          return end;
        }

        if (isMidnightDateTime(record.eventAt)) {
          end.setHours(23, 59, 0, 0);
          return end;
        }

        end.setTime(start.getTime() + 60 * 60 * 1000);
        return end;
      }

      function getDefaultEventEndAt(record) {
        if (!record || !isValidDate(record.eventAt)) {
          return null;
        }

        const end = new Date(record.eventAt);
        if (isMidnightDateTime(record.eventAt) && !hasExplicitTimeToken(record.text)) {
          end.setHours(23, 59, 0, 0);
          return end;
        }

        end.setTime(end.getTime() + 60 * 60 * 1000);
        return end;
      }

      function buildConflictMap(records) {
        const map = {};
        records.forEach(function (record) {
          map[record.id] = [];
        });

        const candidates = records
          .filter(isConflictCandidate)
          .map(buildConflictWindow)
          .filter(Boolean)
          .sort(function (a, b) {
            return a.start.getTime() - b.start.getTime();
          });

        for (let i = 0; i < candidates.length; i += 1) {
          for (let j = i + 1; j < candidates.length; j += 1) {
            const left = candidates[i];
            const right = candidates[j];

            if (!isSameLocalCalendarDay(left.start, right.start)) {
              if (right.start.getTime() - left.start.getTime() > 24 * 60 * 60 * 1000) {
                break;
              }
              continue;
            }

            if (right.start.getTime() >= left.end.getTime()) {
              break;
            }

            const key = createConflictKey(left.record.id, right.record.id);
            if (isConflictIgnored(left.record, right.record, key)) {
              continue;
            }

            map[left.record.id].push({
              key: key,
              title: buildConflictTitle(right.record)
            });
            map[right.record.id].push({
              key: key,
              title: buildConflictTitle(left.record)
            });
          }
        }

        return map;
      }

      function isConflictCandidate(record) {
        return record
          && isConflictRecordType(record)
          && !isVisuallyCompleted(record)
          && isValidDate(record.eventAt)
          && hasConflictTimeInfo(record);
      }

      function isConflictRecordType(record) {
        return Boolean(record && (record.type === "meeting" || isRecurringRecord(record)));
      }

      function hasConflictTimeInfo(record) {
        if (!record || !record.eventAt) {
          return false;
        }

        if (hasExplicitTimeToken(record.text)) {
          return true;
        }

        if (!isMidnightDateTime(record.eventAt)) {
          return true;
        }

        return isConflictRecordType(record);
      }

      function buildConflictWindow(record) {
        if (!isConflictCandidate(record)) {
          return null;
        }

        const start = new Date(record.eventAt);
        const range = extractTimeRangeFromText(record.text);
        const end = new Date(start.getTime());

        if (range) {
          end.setHours(range.hours, range.minutes, 0, 0);
          if (end.getTime() <= start.getTime()) {
            end.setTime(start.getTime() + 60 * 60 * 1000);
          }
        } else if (isMidnightDateTime(record.eventAt) && !hasExplicitTimeToken(record.text)) {
          end.setHours(23, 59, 0, 0);
        } else {
          end.setTime(start.getTime() + 60 * 60 * 1000);
        }

        return {
          record: record,
          start: start,
          end: end
        };
      }

      function extractTimeRangeFromText(text) {
        const source = String(text || "");
        const rangeMatch = source.match(/((?:凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚)?\s*(?:\d{1,2}\s*[:：]\s*\d{1,2}|\d{1,2}\s*点\s*(?:半|[0-5]?\d\s*分?)?))\s*(?:到|至|-|~|～)\s*((?:凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚)?\s*(?:\d{1,2}\s*[:：]\s*\d{1,2}|\d{1,2}\s*点\s*(?:半|[0-5]?\d\s*分?)?))/);
        if (!rangeMatch) {
          return null;
        }

        const fallbackLabel = extractTimePeriodLabel(rangeMatch[1]) || extractTimePeriodLabel(source);
        return parseTimeFragment(rangeMatch[2], fallbackLabel);
      }

      function parseTimeFragment(text, fallbackPeriodLabel) {
        const source = String(text || "");
        const periodLabel = extractTimePeriodLabel(source) || fallbackPeriodLabel || "";
        const hmMatch = source.match(/(\d{1,2})\s*[:：]\s*(\d{1,2})/);
        if (hmMatch) {
          return {
            hours: clampHour(applyTimePeriod(Number(hmMatch[1]), periodLabel)),
            minutes: clampMinute(Number(hmMatch[2]))
          };
        }

        const pointMatch = source.match(/(凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚)?\s*(\d{1,2})\s*点\s*(半|[0-5]?\d\s*分?)?/);
        if (!pointMatch) {
          return null;
        }

        const minutes = pointMatch[3]
          ? (pointMatch[3].indexOf("半") >= 0 ? 30 : clampMinute(parseInt(pointMatch[3], 10) || 0))
          : 0;

        return {
          hours: clampHour(applyTimePeriod(Number(pointMatch[2]), pointMatch[1] || periodLabel)),
          minutes: minutes
        };
      }

      function buildConflictTitle(otherRecord) {
        const timeLabel = formatRecordTimeToken(otherRecord);
        return '与「' + summarizeConflictText(getDisplayText(otherRecord)) + '」'
          + (timeLabel ? "（" + timeLabel + "）" : "")
          + "可能时间冲突，点击忽略这组提醒。";
      }

      function summarizeConflictText(text) {
        const source = String(text || "").trim();
        if (source.length <= 18) {
          return source;
        }
        return source.slice(0, 18) + "…";
      }

      function createConflictKey(leftId, rightId) {
        return [leftId, rightId].sort().join("::");
      }

      function isConflictIgnored(leftRecord, rightRecord, key) {
        const leftKeys = normalizeConflictKeys(leftRecord && leftRecord.ignoredConflictKeys);
        const rightKeys = normalizeConflictKeys(rightRecord && rightRecord.ignoredConflictKeys);
        return leftKeys.indexOf(key) >= 0 || rightKeys.indexOf(key) >= 0;
      }

      function ignoreConflict(id, key) {
        if (!id || !key) {
          return;
        }

        const ids = key.split("::");
        if (ids.length !== 2) {
          return;
        }

        let changed = false;
        state.records.forEach(function (record) {
          if (ids.indexOf(record.id) === -1) {
            return;
          }

          const keys = normalizeConflictKeys(record.ignoredConflictKeys);
          if (keys.indexOf(key) === -1) {
            keys.push(key);
            record.ignoredConflictKeys = keys;
            record.updatedAt = new Date().toISOString();
            changed = true;
          }
        });

        if (!changed) {
          return;
        }

        persist();
        render();
        setStatus("已忽略这组时间冲突提醒。");
      }

      function isUpcomingMeeting(record) {
        if (!isTimedType(record.type) || !record.eventAt || record.completed) {
          return false;
        }

        const diff = new Date(record.eventAt).getTime() - Date.now();
        return diff >= 0 && diff <= 24 * 60 * 60 * 1000;
      }

      function getUpcomingLabel(record) {
        const diff = new Date(record.eventAt).getTime() - Date.now();
        const hours = diff / (60 * 60 * 1000);
        const baseLabel = record.type === "deadline" ? "截止" : "日程";
        if (hours <= 2) {
          return record.type === "deadline" ? "即将截止" : "即将开始";
        }
        if (hours <= 24) {
          return record.type === "deadline" ? "24h内截止" : "24 小时内";
        }
        return baseLabel;
      }

      function inferTypeAndText(text, explicitEventAt, manualType) {
        const naturalInfo = extractNaturalDateInfo(text);
        const recurrenceInfo = extractRecurrenceInfo(text);
        const autoTimedType = inferTimedTypeFromText(text);

        if (manualType && manualType !== "auto") {
          if (manualType === "idea") {
            return {
              text: text,
              type: "idea",
              eventAt: "",
              recurrence: null
            };
          }

          const resolvedManualEventAt = recurrenceInfo
            ? resolveRecurringEventAt(manualType, explicitEventAt, naturalInfo, recurrenceInfo, text)
            : resolveTimedEventAt(manualType, explicitEventAt, naturalInfo);
          return {
            text: text,
            type: manualType,
            eventAt: resolvedManualEventAt,
            recurrence: recurrenceInfo
          };
        }

        const ideaMatch = text.match(/^\s*(?:想法|idea)\s*(?:[:：]\s*)?(.*)$/i);
        if (ideaMatch) {
          return {
            text: (ideaMatch[1] || "").trim() || text.trim(),
            type: "idea",
            eventAt: "",
            recurrence: null
          };
        }

        if (recurrenceInfo) {
          const recurringType = isDeadlineHintText(text) ? "deadline" : "todo";
          return {
            text: text,
            type: recurringType,
            eventAt: resolveRecurringEventAt(recurringType, explicitEventAt, naturalInfo, recurrenceInfo, text),
            recurrence: recurrenceInfo
          };
        }

        if (explicitEventAt || naturalInfo.hasTemporalHint) {
          return {
            text: text,
            type: autoTimedType,
            eventAt: resolveTimedEventAt(autoTimedType, explicitEventAt, naturalInfo),
            recurrence: null
          };
        }

        return {
          text: text,
          type: "todo",
          eventAt: explicitEventAt,
          recurrence: null
        };
      }

      function isTimedType(type) {
        return type === "meeting" || type === "deadline";
      }

      function isDeadlineHintText(text) {
        const source = String(text || "");
        if (/(?:\bddl\b|deadline|截止|截至|过期|到期|失效|期满|有效期)/i.test(source)) {
          return true;
        }

        return /(?:今天|明天|后天|大后天|今晚|今早|明早|明晚|周[一二三四五六日天]|星期[一二三四五六日天]|\d{4}(?:年|[\/.-])\d{1,2}(?:月|[\/.-])\d{1,2}|\d{1,2}(?:月|[\/.-])\d{1,2}(?:日|号)?|\d{1,2}\s*点(?:半|[0-5]?\d\s*分?)?|\d{1,2}[:：]\d{2})\s*(?:前|之前)/.test(source);
      }

      function inferTimedTypeFromText(text) {
        return isDeadlineHintText(text) ? "deadline" : "meeting";
      }

      function resolveTimedEventAt(type, explicitEventAt, naturalInfo) {
        if (!isTimedType(type)) {
          return "";
        }

        if (explicitEventAt) {
          return explicitEventAt;
        }

        if (naturalInfo.eventAt) {
          return naturalInfo.eventAt;
        }

        if (naturalInfo.date) {
          return type === "deadline"
            ? toEndOfDayIso(naturalInfo.date)
            : toStartOfDayIso(naturalInfo.date);
        }

        return "";
      }

      function resolveRecurringEventAt(type, explicitEventAt, naturalInfo, recurrenceInfo, text, referenceNow) {
        const recurrence = normalizeRecurrenceInfo(recurrenceInfo);
        if (!recurrence) {
          return "";
        }

        if (explicitEventAt) {
          return explicitEventAt;
        }

        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const anchorInfo = parseRecurrenceAnchorInfo(text, now);
        if (!anchorInfo && naturalInfo && naturalInfo.eventAt) {
          return naturalInfo.eventAt;
        }

        const date = anchorInfo
          ? getInitialRecurrenceDate(recurrence, text, now)
          : naturalInfo && naturalInfo.date
          ? new Date(naturalInfo.date.getTime())
          : getInitialRecurrenceDate(recurrence, text, now);
        if (!date || !isValidDate(date)) {
          return "";
        }

        const timeInfo = parseTimeFromText(text);
        if (timeInfo.matched) {
          date.setHours(timeInfo.hours, timeInfo.minutes, 0, 0);
        } else if (timeInfo.defaultHours != null) {
          date.setHours(timeInfo.defaultHours, timeInfo.defaultMinutes || 0, 0, 0);
        } else if (type === "deadline") {
          date.setHours(23, 59, 0, 0);
        } else {
          date.setHours(0, 0, 0, 0);
        }

        return date.toISOString();
      }

      function extractRecurrenceInfo(text) {
        const source = String(text || "").trim();
        if (!source) {
          return null;
        }

        if (/(?:每(?:个)?工作日|每周\s*(?:一|1)\s*(?:到|至|-|~|～)\s*(?:周)?(?:五|5))/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "weekly",
            interval: 1,
            mode: "fixed",
            weekdays: [0, 1, 2, 3, 4],
            label: "每个工作日"
          });
        }

        const yearlyFixed = source.match(/每(?:年|年度)\s*([0-9一二两三四五六七八九十]{1,3})\s*月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)?/);
        if (yearlyFixed) {
          const month = parsePositiveIntegerToken(yearlyFixed[1]);
          const monthDay = parsePositiveIntegerToken(yearlyFixed[2]);
          if (isValidMonth(month) && isValidMonthDay(monthDay)) {
            return normalizeRecurrenceInfo({
              frequency: "yearly",
              interval: 1,
              mode: "fixed",
              month: month,
              monthDay: monthDay
            });
          }
        }

        const monthlyFixed = source.match(/每(?:个)?月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/)
          || source.match(/每月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/);
        if (monthlyFixed) {
          const monthDay = parsePositiveIntegerToken(monthlyFixed[1]);
          if (isValidMonthDay(monthDay)) {
            return normalizeRecurrenceInfo({
              frequency: "monthly",
              interval: 1,
              mode: "fixed",
              monthDay: monthDay
            });
          }
        }

        if (/每(?:个)?月\s*(?:底|末)|每月\s*(?:底|末)/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "monthly",
            interval: 1,
            mode: "fixed",
            monthDay: "last",
            label: "每月底"
          });
        }

        const weeklyFixed = source.match(/每(?:周|星期|礼拜)\s*((?:(?:周|星期|礼拜)?[一二三四五六日天末]\s*[、,，和及]?\s*)+)(?!\s*(?:次|回|趟))/);
        if (weeklyFixed) {
          const weekdays = parseWeekdayList(weeklyFixed[1]);
          if (weekdays.length) {
            return normalizeRecurrenceInfo({
              frequency: "weekly",
              interval: 1,
              mode: "fixed",
              weekdays: weekdays
            });
          }
        }

        if (/(?:每天|每日|天天|\bdaily\b|\bevery day\b)/i.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "daily",
            interval: 1,
            mode: "fixed"
          });
        }

        const intervalMatch = source.match(/每(?:隔)?\s*([0-9一二两三四五六七八九十]+)\s*(天|日|周|星期|礼拜|个月|月|年)/);
        if (intervalMatch) {
          const interval = parsePositiveIntegerToken(intervalMatch[1]);
          const frequency = unitToRecurrenceFrequency(intervalMatch[2]);
          if (interval && frequency) {
            return normalizeRecurrenceInfo({
              frequency: frequency,
              interval: interval,
              mode: "sliding"
            });
          }
        }

        const oncePerMatch = source.match(/([0-9一二两三四五六七八九十]+)?\s*(天|日|周|星期|礼拜|个月|月|年)\s*(?:一?次|一回|一趟)/);
        if (oncePerMatch && oncePerMatch[2]) {
          const interval = oncePerMatch[1] ? parsePositiveIntegerToken(oncePerMatch[1]) : 1;
          const frequency = unitToRecurrenceFrequency(oncePerMatch[2]);
          if (interval && frequency) {
            return normalizeRecurrenceInfo({
              frequency: frequency,
              interval: interval,
              mode: "sliding"
            });
          }
        }

        if (/每(?:周|星期|礼拜)(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "weekly",
            interval: 1,
            mode: "sliding"
          });
        }

        if (/每(?:个)?月(?:一次|一回|一趟)?|每月(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "monthly",
            interval: 1,
            mode: "sliding"
          });
        }

        if (/每(?:年|年度)(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "yearly",
            interval: 1,
            mode: "sliding"
          });
        }

        return null;
      }

      function normalizeRecurrenceInfo(value) {
        if (!value || typeof value !== "object") {
          return null;
        }

        const frequency = ["daily", "weekly", "monthly", "yearly"].includes(value.frequency)
          ? value.frequency
          : "";
        if (!frequency) {
          return null;
        }

        const interval = Math.max(1, Math.min(365, parseInt(value.interval, 10) || 1));
        const mode = value.mode === "sliding" ? "sliding" : "fixed";
        const weekdays = Array.isArray(value.weekdays)
          ? uniqueSortedNumbers(value.weekdays, 0, 6)
          : [];
        const month = isValidMonth(parseInt(value.month, 10)) ? parseInt(value.month, 10) : 0;
        let monthDay = "";
        if (value.monthDay === "last") {
          monthDay = "last";
        } else if (isValidMonthDay(parseInt(value.monthDay, 10))) {
          monthDay = parseInt(value.monthDay, 10);
        }

        return {
          frequency: frequency,
          interval: interval,
          mode: mode,
          weekdays: weekdays,
          monthDay: monthDay,
          month: month,
          label: typeof value.label === "string" ? value.label.slice(0, 24) : ""
        };
      }

      function isRecurringRecord(record) {
        return Boolean(record && normalizeRecurrenceInfo(record.recurrence));
      }

      function recurrencesEqual(left, right) {
        return JSON.stringify(normalizeRecurrenceInfo(left)) === JSON.stringify(normalizeRecurrenceInfo(right));
      }

      function completeAndAdvanceRecurringRecord(record, completedAt) {
        const nextEventAt = getNextRecurrenceEventAt(record, completedAt);
        if (!nextEventAt) {
          return false;
        }

        record.prepared = false;
        record.completed = true;
        clearAutoCompleteState(record);
        record.updatedAt = completedAt;
        pushHistory(record, "completed", completedAt);

        const nextText = stripRecurrenceInitialPhrase(record.text);
        if (nextText) {
          record.text = nextText;
        }
        record.eventAt = nextEventAt;
        record.prepared = false;
        record.completed = false;
        record.ignoredConflictKeys = [];
        record.updatedAt = completedAt;
        pushHistory(record, "recurrence_advanced", completedAt);
        return true;
      }

      function getNextRecurrenceEventAt(record, completedAtValue) {
        const recurrence = normalizeRecurrenceInfo(record && record.recurrence);
        if (!recurrence) {
          return "";
        }

        const completedAt = isValidDate(completedAtValue) ? new Date(completedAtValue) : new Date();
        const currentEventAt = isValidDate(record && record.eventAt)
          ? new Date(record.eventAt)
          : new Date(completedAt.getTime());
        const next = recurrence.mode === "sliding"
          ? getNextSlidingRecurrenceEventAt(recurrence, currentEventAt, completedAt)
          : getNextFixedRecurrenceEventAt(recurrence, currentEventAt, completedAt);

        return next && isValidDate(next) ? next.toISOString() : "";
      }

      function getNextSlidingRecurrenceEventAt(recurrence, currentEventAt, completedAt) {
        const base = new Date(completedAt.getTime());
        copyTimeParts(base, currentEventAt);
        return addRecurrenceUnits(base, recurrence.frequency, recurrence.interval);
      }

      function getNextFixedRecurrenceEventAt(recurrence, currentEventAt, completedAt) {
        const threshold = new Date(Math.max(currentEventAt.getTime(), completedAt.getTime()));
        return getFirstFixedOccurrenceAfter(recurrence, threshold, currentEventAt);
      }

      function getFirstFixedOccurrenceAfter(recurrence, threshold, timeSource) {
        if (recurrence.frequency === "daily") {
          let candidate = makeDateWithTime(threshold, timeSource);
          while (candidate.getTime() <= threshold.getTime()) {

              threshold.getFullYear(),
              threshold.getMonth(),
              recurrence.monthDay,
              timeSource

            }

        }

              recurrence.monthDay,
              timeSource

      function getInitialRecurrenceDate(recurrence, text, referenceNow) {
        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();

            recurrence.monthDay,

            recurrence.month - 1,
            recurrence.monthDay,
            today

          return candidate.getTime() < today.getTime()
            ? makeMonthlyOccurrence(today.getFullYear() + recurrence.interval, recurrence.month - 1, recurrence.monthDay, today)

      function parseRecurrenceInitialDate(text, referenceNow) {

      function parseRecurrenceAnchorInfo(text, referenceNow) {

              date: startDate

          }

        return "";

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        const relativeMap = [
          { pattern: /大前天/, offset: -3 },
          { pattern: /前天/, offset: -2 },
          { pattern: /昨天|昨日/, offset: -1 },
          { pattern: /大后天/, offset: 3 },
          { pattern: /后天/, offset: 2 },

      function addRecurrenceUnits(date, frequency, interval) {

          next.setDate(next.getDate() + interval * 7);

      function addMonthsClamped(date, count, preferredDay) {

      function addYearsClamped(date, count) {

      function makeMonthlyOccurrence(year, monthIndex, monthDay, timeSource) {

      function getLocalWeekdayIndex(date) {

      function parseWeekdayList(value) {

      function uniqueSortedNumbers(values, min, max) {

          "二": 2,
          "三": 3,
          "四": 4,
          "五": 5,
          "六": 6,
          "七": 7,
          "八": 8,
          "九": 9

          return recurrence.interval === 1 ? "每周一次" : "每" + intervalText + "周一次";

      function parseExplicitCalendarDate(text, referenceNow) {

          { pattern: /后天/, offset: 2 },
