<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Notes</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='6' width='48' height='52' rx='10' fill='%23ffffff' stroke='%23151515' stroke-width='4'/%3E%3Cpath d='M19 22l7 7-7 7' fill='none' stroke='%23151515' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M31 40h14' stroke='%23777777' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M31 24h14M31 32h10' stroke='%23c7c7c2' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f6f4;
      --bg-deep: #f1f1ee;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --panel-soft: #fafaf8;
      --border: rgba(17, 17, 17, 0.08);
      --border-strong: rgba(17, 17, 17, 0.14);
      --text: #171717;
      --text-soft: #696969;
      --text-faint: #9a9a95;
      --accent: #151515;
      --accent-soft: #f1f1ed;
      --shadow: 0 8px 24px rgba(17, 17, 17, 0.04);
      --shadow-soft: 0 4px 12px rgba(17, 17, 17, 0.03);
      --radius-lg: 18px;
      --focus: #171717;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Aptos", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.22s ease;
    }

    body.journal-focus {
      --panel: #f8f8f5;
      --panel-strong: #fbfaf7;
      --panel-soft: #f2f1ed;
      --border: rgba(58, 55, 48, 0.11);
      --border-strong: rgba(58, 55, 48, 0.18);
      --accent-soft: #efede8;
      background-color: #292a30;
      background-image:
        radial-gradient(ellipse at calc(50% - 240px) 7rem, rgba(255, 250, 239, 0.28) 0%, rgba(221, 215, 203, 0.13) 36%, rgba(41, 42, 48, 0) 66%),
        radial-gradient(ellipse at calc(50% - 240px) 34rem, rgba(255, 255, 250, 0.08) 0%, rgba(41, 42, 48, 0) 48%),
        linear-gradient(180deg, #32333a 0%, #292a30 50%, #23242a 100%);
      background-attachment: fixed;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
    }

    [hidden] {
      display: none !important;
    }

    .title-block h1,
    .counter,
    .composer textarea,
    .search input,
    .item-text,
    .item-meta,
    .badge,
    .segmented button,
    .ghost,
    .primary,
    .icon-btn,
    .item-edit textarea,
    .item-edit input,
    .item-edit select {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .app {
      max-width: 1540px;
      margin: 0 auto;
      padding: 18px 18px 36px;
    }

    .workspace {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
      transition: gap 0.22s ease;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
      flex: 1 1 980px;
      max-width: 980px;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background-color 0.22s ease;
    }

    body.journal-focus .shell {
      background: rgba(250, 249, 246, 0.97);
      border-color: rgba(255, 255, 255, 0.28);
      box-shadow:
        0 28px 84px rgba(8, 9, 14, 0.26),
        0 0 82px rgba(236, 233, 224, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.58);
    }

    .idea-pane {
      min-width: 0;
      flex: 0 0 min(460px, 36vw);
      width: min(460px, 36vw);
      display: none;
      transition: opacity 0.22s ease, filter 0.22s ease;
    }

    .workspace.has-ideas .idea-pane {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .workspace.journal-focus .idea-pane {
      opacity: 0.62;
      filter: grayscale(0.28) blur(0.7px);
      pointer-events: none;
      user-select: none;
    }

    .idea-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
    }

    .workspace.journal-focus .idea-card,
    .journal-idea-veil {
      background: rgba(31, 32, 38, 0.74);
      border-color: rgba(255, 255, 255, 0.07);
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.2);
    }

    .journal-idea-veil {
      min-height: 260px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
    }

    .idea-card-head,
    .idea-card-meta,
    .idea-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .idea-card-head {
      margin-bottom: 10px;
    }

    .idea-card-label,
    .idea-card-hint,
    .idea-card-empty,
    .idea-card textarea {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .idea-card-label {
      font-size: 12px;
      color: var(--text-soft);
    }

    .workspace.journal-focus .idea-card-label {
      color: rgba(245, 246, 248, 0.42);
    }

    .idea-card-hint,
    .idea-card-foot {
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.6;
    }

    .workspace.journal-focus .idea-card-hint,
    .workspace.journal-focus .idea-card-foot {
      color: rgba(245, 246, 248, 0.28);
    }

    .idea-card-foot {
      justify-content: flex-end;
    }

    .idea-card-meta {
      margin-bottom: 10px;
    }

    .idea-card textarea {
      width: 100%;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      outline: none;
      resize: none;
      overflow-y: hidden;
      font-size: 14px;
      line-height: 1.78;
      color: var(--text);
      display: block;
    }

    .workspace.journal-focus .idea-card textarea {
      color: rgba(245, 246, 248, 0.38);
    }

    .idea-card-editor {
      min-height: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfbfa;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .workspace.journal-focus .idea-card-editor {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.07);
    }

    .idea-card-editor:focus-within {
      background: #ffffff;
      border-color: var(--border-strong);
    }

    .idea-card-empty {
      padding: 18px 0 6px;
      color: var(--text-faint);
      font-size: 13px;
      line-height: 1.7;
    }

    .idea-card-note {
      margin: 0;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 22px 24px 14px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      display: none;
    }

    .title-block h1 {
      margin: 0;
      max-width: none;
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
      font-size: 32px;
      line-height: 1.12;
      font-weight: 650;
      letter-spacing: 0;
    }

    .title-block p {
      max-width: 36rem;
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .counter {
      min-width: 150px;
      align-self: start;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      box-shadow: none;
      text-align: right;
      color: var(--text);
    }

    .counter strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
    }

    .counter span {
      display: block;
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
    }

    body.journal-focus .counter {
      background: rgba(247, 246, 242, 0.84);
    }

    .composer {
      padding: 12px 24px 10px;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }

    .composer-card {
      padding: 14px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: none;
    }

    body.journal-focus .composer-card {
      background: rgba(251, 250, 247, 0.8);
    }

    .composer textarea,
    .search input,
    .item-inline-input,
    .item-edit textarea,
    .item-edit input,
    .item-edit select,
    .composer select,
    .composer input[type="datetime-local"],
    .manual-datetime-input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      background: #fafaf8;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition:
        border-color 0.15s ease,
        background-color 0.15s ease;
    }

    .composer textarea,
    .item-edit textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.58;
    }

    .composer textarea {
      min-height: 88px;
      background: #fbfbfa;
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 14px;
    }

    body.journal-focus .composer textarea,
    body.journal-focus .search input,
    body.journal-focus .item-inline-input,
    body.journal-focus .item-edit textarea,
    body.journal-focus .item-edit input,
    body.journal-focus .item-edit select,
    body.journal-focus .composer select,
    body.journal-focus .composer input[type="datetime-local"],
    body.journal-focus .manual-datetime-input {
      background: rgba(255, 254, 251, 0.72);
    }

    .composer textarea::placeholder,
    .search input::placeholder,
    .item-inline-input::placeholder,
    .item-edit textarea::placeholder,
    .item-edit input::placeholder {
      color: #a1a19c;
    }

    .composer textarea:focus,
    .search input:focus,
    .item-inline-input:focus,
    .item-edit textarea:focus,
    .item-edit input:focus,
    .item-edit select:focus,
    .composer select:focus,
    .composer input[type="datetime-local"]:focus,
    .manual-datetime-input:focus {
      border-color: var(--border-strong);
      background: #fff;
      box-shadow: none;
    }

    .composer-bar,
    .composer-actions,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .composer-bar,
    .toolbar {
      margin-top: 10px;
    }

    .composer-bar {
      justify-content: space-between;
      gap: 10px;
    }

    .composer-actions {
      flex: 0 0 auto;
      gap: 6px;
      margin-left: auto;
      justify-content: flex-end;
    }

    .sync-action {
      min-width: 82px;
      font-size: 12px;
      white-space: nowrap;
    }

    .sync-action.attention {
      color: var(--text);
      background: var(--accent-soft);
      border-color: var(--border-strong);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px 8px;
      gap: 12px;
    }

    .toolbar-main,
    .toolbar-side {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .toolbar-side {
      justify-content: flex-end;
    }

    .search {
      min-width: 220px;
      flex: 1 1 240px;
    }

    .search input {
      background: #fafaf8;
      font-size: 13px;
    }

    select {
      appearance: none;
      padding-right: 44px;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(90, 90, 90, 0.9) 50%),
        linear-gradient(135deg, rgba(90, 90, 90, 0.9) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 3px),
        calc(100% - 14px) calc(50% - 3px);
      background-size: 6px 6px;
      background-repeat: no-repeat;
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      opacity: 0.55;
    }

    input[type="datetime-local"] {
      width: 100%;
      min-width: 0;
      min-inline-size: 0;
      max-width: 100%;
      max-inline-size: 100%;
    }

    .manual-datetime-input {
      justify-self: stretch;
      min-width: 0;
      min-inline-size: 0;
      max-width: 100%;
      max-inline-size: 100%;
      text-align: left;
    }

    .segmented {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0;
      background: transparent;
      border: 0;
    }

    .segmented button,
    .ghost,
    .primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition:
        background-color 0.15s ease,
        color 0.15s ease,
        border-color 0.15s ease;
    }

    .segmented button {
      color: var(--text-soft);
      background: transparent;
      font-size: 12px;
      letter-spacing: 0;
    }

    .segmented button.active {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .segmented button:not(.active):hover,
    .ghost:hover {
      background: #f7f7f4;
    }

    .ghost {
      background: transparent;
      color: var(--text-soft);
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      box-shadow: none;
    }

    .primary:hover {
      background: #222222;
    }

    .delete-dialog {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .delete-dialog-scrim {
      position: absolute;
      inset: 0;
      background: rgba(17, 17, 17, 0.22);
    }

    .delete-dialog-panel {
      position: relative;
      width: min(420px, 100%);
      padding: 18px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(17, 17, 17, 0.16);
    }

    .delete-dialog-panel h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .delete-dialog-panel p {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .delete-dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .delete-dialog-actions .ghost,
    .delete-dialog-actions .primary {
      min-height: 34px;
      padding: 0 12px;
    }

    .icon-only {
      width: 32px;
      min-width: 32px;
      padding: 0;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }

    .icon-only.active {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .meta-note {
      font-size: 11px;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      line-height: 1.45;
    }

    .composer-advanced {
      display: grid;
      grid-template-columns: minmax(140px, 170px) minmax(0, 220px) repeat(5, auto);
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .composer-advanced > * {
      min-width: 0;
      max-width: 100%;
    }

    .composer-advanced[hidden] {
      display: none !important;
    }

    .composer-advanced .ghost {
      min-width: 96px;
    }

    .backup-restore-action {
      color: #7a5b18;
    }

    .backup-auth-action.authorized,
    .backup-auth-action:disabled {
      color: var(--text-faint);
      background: transparent;
      border-color: var(--border);
      cursor: default;
    }

    .remote-sync-panel {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(90px, 130px) minmax(150px, 1fr) minmax(180px, 1.2fr) auto auto;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fbfbfa;
    }

    .remote-sync-panel[hidden] {
      display: none !important;
    }

    .remote-sync-panel input {
      min-width: 0;
      width: 100%;
      font-size: 12px;
      background: #ffffff;
    }

    .remote-sync-actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .list-wrap {
      padding: 0 24px 14px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 280px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
    }

    body.journal-focus .list {
      background: rgba(251, 250, 247, 0.76);
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      background: #ffffff;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      position: relative;
      transition: background-color 0.12s ease;
    }

    body.journal-focus .item {
      background: rgba(252, 251, 248, 0.78);
    }

    .item + .item {
      border-top: 1px solid rgba(17, 17, 17, 0.06);
    }

    body.journal-focus .item + .item {
      border-top-color: rgba(58, 55, 48, 0.06);
    }

    .item:hover,
    .item:focus-within {
      background: #fafaf8;
    }

    body.journal-focus .item:hover,
    body.journal-focus .item:focus-within {
      background: rgba(255, 254, 250, 0.86);
    }

    .item.completed {
      background: #fafaf8;
    }

    .item.idea .toggle,
    .item.journal .toggle {
      opacity: 0.42;
    }

    .item.idea:hover .toggle,
    .item.idea:focus-within .toggle,
    .item.journal:hover .toggle,
    .item.journal:focus-within .toggle {
      opacity: 0.82;
    }

    .item.journal {
      background: #fffdf8;
      box-shadow: inset 2px 0 0 rgba(121, 91, 24, 0.18);
    }

    body.journal-focus .item.journal {
      background: rgba(250, 249, 246, 0.84);
      box-shadow: inset 2px 0 0 rgba(104, 94, 76, 0.12);
    }

    .item.journal:hover,
    .item.journal:focus-within {
      background: #fffaf0;
    }

    body.journal-focus .item.journal:hover,
    body.journal-focus .item.journal:focus-within {
      background: rgba(255, 254, 250, 0.92);
    }

    .item.journal .badge {
      color: #72541b;
      background: rgba(121, 91, 24, 0.08);
      border-color: rgba(121, 91, 24, 0.14);
    }

    body.journal-focus .item.journal .badge {
      color: #5f5b52;
      background: rgba(72, 68, 60, 0.07);
      border-color: rgba(72, 68, 60, 0.12);
    }

    .item.readonly .item-line {
      cursor: default;
    }

    .item.readonly .toggle {
      cursor: default;
      opacity: 0.34;
    }

    .item.upcoming {
      background: #f7f7f4;
      box-shadow: inset 2px 0 0 rgba(17, 17, 17, 0.16);
      color: var(--text);
    }

    .toggle {
      margin-top: 2px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1.4px solid var(--border-strong);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      flex-shrink: 0;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .toggle.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .toggle.readonly {
      color: #8a8a84;
      background: #f7f7f4;
      border-color: #ecece6;
      font-size: 12px;
    }

    .toggle.partial {
      border-color: #b7bcc8;
      background: #ffffff;
      color: #707784;
      font-size: 14px;
      line-height: 1;
    }

    .toggle:hover {
      transform: none;
    }

    .toggle:focus-visible,
    .icon-btn:focus-visible,
    .segmented button:focus-visible,
    .ghost:focus-visible,
    .primary:focus-visible {
      outline: 2px solid rgba(17, 17, 17, 0.18);
      outline-offset: 2px;
    }

    .item-main {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .item-line {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-width: 0;
      cursor: text;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .item-line:hover .item-text {
      color: #111111;
    }

    .badge,
    .code-token {
      flex: 0 0 auto;
    }

    .code-token {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 6px;
      font-size: 10px;
      color: #5f6880;
      background: #f4f6fa;
      border: 1px solid #e3e8f0;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 10px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .token-time {
      color: #47556f;
      background: #f3f5f8;
      border-color: #e1e6ee;
    }

    .token-muted {
      color: #8a8a84;
      background: #f7f7f4;
      border-color: #ecece6;
    }

    .token-repeat {
      color: #4c6657;
      background: rgba(76, 102, 87, 0.08);
      border-color: rgba(76, 102, 87, 0.16);
    }

    .token-warning {
      color: #b42318;
      background: rgba(180, 35, 24, 0.08);
      border-color: rgba(180, 35, 24, 0.14);
    }

    .token-prepared {
      color: #5e6370;
      background: #f5f5f2;
      border-color: #e7e8e2;
    }

    .token-auto {
      color: #6e727d;
      background: #f4f4f1;
      border-color: #e5e5de;
    }

    .token-action {
      cursor: pointer;
      background: #ffffff;
    }

    .token-action:hover,
    .token-action:focus-visible {
      background: #f5f5f2;
      border-color: #d9dbd3;
      outline: none;
    }

    .conflict-warning {
      cursor: pointer;
    }

    .conflict-warning:hover,
    .conflict-warning:focus-visible {
      background: rgba(180, 35, 24, 0.12);
      border-color: rgba(180, 35, 24, 0.22);
      outline: none;
    }

    .code-inline-time,
    .code-inline-date,
    .code-inline-keyword,
    .code-inline-location,
    .code-inline-structure,
    .code-inline-meal,
    .code-inline-journal-food,
    .code-inline-journal-health,
    .code-inline-journal-work,
    .code-inline-journal-movement,
    .code-inline-journal-emotion,
    .code-inline-journal-reflection,
    .code-inline-journal-life,
    .code-inline-journal-quote,
    .code-inline-journal-place,
    .code-inline-journal-time {
      border-radius: 4px;
      padding: 0 2px;
    }

    .code-inline-time,
    .code-inline-date {
      color: #415a7a;
      background: rgba(65, 90, 122, 0.08);
    }

    .code-inline-keyword {
      color: #795b18;
      background: rgba(121, 91, 24, 0.08);
    }

    .code-inline-repeat {
      color: #4c6657;
      background: rgba(76, 102, 87, 0.08);
    }

    .code-inline-location {
      color: #4f6253;
      background: rgba(79, 98, 83, 0.08);
    }

    .code-inline-structure {
      color: #6a5a72;
      background: rgba(106, 90, 114, 0.08);
    }

    .code-inline-meal {
      color: #765b63;
      background: rgba(118, 91, 99, 0.08);
    }

    .code-inline-journal-food {
      color: #7a4b23;
      background: rgba(184, 104, 37, 0.1);
    }

    .code-inline-journal-health {
      color: #2f655d;
      background: rgba(47, 101, 93, 0.1);
    }

    .code-inline-journal-work {
      color: #3f5f8d;
      background: rgba(63, 95, 141, 0.1);
    }

    .code-inline-journal-movement {
      color: #5a663d;
      background: rgba(90, 102, 61, 0.1);
    }

    .code-inline-journal-emotion {
      color: #8a3f5e;
      background: rgba(138, 63, 94, 0.1);
    }

    .code-inline-journal-reflection {
      color: #73527d;
      background: rgba(115, 82, 125, 0.1);
    }

    .code-inline-journal-life {
      color: #5f6233;
      background: rgba(95, 98, 51, 0.1);
    }

    .code-inline-journal-quote {
      color: #6f5527;
      background: rgba(111, 85, 39, 0.1);
    }

    .code-inline-journal-place {
      color: #4f6253;
      background: rgba(79, 98, 83, 0.1);
    }

    .code-inline-journal-time {
      color: #59636e;
      background: rgba(89, 99, 110, 0.08);
    }

    .code-inline-weekday-mismatch {
      border-radius: 4px;
      padding: 0 2px;
      color: #b42318;
      background: rgba(180, 35, 24, 0.08);
      text-decoration: line-through;
      text-decoration-thickness: 1.5px;
      text-decoration-color: #b42318;
    }

    .badge.strong {
      color: #8a5c16;
      background: rgba(138, 92, 22, 0.08);
      border-color: rgba(138, 92, 22, 0.14);
    }

    .item-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1 1 auto;
    }

    .item.journal .item-line {
      align-items: start;
    }

    .item.journal .item-text {
      white-space: pre-wrap;
      line-height: 1.68;
      display: block;
      -webkit-line-clamp: unset;
      -webkit-box-orient: initial;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .completed .item-text {
      text-decoration: line-through;
      color: var(--text-soft);
      text-decoration-thickness: 1px;
      text-decoration-color: rgba(17, 17, 17, 0.22);
    }

    .item-actions {
      display: flex;
      gap: 2px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      opacity: 0.28;
      transition: opacity 0.12s ease;
    }

    .item:hover .item-actions,
    .item:focus-within .item-actions {
      opacity: 1;
    }

    .icon-btn {
      min-height: 26px;
      padding: 0 8px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-soft);
    }

    .icon-btn:hover {
      background: #f3f3f0;
      color: var(--text);
    }

    .icon-btn.danger:hover {
      background: #f3f3f0;
      color: var(--text);
    }

    .item-inline-edit {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 8px;
      width: 100%;
      min-width: 0;
    }

    .item-inline-input {
      width: 100%;
      min-width: 0;
      min-height: 30px;
      padding: 4px 8px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: #ffffff;
      outline: none;
      line-height: 1.5;
      resize: vertical;
      overflow-y: hidden;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--text-faint);
      background: #fbfbfa;
      border: 1px dashed var(--border);
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
    }

    .footer {
      padding: 0 24px 18px;
      border-top: 0;
      padding-top: 8px;
      color: var(--text-faint);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item.upcoming .item-text,
    .item.upcoming .icon-btn:hover,
    .item.upcoming .icon-btn.danger:hover {
      color: var(--text);
    }

    .item.upcoming .badge {
      background: transparent;
      border-color: var(--border);
      color: var(--text-soft);
    }

    .item.upcoming .badge.strong {
      color: #8a5c16;
      background: rgba(138, 92, 22, 0.08);
      border-color: rgba(138, 92, 22, 0.14);
    }

    .item.upcoming .toggle {
      background: #ffffff;
      border-color: var(--border-strong);
      color: var(--text);
    }

    .item.upcoming .toggle.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .item.upcoming .toggle.partial {
      background: #ffffff;
      border-color: #b7bcc8;
      color: #707784;
    }

    .item.upcoming .icon-btn {
      background: transparent;
      border-color: transparent;
      color: var(--text-soft);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 980px) {
      body.journal-focus {
        background-image:
          radial-gradient(ellipse at 50% 6rem, rgba(255, 250, 239, 0.27) 0%, rgba(221, 215, 203, 0.12) 36%, rgba(41, 42, 48, 0) 66%),
          radial-gradient(ellipse at 50% 30rem, rgba(255, 255, 250, 0.08) 0%, rgba(41, 42, 48, 0) 48%),
          linear-gradient(180deg, #32333a 0%, #292a30 50%, #23242a 100%);
      }

      .workspace {
        display: block;
      }

      .shell {
        width: 100%;
        max-width: none;
      }

      .header {
        grid-template-columns: 1fr;
      }

      .counter {
        max-width: 220px;
      }

      .toolbar-side {
        justify-content: flex-start;
      }

      .toolbar-main,
      .toolbar-side {
        width: 100%;
      }

      .composer textarea,
      .search input,
      .item-inline-input,
      .composer select,
      .composer input[type="datetime-local"],
      .manual-datetime-input,
      .remote-sync-panel input {
        font-size: 16px;
      }

      .composer-advanced {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      #quickEventAt {
        grid-column: 1 / -1;
        width: 100%;
      }

      .composer-advanced .ghost,
      .composer-advanced .primary {
        min-width: 0;
        min-height: 36px;
      }

      .remote-sync-panel {
        grid-template-columns: 1fr;
      }

      .item {
        grid-template-columns: 24px minmax(0, 1fr) 32px;
        align-items: start;
        gap: 8px;
      }

      .toggle {
        width: 22px;
        height: 22px;
        margin-top: 2px;
      }

      .item-main {
        width: 100%;
        align-items: flex-start;
      }

      .item-line {
        width: 100%;
        grid-template-columns: minmax(0, 1fr);
        align-items: start;
        row-gap: 5px;
        column-gap: 6px;
      }

      .item-tags {
        gap: 6px;
      }

      .item-text {
        font-size: 15px;
        line-height: 1.45;
        white-space: normal;
        overflow: hidden;
        text-overflow: clip;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .badge,
      .code-token {
        min-height: 20px;
        font-size: 11px;
        line-height: 18px;
      }

      .item-actions {
        grid-column: auto;
        align-self: start;
        justify-content: flex-end;
        flex-wrap: nowrap;
        opacity: 1;
      }

      .icon-btn {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
        padding: 0;
        border-radius: 8px;
        font-size: 20px;
        line-height: 1;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 0 0 calc(18px + env(safe-area-inset-bottom));
      }

      .shell {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .header,
      .composer,
      .toolbar,
      .list-wrap,
      .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        padding-top: 14px;
        padding-bottom: 10px;
        gap: 10px;
      }

      .title-block h1 {
        font-size: 24px;
        line-height: 1.15;
      }

      .title-block p {
        margin-top: 6px;
        font-size: 12px;
      }

      .counter {
        max-width: none;
        padding: 9px 11px;
      }

      .counter strong {
        font-size: 21px;
      }

      .composer,
      .toolbar,
      .list-wrap {
        padding-bottom: 12px;
      }

      .composer {
        padding-top: 10px;
      }

      .composer-card,
      .empty {
        border-radius: 12px;
      }

      .composer-card {
        padding: 10px;
      }

      .composer textarea {
        min-height: 66px;
        padding: 10px 12px;
        font-size: 16px;
        line-height: 1.45;
      }

      .composer-bar {
        align-items: center;
      }

      .composer-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .meta-note {
        flex: 1 1 100%;
        font-size: 10px;
      }

      .search {
        min-width: 0;
        flex-basis: 100%;
      }

      .search input {
        min-height: 42px;
      }

      .toolbar-side .ghost {
        flex: 1 1 calc(50% - 5px);
        justify-content: center;
      }

      .segmented {
        gap: 3px;
        flex-wrap: nowrap;
        width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .segmented button {
        flex: 0 0 auto;
        min-height: 40px;
        padding: 0 10px;
        border-radius: 10px;
        font-size: 13px;
      }

      .segmented::-webkit-scrollbar {
        display: none;
      }

      .list {
        min-height: 220px;
        border-radius: 12px;
      }

      .item-line,
      .item-inline-edit {
        gap: 6px;
      }

      .item {
        padding: 10px 8px 9px;
      }

      .item-text {
        width: 100%;
      }

      .item-inline-edit {
        width: 100%;
        grid-template-columns: minmax(0, 1fr);
        align-items: stretch;
      }

      .item-inline-input {
        min-height: 34px;
      }

      .footer {
        padding-top: 4px;
        padding-bottom: 16px;
      }

      .idea-pane {
        width: auto;
        margin-top: 12px;
      }

      .workspace.journal-focus .idea-pane {
        display: none;
      }
    }

    @media (max-width: 980px) and (orientation: landscape) {
      .app {
        padding: 8px 8px calc(12px + env(safe-area-inset-bottom));
      }

      .shell {
        border-radius: 18px;
      }

      .header,
      .composer,
      .toolbar,
      .list-wrap,
      .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        padding-top: 10px;
        padding-bottom: 8px;
      }

      .title-block h1 {
        font-size: 22px;
      }

      .title-block p {
        display: none;
      }

      .counter {
        min-width: 118px;
        max-width: none;
        padding: 8px 10px;
      }

      .counter strong {
        font-size: 20px;
      }

      .counter span {
        margin-top: 2px;
        font-size: 10px;
        white-space: nowrap;
      }

      .composer {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .composer-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: stretch;
        padding: 10px;
      }

      .composer textarea {
        height: 52px;
        min-height: 52px;
        resize: none;
      }

      .composer-bar {
        margin-top: 0;
        align-items: flex-end;
      }

      .meta-note {
        display: none;
      }

      .composer-actions {
        align-self: flex-end;
      }

      .composer-advanced {
        grid-column: 1 / -1;
      }

      .toolbar {
        flex-wrap: nowrap;
        align-items: center;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .toolbar-main {
        width: auto;
        flex: 0 0 auto;
      }

      .toolbar-side {
        width: auto;
        flex: 1 1 220px;
        justify-content: flex-end;
      }

      .segmented {
        width: auto;
      }

      .segmented button {
        min-height: 34px;
        padding: 0 9px;
        border-radius: 8px;
        font-size: 12px;
      }

      .search {
        flex: 1 1 220px;
        min-width: 180px;
      }

      .search input {
        min-height: 36px;
      }

      .list-wrap {
        padding-bottom: 10px;
      }

      .item {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .item-text {
        -webkit-line-clamp: 1;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="workspace" class="workspace">
    <section class="shell" aria-label="极简个人记录工具">
      <header class="header">
        <div class="title-block">
          <h1>极简记录</h1>
          <p>像记事本一样记下待办、日程、截止、想法和日记。打开就能写。</p>
        </div>
        <div class="counter" aria-live="polite">
          <strong id="openCount">0</strong>
          <span>未完成事项 · 不含想法/日记</span>
        </div>
      </header>

      <section class="composer" aria-label="快速输入区">
        <div class="composer-card">
          <label class="sr-only" for="quickInput">记录内容</label>
          <textarea id="quickInput" placeholder="写下一件事、一场会，或一段日常。"></textarea>
          <div class="composer-bar">
            <div class="meta-note">
              <span>Enter 保存。默认自动识别时间和类型；需要时再展开手动选项。</span>
              <span id="statusText">仅保存在当前浏览器。</span>
            </div>
            <div class="composer-actions">
              <button id="syncActionButton" class="ghost sync-action" type="button">连接同步</button>
              <button id="backupAuthButton" class="ghost sync-action backup-auth-action" type="button" hidden>授权备份</button>
              <button id="quickMoreButton" class="ghost icon-only" type="button" aria-label="展开手动选项" aria-expanded="false" title="展开手动选项">⋯</button>
              <button id="addButton" class="primary icon-only" type="button" aria-label="新增记录" title="新增记录">+</button>
            </div>
          </div>
          <div id="composerAdvanced" class="composer-advanced" hidden>
            <label class="sr-only" for="quickType">类型</label>
            <select id="quickType" title="类型">
              <option value="auto">自动判断</option>
              <option value="todo">待办</option>
              <option value="meeting">日程</option>
              <option value="deadline">截止</option>
              <option value="idea">想法</option>
              <option value="journal">日记</option>
            </select>
            <label class="sr-only" for="quickEventAt">事件时间</label>
            <input id="quickEventAt" class="manual-datetime-input" type="datetime-local" autocomplete="off" title="事件时间">
            <button id="exportButton" class="ghost" type="button">导出 JSON</button>
            <button id="importButton" class="ghost" type="button">导入 JSON</button>
            <button id="createSyncButton" class="ghost" type="button">新建同步文件</button>
            <button id="connectSyncButton" class="ghost" type="button">连接同步文件</button>
            <button id="cloudRestoreButton" class="ghost backup-restore-action" type="button" hidden>从备份恢复</button>
            <button id="remoteSyncButton" class="ghost" type="button">GitHub 同步</button>
            <div id="remoteSyncPanel" class="remote-sync-panel" hidden>
              <label class="sr-only" for="remoteRepoInput">GitHub 仓库</label>
              <input id="remoteRepoInput" type="text" autocomplete="off" spellcheck="false" placeholder="owner/repo">
              <label class="sr-only" for="remoteBranchInput">GitHub 分支</label>
              <input id="remoteBranchInput" type="text" autocomplete="off" spellcheck="false" placeholder="main">
              <label class="sr-only" for="remotePathInput">数据文件路径</label>
              <input id="remotePathInput" type="text" autocomplete="off" spellcheck="false" placeholder="minimal-notes-records.json">
              <label class="sr-only" for="remoteTokenInput">GitHub Token</label>
              <input id="remoteTokenInput" type="password" autocomplete="off" spellcheck="false" placeholder="GitHub token">
              <div class="remote-sync-actions">
                <button id="tempRemoteSyncButton" class="ghost" type="button">临时同步</button>
                <button id="saveRemoteSyncButton" class="primary" type="button">保存同步</button>
                <button id="clearRemoteSyncButton" class="ghost" type="button">关闭同步</button>
                <button id="secureExitButton" class="ghost" type="button">安全退出</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="筛选与搜索">
        <div class="toolbar-main">
          <div class="segmented" id="filters" role="tablist" aria-label="记录筛选">
            <button type="button" data-filter="all" class="active" aria-pressed="true">事项</button>
            <button type="button" data-filter="todo" aria-pressed="false">待办</button>
            <button type="button" data-filter="meeting" aria-pressed="false">日程</button>
            <button type="button" data-filter="deadline" aria-pressed="false">截止</button>
            <button type="button" data-filter="idea" aria-pressed="false">想法</button>
            <button type="button" data-filter="journal" aria-pressed="false">日记</button>
            <button type="button" data-filter="completed" aria-pressed="false">已完成</button>
          </div>
        </div>
        <div class="toolbar-side">
          <div class="search">
            <label class="sr-only" for="searchInput">搜索</label>
            <input id="searchInput" type="search" placeholder="搜索内容">
          </div>
          <input id="importFile" class="sr-only" type="file" accept="application/json,.json">
        </div>
      </section>

      <section class="list-wrap">
        <div id="recordList" class="list" aria-live="polite"></div>
      </section>

      <footer class="footer">
        <span>GitHub 用作主同步；云盘 JSON 仅作为电脑端备份。</span>
        <span id="summaryText">0 条记录</span>
      </footer>

        const ok = window.confirm("从云盘备份恢复会用备份内容覆盖当前本地记录，并随后写回 GitHub。是否继续？");
        if (!ok) {
          setStatus("已取消恢复备份。");
          return;
        }

        try {
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("云盘备份需要授权。");
            return;
          }

          const result = await loadRecordsFromSyncFile();
          if (result === "empty") {
            setStatus("云盘备份文件为空。");
            return;
          }

          if (result === "loaded") {
            state.remote.pushLocalNext = Boolean(state.remote.enabled);
            if (state.remote.pushLocalNext) {
              saveRemoteSyncSettingsToLocal();
              queueRemoteWrite();
            }
            setStatus("已从云盘备份恢复。");
            return;
          }

          setStatus("无法读取云盘备份。");
        } catch (error) {
          console.error(error);
          state.sync.error = "云盘备份恢复失败";
          updateStorageStatus();
          setStatus("云盘备份恢复失败。");
        }
      }

      function handleListClick(event) {
        const actionTarget = event.target.closest("[data-action]");
        if (!actionTarget) {
          return;
        }

        const action = actionTarget.dataset.action;
        const id = actionTarget.dataset.id;
        if (!id) {
          return;
        }

        if (action === "toggle") {
          toggleRecord(id);
          return;
        }

        if (action === "delete") {
          deleteRecord(id);
          return;
        }

        if (action === "ignore-conflict") {
          ignoreConflict(id, actionTarget.dataset.conflictKey || "");
          return;
        }

        if (action === "confirm-auto-complete") {
          confirmAutoComplete(id);
          return;
        }

        if (action === "revert-auto-complete") {
          revertAutoComplete(id);
          return;
        }

        if (action === "open-edit") {
          startEditingRecord(id);
          return;
        }

        if (action === "cancel") {
          state.editingId = null;
          render();
          return;
        }

        if (action === "save") {
          saveEditedRecord(id);
        }
      }

      function handleListKeydown(event) {
        const directActionTarget = event.target.closest("[data-action]");
        if (directActionTarget && directActionTarget.dataset.action && directActionTarget.dataset.action !== "open-edit") {
          return;
        }

        const openEditTarget = event.target.closest('[data-action="open-edit"]');
        if (openEditTarget && (event.key === "Enter" || event.key === " ")) {
          event.preventDefault();
          const id = openEditTarget.dataset.id;
          if (id) {
            startEditingRecord(id);
          }
          return;
        }

        const editBox = event.target.closest(".item-inline-edit");
        if (!editBox) {
          return;
        }

        const item = event.target.closest(".item");
        if (!item) {
          return;
        }

        const id = item.dataset.id;
        if (!id) {
          return;
        }

        if (event.key === "Escape") {
          event.preventDefault();
          state.editingId = null;
          render();
          return;
        }

        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          saveEditedRecord(id);
        }
      }

      function handleListInput(event) {
        const input = event.target.closest('[data-role="edit-inline-text"]');
        if (!input) {
          return;
        }

        autoSizeInlineEditInput(input);
      }

      function startEditingRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (isRecordReadOnly(record)) {
          state.editingId = null;
          render();
          setStatus("3 天以外的日记只读。");
          return;
        }

        state.editingId = id;
        render();
        focusEditField(id);
      }

      function handleListFocusOut(event) {
        if (event.target.getAttribute("data-role") !== "edit-inline-text") {
          return;
        }

        const currentItem = event.target.closest(".item");
        const nextItem = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest(".item") : null;
        if (currentItem && nextItem && currentItem === nextItem) {
          return;
        }

        const id = currentItem ? currentItem.dataset.id : "";
        if (id) {
          saveEditedRecord(id);
        }
      }

      function handleIdeaPaneFocusIn(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        input.dataset.originalValue = input.value;
        autoSizeIdeaInput(input);
      }

      function handleIdeaPaneInput(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        const record = findIdeaRecord(input.dataset.id || "");
        if (!record) {
          return;
        }

        const nextText = String(input.value || "");
        if (record.text === nextText) {
          autoSizeIdeaInput(input);
          return;
        }

        record.text = nextText;
        autoSizeIdeaInput(input);
        persist();
        patchIdeaTextInList(record);
      }

      function handleIdeaPaneKeydown(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          event.preventDefault();
          input.blur();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          const originalValue = input.dataset.originalValue;
          if (typeof originalValue === "string") {
            input.value = originalValue;
          }
          input.blur();
        }
      }

      function handleIdeaPaneFocusOut(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        saveIdeaPaneRecord(input);
      }

      function findIdeaRecord(id) {
        return state.records.find(function (record) {
          return record.id === id && record.type === "idea";
        }) || null;
      }

      function patchIdeaTextInList(record) {
        if (!record) {
          return;
        }

        const item = recordList.querySelector('.item[data-id="' + cssEscape(record.id) + '"]');
        if (!item) {
          return;
        }

        const textNode = item.querySelector(".item-text");
        if (textNode) {
          textNode.innerHTML = renderDisplayTextHtml(record);
        }

        const lineNode = item.querySelector(".item-line");
        if (lineNode) {
          lineNode.title = buildItemTitle(record);
        }
      }

      function saveIdeaPaneRecord(input) {
        const record = findIdeaRecord(input.dataset.id || "");
        if (!record) {
          return;
        }

        const previousText = typeof input.dataset.originalValue === "string"
          ? input.dataset.originalValue
          : record.text;
        const nextText = String(input.value || "");
        const trimmedNext = nextText.trim();

        if (!trimmedNext) {
          record.text = previousText;
          input.value = previousText;
          persist();
          patchIdeaTextInList(record);
          setStatus("想法内容不能为空。");
          return;
        }

        const changed = trimmedNext !== String(previousText || "").trim();
        if (!changed) {
          input.dataset.originalValue = nextText;
          if (record.text !== nextText) {
            record.text = nextText;
            persist();
            patchIdeaTextInList(record);
          }
          return;
        }

        record.text = nextText;
        const now = new Date().toISOString();
        record.updatedAt = now;
        pushHistory(record, "edited", now);
        input.dataset.originalValue = nextText;
        persist();
        render();
        setStatus("想法已更新。");
      }

      function addRecord() {
        const rawText = quickInput.value || "";
        const text = rawText.trim();
        const explicitEventAt = normalizeDateTime(quickEventAt.value);
        const manualType = quickType.value;
        const contextualType = manualType === "auto" && state.filter === "journal" ? "journal" : "";
        const now = new Date().toISOString();

        if (!text) {
          setStatus("先写一点内容。");
          focusQuickInput();
          return;
        }

        const parsed = inferTypeAndText(text, explicitEventAt, manualType, contextualType);
        const record = {
          id: createId(),
          text: parsed.text,
          type: parsed.type,
          createdAt: now,
          eventAt: parsed.eventAt,
          recurrence: parsed.recurrence,
          ignoredConflictKeys: [],
          history: [],
          recurrenceCompletions: [],
          autoCompleteState: "",
          autoCompleteRef: "",
          autoCompletedAt: "",
          prepared: false,
          completed: false,
          updatedAt: now
        };
        pushHistory(record, "created", now);

        state.records.unshift(record);
        state.editingId = null;
        persist();
        quickInput.value = "";
        quickEventAt.value = "";
        quickType.value = "auto";
        toggleComposerAdvanced(false);
        render();
        focusQuickInput();
        setStatus(parsed.type === "journal" ? "已收入日记。" : "已保存。");
      }

      function toggleRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (record.type === "journal") {
          setStatus("日记不需要标记完成。");
          return;
        }

        if (isRecordReadOnly(record)) {
          setStatus("3 天以外的日记只读。");
          return;
        }

        if (isAutoCompletionPending(record)) {
          confirmAutoComplete(id);
          return;
        }

        const now = new Date().toISOString();
        let historyAction = "";

        if (isRecurringRecord(record) && !record.completed) {
          if (supportsPreparedState(record) && !record.prepared) {
            record.prepared = true;
            record.updatedAt = now;
            pushHistory(record, "prepared", now);
            persist();
            render();
            return;
          }

          if (completeAndAdvanceRecurringRecord(record, now)) {
            persist();
            render();
            setStatus("已完成本次，已显示下一次。");
            return;
          }
        }

        if (supportsPreparedState(record)) {
          if (!record.prepared && !record.completed) {
            record.prepared = true;
            historyAction = "prepared";
          } else if (record.prepared && !record.completed) {
            record.prepared = false;
            record.completed = true;
            clearAutoCompleteState(record);
            historyAction = "completed";
          } else {
            record.prepared = false;
            record.completed = false;
            clearAutoCompleteState(record);
            historyAction = "reopened";
          }
        } else {
          record.completed = !record.completed;
          clearAutoCompleteState(record);
          historyAction = record.completed ? "completed" : "reopened";
        }
        record.updatedAt = now;
        pushHistory(record, historyAction, now);
        persist();
        render();
      }

      async function deleteRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (isRecordReadOnly(record)) {
          setStatus("3 天以外的日记只读。");
          return;
        }

        const deleteMode = await chooseDeleteMode();
        if (!deleteMode) {
          return;
        }

        const deletedAt = new Date().toISOString();
        if (deleteMode === "archive" && !archiveDeletedRecord(record, deletedAt)) {
          setStatus("删除归档失败，记录未删除。");
          return;
        }

        state.records = state.records.filter(function (item) {
          return item.id !== id;
        });
        if (state.editingId === id) {
          state.editingId = null;
        }
        persist();
        render();
        setStatus(deleteMode === "archive" ? "已删除；完整记录已保留在 JSON。" : "已从 JSON 完全删除。");
      }

      function chooseDeleteMode() {
        if (!deleteDialog) {
          return Promise.resolve(window.confirm("从 JSON 里完全删除这条记录吗？") ? "purge" : "archive");
        }

        if (deleteDialogResolve) {
          closeDeleteDialog("");
        }

        deleteDialogPreviousFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
        deleteDialog.hidden = false;

        requestAnimationFrame(function () {
          if (deleteArchiveButton) {
            deleteArchiveButton.focus();
          }
        });

        return new Promise(function (resolve) {
          deleteDialogResolve = resolve;
        });
      }

      function handleDeleteDialogClick(event) {
        const target = event.target.closest("[data-delete-mode]");
        if (!target || !deleteDialog.contains(target)) {
          return;
        }

        const mode = target.dataset.deleteMode;
        closeDeleteDialog(mode === "archive" || mode === "purge" ? mode : "");
      }

      function handleDeleteDialogKeydown(event) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeDeleteDialog("");
        }
      }

      function closeDeleteDialog(mode) {
        const resolve = deleteDialogResolve;
        deleteDialogResolve = null;
        if (deleteDialog) {
          deleteDialog.hidden = true;
        }

        const previousFocus = deleteDialogPreviousFocus;
        deleteDialogPreviousFocus = null;
        if (previousFocus && document.contains(previousFocus)) {
          previousFocus.focus();
        }

        if (resolve) {
          resolve(mode);
        }
      }

      function confirmAutoComplete(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        const now = new Date().toISOString();
        if (completeAndAdvanceRecurringRecord(record, now)) {
          persist();
          render();
          setStatus("已确认本次，已显示下一次。");
          return;
        }

        record.prepared = false;
        record.completed = true;
        clearAutoCompleteState(record);
        record.updatedAt = now;
        pushHistory(record, "completed", now);
        persist();
        render();
        setStatus("已确认自动完成。");
      }

      function revertAutoComplete(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        const now = new Date().toISOString();
        record.autoCompleteState = "reverted";
        record.autoCompleteRef = getAutoCompleteRef(record);
        record.updatedAt = now;
        pushHistory(record, "auto_reverted", now);
        persist();
        render();
        setStatus("已恢复为未完成。");
      }

      function saveEditedRecord(id) {
        const item = recordList.querySelector('.item[data-id="' + cssEscape(id) + '"]');
        if (!item) {
          return;
        }

        const textField = item.querySelector('[data-role="edit-inline-text"]');

        if (!textField) {
          return;
        }

        const text = (textField.value || "").trim();
        if (!text) {
          state.editingId = null;
          render();
          setStatus("内容不能为空，已取消修改。");
          return;
        }

        const record = state.records.find(function (entry) {
          return entry.id === id;
        });
        if (!record) {
          return;
        }

        if (isRecordReadOnly(record)) {
          state.editingId = null;
          render();
          setStatus("3 天以外的日记只读。");
          return;
        }

        if (text === String(record.text || "").trim()) {
          state.editingId = null;
          render();
          return;
        }

        const updated = inferUpdateFromText(text, record);
        const changed = record.text !== updated.text
          || record.type !== updated.type
          || record.eventAt !== updated.eventAt
          || !recurrencesEqual(record.recurrence, updated.recurrence);
        record.text = updated.text;
        record.type = updated.type;
        record.eventAt = updated.eventAt;
        record.recurrence = updated.recurrence;
        record.ignoredConflictKeys = [];
        clearAutoCompleteState(record);
        if (updated.type === "journal") {
          record.completed = false;
          record.prepared = false;
        }
        if (!supportsPreparedState(updated)) {
          record.prepared = false;
        }
        record.updatedAt = new Date().toISOString();
        if (changed) {
          pushHistory(record, "edited", record.updatedAt);
        }

        state.editingId = null;
        persist();
        render();
        setStatus("已更新。");
      }

      function exportRecords() {
        const exportRecords = state.remote.temporary
          ? state.records.filter(function (record) {
            return !isRecordHiddenByTemporaryPrivacy(record);
          })
          : state.records;
        const exportDeletedRecords = state.remote.temporary
          ? state.deletedRecords.filter(function (entry) {
            return !isRecordHiddenByTemporaryPrivacy(entry && entry.record);
          })
          : state.deletedRecords;
        const payload = buildRecordsPayload({ exportedAt: new Date().toISOString() }, exportRecords, exportDeletedRecords);

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const stamp = formatFileStamp(new Date());
        link.href = url;
        link.download = "minimal-records-" + stamp + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("已导出 JSON。");
      }

      function importRecords(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = function (loadEvent) {
          try {
            const raw = String(loadEvent.target.result || "");
            const payload = parseRecordsEnvelope(raw);
            const normalized = payload.records;
            const ok = window.confirm("导入会覆盖当前本地数据，是否继续？");
            if (!ok) {
              importFile.value = "";
              return;
            }

            state.records = normalized.sort(sortRecords);
            state.deletedRecords = payload.deletedRecords;
            state.recurrenceCompletionArchive = payload.recurrenceCompletionArchive;
            state.editingId = null;
            persist();
            render();
            setStatus("已导入 " + normalized.length + " 条记录。");
          } catch (error) {
            console.error(error);
            setStatus("导入失败，请检查 JSON 文件。");
          } finally {
            importFile.value = "";
          }
        };

        reader.readAsText(file, "utf-8");
      }

      async function createSyncFile() {
        if (!ensureFileSyncSupported()) {
          return;
        }

        try {
          if (state.sync.handle) {
            const permissionGranted = await requestSyncPermission("readwrite");
            if (!permissionGranted) {
              setStatus("云盘备份需要授权。");
              return;
            }

            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("云盘备份写入失败，已保存在当前浏览器。");
              return;
            }

            await storeSyncHandle(state.sync.handle);
            setStatus(state.remote.enabled ? "已覆盖当前云盘备份。" : "已覆盖当前同步文件。");
            return;
          }

          const handle = await window.showSaveFilePicker({
            suggestedName: DEFAULT_SYNC_FILE_NAME,
            types: getJsonFilePickerTypes(),
            excludeAcceptAllOption: false
          });

          await setSyncHandle(handle, false);
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus(state.remote.enabled ? "云盘备份需要授权。" : "同步文件需要授权。");
            return;
          }

          const ok = await writeCurrentRecordsToSyncFile();
          if (!ok) {
            setStatus(state.remote.enabled ? "云盘备份写入失败，已保存在当前浏览器。" : "同步文件写入失败，已保存在当前浏览器。");
            return;
          }

          await storeSyncHandle(handle);
          if (!state.remote.enabled) {
            startSyncPolling();
          }
          setStatus(state.remote.enabled ? "已新建云盘备份文件。" : "已新建并连接同步文件。");
        } catch (error) {
          if (error && error.name === "AbortError") {
            return;
          }

          console.error(error);
          state.sync.error = "新建同步文件失败";
          updateStorageStatus();
          setStatus("新建同步文件失败。");
        }
      }

      async function connectSyncFile() {
        if (!ensureFileSyncSupported()) {
          return;
        }

        try {
          if (state.sync.handle && state.sync.permissionNeeded) {
            await authorizeStoredSyncFile();
            return;
          }

          const handles = await window.showOpenFilePicker({
            multiple: false,
            types: getJsonFilePickerTypes(),
            excludeAcceptAllOption: false
          });
          const handle = handles && handles[0];
          if (!handle) {
            return;
          }

          await setSyncHandle(handle, false);
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("同步文件需要授权。");
            return;
          }

          if (state.remote.enabled) {
            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("同步文件写入失败，已保存在当前浏览器。");
              return;
            }
            setStatus("已连接云盘备份并写入当前记录。");
          } else {
            const result = await loadRecordsFromSyncFile();
            if (result === "empty") {
              const ok = await writeCurrentRecordsToSyncFile();
              if (!ok) {
                setStatus("同步文件写入失败，已保存在当前浏览器。");
                return;
              }
              setStatus("同步文件为空，已写入当前记录。");
            } else if (result === "loaded") {
              setStatus("已读取同步文件。");
            }
          }
          await storeSyncHandle(handle);
          if (!state.remote.enabled) {
            startSyncPolling();
          }
        } catch (error) {
          if (error && error.name === "AbortError") {
            return;
          }

          console.error(error);
          state.sync.error = "连接同步文件失败";
          state.sync.handle = null;
          state.sync.fileName = "";
          state.sync.permissionNeeded = false;
          updateStorageStatus();
          setStatus("连接同步文件失败。");
        }
      }

      async function authorizeStoredSyncFile() {
        if (!state.sync.handle) {
          await connectSyncFile();
          return;
        }

        try {
          setStatus("请在浏览器提示里选择每次访问都允许。");
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("未获得同步文件授权。");
            return;
          }

          if (state.remote.enabled) {
            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("同步文件写入失败，已保存在当前浏览器。");
              return;
            }
            setStatus("云盘备份已授权并写入当前记录。");
          } else {
            const result = await loadRecordsFromSyncFile();
            if (result === "empty") {
              const ok = await writeCurrentRecordsToSyncFile();
              if (!ok) {
                setStatus("同步文件写入失败，已保存在当前浏览器。");
                return;
              }
              setStatus("同步文件为空，已写入当前记录。");
            } else if (result === "loaded") {
              setStatus("已读取同步文件。");
            } else {
              setStatus("同步文件已授权。");
            }
            startSyncPolling();
          }
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件授权失败";
          updateStorageStatus();
          setStatus("同步文件授权失败。");
        }
      }

      async function restoreStoredSyncFile(options) {
        const opts = Object.assign({
          readRecords: true
        }, options || {});

        if (!state.sync.supported) {
          updateStorageStatus();
          return;
        }

        try {
          const handle = await readStoredSyncHandle();
          if (!handle) {
            updateStorageStatus();
            return;
          }

          await setSyncHandle(handle, false);
          const hasPermission = await querySyncPermission("readwrite");
          if (!hasPermission) {
            state.sync.permissionNeeded = true;
            updateStorageStatus();
            return;
          }

          if (!opts.readRecords) {
            try {
              const file = await state.sync.handle.getFile();
              state.sync.lastModified = file.lastModified || 0;
              state.sync.error = "";
            } catch (error) {
              console.error(error);
              state.sync.error = "云盘备份读取失败";
            }
            updateStorageStatus();
            return;
          }

          const result = await loadRecordsFromSyncFile();
          if (result === "empty") {
            await writeCurrentRecordsToSyncFile();
            setStatus("同步文件为空，已写入当前记录。");
          } else if (result === "loaded") {
            setStatus("已读取同步文件。");
          }
          startSyncPolling();
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件恢复失败";
          state.sync.handle = null;
          state.sync.fileName = "";
          state.sync.permissionNeeded = false;
          updateStorageStatus();
        }
      }

      function resetFileSyncState() {
        state.sync.handle = null;
        state.sync.fileName = "";
        state.sync.permissionNeeded = false;
        state.sync.lastModified = 0;
        state.sync.lastWriteAt = "";
        state.sync.writeInFlight = false;
        state.sync.writeQueued = false;
        state.sync.error = "";
        window.clearTimeout(syncWriteTimer);
        window.clearInterval(syncPollTimer);
        syncWriteTimer = null;
        syncPollTimer = null;
      }

      async function setSyncHandle(handle, shouldStore) {
        state.sync.handle = handle;
        state.sync.fileName = handle && handle.name ? handle.name : DEFAULT_SYNC_FILE_NAME;
        state.sync.permissionNeeded = false;
        state.sync.error = "";
        state.sync.lastModified = 0;

        if (shouldStore) {
          await storeSyncHandle(handle);
        }

        updateStorageStatus();
      }

      async function loadRecordsFromSyncFile() {
        if (!state.sync.handle) {
          return "missing";
        }

        const hasPermission = await querySyncPermission("read");
        if (!hasPermission) {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return "permission";
        }

        const file = await state.sync.handle.getFile();
        const raw = await file.text();
        state.sync.lastModified = file.lastModified || 0;

        if (!raw.trim()) {
          state.sync.error = "";
          updateStorageStatus();
          return "empty";
        }

        const payload = parseRecordsEnvelope(raw);
        state.records = payload.records;
        state.deletedRecords = payload.deletedRecords;
        state.recurrenceCompletionArchive = payload.recurrenceCompletionArchive;
        state.localPayloadAt = payload.payloadAt || state.localPayloadAt;
        state.editingId = null;
        state.sync.permissionNeeded = false;
        state.sync.error = "";
        saveLocalRecords({
          payloadSavedAt: payload.savedAt,
          payloadSyncedAt: payload.syncedAt
        });
        render();
        updateStorageStatus();
        return "loaded";
      }

      async function writeCurrentRecordsToSyncFile() {
        if (!state.sync.handle) {
          return false;
        }

        const hasPermission = await querySyncPermission("readwrite");
        if (!hasPermission) {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }

        state.sync.writeInFlight = true;
        updateStorageStatus();

        try {
          const writable = await state.sync.handle.createWritable();
          await writable.write(JSON.stringify(buildRecordsPayload(), null, 2));
          await writable.close();

          const file = await state.sync.handle.getFile();
          state.sync.lastModified = file.lastModified || Date.now();
          state.sync.lastWriteAt = new Date().toISOString();
          state.sync.permissionNeeded = false;
          state.sync.error = "";
          updateStorageStatus();
          return true;
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件写入失败";
          updateStorageStatus();
          return false;
        } finally {
          state.sync.writeInFlight = false;
          updateStorageStatus();
        }
      }

      function queueSyncFileWrite() {
        if (!state.sync.handle) {
          return;
        }

        state.sync.writeQueued = true;
        window.clearTimeout(syncWriteTimer);
        syncWriteTimer = window.setTimeout(function () {
          syncWriteTimer = null;
          writeQueuedSyncFile();
        }, 500);
        updateStorageStatus();
      }

      async function writeQueuedSyncFile() {
        if (!state.sync.handle || state.sync.writeInFlight) {
          return;
        }

        while (state.sync.writeQueued) {
          state.sync.writeQueued = false;
          const ok = await writeCurrentRecordsToSyncFile();
          if (!ok) {
            setStatus("同步文件写入失败，已保存在当前浏览器。");
            return;
          }
        }
      }

      function startSyncPolling() {
        window.clearInterval(syncPollTimer);
        if (!state.sync.handle) {
          return;
        }

        syncPollTimer = window.setInterval(checkForSyncFileChanges, SYNC_POLL_INTERVAL);
      }

      async function checkForSyncFileChanges() {
        if (!state.sync.handle || state.sync.writeInFlight || state.sync.writeQueued) {
          return;
        }

        try {
          const hasPermission = await querySyncPermission("read");
          if (!hasPermission) {
            state.sync.permissionNeeded = true;
            updateStorageStatus();
            return;
          }

          const file = await state.sync.handle.getFile();
          const latestModified = file.lastModified || 0;
          if (!latestModified) {
            return;
          }

          if (!state.sync.lastModified) {
            state.sync.lastModified = latestModified;
            updateStorageStatus();
            return;
          }

          if (latestModified !== state.sync.lastModified) {
            await loadRecordsFromSyncFile();
            setStatus("已从同步文件更新。");
          }
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件读取失败";
          updateStorageStatus();
        }
      }

      function ensureFileSyncSupported() {
        if (state.sync.supported) {
          return true;
        }

        setStatus("当前浏览器不支持同步文件，请用 Chrome 或 Edge 打开。");
        return false;
      }

      function getJsonFilePickerTypes() {
        return [{
          description: "Minimal Notes JSON",
          accept: {
            "application/json": [".json"]
          }
        }];
      }

      async function querySyncPermission(mode) {
        if (!state.sync.handle || typeof state.sync.handle.queryPermission !== "function") {
          return true;
        }

        try {
          return await state.sync.handle.queryPermission({ mode: mode }) === "granted";
        } catch (error) {
          console.error(error);
          return false;
        }
      }

      async function requestSyncPermission(mode) {
        if (!state.sync.handle) {
          return false;
        }

        if (await querySyncPermission(mode)) {
          state.sync.permissionNeeded = false;
          updateStorageStatus();
          return true;
        }

        if (typeof state.sync.handle.requestPermission !== "function") {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }

        try {
          const status = await state.sync.handle.requestPermission({ mode: mode });
          const granted = status === "granted";
          state.sync.permissionNeeded = !granted;
          updateStorageStatus();
          return granted;
        } catch (error) {
          console.error(error);
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }
      }

      async function openSyncDb() {
        return new Promise(function (resolve, reject) {
          const request = window.indexedDB.open(SYNC_DB_NAME, 1);

          request.onupgradeneeded = function () {
            const db = request.result;
            if (!db.objectStoreNames.contains(SYNC_DB_STORE)) {
              db.createObjectStore(SYNC_DB_STORE);
            }
          };

          request.onsuccess = function () {
            resolve(request.result);
          };

          request.onerror = function () {
            reject(request.error);
          };
        });
      }

      async function storeSyncHandle(handle) {
        const db = await openSyncDb();
        return new Promise(function (resolve, reject) {
          const transaction = db.transaction(SYNC_DB_STORE, "readwrite");
          transaction.objectStore(SYNC_DB_STORE).put(handle, SYNC_FILE_HANDLE_KEY);

          transaction.oncomplete = function () {
            db.close();
            resolve();
          };

          transaction.onerror = function () {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function readStoredSyncHandle() {
        const db = await openSyncDb();
        return new Promise(function (resolve, reject) {
          const transaction = db.transaction(SYNC_DB_STORE, "readonly");
          const request = transaction.objectStore(SYNC_DB_STORE).get(SYNC_FILE_HANDLE_KEY);
          let handle = null;

          request.onsuccess = function () {
            handle = request.result || null;
          };

          transaction.oncomplete = function () {
            db.close();
            resolve(handle);
          };

          transaction.onerror = function () {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function deleteStoredSyncFileHandle() {
        if (!window.indexedDB) {
          return;
        }

        await new Promise(function (resolve) {
          const request = window.indexedDB.deleteDatabase(SYNC_DB_NAME);
          request.onsuccess = resolve;
          request.onerror = resolve;
          request.onblocked = resolve;
        });
      }

      function toggleRemoteSyncPanel(forceOpen) {
        state.remote.panelOpen = typeof forceOpen === "boolean" ? forceOpen : !state.remote.panelOpen;
        remoteSyncPanel.hidden = !state.remote.panelOpen;
