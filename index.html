        const defaultTime = inferDefaultTimeByWords(text);
        const periodLabel = extractTimePeriodLabel(text);
        const hmMatch = text.match(/(\d{1,2})\s*[:：]\s*(\d{1,2})/);
        if (hmMatch) {
          return {
            matched: true,
            hours: clampHour(applyTimePeriod(Number(hmMatch[1]), periodLabel)),
            minutes: clampMinute(Number(hmMatch[2]))
          };
        }

        const pointMatch = text.match(/(凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚)?\s*(\d{1,2})\s*点\s*(半|[0-5]?\d\s*分?)?/);
        if (pointMatch) {
          let hours = Number(pointMatch[2]);
          let minutes = 0;

          if (pointMatch[3]) {
            minutes = pointMatch[3].indexOf("半") >= 0 ? 30 : clampMinute(parseInt(pointMatch[3], 10) || 0);
          }

          hours = applyTimePeriod(hours, pointMatch[1] || periodLabel || "");
          return {
            matched: true,
            hours: clampHour(hours),
            minutes: minutes
          };
        }

        return {
          matched: false,
          hours: 0,
          minutes: 0,
          defaultHours: defaultTime ? defaultTime.hours : null,
          defaultMinutes: defaultTime ? defaultTime.minutes : null
        };
      }

      function extractTimePeriodLabel(text) {
        const match = text.match(/凌晨|今早|明早|早上|今晨|上午|中午|今午|下午|傍晚|晚上|今晚|明晚/);
        return match ? match[0] : "";
      }

      function inferDefaultTimeByWords(text) {
        const isMealText = /吃饭|用餐|聚餐|饭局|午饭|午餐|晚饭|晚餐/.test(text);
        if (/凌晨/.test(text)) {
          return { hours: 1, minutes: 0 };
        }
        if (/早上|今早|明早|今晨|上午/.test(text)) {
          return { hours: 9, minutes: 0 };
        }
        if (/午饭|午餐/.test(text) || (isMealText && /中午|今午/.test(text))) {
          return { hours: 12, minutes: 0 };
        }
        if (/晚饭|晚餐/.test(text) || (isMealText && /傍晚|晚上|今晚|明晚/.test(text))) {
          return { hours: 18, minutes: 0 };
        }
        if (/下午/.test(text)) {
          return { hours: 14, minutes: 0 };
        }
        if (/傍晚/.test(text)) {
          return { hours: 18, minutes: 0 };
        }
        if (/晚上|今晚|明晚/.test(text)) {
          return { hours: 20, minutes: 0 };
        }
        return null;
      }

      function applyTimePeriod(hours, label) {
        if (!label) {
          return hours;
        }

        if (/凌晨/.test(label)) {
          return hours === 12 ? 0 : hours;
        }

        if (/今早|明早|早上|今晨|上午/.test(label)) {
          return hours === 12 ? 0 : hours;
        }

        if (/中午|今午/.test(label)) {
          if (hours < 11) {
            return hours + 12;
          }
          return hours;
        }

        if (/下午|傍晚|晚上|今晚|明晚/.test(label)) {
          if (hours < 12) {
            return hours + 12;
          }
        }

        return hours;
      }

      function weekdayToIndex(label) {
        const map = {
          "一": 0,
          "二": 1,
          "三": 2,
          "四": 3,
          "五": 4,
          "六": 5,
          "日": 6,
          "天": 6
        };
        return map[label];
      }

      function clampHour(value) {
        return Math.max(0, Math.min(23, value));
      }

      function clampMinute(value) {
        return Math.max(0, Math.min(59, value));
      }

      function hasExplicitTimeToken(text) {
        return /(\d{1,2}[:：]\d{2}|\d{1,2}\s*点(?:半|[0-5]?\d\s*分?)?)/.test(String(text || ""));
      }

      function toEndOfDayIso(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        date.setHours(23, 59, 0, 0);
        return date.toISOString();
      }

      function toStartOfDayIso(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        date.setHours(0, 0, 0, 0);
        return date.toISOString();
      }

      function isSameLocalCalendarDay(left, right) {
        if (!isValidDate(left) || !isValidDate(right)) {
          return false;
        }

        const a = new Date(left);
        const b = new Date(right);
        return a.getFullYear() === b.getFullYear()
          && a.getMonth() === b.getMonth()
          && a.getDate() === b.getDate();
      }

      function shouldRepairStoredEventAt(text, currentEventAt, inferredEventAt, referenceNow) {
        if (!inferredEventAt) {
          return false;
        }

        if (!currentEventAt) {
          return true;
        }

        const explicitDateInfo = parseExplicitCalendarDate(String(text || ""), referenceNow);
        if (!explicitDateInfo.matched) {
          return false;
        }

        return !isSameLocalCalendarDay(currentEventAt, inferredEventAt);
      }

      function getTextResolutionReferenceAt(record, text, type) {
        const history = Array.isArray(record && record.history)
          ? normalizeHistoryEntries(record.history)
          : [];

        for (let index = history.length - 1; index >= 0; index -= 1) {
          const entry = history[index];
          if ((entry.action === "created" || entry.action === "edited")
            && entry.text === text
            && entry.type === type
            && isValidDate(entry.at)) {
            return entry.at;
          }
        }

        if (isValidDate(record && record.createdAt)) {
          return record.createdAt;
        }

        if (isValidDate(record && record.updatedAt)) {
          return record.updatedAt;
        }

        return "";
      }

      function loadLocalRecordsEnvelope() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return {
              records: [],
              savedAt: "",
              syncedAt: "",
              payloadAt: ""
            };
          }

          return parseRecordsEnvelope(raw);
        } catch (error) {
          console.error(error);
          return {
            records: [],
            savedAt: "",
            syncedAt: "",
            payloadAt: ""
          };
        }
      }

      function persist(options) {
        const opts = options || {};
        markRecordsChanged();
        saveLocalRecords({
          preservePayloadTime: Boolean(opts.preservePayloadTime)
        });
        if (!opts.skipSyncFile) {
          queueSyncFileWrite();
        }
        if (!opts.skipRemote) {
          queueRemoteWrite();
        }
      }

      function saveLocalRecords(options) {
        const opts = options || {};
        const extra = {};
        if (isValidDate(opts.payloadSavedAt)) {
          extra.savedAt = new Date(opts.payloadSavedAt).toISOString();
        } else if (opts.preservePayloadTime && isValidDate(state.localPayloadAt)) {
          extra.savedAt = new Date(state.localPayloadAt).toISOString();
        }
        if (isValidDate(opts.payloadSyncedAt)) {
          extra.syncedAt = new Date(opts.payloadSyncedAt).toISOString();
        }

        const payload = buildRecordsPayload(extra);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        state.localPayloadAt = getPayloadTimestamp(payload) || state.localPayloadAt;
      }

      function markRecordsChanged() {
        state.recordsRevision += 1;
      }

      function buildRecordsPayload(extra, records) {
        return Object.assign({
          version: 2,
          savedAt: new Date().toISOString(),
          records: Array.isArray(records) ? records : state.records
        }, extra || {});
      }

      function parseRecordsPayload(raw) {
        return parseRecordsEnvelope(raw).records;
      }

      function parseRecordsEnvelope(raw) {
        const parsed = JSON.parse(raw);
        const records = Array.isArray(parsed) ? parsed : parsed.records;
        if (!Array.isArray(records)) {
          throw new Error("JSON 格式不正确");
        }

        return {
          records: records.map(normalizeImportedRecord).filter(Boolean).sort(sortRecords),
          savedAt: !Array.isArray(parsed) && isValidDate(parsed.savedAt) ? new Date(parsed.savedAt).toISOString() : "",
          syncedAt: !Array.isArray(parsed) && isValidDate(parsed.syncedAt) ? new Date(parsed.syncedAt).toISOString() : "",
          payloadAt: getPayloadTimestamp(parsed)
        };
      }

      function createHistorySnapshot(action, at, record) {
        return {
          action: action,
          at: isValidDate(at) ? new Date(at).toISOString() : new Date().toISOString(),
          text: record && typeof record.text === "string" ? record.text : "",
          type: record && typeof record.type === "string" ? record.type : "",
          eventAt: normalizeDateTime(record && record.eventAt),
          recurrence: normalizeRecurrenceInfo(record && record.recurrence),
          prepared: Boolean(record && record.prepared),
          completed: Boolean(record && record.completed)
        };
      }

      function normalizeHistoryEntries(value, fallbackRecord) {
        const normalized = Array.isArray(value)
          ? value.map(function (entry) {
            if (!entry || typeof entry !== "object" || !isValidDate(entry.at)) {
              return null;
            }

            return {
              action: typeof entry.action === "string" && entry.action ? entry.action : "updated",
              at: new Date(entry.at).toISOString(),
              text: typeof entry.text === "string" ? entry.text : "",
              type: typeof entry.type === "string" ? entry.type : "",
              eventAt: normalizeDateTime(entry.eventAt),
              recurrence: normalizeRecurrenceInfo(entry.recurrence),
              prepared: Boolean(entry.prepared),
              completed: Boolean(entry.completed)
            };
          }).filter(Boolean)
          : [];

        if (normalized.length) {
          return normalized.sort(function (a, b) {
            return new Date(a.at).getTime() - new Date(b.at).getTime();
          });
        }

        if (!fallbackRecord) {
          return [];
        }

        const entries = [];
        const createdAt = isValidDate(fallbackRecord.createdAt) ? new Date(fallbackRecord.createdAt).toISOString() : new Date().toISOString();
        const updatedAt = isValidDate(fallbackRecord.updatedAt) ? new Date(fallbackRecord.updatedAt).toISOString() : createdAt;

        entries.push(createHistorySnapshot("created", createdAt, fallbackRecord));
        if (Boolean(fallbackRecord.completed)) {
          entries.push(createHistorySnapshot("completed", updatedAt, fallbackRecord));
        } else if (Boolean(fallbackRecord.prepared)) {
          entries.push(createHistorySnapshot("prepared", updatedAt, fallbackRecord));
        } else if (hasVisibleTimeDifference(createdAt, updatedAt)) {
          entries.push(createHistorySnapshot("edited", updatedAt, fallbackRecord));
        }

        return entries;
      }

      function pushHistory(record, action, at) {
        if (!record || !action) {
          return;
        }

        const history = Array.isArray(record.history)
          ? normalizeHistoryEntries(record.history)
          : normalizeHistoryEntries(record.history, record);
        history.push(createHistorySnapshot(action, at, record));
        record.history = history;
      }

      function getLatestHistoryAt(record, action) {
        const history = normalizeHistoryEntries(record && record.history, record);
        for (let index = history.length - 1; index >= 0; index -= 1) {
          if (history[index].action === action) {
            return history[index].at;
          }
        }
        return "";
      }

      function hasVisibleTimeDifference(left, right) {
        if (!isValidDate(left) || !isValidDate(right)) {
          return false;
        }

        return formatDateTime(left) !== formatDateTime(right);
      }

      function normalizeConflictKeys(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        const unique = [];
        value.forEach(function (item) {
          if (typeof item !== "string" || !item) {
            return;
          }
          if (unique.indexOf(item) === -1) {
            unique.push(item);
          }
        });
        return unique;
      }

      function normalizeImportedRecord(record) {
        if (!record || typeof record !== "object") {
          return null;
        }

        const text = typeof record.text === "string" ? record.text.trim() : "";
        if (!text) {
          return null;
        }

        let type = ["todo", "meeting", "deadline", "idea"].includes(record.type) ? record.type : "todo";
        if (type === "meeting" && isDeadlineHintText(text)) {
          type = "deadline";
        }
        const createdAt = isValidDate(record.createdAt) ? new Date(record.createdAt).toISOString() : new Date().toISOString();
        const updatedAt = isValidDate(record.updatedAt) ? new Date(record.updatedAt).toISOString() : createdAt;
        const importedRecurrence = normalizeRecurrenceInfo(record.recurrence);
        const inferredRecurrence = type === "idea" ? null : extractRecurrenceInfo(text);
        const recurrence = importedRecurrence || inferredRecurrence;
        let eventAt = normalizeDateTime(record.eventAt);
        if (recurrence && !eventAt) {
          const naturalInfo = extractNaturalDateInfo(text, createdAt);
          eventAt = resolveRecurringEventAt(type, "", naturalInfo, recurrence, text, createdAt);
        }
        if (isTimedType(type)) {
          const repairReferenceAt = getTextResolutionReferenceAt(record, text, type);
          const naturalInfo = extractNaturalDateInfo(text, repairReferenceAt);
          const inferredEventAt = resolveTimedEventAt(type, "", naturalInfo);
          if (shouldRepairStoredEventAt(text, eventAt, inferredEventAt, repairReferenceAt)) {
            eventAt = inferredEventAt;
          }
        }

        return {
          id: typeof record.id === "string" && record.id ? record.id : createId(),
          text: text,
          type: type,
          createdAt: createdAt,
          eventAt: eventAt,
          recurrence: recurrence,
          ignoredConflictKeys: normalizeConflictKeys(record.ignoredConflictKeys),
          history: normalizeHistoryEntries(record.history, {
            text: text,
            type: type,
            createdAt: createdAt,
            eventAt: eventAt,
            recurrence: recurrence,
            prepared: type === "meeting" ? Boolean(record.prepared) && !Boolean(record.completed) : false,
            completed: Boolean(record.completed),
            updatedAt: updatedAt
          }),
          autoCompleteState: typeof record.autoCompleteState === "string" ? record.autoCompleteState : "",
          autoCompleteRef: typeof record.autoCompleteRef === "string" ? record.autoCompleteRef : "",
          autoCompletedAt: normalizeDateTime(record.autoCompletedAt),
          prepared: type === "meeting" ? Boolean(record.prepared) && !Boolean(record.completed) : false,
          completed: Boolean(record.completed),
          updatedAt: updatedAt
        };
      }

      function focusQuickInput() {
        quickInput.focus();
        quickInput.setSelectionRange(quickInput.value.length, quickInput.value.length);
      }

      function focusEditField(id) {
        requestAnimationFrame(function () {
          const item = recordList.querySelector('.item[data-id="' + cssEscape(id) + '"] [data-role="edit-inline-text"]');
          if (item) {
            autoSizeInlineEditInput(item);
            item.focus();
            item.setSelectionRange(item.value.length, item.value.length);
          }
        });
      }

      function autoSizeInlineEditInput(input) {
        if (!input) {
          return;
        }

        input.style.height = "auto";
        input.style.height = Math.max(input.scrollHeight, input.clientHeight) + "px";
      }

      function setStatus(message) {
        statusText.textContent = message;
        window.clearTimeout(statusTimer);
        statusTimer = window.setTimeout(function () {
          statusTimer = null;
          updateStorageStatus();
        }, 2200);
      }

      function updateStorageStatus() {
        const busy = state.sync.writeInFlight
          || state.sync.writeQueued
          || state.remote.writeInFlight
          || state.remote.writeQueued;

        if (syncActionButton) {
          syncActionButton.disabled = (!state.sync.supported && !state.remote.supported) || busy;
          syncActionButton.textContent = getSyncActionText();
          syncActionButton.title = getSyncActionTitle();
          syncActionButton.classList.toggle("attention", Boolean(
            (!state.remote.enabled && state.sync.handle && (state.sync.permissionNeeded || state.sync.error))
            || state.remote.error
            || (!state.sync.supported && !state.remote.enabled)
          ));
        }

        if (backupAuthButton) {
          const hasCloudBackup = Boolean(state.remote.enabled && state.sync.supported && state.sync.handle);
          const needsBackupAuth = Boolean(hasCloudBackup && state.sync.permissionNeeded);
          const needsBackupRetry = Boolean(hasCloudBackup && !state.sync.permissionNeeded && state.sync.error);
          backupAuthButton.hidden = !hasCloudBackup;
          backupAuthButton.disabled = (!needsBackupAuth && !needsBackupRetry) || busy;
          backupAuthButton.textContent = needsBackupAuth ? "授权备份" : (needsBackupRetry ? "重试备份" : "已授权");
          backupAuthButton.title = needsBackupAuth ? "授权云盘备份文件" : (needsBackupRetry ? "重试写入云盘备份文件" : "云盘备份已授权");
          backupAuthButton.classList.toggle("attention", needsBackupAuth || needsBackupRetry);
          backupAuthButton.classList.toggle("authorized", hasCloudBackup && !needsBackupAuth && !needsBackupRetry);
        }

        if (cloudRestoreButton) {
          const hasCloudBackup = Boolean(state.remote.enabled && state.sync.handle);
          cloudRestoreButton.hidden = !hasCloudBackup;
          cloudRestoreButton.disabled = !hasCloudBackup || state.sync.writeInFlight || state.sync.writeQueued || state.remote.writeInFlight || state.remote.writeQueued;
          cloudRestoreButton.textContent = "从备份恢复";
          cloudRestoreButton.title = "从云盘备份文件恢复记录";
        }

        if (connectSyncButton) {
          if (state.sync.handle && state.sync.permissionNeeded) {
            connectSyncButton.textContent = state.remote.enabled ? "授权备份" : "授权同步文件";
          } else {
            connectSyncButton.textContent = state.remote.enabled ? "连接备份" : "连接同步文件";

        }

        if (createSyncButton) {
          createSyncButton.disabled = !state.sync.supported;
          if (state.sync.handle) {

          } else {
            createSyncButton.textContent = state.remote.enabled ? "新建备份" : "新建同步文件";
          }
        }

        if (remoteSyncButton) {
          remoteSyncButton.textContent = state.remote.enabled ? "GitHub 已开" : "GitHub 同步";
          remoteSyncButton.disabled = !state.remote.supported;
        }

        if (saveRemoteSyncButton) {
          saveRemoteSyncButton.disabled = !state.remote.supported || state.remote.writeInFlight;
        }

        if (!statusTimer) {
          statusText.textContent = getStorageStatusText();
        }
      }

      function getSyncActionText() {
        if (state.remote.enabled && (state.remote.writeInFlight || state.remote.writeQueued)) {
          return "同步中";
        }

        if (state.remote.enabled && state.remote.error) {
          return "重试GitHub";
        }

        if (state.sync.writeInFlight || state.sync.writeQueued) {
          return "同步中";
        }

        if (state.remote.enabled) {
          return "已同步";
        }

        if (state.sync.handle && state.sync.permissionNeeded) {
          return "授权同步";
        }

        if (state.sync.handle && state.sync.error) {
          return "重试同步";
        }

        if (!state.sync.supported) {
          return "GitHub同步";
        }

        if (!state.sync.handle) {
          return "连接同步";
        }

        return "已同步";
      }

      function getSyncActionTitle() {
        if (state.remote.enabled && state.remote.error) {

        }

        if (state.sync.permissionNeeded) {
          return "重新授权已选择的同步文件";
        }

        }

        }

        if (!state.sync.handle) {

        }

        return "手动检查同步文件更新";
      }

      function getStorageStatusText() {
        if (state.remote.enabled) {
          const backupText = getCloudBackupStatusText();
          const suffix = backupText ? "；" + backupText : "";

          if (state.remote.error) {
            return state.remote.error + suffix;
          }

          if (state.remote.pushLocalNext) {
            return "等待写回 GitHub" + suffix;
          }

          if (state.remote.writeInFlight || state.remote.writeQueued) {
            return "GitHub 同步中" + suffix;

        }

        if (!state.sync.supported) {
          return "仅保存在当前浏览器；iOS 浏览器需设置 GitHub 同步。";
        }

        if (!state.sync.handle) {
          return "仅保存在当前浏览器。";
        }

        const fileName = state.sync.fileName || DEFAULT_SYNC_FILE_NAME;
        if (state.sync.permissionNeeded) {

        }

          return state.sync.error + "；本地有备份。";
        }

        if (state.sync.writeInFlight || state.sync.writeQueued) {

        }

        if (state.sync.lastWriteAt || state.sync.lastModified) {

        }

        return "云盘已同步：" + fileName;
      }

      function getCloudBackupStatusText() {
        if (!state.sync.supported) {
          return "";
        }

        if (!state.sync.handle) {
          return "云盘未备份";
        }

        if (state.sync.permissionNeeded) {
          return "云盘需授权";
        }

        if (state.sync.error) {
          return "云盘备份异常";
        }

        if (state.sync.writeInFlight || state.sync.writeQueued) {
          return "云盘备份中";
        }

        return "云盘已备份";
      }

      function formatDateTime(value) {
        if (!value || !isValidDate(value)) {
          return "无";
        }

        return new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date(value));
      }

      function formatFileStamp(date) {
        const pad = function (value) {
          return String(value).padStart(2, "0");
        };
        return [
          date.getFullYear(),
          pad(date.getMonth() + 1),
          pad(date.getDate()),
          "-",
          pad(date.getHours()),
          pad(date.getMinutes())
        ].join("");
      }

      function normalizeDateTime(value) {
        if (!value) {
          return "";
        }

        const normalizedValue = normalizeManualDateTimeValue(value);
        const date = new Date(normalizedValue);
        if (!isValidDate(date)) {
          return "";
        }
        return date.toISOString();
      }

      function normalizeManualDateTimeValue(value) {
        const source = String(value || "").trim();
        if (!source) {
          return "";
        }

        const chineseMatch = source.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日?\s+(\d{1,2})[:：](\d{1,2})$/);
        if (chineseMatch) {
          return [
            chineseMatch[1],
            "-",
            chineseMatch[2].padStart(2, "0"),
            "-",
            chineseMatch[3].padStart(2, "0"),
            "T",
            chineseMatch[4].padStart(2, "0"),
            ":",
            chineseMatch[5].padStart(2, "0")
          ].join("");
        }

        const compactMatch = source.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[ T]+(\d{1,2})[:：](\d{1,2}))?$/);
        if (compactMatch) {
          return [
            compactMatch[1],
            "-",
            compactMatch[2].padStart(2, "0"),
            "-",
            compactMatch[3].padStart(2, "0"),
            compactMatch[4] ? "T" + compactMatch[4].padStart(2, "0") + ":" + compactMatch[5].padStart(2, "0") : ""
          ].join("");
        }

        return source;
      }

      function toDateTimeLocalValue(value) {
        if (!value || !isValidDate(value)) {
          return "";
        }

        const date = new Date(value);
        const pad = function (num) {
          return String(num).padStart(2, "0");
        };
        return [
          date.getFullYear(),
          "-",
          pad(date.getMonth() + 1),
          "-",
          pad(date.getDate()),
          "T",
          pad(date.getHours()),
          ":",
          pad(date.getMinutes())
        ].join("");
      }

      function isValidDate(value) {
        const date = value instanceof Date ? value : new Date(value);
        return !Number.isNaN(date.getTime());
      }

      function createId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return "r-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") {
          return window.CSS.escape(value);
        }
        return String(value).replace(/["\\]/g, "\\$&");
      }
    })();
  </script>
</body>
</html>
