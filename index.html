<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Notes</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='6' width='48' height='52' rx='10' fill='%23ffffff' stroke='%23151515' stroke-width='4'/%3E%3Cpath d='M19 22l7 7-7 7' fill='none' stroke='%23151515' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M31 40h14' stroke='%23777777' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M31 24h14M31 32h10' stroke='%23c7c7c2' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f6f4;
      --bg-deep: #f1f1ee;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --panel-soft: #fafaf8;
      --border: rgba(17, 17, 17, 0.08);
      --border-strong: rgba(17, 17, 17, 0.14);
      --text: #171717;
      --text-soft: #696969;
      --text-faint: #9a9a95;
      --accent: #151515;
      --accent-soft: #f1f1ed;
      --shadow: 0 8px 24px rgba(17, 17, 17, 0.04);
      --shadow-soft: 0 4px 12px rgba(17, 17, 17, 0.03);
      --radius-lg: 18px;
      --focus: #171717;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Aptos", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.22s ease;
    }

    body.journal-focus {
      --panel: #f8f8f5;
      --panel-strong: #fbfaf7;
      --panel-soft: #f2f1ed;
      --border: rgba(58, 55, 48, 0.11);
      --border-strong: rgba(58, 55, 48, 0.18);
      --accent-soft: #efede8;
      background-color: #292a30;
      background-image:
        radial-gradient(ellipse at calc(50% - 240px) 7rem, rgba(255, 250, 239, 0.28) 0%, rgba(221, 215, 203, 0.13) 36%, rgba(41, 42, 48, 0) 66%),
        radial-gradient(ellipse at calc(50% - 240px) 34rem, rgba(255, 255, 250, 0.08) 0%, rgba(41, 42, 48, 0) 48%),
        linear-gradient(180deg, #32333a 0%, #292a30 50%, #23242a 100%);
      background-attachment: fixed;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
    }

    [hidden] {
      display: none !important;
    }

    .title-block h1,
    .counter,
    .composer textarea,
    .search input,
    .item-text,
    .item-meta,
    .badge,
    .health-summary-label,
    .health-summary-metric,
    .segmented button,
    .ghost,
    .primary,
    .icon-btn,
    .item-edit textarea,
    .item-edit input,
    .item-edit select {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .app {
      max-width: 1540px;
      margin: 0 auto;
      padding: 18px 18px 36px;
    }

    .workspace {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
      transition: gap 0.22s ease;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
      flex: 1 1 980px;
      max-width: 980px;
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background-color 0.22s ease;
    }

    body.journal-focus .shell {
      background: rgba(250, 249, 246, 0.97);
      border-color: rgba(255, 255, 255, 0.28);
      box-shadow:
        0 28px 84px rgba(8, 9, 14, 0.26),
        0 0 82px rgba(236, 233, 224, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.58);
    }

    .idea-pane {
      min-width: 0;
      flex: 0 0 min(460px, 36vw);
      width: min(460px, 36vw);
      display: none;
      transition: opacity 0.22s ease, filter 0.22s ease;
    }

    .workspace.has-ideas .idea-pane {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .workspace.journal-focus .idea-pane {
      opacity: 0.62;
      filter: grayscale(0.28) blur(0.7px);
      pointer-events: none;
      user-select: none;
    }

    .idea-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
    }

    .workspace.journal-focus .idea-card,
    .journal-idea-veil {
      background: rgba(31, 32, 38, 0.74);
      border-color: rgba(255, 255, 255, 0.07);
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.2);
    }

    .journal-idea-veil {
      min-height: 260px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
    }

    .idea-card-head,
    .idea-card-meta,
    .idea-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .idea-card-head {
      margin-bottom: 10px;
    }

    .idea-card-label,
    .idea-card-hint,
    .idea-card-empty,
    .idea-card textarea {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .idea-card-label {
      font-size: 12px;
      color: var(--text-soft);
    }

    .workspace.journal-focus .idea-card-label {
      color: rgba(245, 246, 248, 0.42);
    }

    .idea-card-hint,
    .idea-card-foot {
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.6;
    }

    .workspace.journal-focus .idea-card-hint,
    .workspace.journal-focus .idea-card-foot {
      color: rgba(245, 246, 248, 0.28);
    }

    .idea-card-foot {
      justify-content: flex-end;
    }

    .idea-card-meta {
      margin-bottom: 10px;
    }

    .idea-card textarea {
      width: 100%;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      outline: none;
      resize: none;
      overflow-y: hidden;
      font-size: 14px;
      line-height: 1.78;
      color: var(--text);
      display: block;
    }

    .workspace.journal-focus .idea-card textarea {
      color: rgba(245, 246, 248, 0.38);
    }

    .idea-card-editor {
      min-height: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfbfa;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .workspace.journal-focus .idea-card-editor {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.07);
    }

    .idea-card-editor:focus-within {
      background: #ffffff;
      border-color: var(--border-strong);
    }

    .idea-card-empty {
      padding: 18px 0 6px;
      color: var(--text-faint);
      font-size: 13px;
      line-height: 1.7;
    }

    .idea-card-note {
      margin: 0;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 22px 24px 14px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      display: none;
    }

    .title-block h1 {
      margin: 0;
      max-width: none;
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
      font-size: 32px;
      line-height: 1.12;
      font-weight: 650;
      letter-spacing: 0;
    }

    .title-block p {
      max-width: 36rem;
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .counter {
      min-width: 150px;
      align-self: start;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      box-shadow: none;
      text-align: right;
      color: var(--text);
    }

    button.counter {
      display: block;
      width: auto;
    }

    button.counter:hover {
      background: #f7f7f4;
      border-color: var(--border-strong);
    }

    button.counter:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    button.counter[aria-expanded="true"] {
      background: var(--accent-soft);
      border-color: var(--border-strong);
    }

    .counter strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
    }

    .counter span {
      display: block;
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
    }

    body.journal-focus .counter {
      background: rgba(247, 246, 242, 0.84);
    }

    .health-calendar-panel {
      display: grid;
      gap: 12px;
      margin: 12px 24px 0;
      padding: 12px 13px 13px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fcfcfb;
    }

    .health-calendar-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px 14px;
    }

    .health-calendar-kicker,
    .health-calendar-meta,
    .health-calendar-legend,
    .health-calendar-weekday,
    .health-calendar-day,
    .health-calendar-note {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .health-calendar-kicker {
      display: block;
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.3;
    }

    .health-calendar-title {
      margin: 2px 0 0;
      color: var(--text);
      font-size: 17px;
      line-height: 1.3;
      font-weight: 750;
      letter-spacing: 0;
    }

    .health-calendar-meta {
      margin: 4px 0 0;
      color: var(--text-soft);
      font-size: 11px;
      line-height: 1.45;
    }

    .health-calendar-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
      max-width: 360px;
      color: var(--text-soft);
      font-size: 11px;
    }

    .health-calendar-legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 20px;
    }

    .health-calendar-legend span::before {
      content: "";
      width: 10px;
      height: 10px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: var(--calendar-fill, #f4f6f8);
    }

    .health-calendar-legend .good {
      --calendar-fill: #dcefe6;
    }

    .health-calendar-legend .steady {
      --calendar-fill: #dfeaf3;
    }

    .health-calendar-legend .rest {
      --calendar-fill: #f0d5d2;
    }

    .health-calendar-legend .active {
      --calendar-fill: #f1dccb;
    }

    .health-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-template-rows: auto;
      grid-auto-rows: 60px;
      gap: 6px;
    }

    .health-calendar-weekday {
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }

    .health-calendar-day {
      position: relative;
      min-width: 0;
      min-height: 0;
      height: 100%;
      padding: 6px 7px;
      border: 1px solid var(--calendar-stroke, #e3e8ef);
      border-radius: 10px;
      background: var(--calendar-fill, #f4f6f8);
      color: var(--calendar-text, #7b8494);
      display: grid;
      grid-template-columns: minmax(34px, auto) minmax(0, 1fr);
      grid-template-rows: auto auto auto;
      align-content: start;
      column-gap: 8px;
      row-gap: 1px;
      overflow: hidden;
    }

    .health-calendar-day.good {
      --calendar-fill: #dcefe6;
      --calendar-stroke: #93c9ad;
      --calendar-text: #226044;
    }

    .health-calendar-day.steady {
      --calendar-fill: #dfeaf3;
      --calendar-stroke: #9ebfd8;
      --calendar-text: #285b84;
    }

    .health-calendar-day.rest {
      --calendar-fill: #f0d5d2;
      --calendar-stroke: #d69b96;
      --calendar-text: #7d332d;
    }

    .health-calendar-day.active {
      --calendar-fill: #f1dccb;
      --calendar-stroke: #d3a67f;
      --calendar-text: #82481f;
    }

    .health-calendar-day.missing {
      --calendar-fill: #f4f6f8;
      --calendar-stroke: #e3e8ef;
      --calendar-text: #98a2b3;
    }

    .health-calendar-day.empty {
      visibility: hidden;
    }

    .health-calendar-day.future {
      opacity: 0.52;
    }

    .health-calendar-day.partial::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.34) 0,
        rgba(255, 255, 255, 0.34) 3px,
        transparent 3px,
        transparent 8px
      );
      pointer-events: none;
    }

    .health-calendar-day strong,
    .health-calendar-day span,
    .health-calendar-day small {
      position: relative;
      z-index: 1;
    }

    .health-calendar-day strong {
      grid-column: 1;
      grid-row: 1;
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
    }

    .health-calendar-day span {
      grid-column: 1;
      grid-row: 2;
      font-size: 11px;
      line-height: 1.25;
      font-weight: 750;
      white-space: nowrap;
    }

    .health-calendar-day small {
      grid-column: 2;
      justify-self: end;
      max-width: 100%;
      color: var(--calendar-text);
      opacity: 0.72;
      font-size: 10px;
      line-height: 1.2;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .health-calendar-day small:nth-of-type(1) {
      grid-row: 1;
    }

    .health-calendar-day small:nth-of-type(2) {
      grid-row: 2;
    }

    .health-calendar-day small:nth-of-type(3) {
      grid-row: 3;
    }

    .health-calendar-day small.activity-location {
      grid-column: 1 / -1;
      justify-self: start;
      text-align: left;
    }

    .health-calendar-metric-value {
      font-weight: 750;
    }

    .health-calendar-note {
      margin: 0;
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.55;
    }

    .health-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
      margin: 12px 24px 0;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fcfcfb;
    }

    .health-summary[hidden],
    .health-summary-training[hidden],
    .health-summary-training-plan[hidden],
    .health-summary-advice[hidden],
    .health-summary-metrics[hidden],
    .health-summary-notices[hidden] {
      display: none !important;
    }

    .health-summary-main {
      min-width: 0;
    }

    .health-summary-label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.3;
    }

    .health-summary-text {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
    }

    .health-summary-metrics {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 5px 12px;
      max-width: none;
    }

    .health-summary-metric {
      display: inline-flex;
      min-width: 0;
      gap: 4px;
      align-items: baseline;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      text-align: left;
    }

    .health-summary-metric-label,
    .health-summary-metric-value {
      display: block;
    }

    .health-summary-metric-label {
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.2;
    }

    .health-summary-metric-label::after {
      content: ":";
    }

    .health-summary-metric-value {
      margin-top: 0;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.2;
    }

    .health-summary-training {
      display: grid;
      gap: 4px;
      padding-top: 7px;
      border-top: 1px solid var(--border);
    }

    .health-summary-training-header {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      align-items: baseline;
      min-width: 0;
    }

    .health-summary-training-label {
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.2;
    }

    .health-summary-training-title {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }

    .health-summary-training-meta,
    .health-summary-training-reason {
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.45;
    }

    .health-summary-training-reason {
      margin: 0;
    }

    .health-summary-training-reason + .health-summary-training-plan {
      margin-top: 2px;
    }

    .health-summary-training-plan {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin: 0;
      padding: 0 0 0 9px;
      border-left: 2px solid var(--border);
      list-style: none;
    }

    .health-summary-advice {
      grid-column: 1 / -1;
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 0 0 0 9px;
      border-left: 2px solid var(--border);
      list-style: none;
    }

    .health-summary-training-plan li,
    .health-summary-advice li {
      position: relative;
      max-width: 100%;
      padding: 0 0 0 12px;
      color: var(--text-soft);
      font-size: 12.5px;
      line-height: 1.55;
    }

    .health-summary-training-plan li::before,
    .health-summary-advice li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.72em;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--text-faint);
    }

    .health-summary-notices {
      display: grid;
      gap: 4px;
      margin: 0;
      padding: 7px 9px;
      border: 1px solid rgba(169, 128, 45, 0.22);
      border-radius: 8px;
      background: rgba(255, 249, 231, 0.72);
      list-style: none;
    }

    .health-summary-notices li {
      color: #6d5a27;
      font-size: 12px;
      line-height: 1.55;
    }

    .composer {
      padding: 12px 24px 10px;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }

    .composer-card {
      padding: 14px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: none;
    }

    body.journal-focus .composer-card {
      background: rgba(251, 250, 247, 0.8);
    }

    .composer textarea,
    .search input,
    .item-inline-input,
    .item-edit textarea,
    .item-edit input,
    .item-edit select,
    .composer select,
    .composer input[type="datetime-local"],
    .manual-datetime-input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      background: #fafaf8;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition:
        border-color 0.15s ease,
        background-color 0.15s ease;
    }

    .composer textarea,
    .item-edit textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.58;
    }

    .composer textarea {
      min-height: 88px;
      background: #fbfbfa;
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 14px;
    }

    body.journal-focus .composer textarea,
    body.journal-focus .search input,
    body.journal-focus .item-inline-input,
    body.journal-focus .item-edit textarea,
    body.journal-focus .item-edit input,
    body.journal-focus .item-edit select,
    body.journal-focus .composer select,
    body.journal-focus .composer input[type="datetime-local"],
    body.journal-focus .manual-datetime-input {
      background: rgba(255, 254, 251, 0.72);
    }

    .composer textarea::placeholder,
    .search input::placeholder,
    .item-inline-input::placeholder,
    .item-edit textarea::placeholder,
    .item-edit input::placeholder {
      color: #a1a19c;
    }

    .composer textarea:focus,
    .search input:focus,
    .item-inline-input:focus,
    .item-edit textarea:focus,
    .item-edit input:focus,
    .item-edit select:focus,
    .composer select:focus,
    .composer input[type="datetime-local"]:focus,
    .manual-datetime-input:focus {
      border-color: var(--border-strong);
      background: #fff;
      box-shadow: none;
    }

    .composer-bar,
    .composer-actions,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .composer-bar,
    .toolbar {
      margin-top: 10px;
    }

    .composer-bar {
      justify-content: space-between;
      gap: 10px;
    }

    .composer-actions {
      flex: 0 0 auto;
      gap: 6px;
      margin-left: auto;

      border-color: rgba(71, 97, 96, 0.24);
      background: rgba(71, 97, 96, 0.1);
    }

    .g-teacher-feedback-menu {
      position: fixed;
      z-index: 50;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-width: calc(100vw - 16px);
      padding: 5px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 12px 32px rgba(17, 17, 17, 0.16);
      backdrop-filter: blur(14px) saturate(1.06);
      -webkit-backdrop-filter: blur(14px) saturate(1.06);
    }

    .g-teacher-feedback-menu[hidden] {
      display: none !important;
    }

    .g-teacher-feedback-menu button {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text-soft);
      background: transparent;
      font-size: 12px;
      white-space: nowrap;
    }

    .g-teacher-feedback-menu button:hover,
    .g-teacher-feedback-menu button:focus-visible,
    .g-teacher-feedback-menu button.active {
      color: var(--text);
      background: #f3f3f0;
      border-color: var(--border);
      outline: none;
    }

    .item.upcoming .item-text,
    .item.upcoming .icon-btn:hover,
    .item.upcoming .icon-btn.danger:hover {
      color: var(--text);
    }

    .item.upcoming .badge {
      background: transparent;
      border-color: var(--border);
      color: var(--text-soft);
    }

    .item.upcoming .badge.strong {
      color: #8a5c16;
      background: rgba(138, 92, 22, 0.08);
      border-color: rgba(138, 92, 22, 0.14);
    }

    .item.upcoming .toggle {
      background: #ffffff;
      border-color: var(--border-strong);
      color: var(--text);
    }

    .item.upcoming .toggle.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .item.upcoming .toggle.partial {
      background: #ffffff;
      border-color: #b7bcc8;
      color: #707784;
    }

    .item.upcoming .icon-btn {
      background: transparent;
      border-color: transparent;
      color: var(--text-soft);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 980px) {
      body.journal-focus {
        background-image:
          radial-gradient(ellipse at 50% 6rem, rgba(255, 250, 239, 0.27) 0%, rgba(221, 215, 203, 0.12) 36%, rgba(41, 42, 48, 0) 66%),
          radial-gradient(ellipse at 50% 30rem, rgba(255, 255, 250, 0.08) 0%, rgba(41, 42, 48, 0) 48%),
          linear-gradient(180deg, #32333a 0%, #292a30 50%, #23242a 100%);
      }

      .workspace {
        display: block;
      }

      .shell {
        width: 100%;
        max-width: none;
      }

      .header {
        grid-template-columns: 1fr;
      }

      .counter {
        max-width: 220px;
      }

      .toolbar-side {
        justify-content: flex-start;
      }

      .toolbar-main,
      .toolbar-side {
        width: 100%;
      }

      .composer textarea,
      .search input,
      .item-inline-input,
      .composer select,
      .composer input[type="datetime-local"],
      .manual-datetime-input,
      .remote-sync-panel input {
        font-size: 16px;
      }

      .composer-advanced {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      #quickEventAt {
        grid-column: 1 / -1;
        width: 100%;
      }

      .composer-advanced .ghost,
      .composer-advanced .primary {
        min-width: 0;
        min-height: 36px;
      }

      .remote-sync-panel {
        grid-template-columns: 1fr;
      }

      .item {
        grid-template-columns: 24px minmax(0, 1fr) 32px;
        align-items: start;
        gap: 8px;
      }

      .toggle {
        width: 22px;
        height: 22px;
        margin-top: 2px;
      }

      .item-main {
        width: 100%;
        align-items: flex-start;
      }

      .item-line {
        width: 100%;
        grid-template-columns: minmax(0, 1fr);
        align-items: start;
        row-gap: 5px;
        column-gap: 6px;
      }

      .item-tags {
        gap: 6px;
      }

      .item-text {
        font-size: 15px;
        line-height: 1.45;
        white-space: normal;
        overflow: hidden;
        text-overflow: clip;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .badge,
      .code-token {
        min-height: 20px;
        font-size: 11px;
        line-height: 18px;
      }

      .item-actions {
        grid-column: auto;
        align-self: start;
        justify-content: flex-end;
        flex-wrap: nowrap;
        opacity: 1;
      }

      .icon-btn {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
        padding: 0;
        border-radius: 8px;
        font-size: 20px;
        line-height: 1;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 0 0 calc(18px + env(safe-area-inset-bottom));
      }

      .shell {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .header,
      .composer,
      .toolbar,
      .list-wrap,
      .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        padding-top: 14px;
        padding-bottom: 10px;
        gap: 10px;
      }

      .title-block h1 {
        font-size: 24px;
        line-height: 1.15;
      }

      .title-block p {
        margin-top: 6px;
        font-size: 12px;
      }

      .counter {
        max-width: none;
        padding: 9px 11px;
      }

      .health-summary {
        margin: 10px 12px 0;
        padding: 9px 10px;
      }

      .health-calendar-panel {
        margin: 10px 12px 0;
        padding: 10px;
        border-radius: 12px;
      }

      .health-calendar-head {
        gap: 8px;
      }

      .health-calendar-legend {
        justify-content: flex-start;
        max-width: none;
      }

      .health-calendar-grid {
        grid-auto-rows: 48px;
        gap: 4px;
      }

      .health-calendar-day {
        grid-template-columns: minmax(28px, auto) minmax(0, 1fr);
        column-gap: 5px;
        padding: 5px;
        border-radius: 8px;
      }

      .health-calendar-day span {
        font-size: 10px;
      }

      .health-calendar-day small {
        font-size: 9px;
      }

      .health-calendar-day small.activity-location {
        display: none;
      }

      .counter strong {
        font-size: 21px;
      }

      .composer,
      .toolbar,
      .list-wrap {
        padding-bottom: 12px;
      }

      .composer {
        padding-top: 10px;
      }

      .composer-card,
      .empty {
        border-radius: 12px;
      }

      .composer-card {
        padding: 10px;
      }

      .composer textarea {
        min-height: 66px;
        padding: 10px 12px;
        font-size: 16px;
        line-height: 1.45;
      }

      .composer-bar {
        align-items: center;
      }

      .composer-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .meta-note {
        flex: 1 1 100%;
        font-size: 10px;
      }

      .search {
        min-width: 0;
        flex-basis: 100%;
      }

      .search input {
        min-height: 42px;
      }

      .toolbar-side .ghost {
        flex: 1 1 calc(50% - 5px);
        justify-content: center;
      }

      .segmented {
        gap: 3px;
        flex-wrap: nowrap;
        width: 100%;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .segmented button {
        flex: 0 0 auto;
        min-height: 40px;
        padding: 0 10px;
        border-radius: 10px;
        font-size: 13px;
      }

      .segmented::-webkit-scrollbar {
        display: none;
      }

      .list {
        min-height: 220px;
        border-radius: 12px;
      }

      .item-line,
      .item-inline-edit {
        gap: 6px;
      }

      .item {
        padding: 10px 8px 9px;
      }

      .item-text {
        width: 100%;
      }

      .item-inline-edit {
        width: 100%;
        grid-template-columns: minmax(0, 1fr);
        align-items: stretch;
      }

      .item-inline-input {
        min-height: 34px;
      }

      .g-teacher-panel {
        margin-left: 12px;
        margin-right: 12px;
      }

      .footer {
        padding-top: 4px;
        padding-bottom: 16px;
      }

      .idea-pane {
        width: auto;
        margin-top: 12px;
      }

      .workspace.journal-focus .idea-pane {
        display: none;
      }

      .journal-bottom-jump {
        display: inline-flex;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .journal-bottom-jump {
        display: inline-flex;
      }
    }

    @media (max-width: 760px) and (orientation: portrait) {
      .health-calendar-grid {
        grid-auto-rows: 42px;
      }

      .health-calendar-day {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto auto;
        justify-items: center;
        align-content: center;
        row-gap: 3px;
        padding: 5px 2px;
      }

      .health-calendar-day strong,
      .health-calendar-day span {
        grid-column: 1;
        justify-self: center;
        text-align: center;
      }

      .health-calendar-day span {
        font-size: 10px;
      }

      .health-calendar-day small {
        display: none;
      }
    }

    @media (max-width: 980px) and (orientation: landscape) {
      .app {
        padding: 8px 8px calc(12px + env(safe-area-inset-bottom));
      }

      .shell {
        border-radius: 18px;
      }

      .header,
      .composer,
      .toolbar,
      .list-wrap,
      .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        padding-top: 10px;
        padding-bottom: 8px;
      }

      .title-block h1 {
        font-size: 22px;
      }

      .title-block p {
        display: none;
      }

      .counter {
        min-width: 118px;
        max-width: none;
        padding: 8px 10px;
      }

      .counter strong {
        font-size: 20px;
      }

      .counter span {
        margin-top: 2px;
        font-size: 10px;
        white-space: nowrap;
      }

      .health-calendar-grid {
        grid-auto-rows: 50px;
        gap: 4px;
      }

      .health-calendar-day {
        grid-template-columns: minmax(28px, auto) minmax(0, 1fr);
        column-gap: 5px;
        padding: 5px;
      }

      .health-calendar-day small {
        display: block;
        font-size: 9px;
      }

      .health-calendar-day small.activity-location {
        display: none;
      }

      .composer {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .composer-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: stretch;
        padding: 10px;
      }

      .composer textarea {
        height: 52px;
        min-height: 52px;
        resize: none;
      }

      .composer-bar {
        margin-top: 0;
        align-items: flex-end;
      }

      .meta-note {
        display: none;
      }

      .composer-actions {
        align-self: flex-end;
      }

      .composer-advanced {
        grid-column: 1 / -1;
      }

      .toolbar {
        flex-wrap: nowrap;
        align-items: center;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .toolbar-main {
        width: auto;
        flex: 0 0 auto;
      }

      .toolbar-side {
        width: auto;
        flex: 1 1 220px;
        justify-content: flex-end;
      }

      .segmented {
        width: auto;
      }

      .segmented button {
        min-height: 34px;
        padding: 0 9px;
        border-radius: 8px;
        font-size: 12px;
      }

      .search {
        flex: 1 1 220px;
        min-width: 180px;
      }

      .search input {
        min-height: 36px;
      }

      .list-wrap {
        padding-bottom: 10px;
      }

      .g-teacher-panel {
        margin-left: 12px;
        margin-right: 12px;
      }

      .item {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .item-text {
        -webkit-line-clamp: 2;
      }
    }
  </style>

<body>
  <main class="app">
    <div id="workspace" class="workspace">
    <section class="shell" aria-label="极简个人记录工具">
      <header class="header">
        <div class="title-block">
          <h1 id="todayHeading">今天</h1>
          <p>像记事本一样记下待办、日程、截止、想法和日记。打开就能写。</p>
        </div>
        <button id="healthCalendarToggle" class="counter" type="button" aria-live="polite" aria-expanded="false" aria-controls="healthCalendarPanel" title="展开本月健康月历">
          <strong id="openCount">0</strong>
          <span>未完成事项 · 不含想法/日记</span>
        </button>
      </header>

      <section id="healthCalendarPanel" class="health-calendar-panel" aria-label="本月健康月历" hidden>
        <div class="health-calendar-head">
          <div>
            <span class="health-calendar-kicker">COROS health calendar</span>
            <h2 id="healthCalendarTitle" class="health-calendar-title">本月健康月历</h2>
            <p id="healthCalendarMeta" class="health-calendar-meta">正在读取健康历史...</p>
          </div>
          <div id="healthCalendarLegend" class="health-calendar-legend" aria-label="状态图例"></div>
        </div>
        <div id="healthCalendarGrid" class="health-calendar-grid" aria-live="polite"></div>
        <p id="healthCalendarNote" class="health-calendar-note"></p>
      </section>

      <section id="healthSummary" class="health-summary" aria-label="健康小结" hidden>
        <div class="health-summary-main">
          <span id="healthSummaryLabel" class="health-summary-label">健康小结</span>
          <p id="healthSummaryText" class="health-summary-text"></p>
        </div>
        <div id="healthSummaryMetrics" class="health-summary-metrics" aria-label="健康指标" hidden></div>
        <div id="healthSummaryTraining" class="health-summary-training" aria-label="今日训练建议" hidden>
          <div class="health-summary-training-header">
            <span id="healthSummaryTrainingLabel" class="health-summary-training-label">今日训练</span>
            <strong id="healthSummaryTrainingTitle" class="health-summary-training-title"></strong>
            <span id="healthSummaryTrainingMeta" class="health-summary-training-meta"></span>
          </div>
          <p id="healthSummaryTrainingReason" class="health-summary-training-reason"></p>
          <ul id="healthSummaryTrainingPlan" class="health-summary-training-plan" hidden></ul>
        </div>
        <ul id="healthSummaryAdvice" class="health-summary-advice" aria-label="健康建议" hidden></ul>
        <ul id="healthSummaryNotices" class="health-summary-notices" aria-label="健康状态提示" hidden></ul>
      </section>

      <section class="composer" aria-label="快速输入区">
        <div class="composer-card">
          <label class="sr-only" for="quickInput">记录内容</label>
          <textarea id="quickInput" placeholder="写下一件事、一场会，或一段日常。"></textarea>
          <div class="composer-bar">
            <div class="meta-note">
              <span>Enter 保存。默认自动识别时间和类型；需要时再展开手动选项。</span>
              <span id="statusText">仅保存在当前浏览器。</span>
            </div>
            <div class="composer-actions">
              <button id="syncActionButton" class="ghost sync-action" type="button">连接同步</button>
              <button id="backupAuthButton" class="ghost sync-action backup-auth-action" type="button" hidden>授权备份</button>
              <button id="quickMoreButton" class="ghost icon-only" type="button" aria-label="展开手动选项" aria-expanded="false" title="展开手动选项">⋯</button>
              <button id="addButton" class="primary icon-only" type="button" aria-label="新增记录" title="新增记录">+</button>
            </div>
          </div>
          <div id="composerAdvanced" class="composer-advanced" hidden>
            <label class="sr-only" for="quickType">类型</label>
            <select id="quickType" title="类型">
              <option value="auto">自动判断</option>
              <option value="todo">待办</option>
              <option value="meeting">日程</option>
              <option value="deadline">截止</option>
              <option value="idea">想法</option>
              <option value="journal">日记</option>
            </select>
            <label class="sr-only" for="quickEventAt">事件时间</label>
            <input id="quickEventAt" class="manual-datetime-input" type="datetime-local" autocomplete="off" title="事件时间">
            <button id="exportButton" class="ghost" type="button">导出 JSON</button>
            <button id="importButton" class="ghost" type="button">导入 JSON</button>
            <button id="createSyncButton" class="ghost" type="button">新建同步文件</button>
            <button id="connectSyncButton" class="ghost" type="button">连接同步文件</button>
            <button id="cloudRestoreButton" class="ghost backup-restore-action" type="button" hidden>从备份恢复</button>
            <button id="remoteSyncButton" class="ghost" type="button">GitHub 同步</button>
            <div id="remoteSyncPanel" class="remote-sync-panel" hidden>
              <label class="sr-only" for="remoteRepoInput">GitHub 仓库</label>
              <input id="remoteRepoInput" type="text" autocomplete="off" spellcheck="false" placeholder="owner/repo">
              <label class="sr-only" for="remoteBranchInput">GitHub 分支</label>
              <input id="remoteBranchInput" type="text" autocomplete="off" spellcheck="false" placeholder="main">
              <label class="sr-only" for="remotePathInput">数据文件路径</label>
              <input id="remotePathInput" type="text" autocomplete="off" spellcheck="false" placeholder="minimal-notes-sync/manifest.json">
              <label class="sr-only" for="remoteTokenInput">GitHub Token</label>
              <input id="remoteTokenInput" type="password" autocomplete="off" spellcheck="false" placeholder="GitHub token">
              <div class="remote-sync-actions">
                <button id="tempRemoteSyncButton" class="ghost" type="button">临时同步</button>
                <button id="saveRemoteSyncButton" class="primary" type="button">保存同步</button>
                <button id="clearRemoteSyncButton" class="ghost" type="button">关闭同步</button>
                <button id="secureExitButton" class="ghost" type="button">安全退出</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="筛选与搜索">
        <div class="toolbar-main">
          <div class="segmented" id="filters" role="tablist" aria-label="记录筛选">
            <button type="button" data-filter="all" class="active" aria-pressed="true">事项</button>
            <button type="button" data-filter="todo" aria-pressed="false">待办</button>
            <button type="button" data-filter="meeting" aria-pressed="false">日程</button>
            <button type="button" data-filter="deadline" aria-pressed="false">截止</button>
            <button type="button" data-filter="idea" aria-pressed="false">想法</button>
            <button type="button" data-filter="journal" aria-pressed="false">日记</button>
            <button type="button" data-filter="completed" aria-pressed="false">已完成</button>
          </div>
        </div>
        <div class="toolbar-side">
          <div class="search">
            <label class="sr-only" for="searchInput">搜索</label>
            <input id="searchInput" type="search" placeholder="搜索内容">
          </div>
          <input id="importFile" class="sr-only" type="file" accept="application/json,.json">
        </div>
      </section>

      <section class="list-wrap">
        <div id="recordList" class="list" aria-live="polite"></div>
      </section>

      <div id="gTeacherPanel" class="g-teacher-panel" role="group" aria-label="G老师自动日记" hidden>
        <div id="gTeacherControls" class="g-teacher-controls" role="group" aria-label="G老师日记筛选">
          <button type="button" data-g-teacher-mode="with">包含G老师</button>
        </div>
        <label class="g-teacher-toggle">
          <input id="gTeacherEnabledToggle" type="checkbox">
          <span>自动写入</span>
        </label>
      </div>

      <footer class="footer">
        <span>GitHub 用作主同步；云盘 JSON 仅作为电脑端备份。</span>
        <span id="summaryText">0 条记录</span>
      </footer>
    </section>
    <aside id="ideaPane" class="idea-pane" aria-live="polite"></aside>
    </div>
  </main>
  <button id="journalBottomJump" class="journal-bottom-jump" type="button" aria-label="跳到日记底部查看小红花统计" title="跳到小红花统计" hidden>
    <svg class="journal-bottom-jump-arrow" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
      <path d="M16 7v17M9.25 18 16 24.75 22.75 18" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </button>
  <div id="gTeacherFeedbackMenu" class="g-teacher-feedback-menu" role="menu" aria-label="G老师日记反馈" hidden>
    <button type="button" data-g-teacher-feedback-aspect="content" data-g-teacher-feedback="like" role="menuitemcheckbox">内容喜欢</button>
    <button type="button" data-g-teacher-feedback-aspect="content" data-g-teacher-feedback="dislike" role="menuitemcheckbox">内容不喜欢</button>
    <button type="button" data-g-teacher-feedback-aspect="wording" data-g-teacher-feedback="like" role="menuitemcheckbox">措辞喜欢</button>
    <button type="button" data-g-teacher-feedback-aspect="wording" data-g-teacher-feedback="dislike" role="menuitemcheckbox">措辞不喜欢</button>
    <button type="button" data-g-teacher-feedback="clear" role="menuitem">取消反馈</button>
  </div>
  <div id="deleteDialog" class="delete-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle" aria-describedby="deleteDialogDescription" hidden>
    <div class="delete-dialog-scrim" data-delete-mode="cancel"></div>
    <div class="delete-dialog-panel">
      <h2 id="deleteDialogTitle">删除记录</h2>

      function updateTodayHeading() {
        if (!todayHeading) {
          return;
        }

        const now = new Date();
        todayHeading.textContent = formatTodayHeading(now);
        todayHeading.title = "今天是 " + formatTodayHeading(now);
      }

      function scheduleTodayHeadingUpdate() {
        window.clearTimeout(todayHeadingTimer);
        const now = new Date();
        const nextDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 1);
        todayHeadingTimer = window.setTimeout(function () {
          updateTodayHeading();
          scheduleTodayHeadingUpdate();
        }, Math.max(1000, nextDay.getTime() - now.getTime()));
      }

      function formatTodayHeading(date) {
        const weekdayLabels = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        return date.getFullYear() + "年"
          + (date.getMonth() + 1) + "月"
          + date.getDate() + "日 "
          + weekdayLabels[date.getDay()];
      }

      function toggleHealthCalendar() {
        setHealthCalendarOpen(!state.healthCalendar.open);
      }

      function setHealthCalendarOpen(open) {
        const shouldOpen = Boolean(open);
        const opening = shouldOpen && !state.healthCalendar.open;
        state.healthCalendar.open = shouldOpen;
        if (!healthCalendarPanel || !healthCalendarToggle) {
          return;
        }

        healthCalendarPanel.hidden = !state.healthCalendar.open;
        healthCalendarToggle.setAttribute("aria-expanded", String(state.healthCalendar.open));
        healthCalendarToggle.title = state.healthCalendar.open ? "收起本月健康月历" : "展开本月健康月历";

        if (opening && !state.healthCalendar.loading) {
          if (!state.healthCalendar.payload) {
            loadCachedHealthCalendar();
          }
          if (state.healthCalendar.payload) {
            renderHealthCalendar(state.healthCalendar.payload);
          }
          loadAndRenderHealthCalendar({
            preserveExisting: Boolean(state.healthCalendar.payload)
          });
        }
      }

      async function loadAndRenderHealthCalendar(options) {
        const opts = options || {};
        const preserveExisting = Boolean(opts.preserveExisting && state.healthCalendar.payload);
        state.healthCalendar.loading = true;
        state.healthCalendar.error = "";
        if (!preserveExisting) {
          renderHealthCalendarEmpty("正在读取健康月历...");
        }

        try {
          const payload = await fetchHealthCalendarPayload();
          if (!payload) {
            state.healthCalendar.payload = null;
            state.healthCalendar.loaded = true;
            state.healthCalendar.cached = false;
            clearHealthCalendarCache();
            renderHealthCalendarEmpty("没有可显示的健康月历。");
            return;
          }
          state.healthCalendar.payload = payload;
          state.healthCalendar.loaded = true;
          state.healthCalendar.cached = false;
          saveHealthCalendarCache(payload);
          renderHealthCalendar(payload);
        } catch (error) {
          console.warn("Health calendar unavailable", error);
          state.healthCalendar.error = error && error.message ? String(error.message) : "健康历史读取失败";
          state.healthCalendar.loaded = true;
          if (!preserveExisting) {
            renderHealthCalendarEmpty("暂时无法读取健康历史。");
          }
        } finally {
          state.healthCalendar.loading = false;
        }
      }

      function loadCachedHealthCalendar() {
        try {
          const raw = localStorage.getItem(HEALTH_CALENDAR_CACHE_KEY);
          if (!raw) {
            return false;
          }

          const payload = JSON.parse(raw);
          if (!payload || typeof payload !== "object") {
            clearHealthCalendarCache();
            return false;
          }

          state.healthCalendar.payload = payload;
          state.healthCalendar.loaded = true;
          state.healthCalendar.cached = true;
          state.healthCalendar.error = "";
          renderHealthCalendar(payload);
          return true;
        } catch (error) {
          console.warn("Cached health calendar unavailable", error);
          clearHealthCalendarCache();
          return false;
        }
      }

      function saveHealthCalendarCache(payload) {
        if (state.sessionOnly || state.remote.temporary) {
          return;
        }

        try {
          localStorage.setItem(HEALTH_CALENDAR_CACHE_KEY, JSON.stringify(payload));
        } catch (error) {
          console.warn("Health calendar cache unavailable", error);
        }
      }

      function clearHealthCalendarCache() {
        try {
          localStorage.removeItem(HEALTH_CALENDAR_CACHE_KEY);
        } catch (error) {
          console.warn("Health calendar cache cleanup failed", error);
        }
      }

      async function fetchHealthCalendarPayload() {
        if (state.remote.enabled && state.remote.token && state.remote.repo) {
          return fetchRemoteHealthCalendarPayload();
        }

        return fetchLocalHealthCalendarPayload();
      }

      async function fetchRemoteHealthCalendarPayload() {
        return fetchRemoteHealthJsonPayload(HEALTH_CALENDAR_PATH, "健康月历读取失败");
      }

      async function fetchRemoteHealthJsonPayload(path, errorMessage) {
        if (!state.remote.enabled || !state.remote.token || !state.remote.repo) {
          return null;
        }

        const response = await fetch(getRemotePathContentsUrl(path, true), {
          headers: getRemoteHeaders(false),
          cache: "no-store"
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw await createRemoteHttpError(response, errorMessage);
        }

        const data = await response.json();
        const text = decodeBase64Utf8(String(data.content || ""));
        return JSON.parse(text);
      }

      async function fetchLocalHealthCalendarPayload() {
        if (isLocalFilePage()) {
          throw new Error("本地文件页面不能直接读取健康月历。");
        }

        const response = await fetch(HEALTH_CALENDAR_PATH + "?t=" + encodeURIComponent(String(Date.now())), {
          cache: "no-store"
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw new Error("健康月历读取失败：" + response.status);
        }

        return response.json();
      }

      function renderHealthCalendarEmpty(message) {
        const now = new Date();
        if (healthCalendarTitle) {
          healthCalendarTitle.textContent = (now.getFullYear()) + "年" + (now.getMonth() + 1) + "月健康月历";
        }
        if (healthCalendarMeta) {
          healthCalendarMeta.hidden = false;
          healthCalendarMeta.textContent = message || "没有可显示的健康历史。";
        }
        if (healthCalendarLegend) {
          healthCalendarLegend.innerHTML = "";
        }
        if (healthCalendarGrid) {
          healthCalendarGrid.innerHTML = "";
        }
        if (healthCalendarNote) {
          healthCalendarNote.textContent = state.remote.enabled
            ? "健康历史不可用。"
            : "健康历史未连接。";
        }
      }

      function renderHealthCalendar(payload) {
        const model = buildHealthCalendarModel(payload, new Date());
        if (!model.daysWithData) {
          renderHealthCalendarEmpty("本月暂时没有 COROS 健康数据。");
          return;
        }

        healthCalendarTitle.textContent = model.title;
        if (healthCalendarMeta) {
          healthCalendarMeta.textContent = "";
          healthCalendarMeta.hidden = true;
        }
        renderHealthCalendarLegend(model.counts);
        renderHealthCalendarGrid(model);
        healthCalendarNote.textContent = model.note;
      }

      function renderHealthCalendarLegend(counts) {
        healthCalendarLegend.innerHTML = "";
        [
          ["good", "不错", counts.good],
          ["steady", "平稳", counts.steady],
          ["rest", "欠佳", counts.rest],
          ["active", "活动", counts.active]
        ].forEach(function (item) {
          const chip = document.createElement("span");
          chip.className = item[0];
          chip.textContent = item[1] + " " + item[2] + "天";
          healthCalendarLegend.appendChild(chip);
        });
      }

      function renderHealthCalendarGrid(model) {
        healthCalendarGrid.innerHTML = "";
        ["一", "二", "三", "四", "五", "六", "日"].forEach(function (weekday) {
          const node = document.createElement("div");
          node.className = "health-calendar-weekday";
          node.textContent = weekday;
          healthCalendarGrid.appendChild(node);
        });

        for (let index = 0; index < model.firstOffset; index += 1) {
          const empty = document.createElement("div");
          empty.className = "health-calendar-day empty";
          healthCalendarGrid.appendChild(empty);
        }

        model.days.forEach(function (day) {
          healthCalendarGrid.appendChild(createHealthCalendarDayCell(day));
        });
      }

      function createHealthCalendarDayCell(day) {
        const cell = document.createElement("div");
        cell.className = [
          "health-calendar-day",
          day.statusKey,
          day.partial ? "partial" : "",
          day.future ? "future" : ""
        ].filter(Boolean).join(" ");
        cell.title = day.tooltip;

        const number = document.createElement("strong");
        number.textContent = String(day.dayNumber);
        cell.appendChild(number);

        const label = document.createElement("span");
        label.textContent = day.shortLabel;
        cell.appendChild(label);

        day.details.forEach(function (item) {
          const detail = document.createElement("small");
          if (item.className) {
            detail.className = item.className;
          }
          if (Array.isArray(item.parts)) {
            item.parts.forEach(function (part) {
              if (part.label) {
                detail.appendChild(document.createTextNode(part.label));
              }
              const value = document.createElement("span");
              value.className = "health-calendar-metric-value";
              value.textContent = part.value;
              detail.appendChild(value);
            });
          } else {
            detail.textContent = item.text;
          }
          cell.appendChild(detail);
        });

        return cell;
      }

      function buildHealthCalendarModel(payload, referenceDate) {
        const now = isValidDate(referenceDate) ? new Date(referenceDate) : new Date();
        const year = now.getFullYear();
        const monthIndex = now.getMonth();
        const todayKey = formatLocalDayKey(now);
        const monthStartKey = formatLocalDayKey(new Date(year, monthIndex, 1));
        const monthEndKey = formatLocalDayKey(new Date(year, monthIndex, daysInMonth(year, monthIndex)));
        const entryMap = new Map();

        getHealthCalendarEntries(payload).forEach(function (entry) {
          if (entry && typeof entry.date === "string") {
            entryMap.set(entry.date, entry);
          }
        });

        const counts = { good: 0, steady: 0, rest: 0, active: 0 };
        const days = [];
        let daysWithData = 0;
        for (let dayNumber = 1; dayNumber <= daysInMonth(year, monthIndex); dayNumber += 1) {
          const date = formatLocalDayKey(new Date(year, monthIndex, dayNumber));
          const entry = entryMap.get(date);
          const day = buildHealthCalendarDay(date, dayNumber, entry, date > todayKey);
          if (entry) {
            daysWithData += 1;
            counts[day.statusKey] = (counts[day.statusKey] || 0) + 1;
          }
          days.push(day);
        }

        return {
          title: year + "年" + (monthIndex + 1) + "月健康月历",
          note: "斜纹表示当天数据未完整。",
          counts: counts,
          days: days,
          daysWithData: daysWithData,
          firstOffset: getLocalWeekdayIndex(new Date(year, monthIndex, 1)),
          monthStartKey: monthStartKey,
          monthEndKey: monthEndKey
        };
      }

      function getHealthCalendarEntries(payload) {
        if (!payload || typeof payload !== "object") {
          return [];
        }

        const entries = Array.isArray(payload.days)
          ? payload.days
          : (Array.isArray(payload.entries) ? payload.entries : []);

        return entries.slice().sort(function (left, right) {
          return String(left && left.date || "").localeCompare(String(right && right.date || ""));
        });
      }

      function buildHealthCalendarDay(date, dayNumber, entry, future) {
        if (!entry) {
          return {
            date: date,
            dayNumber: dayNumber,
            statusKey: "missing",
            shortLabel: future ? "" : "无数据",
            details: future ? [] : [{ text: "未同步" }],
            tooltip: date + "：无手表数据",
            partial: false,
            future: future
          };
        }

        const metrics = getHealthCalendarMetrics(entry);
        const status = resolveHealthCalendarDayStatus(metrics);
        return {
          date: date,
          dayNumber: dayNumber,
          statusKey: status.key,
          shortLabel: status.short,
          details: formatHealthCalendarDayDetails(metrics, status.key),
          tooltip: buildHealthCalendarTooltip(date, status.label, metrics),
          partial: metrics.partial,
          future: future
        };
      }

      function getHealthCalendarMetrics(entry) {
        if (entry && typeof entry === "object" && !entry.coros && typeof entry.statusKey === "string") {
          const compactActivities = Array.isArray(entry.activities) ? entry.activities : [];
          const directElevationGain = healthNumber(entry.elevationGainMeters);
          const directTrainingLoad = healthNumber(entry.trainingLoad);
          return {
            statusKey: normalizeHealthCalendarStatusKey(entry.statusKey),
            partial: Boolean(entry.partial),
            sleepScore: healthNumber(entry.sleepScore),
            sleepMinutes: healthNumber(entry.sleepMinutes),
            recoveryPct: healthNumber(entry.recoveryPct),
            hrvMs: healthNumber(entry.hrvMs),
            hrvBaselineMs: healthNumber(entry.hrvBaselineMs),
            hrvNormalRangeLowMs: healthNumber(entry.hrvNormalRangeLowMs),
            restingBpm: healthNumber(entry.restingBpm),
            steps: healthNumber(entry.steps),
            exerciseMinutes: healthNumber(entry.exerciseMinutes),
            activeCalories: getHealthCalendarCompactActiveCalories(entry),
            activityLocation: getHealthCalendarActivityLocation(compactActivities),
            elevationGainMeters: directElevationGain != null ? directElevationGain : healthSum(compactActivities.map(function (activity) {
              return healthNumber(activity && activity.elevationGainMeters);
            })),
            trainingLoad: directTrainingLoad != null ? directTrainingLoad : healthSum(compactActivities.map(function (activity) {
              return healthNumber(activity && activity.trainingDetails && activity.trainingDetails.trainingLoad);
            }))
          };
        }

        const coros = entry.coros || {};
        const dailyHealth = coros.dailyHealth || {};
        const sleep = coros.sleep || {};
        const sleepHrv = coros.sleepHrv || {};
        const heartRate = coros.heartRate || {};
        const recovery = coros.recovery || {};
        const activities = Array.isArray(coros.activities) ? coros.activities : [];
        const activeCalories = getHealthCalendarDailyActiveCalories(dailyHealth, activities);

        return {
          statusKey: "",
          partial: entry.dayComplete === false
            || /partial/i.test(String(entry.dataStatus || ""))
            || /partial/i.test(String(dailyHealth.dataStatus || "")),
          sleepScore: healthNumber(sleep.score),
          sleepMinutes: healthNumber(sleep.mainSleepMinutes),
          recoveryPct: healthNumber(recovery.percentage),
          hrvMs: healthNumber(sleepHrv.avgMs),
          hrvBaselineMs: healthNumber(sleepHrv.baselineMs),
          hrvNormalRangeLowMs: healthNumber(sleepHrv.normalRangeLowMs),
          restingBpm: healthNumber(heartRate.restingBpm),
          steps: healthNumber(dailyHealth.steps),
          exerciseMinutes: healthNumber(dailyHealth.exerciseMinutes),
          activeCalories: activeCalories,
          activityLocation: getHealthCalendarActivityLocation(activities),
          elevationGainMeters: healthSum(activities.map(function (activity) {
            return healthNumber(activity && activity.elevationGainMeters);
          })),
          trainingLoad: healthSum(activities.map(function (activity) {
            return healthNumber(activity && activity.trainingDetails && activity.trainingDetails.trainingLoad);
          }))
        };
      }

      function normalizeHealthCalendarStatusKey(value) {
        const key = String(value || "").toLowerCase();
        return ["good", "steady", "rest", "active"].includes(key) ? key : "";
      }

      function getHealthCalendarStatus(statusKey) {
        const key = normalizeHealthCalendarStatusKey(statusKey);
        const statuses = {
          good: { key: "good", label: "状态不错", short: "不错" },
          steady: { key: "steady", label: "平稳", short: "平稳" },
          rest: { key: "rest", label: "需要休息", short: "欠佳" },
          active: { key: "active", label: "活动较多", short: "活动" }
        };
        return statuses[key] || null;
      }

      function getHealthCalendarCompactActiveCalories(entry) {
        const analysisActiveCalories = healthNumber(entry && entry.analysisActiveCalories);
        if (analysisActiveCalories != null) {
          return analysisActiveCalories;
        }

        return healthNumber(entry && entry.activeCalories);
      }

      function getHealthCalendarDailyActiveCalories(dailyHealth, activities) {
        const analysisActiveCalories = healthNumber(dailyHealth && dailyHealth.analysisActiveCalories);
        if (analysisActiveCalories != null) {
          return analysisActiveCalories;
        }

        const rawActiveCalories = healthNumber(dailyHealth && dailyHealth.activeCalories);
        if (rawActiveCalories == null) {
          return null;
        }

        const activeCaloriesDelta = healthSum((Array.isArray(activities) ? activities : []).map(function (activity) {
          return getHealthCalendarActivityAnalysisCalorieDelta(activity);
        }));
        return Math.max(0, Math.round(rawActiveCalories + activeCaloriesDelta));
      }

      function resolveHealthCalendarDayStatus(metrics) {
        return getHealthCalendarStatus(metrics.statusKey) || classifyHealthCalendarDay(metrics);
      }

      function classifyHealthCalendarDay(metrics) {
        const sleepLow = metrics.sleepScore != null && metrics.sleepScore < 70;
        const recoveryLow = metrics.recoveryPct != null && metrics.recoveryPct < 70;
        const hrvLow = metrics.hrvMs != null
          && metrics.hrvNormalRangeLowMs != null
          && metrics.hrvMs < metrics.hrvNormalRangeLowMs;
        const restingHigh = metrics.restingBpm != null && metrics.restingBpm >= 58;
        const highActivity = !metrics.partial && (
          (metrics.exerciseMinutes || 0) >= 90
          || (metrics.steps || 0) >= 15000
          || (metrics.activeCalories || 0) >= 800
          || (metrics.elevationGainMeters || 0) >= 300
          || (metrics.trainingLoad || 0) >= 100
        );
        const hrvGood = metrics.hrvMs == null
          || metrics.hrvBaselineMs == null
          || metrics.hrvMs >= metrics.hrvBaselineMs;
        const restingGood = metrics.restingBpm == null || metrics.restingBpm <= 53;

        if (sleepLow || recoveryLow) {
          return { key: "rest", label: "需要休息", short: "欠佳" };
        }
        if (highActivity) {
          return { key: "active", label: "活动较多", short: "活动" };
        }
        if (hrvLow || restingHigh) {
          return { key: "rest", label: "需要休息", short: "欠佳" };
        }
        if (metrics.sleepScore != null && metrics.sleepScore >= 90
          && (metrics.recoveryPct == null || metrics.recoveryPct >= 90)
          && hrvGood
          && restingGood) {
          return { key: "good", label: "状态不错", short: "不错" };
        }
        return { key: "steady", label: "平稳", short: "平稳" };
      }

      function formatHealthCalendarDayDetails(metrics, statusKey) {
        const details = [];
        const sleepValue = metrics.sleepScore != null ? String(Math.round(metrics.sleepScore)) : "--";
        const restingValue = metrics.restingBpm != null ? String(Math.round(metrics.restingBpm)) : "--";
        const hrvValue = metrics.hrvMs != null ? String(Math.round(metrics.hrvMs)) : "--";

        details.push({
          parts: [
            { label: "睡", value: sleepValue },
            { label: " 静", value: restingValue }
          ]
        });
        details.push({
          parts: [
            { label: "HRV ", value: hrvValue }
          ]
        });
        if (metrics.activityLocation) {
          details.push({
            text: metrics.activityLocation,
            className: "activity-location"
          });
        }
        return details;
      }

      function buildHealthCalendarTooltip(date, label, metrics) {
        const partialText = metrics.partial ? "；当天数据未完整" : "";
        return [
          date + "：" + label + partialText,
          "睡眠 " + formatHealthMetric(metrics.sleepScore, "分") + " / " + formatHealthDuration(metrics.sleepMinutes),
          "恢复 " + formatHealthMetric(metrics.recoveryPct, "%"),
          "HRV " + formatHealthMetric(metrics.hrvMs, "ms") + "，静息心率 " + formatHealthMetric(metrics.restingBpm, "bpm"),
          "步数 " + formatHealthMetric(metrics.steps, "步") + "，运动 " + formatHealthDuration(metrics.exerciseMinutes),
          metrics.activityLocation ? "地点 " + metrics.activityLocation : ""
        ].filter(Boolean).join("；");
      }

      function getHealthCalendarActivityLocation(activities) {
        let bestLocation = "";
        let bestCalories = -Infinity;
        for (let index = 0; index < activities.length; index += 1) {
          const activity = activities[index] || {};
          const location = String(activity.location || activity.place || activity.routeName || "").trim();
          if (!location) {
            continue;
          }

          const calories = getHealthCalendarActivityAnalysisCalories(activity);
          const score = calories == null ? 0 : calories;
          if (!bestLocation || score > bestCalories) {
            bestLocation = location;
            bestCalories = score;
          }
        }
        return bestLocation;
      }

      function getHealthCalendarActivityAnalysisCalories(activity) {
        if (!activity || typeof activity !== "object") {
          return null;
        }

        const direct = healthNumber(activity.analysisCalories);
        if (direct != null) {
          return direct;
        }

        const nested = healthNumber(activity.analysis && activity.analysis.calories);
        if (nested != null) {
          return nested;
        }

        return healthNumber(activity.calories);
      }

      function getHealthCalendarActivityAnalysisCalorieDelta(activity) {
        if (!activity || typeof activity !== "object") {
          return 0;
        }

        const original = healthNumber(activity.calories);
        if (original == null) {
          return 0;
        }

        const direct = healthNumber(activity.analysisCalories);
        if (direct != null) {
          return direct - original;
        }

        const nested = healthNumber(activity.analysis && activity.analysis.calories);
        return nested != null ? nested - original : 0;
      }

      function healthNumber(value) {
        if (typeof value === "number" && Number.isFinite(value)) {
          return value;
        }
        if (typeof value === "string" && value.trim()) {
          const parsed = Number(value);
          return Number.isFinite(parsed) ? parsed : null;
        }
        return null;
      }

      function healthSum(values) {
        return values.reduce(function (total, value) {
          return total + (typeof value === "number" && Number.isFinite(value) ? value : 0);
        }, 0);
      }

      function formatHealthMetric(value, unit) {
        if (value == null || !Number.isFinite(value)) {
          return "暂无";
        }
        return Math.round(value).toLocaleString("zh-CN") + unit;
      }

      function formatHealthDuration(minutes) {
        if (minutes == null || !Number.isFinite(minutes)) {
          return "暂无";
        }
        const total = Math.round(minutes);
        const hours = Math.floor(total / 60);
        const rest = total % 60;
        if (!hours) {
          return rest + "分钟";
        }
        return hours + "小时" + (rest ? rest + "分钟" : "");
      }

      function toggleComposerAdvanced(forceExpanded) {
        state.composerExpanded = typeof forceExpanded === "boolean" ? forceExpanded : !state.composerExpanded;
        composerAdvanced.hidden = !state.composerExpanded;
        quickMoreButton.setAttribute("aria-expanded", String(state.composerExpanded));
        quickMoreButton.classList.toggle("active", state.composerExpanded);
      }

      async function handleSyncAction() {
        if (state.remote.enabled) {
          await syncRemoteRecords();
          return;
        }

        if (!state.sync.supported) {
          toggleRemoteSyncPanel(true);
          setStatus("请填写 GitHub 同步设置。");
          return;
        }

        if (!state.sync.handle) {
          await connectSyncFile();
          return;
        }

        if (state.sync.permissionNeeded || state.sync.error) {
          await authorizeStoredSyncFile();
          return;
        }

        await checkForSyncFileChanges();
        setStatus("已检查同步文件。");
      }

      async function handleBackupAuthAction() {
        if (!state.sync.handle) {
          setStatus("还没有连接云盘备份文件。");
          return;
        }

        await authorizeStoredSyncFile();
      }

      async function restoreRecordsFromCloudBackup() {
        if (!state.sync.handle) {
          setStatus("还没有连接云盘备份文件。");
          return;
        }

        const ok = window.confirm("从云盘备份恢复会用备份内容覆盖当前本地记录，并随后写回 GitHub。是否继续？");
        if (!ok) {
          setStatus("已取消恢复备份。");
          return;
        }

        try {
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("云盘备份需要授权。");
            return;
          }

          const result = await loadRecordsFromSyncFile();
          if (result === "empty") {
            setStatus("云盘备份文件为空。");
            return;
          }

          if (result === "loaded") {
            state.remote.pushLocalNext = Boolean(state.remote.enabled);
            if (state.remote.pushLocalNext) {
              saveRemoteSyncSettingsToLocal();
              queueRemoteWrite();
            }
            setStatus("已从云盘备份恢复。");
            return;
          }

          setStatus("无法读取云盘备份。");
        } catch (error) {
          console.error(error);
          state.sync.error = "云盘备份恢复失败";
          updateStorageStatus();
          setStatus("云盘备份恢复失败。");
        }
      }

      function handleListClick(event) {

          toggleRecord(id);
          return;
        }

        if (action === "delete") {
          deleteRecord(id);
          return;
        }

        if (action === "ignore-conflict") {
          ignoreConflict(id, actionTarget.dataset.conflictKey || "");
          return;
        }

        if (action === "confirm-auto-complete") {
          confirmAutoComplete(id);
          return;
        }

        if (action === "open-edit") {
          startEditingRecord(id);
          return;
        }

        if (action === "cancel") {
          state.editingId = null;
          render();
          return;
        }

        if (action === "save") {
          saveEditedRecord(id);
        }
      }

        if (feedbackTarget && (

      function handleListInput(event) {

      function handleGTeacherLongPressStart(event) {
        if (event.isPrimary === false || (event.button && event.button !== 0)) {
          return;
        }
        if (shouldIgnoreGTeacherFeedbackEvent(event)) {
          return;
        }

        const item = getGTeacherItemFromEvent(event);
        if (!item || !findGTeacherRecord(item.dataset.id || "")) {
          return;
        }

        cancelGTeacherLongPress();
        gTeacherLongPressRecordId = item.dataset.id || "";
        gTeacherLongPressPointerId = typeof event.pointerId === "number" ? event.pointerId : null;
        gTeacherLongPressStartX = event.clientX;
        gTeacherLongPressStartY = event.clientY;
        gTeacherLongPressTimer = window.setTimeout(function () {
          const recordId = gTeacherLongPressRecordId;
          cancelGTeacherLongPress();
          openGTeacherFeedbackMenu(recordId, event.clientX, event.clientY, false);
        }, G_TEACHER_LONG_PRESS_MS);
      }

      function handleGTeacherLongPressMove(event) {
        if (!gTeacherLongPressTimer) {
          return;
        }
        if (gTeacherLongPressPointerId !== null && event.pointerId !== gTeacherLongPressPointerId) {
          return;
        }

        const dx = Math.abs(event.clientX - gTeacherLongPressStartX);
        const dy = Math.abs(event.clientY - gTeacherLongPressStartY);
        if (Math.max(dx, dy) > G_TEACHER_LONG_PRESS_MOVE_TOLERANCE) {
          cancelGTeacherLongPress();
        }
      }

      function cancelGTeacherLongPress() {
        if (gTeacherLongPressTimer) {
          window.clearTimeout(gTeacherLongPressTimer);
        }
        gTeacherLongPressTimer = 0;
        gTeacherLongPressRecordId = "";
        gTeacherLongPressPointerId = null;
      }

      function handleGTeacherContextMenu(event) {
        if (shouldIgnoreGTeacherFeedbackEvent(event)) {
          return;
        }

        const item = getGTeacherItemFromEvent(event);
        if (!item || !findGTeacherRecord(item.dataset.id || "")) {
          return;
        }

        event.preventDefault();
        cancelGTeacherLongPress();
        openGTeacherFeedbackMenu(item.dataset.id || "", event.clientX, event.clientY, true);

      function handleGTeacherFeedbackMenuClick(event) {
        const button = event.target.closest("button[data-g-teacher-feedback]");
        if (!button || !gTeacherFeedbackMenu || !gTeacherFeedbackMenu.contains(button)) {
          return;
        }

        const recordId = gTeacherFeedbackMenuRecordId;
        const value = button.dataset.gTeacherFeedback;
        const aspect = button.dataset.gTeacherFeedbackAspect || "";
        closeGTeacherFeedbackMenu();
        if (value === "clear") {
          clearGTeacherFeedback(recordId);
