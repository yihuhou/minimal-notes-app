          '<button type="button" class="toggle ' + escapeHtml(toggleMeta.className) + '" data-action="toggle" data-id="' + escapeHtml(record.id) + '" aria-label="' + escapeHtml(toggleMeta.ariaLabel) + '" title="' + escapeHtml(toggleMeta.title) + '"' + (toggleDisabled ? ' disabled aria-disabled="true"' : "") + '>',
          toggleMeta.symbol,
          "</button>",
          '<div class="item-main">',
          editing ? renderInlineEdit(record) : renderDisplay(record, urgent, conflicts),
          "</div>",
          '<div class="item-actions">',
          deleteLocked ? "" : '<button type="button" class="icon-btn danger" data-action="delete" data-id="' + escapeHtml(record.id) + '" aria-label="删除" title="删除">×</button>',
          "</div>",
          "</article>"
        ].join("");
      }

      function renderDisplay(record, urgent, conflicts) {
        const displayText = getDisplayText(record);
        const readOnly = isRecordReadOnly(record);
        const editLocked = isRecordEditLocked(record);
        const gTeacherRecord = record.type === "journal" && isGTeacherRecord(record);
        const lineAttrs = gTeacherRecord
          ? 'class="item-line" data-g-teacher-feedback-target="true" tabindex="0" title="' + escapeHtml(buildItemTitle(record)) + '"'
          : (editLocked
            ? 'class="item-line" title="' + escapeHtml(buildItemTitle(record)) + '"'
            : 'class="item-line" data-action="open-edit" data-id="' + escapeHtml(record.id) + '" tabindex="0" title="' + escapeHtml(buildItemTitle(record)) + '"');
        const parts = [];
        parts.push("<div " + lineAttrs + ">");
        parts.push('<span class="item-tags">');
        if (gTeacherRecord) {
          parts.push('<span class="code-token token-g-teacher">G老师</span>');
        } else {
          parts.push('<span class="badge">' + TYPE_LABELS[record.type] + "</span>");
        }
        if (urgent) {
          parts.push('<span class="badge strong">' + escapeHtml(getUpcomingLabel(record)) + "</span>");
        }
        if (isRecurringRecord(record)) {
          parts.push('<span class="code-token token-repeat">' + escapeHtml(formatRecurrenceLabel(record.recurrence)) + "</span>");
        }
        const futureYearTag = formatFutureYearTag(record);
        if (futureYearTag) {
          parts.push('<span class="code-token token-future-year">' + escapeHtml(futureYearTag) + "</span>");
        }
        if (record.eventAt) {
          parts.push('<span class="code-token token-time">' + escapeHtml(formatRecordTimeToken(record)) + "</span>");
        }
        if (conflicts && conflicts.length) {
          conflicts.forEach(function (conflict) {
            parts.push(renderConflictWarning(record.id, conflict));
          });
        }
        if (isPrepared(record) && !isAutoCompletionPending(record)) {
          parts.push('<span class="code-token token-prepared">已准备</span>');
        }
        if (isAutoCompletionPending(record)) {
          parts.push('<span class="code-token token-auto">已结束</span>');
          parts.push('<button type="button" class="code-token token-action" data-action="confirm-auto-complete" data-id="' + escapeHtml(record.id) + '" title="确认自动完成">确认</button>');
        }
        if (record.type === "journal") {
          parts.push('<span class="code-token token-muted">' + escapeHtml(formatJournalDateToken(record)) + "</span>");
          if (readOnly) {
            parts.push('<span class="code-token token-muted">只读</span>');
          }
        }
        if (record.completed && record.type !== "journal") {
          parts.push('<span class="code-token token-muted">' + (isPassiveRecord(record) ? "archived" : "done") + "</span>");
        }
        parts.push("</span>");
        parts.push('<span class="item-text">' + renderDisplayTextHtml(record) + "</span>");
        parts.push("</div>");
        return parts.join("");
      }

      function renderIdeaPane() {
        if (!ideaPane) {
          return;
        }

        const activeIdeaDraft = getActiveIdeaPaneDraft();
        const journalFocus = state.filter === "journal";
        const ideas = getOpenIdeas();
        const hasIdeas = ideas.length > 0;
        const shouldShowIdeaPane = hasIdeas;
        const keepActiveDraftEditor = Boolean(activeIdeaDraft && activeIdeaDraft.dirty && !journalFocus);

        document.body.classList.toggle("journal-focus", journalFocus);
        workspace.classList.toggle("journal-focus", journalFocus);
        workspace.classList.toggle("has-ideas", shouldShowIdeaPane);
        setIdeaPanePrivacyMode(journalFocus);
        if (keepActiveDraftEditor) {
          syncIdeaPaneHeights();
          return;
        }

        if (!shouldShowIdeaPane) {
          ideaPane.innerHTML = "";
          return;
        }

        ideaPane.innerHTML = ideas.map(renderIdeaCard).join("");
        syncIdeaPaneHeights();
        if (!journalFocus) {
          restoreIdeaPaneDraft(activeIdeaDraft);
        }
      }

      function setIdeaPanePrivacyMode(enabled) {
        if (!ideaPane) {
          return;
        }

        if (enabled) {
          ideaPane.setAttribute("inert", "");
          ideaPane.setAttribute("aria-hidden", "true");
          return;
        }

        ideaPane.removeAttribute("inert");
        ideaPane.removeAttribute("aria-hidden");
      }

      function renderIdeaCard(record) {
        const editedAt = getLatestHistoryAt(record, "edited");
        const meta = [
          '<span class="idea-card-hint">创建于 ' + escapeHtml(formatDateTime(record.createdAt)) + "</span>"
        ];
        if (editedAt) {
          meta.push('<span class="idea-card-hint">编辑于 ' + escapeHtml(formatDateTime(editedAt)) + "</span>");
        }

        return [
          '<article class="idea-card" data-id="' + escapeHtml(record.id) + '">',
          '<div class="idea-card-head">',
          '<span class="idea-card-label">想法</span>',
          '<span class="idea-card-hint">' + escapeHtml(summarizeIdeaLength(record.text)) + '</span>',
          '</div>',
          '<div class="idea-card-meta">' + meta.join("") + "</div>",
          '<div class="idea-card-editor">',
          '<textarea data-role="idea-pane-text" data-id="' + escapeHtml(record.id) + '" spellcheck="false" aria-label="编辑想法">' + escapeHtml(record.text) + '</textarea>',
          '</div>',
          '<div class="idea-card-foot">',
          '<span>Ctrl/Cmd + Enter 收起焦点</span>',
          '</div>',
          '</article>'
        ].join("");
      }

      function getOpenIdeas() {
        return state.records
          .filter(function (record) {
            return record.type === "idea" && !record.completed;
          })
          .sort(sortRecords);
      }

      function syncIdeaPaneHeights() {
        const inputs = ideaPane.querySelectorAll('[data-role="idea-pane-text"]');
        inputs.forEach(autoSizeIdeaInput);
      }

      function autoSizeIdeaInput(input) {
        if (!input) {
          return;
        }

        const lineHeight = parseFloat(window.getComputedStyle(input).lineHeight) || 25;
        const minHeight = Math.ceil(lineHeight + 2);
        input.style.height = "auto";
        const nextHeight = Math.max(input.scrollHeight, minHeight);
        input.style.height = nextHeight + "px";
        input.style.overflowY = "hidden";
      }

      function summarizeIdeaLength(text) {
        const source = String(text || "");
        const lines = source ? source.split(/\r?\n/).length : 0;
        const chars = source.length;
        if (lines > 1) {
          return lines + " 行 / " + chars + " 字";
        }
        return chars + " 字";
      }

      function getToggleMeta(record) {
        if (isRecordReadOnly(record)) {
          return {
            className: "readonly",
            symbol: "",
            ariaLabel: "只读日记",
            title: getRecordReadOnlyMessage(record)
          };
        }

        if (record && record.type === "journal") {
          return {
            className: "readonly",
            symbol: "",
            ariaLabel: "日记不支持完成",
            title: "日记不支持完成或归档"
          };
        }

        if (isAutoCompletionPending(record)) {
          return {
            className: "done",
            symbol: "✓",
            ariaLabel: "确认自动完成",
            title: "已自动完成，点击确认"
          };
        }

        if (supportsPreparedState(record)) {
          if (record.completed) {
            return {
              className: "done",
              symbol: "✓",
              ariaLabel: "重置日程状态",
              title: "已完成，点击重置为未开始"
            };
          }

          if (isPrepared(record)) {
            return {
              className: "partial",
              symbol: "•",
              ariaLabel: "标记日程已完成",
              title: "已准备，点击标记为已完成"
            };
          }

          return {
            className: "",
            symbol: "",
            ariaLabel: "标记日程已准备",
            title: "未开始，点击标记为已准备"
          };
        }

        const completionLabel = isPassiveRecord(record) ? "归档" : "完成";
        return {
          className: record.completed ? "done" : "",
          symbol: record.completed ? "✓" : "",
          ariaLabel: record.completed ? "取消" + completionLabel : completionLabel,
          title: record.completed ? "取消" + completionLabel : completionLabel
        };
      }

      function renderConflictWarning(id, conflict) {
        return '<button type="button" class="code-token token-warning conflict-warning" data-action="ignore-conflict" data-id="' + escapeHtml(id) + '" data-conflict-key="' + escapeHtml(conflict.key) + '" title="' + escapeHtml(conflict.title) + '">warning</button>';
      }

      function renderInlineEdit(record) {
        return [
          '<div class="item-inline-edit">',
          '<textarea data-role="edit-inline-text" class="item-inline-input" rows="1" spellcheck="false" aria-label="编辑记录">' + escapeHtml(record.text) + '</textarea>',
          '<span class="code-token token-muted">Enter 保存 / Esc 取消</span>',
          "</div>"
        ].join("");
      }

      function buildItemTitle(record) {
        const parts = ["创建于 " + formatDateTime(record.createdAt)];
        const preparedAt = getLatestHistoryAt(record, "prepared");
        const completedAt = getLatestHistoryAt(record, "completed");
        const editedAt = getLatestHistoryAt(record, "edited");
        const reopenedAt = getLatestHistoryAt(record, "reopened");

        if (isRecurringRecord(record)) {
          parts.push("周期 " + formatRecurrenceLabel(record.recurrence));
        }
        if (preparedAt) {
          parts.push("准备于 " + formatDateTime(preparedAt));
        }
        if (completedAt) {
          parts.push("完成于 " + formatDateTime(completedAt));
        }
        if (editedAt) {
          parts.push("编辑于 " + formatDateTime(editedAt));
        }
        if (reopenedAt) {
          parts.push("重新打开于 " + formatDateTime(reopenedAt));
        }

        return parts.join(" | ");
      }

      function formatRecordTimeToken(record) {
        if (!record.eventAt) {
          return "";
        }

        if (record.type === "deadline" && !hasExplicitTimeToken(record.text)) {
          return formatCompactDateOnly(record.eventAt) + " 前";
        }

        if (!hasExplicitTimeToken(record.text) && isMidnightDateTime(record.eventAt)) {
          return formatCompactDateOnly(record.eventAt);
        }

        if (record.type === "meeting" && extractTimeRangeFromText(record.text)) {

      function formatFutureYearTag(record) {

        const diff = eventAt.getFullYear() - now.getFullYear();
        if (diff === 1) {
          return "明年";
        }
        if (diff === 2) {
          return "后年";
        }

      function formatCompactDateTime(value) {
        if (!value || !isValidDate(value)) {

        const date = new Date(value);
        const pad = function (num) {

        return [
          date.getMonth() + 1,
          "/",
          date.getDate(),
          " ",
          pad(date.getHours()),
          ":",
          pad(date.getMinutes())
        ].join("");
      }

      function formatCompactDateTimeRange(startValue, endValue) {
        if (!startValue || !endValue || !isValidDate(startValue) || !isValidDate(endValue)) {

        }

        const start = new Date(startValue);
        const end = new Date(endValue);
        const pad = function (num) {
          return String(num).padStart(2, "0");
        };
        const startText = [
          start.getMonth() + 1,
          "/",
          start.getDate(),
          " ",
          pad(start.getHours()),
          ":",
          pad(start.getMinutes())
        ].join("");
        const endTimeText = [
          pad(end.getHours()),
          ":",
          pad(end.getMinutes())

          "/",
          end.getDate(),

      function formatJournalDateToken(record) {
        const value = getJournalDateValue(record);

        const now = new Date();
        const datePart = date.getFullYear() === now.getFullYear()
          ? [date.getMonth() + 1, "/", date.getDate()].join("")
          : [date.getFullYear(), "/", date.getMonth() + 1, "/", date.getDate()].join("");

      }

      function getJournalDateValue(record) {

        const date = new Date(baseValue);
        if (shouldBackdateJournalDate(date)) {

      function shouldBackdateJournalDate(date) {

      function isPassiveRecord(record) {

        const signatureStart = trimmedEnd.length - G_TEACHER_SIGNATURE.length;
        const body = source.slice(0, signatureStart).replace(/\s+$/, "");
        const trailing = source.slice(trimmedEnd.length);

      function getWeekdayMismatchInfo(record) {

        if (!source || !record || !isValidDate(record.eventAt)) {

        const expectedWeekday = formatWeekdayToken(record.eventAt);
        const expectedIndex = weekdayToIndex(expectedWeekday.replace("周", ""));

          .replace(/\s*([，,。；;、])\s*/g, "$1")
          .replace(/[，,。；;、]{2,}/g, "，")

      }

      function getStandaloneDayPatternSource() {
        return "[0-9一二两三四五六七八九十]{1,3}\\s*(?:日|号)";

      function getDisplayDatePatternSource() {
        return "(?:" + getRelativeDayPatternSource() + "|" + getCompactRelativePeriodDatePatternSource() + "|下周[一二三四五六日天]|上周[一二三四五六日天]|本周[一二三四五六日天]|这周[一二三四五六日天]|周[一二三四五六日天]|星期[一二三四五六日天]|\\d{4}\\s*(?:年|[\\/.-])\\s*\\d{1,2}\\s*(?:月|[\\/.-])\\s*\\d{1,2}\\s*(?:日|号)?|\\d{1,2}\\s*(?:月|[\\/.-])\\s*\\d{1,2}\\s*(?:日|号)?)";
      }

      function formatRecurringDisplayDatePrefix(record, rawText) {

        }

      }

      function formatRelativeDatePrefix(value) {
        if (!isValidDate(value)) {
          return "";
        }

        const target = new Date(value);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const targetDay = new Date(target.getFullYear(), target.getMonth(), target.getDate());
        const dayMs = 24 * 60 * 60 * 1000;
        const diffDays = Math.round((targetDay.getTime() - today.getTime()) / dayMs);
        const weekday = formatWeekdayToken(target);

        if (diffDays === 1) {

        if (diffDays === 2) {

        const dayMs = 24 * 60 * 60 * 1000;
        const diffDays = Math.round((targetDay.getTime() - today.getTime()) / dayMs);

        if (diffDays === 1) {

        }
        if (/午/.test(source)) {
          return { today: "今午", tomorrow: "明午", label: "中午" };

        if (/夜/.test(source)) {

        date.setHours(0, 0, 0, 0);
        date.setDate(date.getDate() - getLocalWeekdayIndex(date));

      }

      function formatDotDateWithWeekday(value) {

      function injectWeekdayIntoText(source, weekday) {

          source,

      function isUsableStandaloneDayDateMatch(source, match) {

      function getWeekdayConnectorForDateSeparator(separator) {

      function extractDateRangeInfo(source, startValue) {

      function extractWeekdayRangeInfo(source, startDate) {

      function highlightJournalRecordText(text) {

          + "</span>";

      function highlightRecordText(text, options) {

      function mergeJournalKeywordGroups(publicGroups, privateGroups) {

        const groupIndexes = {};

        (privateGroups || []).forEach(addGroup);

      function getJournalTimePatternSource() {

      function isRejectedLocationLikeToken(token) {

      function isDeadlineKeywordToken(token, source, index) {

      function isDeadlineBeforeMarker(source, index) {

      function parseJournalCommandText(text) {

      function parseRecordTypeCommandText(text) {

        const commands = [
          { type: "idea", pattern: /^\s*(?:想法|idea)\s*(?:[:：]\s*)?(.*)$/i },
          { type: "journal", pattern: /^\s*(?:记录|日记|journal)\s*[:：]\s*(.*)$/i },

        const type = command.type;
        if (type === "idea") {
          return {
            text: text,
            type: "idea",
            eventAt: "",
            recurrence: null,
            typeLock: "idea"
          };
        }

        if (type === "journal") {
          return {
            text: text,
            type: "journal",
            eventAt: "",
            recurrence: null,
            typeLock: "journal"

        const recurrenceInfo = extractRecurrenceInfo(text);

        const eventAt = recurrenceInfo
          ? resolveRecurringEventAt(type, explicitEventAt, naturalInfo, recurrenceInfo, text) || fallbackEventAt

          type: type,
          eventAt: eventAt,
          recurrence: recurrenceInfo,
          typeLock: type

      function normalizeRecordType(value) {
        return typeof value === "string" && RECORD_TYPES.includes(value) ? value : "";

      function resolveNewRecordTypeLock(parsedType, manualType, contextualType) {
        const type = normalizeRecordType(parsedType);
        if (!type) {
          return "";
        }

        if (manualType && manualType !== "auto") {
          return type;
        }

        if (normalizeRecordType(contextualType)) {

        }

        return "";
      }

      function getRecordTypeLock(record) {
        return normalizeRecordType(record && record.typeLock) || inferLegacyTypeLock(record);
      }

      function inferLegacyTypeLock(record) {
        if (!record || typeof record !== "object" || normalizeRecordType(record.typeLock)) {
          return "";
        }

        const currentType = normalizeRecordType(record.type);
        if (currentType === "idea" || currentType === "journal") {
          return "";
        }

        const history = Array.isArray(record.history) ? record.history : [];
        for (let index = 0; index < history.length; index += 1) {
          const entry = history[index];
          const entryType = normalizeRecordType(entry && entry.type);
          if (!entry
            || entry.action !== "created"
            || entryType !== "todo"
            || !normalizeDateTime(entry.eventAt)
            || normalizeRecurrenceInfo(entry.recurrence)) {

        return "";

      function inferUpdateFromText(text, record) {
        const source = String(text || "").trim();
        const typeCommand = parseRecordTypeCommandText(source);
        if (typeCommand) {

            text: source,
            type: "idea",
            eventAt: "",
            recurrence: null,
            typeLock: typeLock

        }

        if (typeLock === "journal") {

            text: source,
            type: "journal",
            eventAt: "",
            recurrence: null,
            typeLock: typeLock

        }

        if (record && record.type === "journal") {

            type: "journal",
            eventAt: "",
            recurrence: null,
            typeLock: typeLock

      function getVisibleRecords() {
        const keyword = state.search.toLowerCase();
        const hasGTeacherRecords = hasGTeacherJournalRecords();
        return state.records
          .slice()
          .sort(sortVisibleRecords)
          .filter(function (record) {
            if (isRecordHiddenByTemporaryPrivacy(record)) {

            if (state.filter === "completed") {

            } else if (state.filter === "all") {

            } else if (state.filter === "journal") {

      function recordMatchesSearch(record, keyword) {

          paddedMonth + "月",
          monthText + "月份",
          paddedMonth + "月份",

          year + "/" + paddedMonth,
          year + "-" + monthText,
          year + "-" + paddedMonth,
          year + "." + monthText,
          year + "." + paddedMonth,
          year + " " + monthText + "月",
          year + " " + paddedMonth + "月",
          year + "年" + monthText + "月",
          year + "年" + paddedMonth + "月",
          year + "年" + monthText + "月份",
          year + "年" + paddedMonth + "月份"

          primaryLabel,
          monthText + "/" + dayText,
          paddedMonth + "/" + paddedDay,
          monthText + "." + dayText,
          paddedMonth + "." + paddedDay,
          monthText + "月" + dayText,

          year + "年" + monthText + "月" + dayText,

          end = resolveTimeRangeEndDate(start, range);
        } else if (isMidnightDateTime(record.eventAt) && hasExplicitAllDayToken(record.text)) {
          end.setHours(23, 59, 0, 0);
        } else {
          end.setTime(start.getTime() + 60 * 60 * 1000);
        }

        return {
          record: record,
          start: start,
          end: end
        };
      }

      function extractTimeRangeFromText(text) {
        const rangeInfo = extractTimeRangeInfoFromText(text);
        return rangeInfo ? rangeInfo.end : null;
      }

      function extractTimeRangeInfoFromText(text) {
        const source = String(text || "");
        const periodTimePattern = "(?:" + getTimePeriodPatternSource() + ")?\\s*" + getTimeFragmentPatternSource();
        const rangeMatch = source.match(new RegExp("(" + periodTimePattern + ")\\s*(?:到|至|-|~|～)\\s*(" + periodTimePattern + ")"));
        if (!rangeMatch) {
          return null;
        }

        const fallbackLabel = extractTimePeriodLabel(rangeMatch[1])
          || extractTimePeriodLabel(source)
          || inferTimePeriodLabelByWords(source);
        const start = parseTimeFragment(rangeMatch[1], fallbackLabel);
        const end = parseTimeFragment(rangeMatch[2], fallbackLabel);
        if (!start || !end) {
          return null;
        }

        return {
          start: start,
          end: end
        };
      }

      function resolveTimeRangeEndDate(start, range) {
        const end = new Date(start.getTime());
        end.setHours(range.hours, range.minutes, 0, 0);

        if (end.getTime() <= start.getTime()
          && range.ambiguousMeridiem
          && start.getHours() >= 12
          && range.hours < 12) {
          end.setHours(range.hours + 12, range.minutes, 0, 0);
        }

        if (end.getTime() <= start.getTime()) {
          const nextDayEnd = new Date(end.getTime());
          nextDayEnd.setDate(nextDayEnd.getDate() + 1);
          if (nextDayEnd.getTime() > start.getTime()) {
            return nextDayEnd;
          }
          end.setTime(start.getTime() + 60 * 60 * 1000);
        }

        return end;
      }

      function getTimePeriodPatternSource() {
        return "(?:凌晨|今早|今晨|今午|今晚|今夜|明早|明晨|明午|明晚|明夜|早上|上午|中午|下午|傍晚|晚上)";
      }

      function getTimeNumberPatternSource() {
        return "(?:\\d{1,2}|[零〇一二两三四五六七八九十]{1,3})";
      }

      function getMinuteTokenPatternSource() {
        return "(?:半|一刻|三刻|" + getTimeNumberPatternSource() + "\\s*分?)";
      }

      function getPointTimePatternSource() {
        return getTimeNumberPatternSource() + "\\s*点(?:\\s*" + getMinuteTokenPatternSource() + ")?";
      }

      function getTimeFragmentPatternSource() {
        return "(?:" + getTimeNumberPatternSource() + "\\s*[:：]\\s*" + getTimeNumberPatternSource() + "|" + getPointTimePatternSource() + ")";
      }

      function parseTimeNumberToken(value) {
        const source = String(value || "").replace(/\s/g, "").replace(/分$/g, "").trim();
        if (!source) {
          return null;
        }
        if (/^\d+$/.test(source)) {
          return parseInt(source, 10);
        }
        if (!/^[零〇一二两三四五六七八九十]+$/.test(source)) {
          return null;
        }

        const parsed = parseChineseNumber(source);
        if (parsed || /^(?:零|〇)$/.test(source)) {
          return parsed;
        }
        return null;
      }

      function parseMinuteToken(value) {
        const source = String(value || "").trim();
        if (!source) {
          return 0;
        }
        if (source.indexOf("半") >= 0) {
          return 30;
        }
        if (source.indexOf("一刻") >= 0) {
          return 15;
        }
        if (source.indexOf("三刻") >= 0) {
          return 45;
        }

        const minutes = parseTimeNumberToken(source.replace(/分/g, ""));
        return minutes == null ? null : clampMinute(minutes);
      }

      function parsePointTimeFragment(text, fallbackPeriodLabel) {
        const source = String(text || "");
        const pointPattern = "(" + getTimePeriodPatternSource() + ")?\\s*(" + getTimeNumberPatternSource() + ")\\s*点(?:\\s*(" + getMinuteTokenPatternSource() + "))?";
        const pointMatch = source.match(new RegExp(pointPattern));
        if (!pointMatch) {
          return null;
        }

        const hours = parseTimeNumberToken(pointMatch[2]);
        const minutes = parseMinuteToken(pointMatch[3]);
        if (hours == null || minutes == null) {
          return null;
        }

        const periodLabel = pointMatch[1] || fallbackPeriodLabel || "";
        return {
          hours: clampHour(applyTimePeriod(hours, periodLabel)),
          minutes: minutes,
          ambiguousMeridiem: isAmbiguousMeridiemTime(hours, periodLabel)
        };
      }

      function isAmbiguousMeridiemTime(hours, periodLabel) {
        const hour = Number(hours);
        return !periodLabel && Number.isFinite(hour) && hour >= 1 && hour <= 11;
      }

      function parseTimeFragment(text, fallbackPeriodLabel) {
        const source = String(text || "");
        const periodLabel = extractTimePeriodLabel(source) || fallbackPeriodLabel || inferTimePeriodLabelByWords(source);
        const hmMatch = source.match(new RegExp("(" + getTimeNumberPatternSource() + ")\\s*[:：]\\s*(" + getTimeNumberPatternSource() + ")"));
        if (hmMatch) {
          const hours = parseTimeNumberToken(hmMatch[1]);
          const minutes = parseTimeNumberToken(hmMatch[2]);
          if (hours == null || minutes == null) {
            return null;
          }

          return {
            hours: clampHour(applyTimePeriod(hours, periodLabel)),
            minutes: clampMinute(minutes),
            ambiguousMeridiem: isAmbiguousMeridiemTime(hours, periodLabel)
          };
        }

        return parsePointTimeFragment(source, periodLabel);
      }

      function buildConflictTitle(otherRecord) {
        const timeLabel = formatRecordTimeToken(otherRecord);
        return '与「' + summarizeConflictText(getDisplayText(otherRecord)) + '」'
          + (timeLabel ? "（" + timeLabel + "）" : "")
          + "可能时间冲突，点击忽略这组提醒。";
      }

      function summarizeConflictText(text) {
        const source = String(text || "").trim();
        if (source.length <= 18) {
          return source;
        }
        return source.slice(0, 18) + "…";
      }

      function createConflictKey(leftId, rightId) {
        return [leftId, rightId].sort().join("::");
      }

      function isConflictIgnored(leftRecord, rightRecord, key) {
        const leftKeys = normalizeConflictKeys(leftRecord && leftRecord.ignoredConflictKeys);
        const rightKeys = normalizeConflictKeys(rightRecord && rightRecord.ignoredConflictKeys);
        return leftKeys.indexOf(key) >= 0 || rightKeys.indexOf(key) >= 0;
      }

      function ignoreConflict(id, key) {
        if (!id || !key) {
          return;
        }

        const ids = key.split("::");
        if (ids.length !== 2) {
          return;
        }

        let changed = false;
        state.records.forEach(function (record) {
          if (ids.indexOf(record.id) === -1) {
            return;
          }

          const keys = normalizeConflictKeys(record.ignoredConflictKeys);
          if (keys.indexOf(key) === -1) {
            keys.push(key);
            record.ignoredConflictKeys = keys;
            record.updatedAt = new Date().toISOString();
            changed = true;
          }
        });

        if (!changed) {
          return;
        }

        persist();
        render();
        setStatus("已忽略这组时间冲突提醒。");
      }

      function hasUrgencyTag(record) {
        if (!isTimedType(record.type) || !record.eventAt || record.completed) {
          return false;
        }

        if (isOngoingMeetingRecord(record)) {
          return true;
        }

        const upcomingAt = getUpcomingComparisonAt(record);
        if (!upcomingAt) {
          return false;
        }

        const diff = upcomingAt.getTime() - Date.now();
        return isOverdueUrgencyRecord(record, diff) || (diff >= 0 && diff <= 24 * 60 * 60 * 1000);
      }

      function isOverdueUrgencyRecord(record, diff) {
        return diff < 0 && (record.type === "deadline" || record.type === "todo" || isRecurringRecord(record));
      }

      function isOngoingMeetingRecord(record, nowTime) {
        if (!record || record.type !== "meeting" || !isValidDate(record.eventAt)) {
          return false;
        }

        const start = new Date(record.eventAt).getTime();
        const end = getMeetingEndAt(record);
        const now = isValidDate(nowTime) ? new Date(nowTime).getTime() : Date.now();
        return Boolean(end) && start <= now && now < end.getTime();
      }

      function getUpcomingComparisonAt(record) {
        if (!record || !isValidDate(record.eventAt)) {
          return null;
        }

        const start = new Date(record.eventAt);
        if (record.type === "todo" && !isUntimedDateRecord(record) && start.getTime() <= Date.now()) {
          return getDefaultEventEndAt(record) || start;
        }

        if (isUntimedDateRecord(record) && start.getTime() <= Date.now()) {
          return getDefaultEventEndAt(record) || start;
        }

        return start;
      }

      function getUpcomingLabel(record) {
        const nowTime = Date.now();
        if (isOngoingMeetingRecord(record, nowTime)) {
          return "进行中";
        }

        const upcomingAt = getUpcomingComparisonAt(record);
        if (!upcomingAt) {
          return "";
        }

        const diff = upcomingAt.getTime() - nowTime;
        const startsIn = new Date(record.eventAt).getTime() - nowTime;
        const hours = diff / (60 * 60 * 1000);
        const baseLabel = record.type === "deadline" ? "截止" : (record.type === "todo" ? "待办" : "日程");
        if (isOverdueUrgencyRecord(record, diff)) {
          return "已过期";
        }
        if (record.type === "todo") {
          return "24 小时内";
        }
        if (record.type === "deadline" && hours <= 2) {
          return "即将截止";
        }
        if (record.type !== "deadline" && !isUntimedDateRecord(record) && startsIn >= 0 && startsIn / (60 * 60 * 1000) <= 2) {
          return "即将开始";
        }
        if (hours <= 24) {
          return record.type === "deadline" ? "24h内截止" : "24 小时内";
        }
        return baseLabel;
      }

      function inferTypeAndText(text, explicitEventAt, manualType, contextualType) {
        const naturalInfo = extractNaturalDateInfo(text);
        const recurrenceInfo = extractRecurrenceInfo(text);
        const autoTimedType = inferTimedTypeFromText(text);

        if (manualType && manualType !== "auto") {
          if (manualType === "idea") {
            return {
              text: text,
              type: "idea",
              eventAt: "",
              recurrence: null
            };
          }

          if (manualType === "journal") {
            return {
              text: parseJournalCommandText(text) || text,
              type: "journal",
              eventAt: "",
              recurrence: null
            };
          }

          const resolvedManualEventAt = recurrenceInfo
            ? resolveRecurringEventAt(manualType, explicitEventAt, naturalInfo, recurrenceInfo, text)
            : resolveTimedEventAt(manualType, explicitEventAt, naturalInfo);
          return {
            text: text,
            type: manualType,
            eventAt: resolvedManualEventAt,
            recurrence: recurrenceInfo
          };
        }

        const typeCommand = parseRecordTypeCommandText(text);
        if (typeCommand) {
          const commandResult = buildTypeCommandResult(typeCommand, explicitEventAt, null);
          if (commandResult) {
            return commandResult;
          }
        }

        if (contextualType === "idea") {
          return {
            text: text,
            type: "idea",
            eventAt: "",
            recurrence: null
          };
        }

        if (contextualType === "journal") {
          return {
            text: text,
            type: "journal",
            eventAt: "",
            recurrence: null
          };
        }

        if (isTimedType(contextualType)) {
          const resolvedContextualEventAt = recurrenceInfo
            ? resolveRecurringEventAt(contextualType, explicitEventAt, naturalInfo, recurrenceInfo, text)
            : resolveTimedEventAt(contextualType, explicitEventAt, naturalInfo);
          return {
            text: text,
            type: contextualType,
            eventAt: resolvedContextualEventAt,
            recurrence: recurrenceInfo
          };
        }

        if (recurrenceInfo) {
          const recurringType = isDeadlineHintText(text) ? "deadline" : "todo";
          return {
            text: text,
            type: recurringType,
            eventAt: resolveRecurringEventAt(recurringType, explicitEventAt, naturalInfo, recurrenceInfo, text),
            recurrence: recurrenceInfo
          };
        }

        if (explicitEventAt || naturalInfo.hasTemporalHint) {
          return {
            text: text,
            type: autoTimedType,
            eventAt: resolveTimedEventAt(autoTimedType, explicitEventAt, naturalInfo),
            recurrence: null
          };
        }

        return {
          text: text,
          type: "todo",
          eventAt: explicitEventAt,
          recurrence: null
        };
      }

      function isTimedType(type) {
        return type === "todo" || type === "meeting" || type === "deadline";
      }

      function isDeadlineHintText(text) {
        const source = String(text || "");
        if (/(?:\bddl\b|deadline|截止|截至|过期|到期|失效|期满|有效期)/i.test(source)) {
          return true;
        }

        const timePeriodPattern = getTimePeriodPatternSource();
        const datePattern = "(?:" + getDisplayDatePatternSource() + "|" + getStandaloneDayPatternSource() + ")";
        const dateOrTimePattern = "(?:" + datePattern + "(?:\\s*" + timePeriodPattern + ")?|" + timePeriodPattern + "|" + getTimeFragmentPatternSource() + ")";
        return new RegExp(dateOrTimePattern + "\\s*(?:前|之前)").test(source);
      }

      function inferTimedTypeFromText(text) {
        return isDeadlineHintText(text) ? "deadline" : "meeting";
      }

      function resolveTimedEventAt(type, explicitEventAt, naturalInfo) {
        if (!isTimedType(type)) {
          return "";
        }

        if (explicitEventAt) {
          return explicitEventAt;
        }

        if (naturalInfo.eventAt) {
          return naturalInfo.eventAt;
        }

        if (naturalInfo.date) {
          return type === "deadline"
            ? toEndOfDayIso(naturalInfo.date)
            : toStartOfDayIso(naturalInfo.date);
        }

        return "";
      }

      function resolveRecurringEventAt(type, explicitEventAt, naturalInfo, recurrenceInfo, text, referenceNow) {
        const recurrence = normalizeRecurrenceInfo(recurrenceInfo);
        if (!recurrence) {
          return "";
        }

        if (explicitEventAt) {
          return explicitEventAt;
        }

        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const anchorInfo = parseRecurrenceAnchorInfo(text, now);
        if (!anchorInfo && naturalInfo && naturalInfo.eventAt) {
          return naturalInfo.eventAt;
        }

        const date = anchorInfo
          ? getInitialRecurrenceDate(recurrence, text, now)
          : naturalInfo && naturalInfo.date
          ? new Date(naturalInfo.date.getTime())
          : getInitialRecurrenceDate(recurrence, text, now);
        if (!date || !isValidDate(date)) {
          return "";
        }

        const timeInfo = parseTimeFromText(text);
        if (timeInfo.matched) {
          date.setHours(timeInfo.hours, timeInfo.minutes, 0, 0);
        } else if (timeInfo.defaultHours != null) {
          date.setHours(timeInfo.defaultHours, timeInfo.defaultMinutes || 0, 0, 0);
        } else if (type === "deadline") {
          date.setHours(23, 59, 0, 0);
        } else {
          date.setHours(0, 0, 0, 0);
        }

        return date.toISOString();
      }

      function extractRecurrenceInfo(text) {
        const source = String(text || "").trim();
        if (!source) {
          return null;
        }

        if (/(?:每(?:个)?工作日|每周\s*(?:一|1)\s*(?:到|至|-|~|～)\s*(?:周)?(?:五|5))/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "weekly",
            interval: 1,
            mode: "fixed",
            weekdays: [0, 1, 2, 3, 4],
            label: "每个工作日"
          });
        }

        const yearlyFixed = source.match(/每(?:年|年度)\s*([0-9一二两三四五六七八九十]{1,3})\s*月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)?/);
        if (yearlyFixed) {
          const month = parsePositiveIntegerToken(yearlyFixed[1]);
          const monthDay = parsePositiveIntegerToken(yearlyFixed[2]);
          if (isValidMonth(month) && isValidMonthDay(monthDay)) {
            return normalizeRecurrenceInfo({
              frequency: "yearly",
              interval: 1,
              mode: "fixed",
              month: month,
              monthDay: monthDay
            });
          }
        }

        const monthlyFixed = source.match(/每(?:个)?月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/)
          || source.match(/每月\s*([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/);
        if (monthlyFixed) {
          const monthDay = parsePositiveIntegerToken(monthlyFixed[1]);
          if (isValidMonthDay(monthDay)) {
            return normalizeRecurrenceInfo({
              frequency: "monthly",
              interval: 1,
              mode: "fixed",
              monthDay: monthDay
            });
          }
        }

        if (/每(?:个)?月\s*(?:底|末)|每月\s*(?:底|末)/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "monthly",
            interval: 1,
            mode: "fixed",
            monthDay: "last",
            label: "每月底"
          });
        }

        const weeklyFixed = source.match(/每(?:周|星期|礼拜)\s*((?:(?:周|星期|礼拜)?[一二三四五六日天末]\s*[、,，和及]?\s*)+)(?!\s*(?:次|回|趟))/);
        if (weeklyFixed) {
          const weekdays = parseWeekdayList(weeklyFixed[1]);
          if (weekdays.length) {
            return normalizeRecurrenceInfo({
              frequency: "weekly",
              interval: 1,
              mode: "fixed",
              weekdays: weekdays
            });
          }
        }

        if (/(?:每天|每日|天天|\bdaily\b|\bevery day\b)/i.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "daily",
            interval: 1,
            mode: "fixed"
          });
        }

        const intervalMatch = source.match(/每(?:隔)?\s*([0-9一二两三四五六七八九十]+)\s*(天|日|周|星期|礼拜|个月|月|年)/);
        if (intervalMatch) {
          const interval = parsePositiveIntegerToken(intervalMatch[1]);
          const frequency = unitToRecurrenceFrequency(intervalMatch[2]);
          if (interval && frequency) {
            return normalizeRecurrenceInfo({
              frequency: frequency,
              interval: interval,
              mode: "sliding"
            });
          }
        }

        const oncePerMatch = source.match(/([0-9一二两三四五六七八九十]+)?\s*(天|日|周|星期|礼拜|个月|月|年)\s*(?:一?次|一回|一趟)/);
        if (oncePerMatch && oncePerMatch[2]) {
          const interval = oncePerMatch[1] ? parsePositiveIntegerToken(oncePerMatch[1]) : 1;
          const frequency = unitToRecurrenceFrequency(oncePerMatch[2]);
          if (interval && frequency) {
            return normalizeRecurrenceInfo({
              frequency: frequency,
              interval: interval,
              mode: "sliding"
            });
          }
        }

        if (/每(?:周|星期|礼拜)(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "weekly",
            interval: 1,
            mode: "sliding"
          });
        }

        if (/每(?:个)?月(?:一次|一回|一趟)?|每月(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "monthly",
            interval: 1,
            mode: "sliding"
          });
        }

        if (/每(?:年|年度)(?:一次|一回|一趟)?/.test(source)) {
          return normalizeRecurrenceInfo({
            frequency: "yearly",
            interval: 1,
            mode: "sliding"
          });
        }

        return null;
      }

      function normalizeRecurrenceInfo(value) {
        if (!value || typeof value !== "object") {
          return null;
        }

        const frequency = ["daily", "weekly", "monthly", "yearly"].includes(value.frequency)
          ? value.frequency
          : "";
        if (!frequency) {
          return null;
        }

        const interval = Math.max(1, Math.min(365, parseInt(value.interval, 10) || 1));
        const mode = value.mode === "sliding" ? "sliding" : "fixed";
        const weekdays = Array.isArray(value.weekdays)
          ? uniqueSortedNumbers(value.weekdays, 0, 6)
          : [];
        const month = isValidMonth(parseInt(value.month, 10)) ? parseInt(value.month, 10) : 0;
        let monthDay = "";
        if (value.monthDay === "last") {
          monthDay = "last";
        } else if (isValidMonthDay(parseInt(value.monthDay, 10))) {
          monthDay = parseInt(value.monthDay, 10);
        }

        return {
          frequency: frequency,
          interval: interval,
          mode: mode,
          weekdays: weekdays,
          monthDay: monthDay,
          month: month,
          label: typeof value.label === "string" ? value.label.slice(0, 24) : ""
        };
      }

      function isRecurringRecord(record) {
        return Boolean(record && normalizeRecurrenceInfo(record.recurrence));
      }

      function recurrencesEqual(left, right) {
        return JSON.stringify(normalizeRecurrenceInfo(left)) === JSON.stringify(normalizeRecurrenceInfo(right));
      }

      function pushRecurrenceCompletion(record, completion) {
        if (!record || !completion) {
          return;
        }

        const entries = normalizeRecurrenceCompletionEntries(record.recurrenceCompletions);
        const normalized = normalizeRecurrenceCompletionEntry(completion);
        if (!normalized) {
          return;
        }

        entries.push(normalized);
        record.recurrenceCompletions = entries;
      }

      function archiveDeletedRecord(record, deletedAt) {
        const archivedRecord = normalizeImportedRecord(record);
        if (!archivedRecord) {
          return false;
        }

        pushHistory(archivedRecord, "deleted", deletedAt);
        const entry = normalizeDeletedRecordEntry({
          recordId: archivedRecord.id,
          deletedAt: deletedAt,
          record: archivedRecord
        });
        if (!entry) {
          return false;
        }

        const entries = normalizeDeletedRecordEntries(state.deletedRecords);
        entries.push(entry);
        state.deletedRecords = entries;
        return true;
      }

      function archivePurgedRecord(record, deletedAt) {
        if (!record || typeof record.id !== "string" || !record.id || !isValidDate(deletedAt)) {
          return false;
        }

        const entry = normalizeDeletedRecordEntry({
          recordId: record.id,
          deletedAt: deletedAt,
          purged: true
        });
        if (!entry) {
          return false;
        }

        const entries = normalizeDeletedRecordEntries(state.deletedRecords);
        entries.push(entry);
        state.deletedRecords = entries;
        return true;
      }

      function normalizeDeletedRecordEntries(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value
          .map(normalizeDeletedRecordEntry)
          .filter(Boolean)
          .sort(function (a, b) {
            return new Date(a.deletedAt).getTime() - new Date(b.deletedAt).getTime();
          });
      }

      function normalizeDeletedRecordEntry(value) {
        if (!value || typeof value !== "object" || !isValidDate(value.deletedAt)) {
          return null;
        }

        const fallbackId = typeof value.recordId === "string" && value.recordId
          ? value.recordId
          : (value.record && typeof value.record.id === "string" ? value.record.id : "");
        const deletedAt = new Date(value.deletedAt).toISOString();
        if (value.purged) {
          if (!fallbackId) {
            return null;
          }
          return {
            recordId: fallbackId,
            deletedAt: deletedAt,
            purged: true
          };
        }
        if (value.v4Tombstone && fallbackId) {
          return {
            recordId: fallbackId,
            deletedAt: deletedAt,
            purged: false,
            v4Tombstone: true
          };
        }

        const sourceRecord = value.record && typeof value.record === "object" ? value.record : value;
        const recordSource = fallbackId && (!sourceRecord.id || typeof sourceRecord.id !== "string")
          ? Object.assign({}, sourceRecord, { id: fallbackId })
          : sourceRecord;
        const record = normalizeImportedRecord(recordSource);
        if (!record) {
          return null;
        }

        return {
          recordId: fallbackId || record.id,
          deletedAt: deletedAt,
          record: record
        };
      }

      function archiveRecurrenceCompletions(record, deletedAt) {
        const entry = createRecurrenceCompletionArchiveEntry(record, deletedAt);
        if (!entry) {
          return false;
        }

        const entries = normalizeRecurrenceCompletionArchiveEntries(state.recurrenceCompletionArchive);
        entries.push(entry);
        state.recurrenceCompletionArchive = entries;
        return true;
      }

      function createRecurrenceCompletionArchiveEntry(record, deletedAt) {
        if (!record) {
          return null;
        }

        return normalizeRecurrenceCompletionArchiveEntry({
          recordId: record.id,
          deletedAt: deletedAt,
          text: typeof record.text === "string" ? record.text : "",
          displayText: getDisplayText(record),
          type: typeof record.type === "string" ? record.type : "",
          createdAt: record.createdAt,
          updatedAt: record.updatedAt,
          recurrence: record.recurrence,
          recurrenceLabel: formatRecurrenceLabel(record.recurrence),
          completions: record.recurrenceCompletions
        });
      }

      function normalizeRecurrenceCompletionEntries(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value
          .map(normalizeRecurrenceCompletionEntry)
          .filter(Boolean)
          .sort(function (a, b) {
            return new Date(a.completedAt).getTime() - new Date(b.completedAt).getTime();
          });
      }

      function normalizeRecurrenceCompletionEntry(value) {
        if (!value || typeof value !== "object" || !isValidDate(value.completedAt)) {
          return null;
        }

        return {
          occurrenceAt: normalizeDateTime(value.occurrenceAt),
          completedAt: new Date(value.completedAt).toISOString(),
          nextEventAt: normalizeDateTime(value.nextEventAt),
          text: typeof value.text === "string" ? value.text : "",
          displayText: typeof value.displayText === "string" ? value.displayText : "",
          recurrenceLabel: typeof value.recurrenceLabel === "string" ? value.recurrenceLabel : ""
        };
      }

      function normalizeRecurrenceCompletionArchiveEntries(value) {
        if (!Array.isArray(value)) {
          return [];
        }

        return value
          .map(normalizeRecurrenceCompletionArchiveEntry)
          .filter(Boolean)
          .sort(function (a, b) {
            return new Date(a.deletedAt).getTime() - new Date(b.deletedAt).getTime();
          });
      }

      function normalizeRecurrenceCompletionArchiveEntry(value) {
        if (!value || typeof value !== "object" || !isValidDate(value.deletedAt)) {
          return null;
        }

        const completions = normalizeRecurrenceCompletionEntries(value.completions);
        if (!completions.length) {
          return null;
        }

        const recurrence = normalizeRecurrenceInfo(value.recurrence);
        return {
          recordId: typeof value.recordId === "string" ? value.recordId : "",
          deletedAt: new Date(value.deletedAt).toISOString(),
          text: typeof value.text === "string" ? value.text : "",
          displayText: typeof value.displayText === "string" ? value.displayText : "",
          type: typeof value.type === "string" ? value.type : "",
          createdAt: normalizeDateTime(value.createdAt),
          updatedAt: normalizeDateTime(value.updatedAt),
          recurrence: recurrence,
          recurrenceLabel: typeof value.recurrenceLabel === "string" && value.recurrenceLabel
            ? value.recurrenceLabel
            : formatRecurrenceLabel(recurrence),
          completions: completions
        };
      }

      function completeAndAdvanceRecurringRecord(record, completedAt) {
        const nextEventAt = getNextRecurrenceEventAt(record, completedAt);
        if (!nextEventAt) {
          return false;
        }

        const completedOccurrence = {
          occurrenceAt: normalizeDateTime(record.eventAt),
          completedAt: completedAt,
          nextEventAt: nextEventAt,
          text: typeof record.text === "string" ? record.text : "",
          displayText: getDisplayText(record),
          recurrenceLabel: formatRecurrenceLabel(record.recurrence)
        };

        record.prepared = false;
        record.completed = true;
        clearAutoCompleteState(record);
        record.updatedAt = completedAt;
        pushHistory(record, "completed", completedAt);
        pushRecurrenceCompletion(record, completedOccurrence);

        const nextText = stripRecurrenceInitialPhrase(record.text);
        if (nextText) {
          record.text = nextText;
        }
        record.eventAt = nextEventAt;
        record.prepared = false;
        record.completed = false;
        record.ignoredConflictKeys = [];
        record.updatedAt = completedAt;
        pushHistory(record, "recurrence_advanced", completedAt);

      }

      function getNextRecurrenceEventAt(record, completedAtValue) {
        const recurrence = normalizeRecurrenceInfo(record && record.recurrence);
        if (!recurrence) {
          return "";
        }

        const completedAt = isValidDate(completedAtValue) ? new Date(completedAtValue) : new Date();
        const currentEventAt = isValidDate(record && record.eventAt)
          ? new Date(record.eventAt)
          : new Date(completedAt.getTime());
        const next = recurrence.mode === "sliding"
          ? getNextSlidingRecurrenceEventAt(recurrence, currentEventAt, completedAt)
          : getNextFixedRecurrenceEventAt(recurrence, currentEventAt, completedAt);

        return next && isValidDate(next) ? next.toISOString() : "";
      }

      function getNextSlidingRecurrenceEventAt(recurrence, currentEventAt, completedAt) {
        const base = new Date(completedAt.getTime());
        copyTimeParts(base, currentEventAt);
        return addRecurrenceUnits(base, recurrence.frequency, recurrence.interval);
      }

      function getNextFixedRecurrenceEventAt(recurrence, currentEventAt, completedAt) {
        const threshold = new Date(Math.max(currentEventAt.getTime(), completedAt.getTime()));
        return getFirstFixedOccurrenceAfter(recurrence, threshold, currentEventAt);
      }

      function getFirstFixedOccurrenceAfter(recurrence, threshold, timeSource) {
        if (recurrence.frequency === "daily") {
          let candidate = makeDateWithTime(threshold, timeSource);
          while (candidate.getTime() <= threshold.getTime()) {
            candidate.setDate(candidate.getDate() + recurrence.interval);
          }
          return candidate;
        }

        if (recurrence.frequency === "weekly") {
          const weekdays = recurrence.weekdays.length
            ? recurrence.weekdays
            : [getLocalWeekdayIndex(timeSource)];
          if (recurrence.interval > 1 && weekdays.length === 1) {
            let candidate = new Date(timeSource.getTime());
            while (candidate.getTime() <= threshold.getTime()) {
              candidate.setDate(candidate.getDate() + recurrence.interval * 7);
            }
            return candidate;
          }

          for (let offset = 0; offset <= 370; offset += 1) {
            const candidate = makeDateWithTime(threshold, timeSource);
            candidate.setDate(candidate.getDate() + offset);
            if (weekdays.indexOf(getLocalWeekdayIndex(candidate)) !== -1
              && candidate.getTime() > threshold.getTime()) {
              return candidate;
            }
          }
          return null;
        }

        if (recurrence.frequency === "monthly") {
          if (recurrence.monthDay) {
            let candidate = makeMonthlyOccurrence(
              threshold.getFullYear(),
              threshold.getMonth(),
              recurrence.monthDay,
              timeSource
            );
            while (candidate.getTime() <= threshold.getTime()) {
              candidate = addMonthsClamped(candidate, recurrence.interval, recurrence.monthDay);
            }
            return candidate;
          }

          let candidate = new Date(timeSource.getTime());
          while (candidate.getTime() <= threshold.getTime()) {
            candidate = addMonthsClamped(candidate, recurrence.interval, timeSource.getDate());
          }
          return candidate;
        }

        if (recurrence.frequency === "yearly") {
          if (recurrence.month && recurrence.monthDay) {
            let candidate = makeMonthlyOccurrence(
              threshold.getFullYear(),
              recurrence.month - 1,
              recurrence.monthDay,
              timeSource
            );
            while (candidate.getTime() <= threshold.getTime()) {
              candidate = makeMonthlyOccurrence(
                candidate.getFullYear() + recurrence.interval,
                recurrence.month - 1,
                recurrence.monthDay,
                timeSource
              );
            }
            return candidate;
          }

          let candidate = new Date(timeSource.getTime());
          while (candidate.getTime() <= threshold.getTime()) {
            candidate = addYearsClamped(candidate, recurrence.interval);
          }
          return candidate;
        }

        return null;
      }

      function getInitialRecurrenceDate(recurrence, text, referenceNow) {
        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const anchorInfo = parseRecurrenceAnchorInfo(text, now);
        if (anchorInfo) {
          const anchorDate = new Date(anchorInfo.date.getTime());
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          if (anchorInfo.relation === "occurrence" || anchorInfo.relation === "first") {
            return anchorDate;
          }
          if (anchorInfo.relation === "previous") {
            return getNextOccurrenceFromAnchor(recurrence, anchorDate, today, false);
          }
          if (anchorDate.getTime() >= today.getTime()) {
            return anchorDate;
          }
          return getNextOccurrenceFromAnchor(recurrence, anchorDate, today, true);
        }

        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (recurrence.mode === "sliding") {
          return today;
        }

        if (recurrence.frequency === "weekly" && recurrence.weekdays.length) {
          return getNextWeekdayDate(today, recurrence.weekdays);
        }

        if (recurrence.frequency === "monthly" && recurrence.monthDay) {
          const candidate = makeMonthlyOccurrence(
            today.getFullYear(),
            today.getMonth(),
            recurrence.monthDay,
            today
          );
          return candidate.getTime() < today.getTime()
            ? addMonthsClamped(candidate, recurrence.interval, recurrence.monthDay)
            : candidate;
        }

        if (recurrence.frequency === "yearly" && recurrence.month && recurrence.monthDay) {
          const candidate = makeMonthlyOccurrence(
            today.getFullYear(),
            recurrence.month - 1,
            recurrence.monthDay,
            today
          );
          return candidate.getTime() < today.getTime()
            ? makeMonthlyOccurrence(today.getFullYear() + recurrence.interval, recurrence.month - 1, recurrence.monthDay, today)
            : candidate;
        }

        return today;
      }

      function parseRecurrenceInitialDate(text, referenceNow) {
        const anchorInfo = parseRecurrenceAnchorInfo(text, referenceNow);
        return anchorInfo ? anchorInfo.date : null;
      }

      function parseRecurrenceAnchorInfo(text, referenceNow) {
        const source = String(text || "");
        if (!source) {
          return null;
        }

        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const occurrencePattern = /(?:下次|下一次|下回|下一回|下一期|下期|下轮|下一轮|下个周期|下一周期|本次|这次|本期|这一期)/g;
        const occurrenceContext = getRecurrenceAnchorContext(source, occurrencePattern);
        if (occurrenceContext) {
          const occurrenceDate = parseAnchorDateFromText(occurrenceContext, now, "occurrence");
          if (occurrenceDate) {
            return {
              relation: "occurrence",
              date: occurrenceDate
            };
          }
        }

        const previousPattern = /(?:上一次|上次|上回|上一回|上一期|上期|最近一次|最近一回|最近一期|上轮|上一轮|上个周期|上一周期|上次完成|上次执行|上次做|上次是)/g;
        const previousContext = getRecurrenceAnchorContext(source, previousPattern);
        if (previousContext) {
          const previousDate = parseAnchorDateFromText(previousContext, now, "previous");
          if (previousDate) {
            return {
              relation: "previous",
              date: previousDate
            };
          }
        }

        const firstPattern = /(?:第一次|首次|首回|第一回|第一期|首期|首个)/g;
        const firstContext = getRecurrenceAnchorContext(source, firstPattern);
        if (firstContext) {
          const firstDate = parseAnchorDateFromText(firstContext, now, "first");
          if (firstDate) {
            return {
              relation: "first",
              date: firstDate
            };
          }
        }

        const startPattern = /(?:从|自|自从|开始|起始|起始日期|开始日期|开始于|起于|起)/g;
        const startContext = getRecurrenceAnchorContext(source, startPattern);
        if (startContext) {
          const startDate = parseAnchorDateFromText(startContext, now, "start");
          if (startDate) {
            return {
              relation: "start",
              date: startDate
            };
          }
        }

        return null;
      }

      function getRecurrenceAnchorContext(source, pattern) {
        let match;
        while ((match = pattern.exec(source)) !== null) {
          const index = match.index;
          const start = Math.max(0, index - 28);
          const end = Math.min(source.length, index + match[0].length + 72);
          const context = source.slice(start, end);
          if (hasDateLikeToken(context)) {
            return context;
          }
        }
        return "";
      }

      function parseAnchorDateFromText(text, referenceNow, relation) {
        const source = String(text || "");
        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        const relativeMap = [
          { pattern: /大前天/, offset: -3 },
          { pattern: /前天/, offset: -2 },
          { pattern: /昨天|昨日/, offset: -1 },
          { pattern: /大后天/, offset: 3 },
          { pattern: /后天/, offset: 2 },
          { pattern: /明天|明日|明早|明晨|明午|明晚|明夜/, offset: 1 },
          { pattern: /今天|今日|今早|今晨|今午|今晚|今夜/, offset: 0 }
        ];

        for (let index = 0; index < relativeMap.length; index += 1) {

          }

        const fullDateMatch = source.match(/(\d{4})\s*(?:年|[\/.-])\s*(\d{1,2})\s*(?:月|[\/.-])\s*(\d{1,2})\s*(?:日|号)?/);
        if (fullDateMatch) {
          return new Date(Number(fullDateMatch[1]), Number(fullDateMatch[2]) - 1, Number(fullDateMatch[3]));
        }

        const monthDayMatch = source.match(/(?:^|[^\d])(\d{1,2})\s*(?:月|[\/.-])\s*(\d{1,2})\s*(?:日|号)?/);
        if (monthDayMatch) {
          return new Date(now.getFullYear(), Number(monthDayMatch[1]) - 1, Number(monthDayMatch[2]));
        }

        const weekdayMatch = source.match(/(上周|上星期|上礼拜|下周|下星期|下礼拜|本周|这周|本星期|这星期|本礼拜|这礼拜)?\s*(?:周|星期|礼拜)\s*([一二三四五六日天])/);
        if (weekdayMatch) {

        const dayMatch = source.match(/(?:^|[^\d月])([0-9一二两三四五六七八九十]{1,3})\s*(?:日|号)/);
        if (!dayMatch) {
          return null;
        }

        const day = parsePositiveIntegerToken(dayMatch[1]);
        if (!isValidMonthDay(day)) {

        }

        return makeMonthlyOccurrence(now.getFullYear(), now.getMonth(), day, today);

      function resolveAnchorWeekdayDate(prefix, weekdayLabel, referenceNow, relation) {
        const now = isValidDate(referenceNow) ? new Date(referenceNow) : new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const target = weekdayToIndex(weekdayLabel);
        const current = getLocalWeekdayIndex(today);
        let diff = target - current;

        if (/上/.test(prefix)) {
          diff -= 7;
        } else if (/下/.test(prefix)) {
          diff += 7;
        } else if (relation === "previous" && diff > 0) {
          diff -= 7;
        } else if (relation !== "previous" && diff < 0) {
          diff += 7;
        }

        const date = new Date(today);
        date.setDate(date.getDate() + diff);
        return date;
      }

      function hasDateLikeToken(text) {
        const datePattern = "(?:" + getDisplayDatePatternSource() + "|" + getStandaloneDayPatternSource() + ")";
        return new RegExp(datePattern).test(String(text || ""));
      }

      function hasExplicitCalendarDateToken(text) {
        return /(?:\d{4}\s*(?:年|[\/.-])\s*\d{1,2}\s*(?:月|[\/.-])\s*\d{1,2}|\d{1,2}\s*(?:月|[\/.-])\s*\d{1,2})/.test(String(text || ""));

      function getNextOccurrenceFromAnchor(recurrence, anchorDate, thresholdDate, includeAnchor) {
        const threshold = isValidDate(thresholdDate) ? new Date(thresholdDate) : new Date();
        if (recurrence.mode === "sliding") {
          let candidate = new Date(anchorDate.getTime());
          if (!includeAnchor || candidate.getTime() < threshold.getTime()) {
            candidate = addRecurrenceUnits(candidate, recurrence.frequency, recurrence.interval);
          }
          while (candidate && candidate.getTime() < threshold.getTime()) {
            candidate = addRecurrenceUnits(candidate, recurrence.frequency, recurrence.interval);

          return candidate;

        if (includeAnchor && anchorDate.getTime() >= threshold.getTime()) {

        }

        const searchAfter = includeAnchor
          ? new Date(threshold.getTime() - 1)

      function stripRecurrenceInitialPhrase(text) {
        let source = String(text || "").trim();
        if (!source) {
          return "";
        }

        const datePattern = "(?:" + getDisplayDatePatternSource() + "|" + getStandaloneDayPatternSource() + ")";
        const patterns = [
          new RegExp("[，,。；;、\\s]*(?:第一次|首次|首回|第一回|第一期|首期|首个)[^，,。；;、\\n]{0,28}?(?:是|在|从|为)?\\s*" + datePattern + "\\s*(?:开始|执行)?", "g"),
          new RegExp("[，,。；;、\\s]*(?:上一次|上次|上回|上一回|上一期|上期|最近一次|最近一回|最近一期|上轮|上一轮|上个周期|上一周期|上次完成|上次执行|上次做|上次是)[^，,。；;、\\n]{0,28}?(?:是|在|为)?\\s*" + datePattern, "g"),
          new RegExp("[，,。；;、\\s]*(?:从|自|自从)\\s*" + datePattern + "\\s*(?:开始|起|起始|算起)?", "g"),
          new RegExp("[，,。；;、\\s]*(?:开始|起始|起始日期|开始日期|开始于|起于)\\s*(?:日期|时间)?\\s*(?:是|为|在)?\\s*" + datePattern, "g")

        patterns.forEach(function (pattern) {

        source = stripRecurrenceOccurrencePhrase(source);

        source = source
          .replace(/\s{2,}/g, " ")
          .replace(/^[，,。；;、\s]+/, "")
          .replace(/[，,。；;、\s]+$/, "")
          .trim();
        return source || String(text || "").trim();
      }

      function addRecurrenceUnits(date, frequency, interval) {
        const next = new Date(date.getTime());
        if (frequency === "daily") {
          next.setDate(next.getDate() + interval);
          return next;
        }
        if (frequency === "weekly") {
          next.setDate(next.getDate() + interval * 7);
          return next;
        }
        if (frequency === "monthly") {
          return addMonthsClamped(next, interval, next.getDate());
        }
        if (frequency === "yearly") {
          return addYearsClamped(next, interval);
        }
        return null;
      }

      function addMonthsClamped(date, count, preferredDay) {
        const target = new Date(date.getTime());
        const day = preferredDay === "last"
          ? "last"
          : Math.max(1, Math.min(31, parseInt(preferredDay, 10) || target.getDate()));
        target.setDate(1);
        target.setMonth(target.getMonth() + count);
        target.setDate(resolveMonthDay(day, target.getFullYear(), target.getMonth()));
        return target;
      }

      function addYearsClamped(date, count) {
        const target = new Date(date.getTime());
        const preferredDay = target.getDate();
        target.setDate(1);
        target.setFullYear(target.getFullYear() + count);
        target.setDate(Math.min(preferredDay, daysInMonth(target.getFullYear(), target.getMonth())));

      function makeMonthlyOccurrence(year, monthIndex, monthDay, timeSource) {

        copyTimeParts(date, timeSource);
        return date;
      }

      function makeDateWithTime(dateSource, timeSource) {
        const date = new Date(dateSource.getFullYear(), dateSource.getMonth(), dateSource.getDate());
        copyTimeParts(date, timeSource);
        return date;
      }

      function copyTimeParts(target, source) {
        const date = isValidDate(source) ? new Date(source) : new Date();
        target.setHours(date.getHours(), date.getMinutes(), date.getSeconds(), date.getMilliseconds());
      }

      function resolveMonthDay(monthDay, year, monthIndex) {
        if (monthDay === "last") {
          return daysInMonth(year, monthIndex);
        }
        return Math.max(1, Math.min(daysInMonth(year, monthIndex), parseInt(monthDay, 10) || 1));
      }

      function daysInMonth(year, monthIndex) {
        return new Date(year, monthIndex + 1, 0).getDate();
      }

      function getNextWeekdayDate(today, weekdays) {
        const current = getLocalWeekdayIndex(today);
        let bestOffset = 7;
        weekdays.forEach(function (weekday) {
          let offset = weekday - current;
          if (offset < 0) {
            offset += 7;
          }
          if (offset < bestOffset) {
            bestOffset = offset;
          }
        });

        const date = new Date(today.getTime());
        date.setDate(date.getDate() + bestOffset);
        return date;
      }

      function getLocalWeekdayIndex(date) {
        return (new Date(date).getDay() + 6) % 7;
      }

      function parseWeekdayList(value) {
        const source = String(value || "");
        const weekdays = [];
        if (/末/.test(source)) {
          weekdays.push(5, 6);
        }
        source.replace(/[一二三四五六日天]/g, function (token) {
          const index = weekdayToIndex(token);
          if (typeof index === "number") {
            weekdays.push(index);
          }
          return token;
        });
        return uniqueSortedNumbers(weekdays, 0, 6);

      function uniqueSortedNumbers(values, min, max) {
        const unique = [];
        values.forEach(function (value) {
          const number = parseInt(value, 10);
          if (Number.isNaN(number) || number < min || number > max || unique.indexOf(number) !== -1) {
            return;
          }
          unique.push(number);
        });
        return unique.sort(function (a, b) {
          return a - b;
        });
      }

      function unitToRecurrenceFrequency(unit) {
        if (/^(?:天|日)$/.test(unit)) {
          return "daily";
        }
        if (/^(?:周|星期|礼拜)$/.test(unit)) {
          return "weekly";
        }
        if (/^(?:个月|月)$/.test(unit)) {
          return "monthly";
        }
        if (/^年$/.test(unit)) {
          return "yearly";
        }
        return "";
      }

      function parsePositiveIntegerToken(value) {
        const source = String(value || "").trim();
        if (/^\d+$/.test(source)) {
          return parseInt(source, 10);
        }
        return parseChineseNumber(source);
      }

      function parseChineseNumber(value) {
        const source = String(value || "").replace(/两/g, "二").replace(/〇/g, "零");
        const digits = {
          "零": 0,
          "一": 1,
          "二": 2,
          "三": 3,
          "四": 4,
          "五": 5,
          "六": 6,
          "七": 7,
          "八": 8,
          "九": 9
        };
        if (!source) {
          return 0;
        }
        if (digits[source] != null) {
          return digits[source];
        }
        if (source === "十") {
          return 10;
        }
        const tenMatch = source.match(/^([一二三四五六七八九])?十([一二三四五六七八九])?$/);
        if (tenMatch) {
