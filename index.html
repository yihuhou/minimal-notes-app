        setGTeacherFeedback(recordId, value, aspect);
      }

      function handleGTeacherFeedbackOutsideClick(event) {
        if (!gTeacherFeedbackMenu || gTeacherFeedbackMenu.hidden) {
          return;
        }
        if (Date.now() - gTeacherFeedbackOpenedAt < 220) {
          return;
        }
        const target = event.target;
        if (target && target.closest && target.closest("#gTeacherFeedbackMenu")) {
          return;
        }
        closeGTeacherFeedbackMenu();
      }

      function getGTeacherItemFromEvent(event) {
        const target = event && event.target;
        if (!target || !target.closest) {
          return null;
        }

        const item = target.closest(".item.g-teacher[data-id]");
        return item && recordList.contains(item) ? item : null;
      }

      function shouldIgnoreGTeacherFeedbackEvent(event) {
        const target = event && event.target;
        if (!target || !target.closest) {
          return true;
        }
        return Boolean(target.closest("button, input, textarea, select, a, .item-inline-edit, [data-action]"));
      }

      function openGTeacherFeedbackMenuForElement(element, focusMenu) {
        const item = element && element.closest ? element.closest(".item.g-teacher[data-id]") : null;
        if (!item) {
          return;
        }

        const rect = item.getBoundingClientRect();
        openGTeacherFeedbackMenu(
          item.dataset.id || "",
          rect.left + Math.min(rect.width - 12, Math.max(28, rect.width * 0.72)),
          rect.top + Math.min(rect.height - 8, 42),
          focusMenu
        );
      }

      function openGTeacherFeedbackMenu(recordId, clientX, clientY, focusMenu) {
        if (!gTeacherFeedbackMenu || !findGTeacherRecord(recordId)) {
          return;
        }

        gTeacherFeedbackMenuRecordId = recordId;
        updateGTeacherFeedbackMenuButtons(recordId);
        gTeacherFeedbackMenu.hidden = false;
        gTeacherFeedbackMenu.style.left = "0px";
        gTeacherFeedbackMenu.style.top = "0px";

        const margin = 8;
        const width = gTeacherFeedbackMenu.offsetWidth || 180;
        const height = gTeacherFeedbackMenu.offsetHeight || 42;
        const left = Math.max(margin, Math.min(clientX, window.innerWidth - width - margin));
        const top = Math.max(margin, Math.min(clientY, window.innerHeight - height - margin));
        gTeacherFeedbackMenu.style.left = left + "px";
        gTeacherFeedbackMenu.style.top = top + "px";
        gTeacherFeedbackOpenedAt = Date.now();

        if (focusMenu) {
          const activeButton = gTeacherFeedbackMenu.querySelector("button.active:not([hidden])");
          const firstButton = gTeacherFeedbackMenu.querySelector("button:not([hidden])");
          (activeButton || firstButton || gTeacherFeedbackMenu).focus();
        }
      }

      function updateGTeacherFeedbackMenuButtons(recordId) {
        if (!gTeacherFeedbackMenu) {
          return;
        }

        const hasFeedback = hasGTeacherFeedback(recordId);
        gTeacherFeedbackMenu.querySelectorAll("button[data-g-teacher-feedback]").forEach(function (button) {
          const value = button.dataset.gTeacherFeedback || "";
          const aspect = button.dataset.gTeacherFeedbackAspect || "";
          const current = getGTeacherFeedbackValue(recordId, aspect);
          const active = value === current;
          button.classList.toggle("active", active);
          if (value === "clear") {
            button.hidden = !hasFeedback;
            return;
          }
          button.hidden = false;
          button.setAttribute("aria-checked", String(active));
        });
      }

      function closeGTeacherFeedbackMenu() {
        if (!gTeacherFeedbackMenu) {
          return;
        }
        gTeacherFeedbackMenu.hidden = true;
        gTeacherFeedbackMenuRecordId = "";
      }

      function findGTeacherRecord(recordId) {
        return (state.records || []).find(function (record) {
          return record && record.id === recordId && record.type === "journal" && isGTeacherRecord(record);
        }) || null;
      }

      function setGTeacherFeedback(recordId, value, aspect) {
        const record = findGTeacherRecord(recordId);
        const feedbackValue = normalizeGTeacherFeedbackValue(value);
        const feedbackAspect = normalizeGTeacherFeedbackAspect(aspect);
        if (!record || !feedbackValue || !feedbackAspect) {
          return;
        }

        if (getGTeacherFeedbackValue(record.id, feedbackAspect) === feedbackValue) {
          setStatus("这条G老师日记已经标记为" + formatGTeacherFeedbackLabel(feedbackValue, feedbackAspect) + "。");
          return;
        }

        rememberGTeacherFeedback(record, feedbackValue, new Date().toISOString(), feedbackAspect);
        persist();
        render();
        setStatus("已标记G老师日记：" + formatGTeacherFeedbackLabel(feedbackValue, feedbackAspect) + "。");
      }

      function rememberGTeacherFeedback(record, value, at, aspect) {
        const feedbackValue = normalizeGTeacherFeedbackValue(value);
        if (!record || !record.id || !feedbackValue) {
          return false;
        }

        const now = isValidDate(at) ? new Date(at).toISOString() : new Date().toISOString();
        const stats = normalizeJournalStats(state.journalStats);
        const gTeacher = normalizeGTeacherStats(stats.gTeacher) || { enabled: true };
        const feedback = normalizeGTeacherFeedbackMap(gTeacher.feedback);
        const entry = Object.assign({}, feedback[record.id] || {});
        const feedbackAspect = normalizeGTeacherFeedbackAspect(aspect);
        if (feedbackAspect) {
          const aspects = normalizeGTeacherFeedbackAspects(entry.aspects);
          aspects[feedbackAspect] = {
            value: feedbackValue,
            at: now
          };
          entry.aspects = aspects;
          if (entry.value === "cleared") {
            delete entry.value;
          }
        } else {
          entry.value = feedbackValue;
        }
        entry.at = now;
        const createdAt = normalizeDateTime(record.createdAt);
        const textPreview = summarizeGTeacherFeedbackText(record);
        if (createdAt) {
          entry.createdAt = createdAt;
        }
        if (textPreview) {
          entry.textPreview = textPreview;
        }

        feedback[record.id] = entry;
        gTeacher.feedback = feedback;
        stats.gTeacher = gTeacher;
        stats.updatedAt = now;
        state.journalStats = stats;
        return true;
      }

      function clearGTeacherFeedback(recordId) {
        const record = findGTeacherRecord(recordId);
        if (!record) {
          return;
        }

        const stats = normalizeJournalStats(state.journalStats);
        const gTeacher = normalizeGTeacherStats(stats.gTeacher) || { enabled: true };
        const feedback = normalizeGTeacherFeedbackMap(gTeacher.feedback);
        if (!hasActiveGTeacherFeedbackEntry(feedback[record.id])) {
          setStatus("这条G老师日记还没有反馈。");
          return;
        }

        const now = new Date().toISOString();
        const entry = Object.assign({}, feedback[record.id] || {});
        const aspects = normalizeGTeacherFeedbackAspects(entry.aspects);
        G_TEACHER_FEEDBACK_ASPECTS.forEach(function (aspect) {
          aspects[aspect] = {
            value: "cleared",
            at: now
          };
        });
        entry.value = "cleared";
        entry.at = now;
        entry.aspects = aspects;
        const createdAt = normalizeDateTime(record.createdAt);
        const textPreview = summarizeGTeacherFeedbackText(record);
        if (createdAt) {
          entry.createdAt = createdAt;
        }
        if (textPreview) {
          entry.textPreview = textPreview;
        }
        feedback[record.id] = entry;
        gTeacher.feedback = feedback;
        stats.gTeacher = gTeacher;
        stats.updatedAt = now;
        state.journalStats = stats;
        persist();
        render();
        setStatus("已取消这条G老师日记的反馈。");
      }

      function summarizeGTeacherFeedbackText(record) {
        return stripGTeacherSignature(record && record.text)
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, 180);
      }

      function startEditingRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (isRecordEditLocked(record)) {
          state.editingId = null;
          render();
          setStatus(getRecordEditLockedMessage(record));
          return;
        }

        state.editingId = id;
        const value = String(record.text || "");
        inlineEditDraft = {
          id: id,
          value: value,
          dirty: false,
          selectionStart: value.length,
          selectionEnd: value.length,
          selectionDirection: "none",
          restoreFocus: true
        };
        render();
        focusEditField(id);
      }

      function getActiveInlineEditDraft() {
        if (!state.editingId || !recordList) {
          inlineEditDraft = null;
          return null;
        }

        if (document.activeElement && document.activeElement.closest) {
          const input = document.activeElement.closest('[data-role="edit-inline-text"]');
          if (input && recordList.contains(input)) {
            updateInlineEditDraftFromInput(input, true);
          }
        }

        if (!inlineEditDraft || inlineEditDraft.id !== state.editingId) {
          return null;
        }

        const record = state.records.find(function (entry) {
          return entry.id === inlineEditDraft.id;
        });
        inlineEditDraft.dirty = !record
          || inlineEditDraft.value.trim() !== String(record.text || "").trim();
        return inlineEditDraft;
      }

      function updateInlineEditDraftFromInput(input, restoreFocus) {
        if (!input || !recordList.contains(input)) {
          return null;
        }

        const item = input.closest(".item");
        const id = item && item.dataset ? item.dataset.id || "" : "";
        if (!id || state.editingId !== id) {
          return null;
        }

        const value = String(input.value || "");
        const record = state.records.find(function (entry) {
          return entry.id === id;
        });

        inlineEditDraft = {
          id: id,
          value: value,
          dirty: !record || value.trim() !== String(record.text || "").trim(),
          selectionStart: typeof input.selectionStart === "number" ? input.selectionStart : value.length,
          selectionEnd: typeof input.selectionEnd === "number" ? input.selectionEnd : value.length,
          selectionDirection: typeof input.selectionDirection === "string" ? input.selectionDirection : "none",
          restoreFocus: Boolean(restoreFocus)
        };
        return inlineEditDraft;
      }

      function hasActiveDirtyInlineEditDraft() {
        const draft = getActiveInlineEditDraft();
        return Boolean(draft && draft.dirty);
      }

      function restoreInlineEditDraft(draft) {
        const id = draft && draft.id ? draft.id : state.editingId;
        if (!id || state.editingId !== id) {
          return;
        }

        const input = recordList.querySelector('.item[data-id="' + cssEscape(id) + '"] [data-role="edit-inline-text"]');
        if (!input) {
          return;
        }

        if (draft && input.value !== draft.value) {
          input.value = draft.value;
        }
        autoSizeInlineEditInput(input);
        if (!draft || !draft.restoreFocus) {
          return;
        }

        requestAnimationFrame(function () {
          if (!input.isConnected || state.editingId !== draft.id) {
            return;
          }
          const activeElement = document.activeElement;
          if (activeElement
            && activeElement !== document.body
            && activeElement !== document.documentElement
            && activeElement !== input) {
            return;
          }
          try {
            input.focus({ preventScroll: true });
          } catch (error) {
            input.focus();
          }
          const valueLength = String(input.value || "").length;
          const start = Math.min(Math.max(Number(draft.selectionStart) || 0, 0), valueLength);
          const end = Math.min(Math.max(Number(draft.selectionEnd) || start, 0), valueLength);
          try {
            input.setSelectionRange(start, end, draft.selectionDirection || "none");
          } catch (error) {
            input.setSelectionRange(start, end);
          }
          updateInlineEditDraftFromInput(input, true);
        });
      }

      function reconcileEditingStateAfterRecordsUpdate() {
        if (!state.editingId) {
          return;
        }

        const record = state.records.find(function (entry) {
          return entry.id === state.editingId;
        });
        if (!record || isRecordEditLocked(record)) {
          state.editingId = null;
          inlineEditDraft = null;
        }
      }

      function handleListFocusOut(event) {
        if (event.target.getAttribute("data-role") !== "edit-inline-text") {
          return;
        }
        if (recordListRenderInProgress || !recordList.contains(event.target)) {
          return;
        }

        const currentItem = event.target.closest(".item");
        const nextItem = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest(".item") : null;
        if (currentItem && nextItem && currentItem === nextItem) {
          return;
        }

        const id = currentItem ? currentItem.dataset.id : "";
        if (id) {
          saveEditedRecord(id);
        }
      }

      function handleIdeaPaneFocusIn(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        const record = findIdeaRecord(input.dataset.id || "");
        input.dataset.originalValue = input.value;
        input.dataset.originalUpdatedAt = record && isValidDate(record.updatedAt)
          ? new Date(record.updatedAt).toISOString()
          : "";
        delete input.dataset.draftUpdatedAt;
        autoSizeIdeaInput(input);
      }

      function handleIdeaPaneInput(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        const record = findIdeaRecord(input.dataset.id || "");
        if (!record) {
          return;
        }

        const nextText = String(input.value || "");
        if (record.text === nextText) {
          autoSizeIdeaInput(input);
          return;
        }

        const now = new Date().toISOString();
        record.text = nextText;
        input.dataset.draftUpdatedAt = now;
        autoSizeIdeaInput(input);
        persist();
        patchIdeaTextInList(record);
      }

      function handleIdeaPaneKeydown(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          event.preventDefault();
          input.blur();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          const originalValue = input.dataset.originalValue;
          if (typeof originalValue === "string") {
            input.value = originalValue;
            const record = findIdeaRecord(input.dataset.id || "");
            if (record) {
              record.text = originalValue;
              restoreIdeaRecordOriginalUpdatedAt(record, input);
              delete input.dataset.draftUpdatedAt;
              persist();
              patchIdeaTextInList(record);
            }
          }
          input.blur();
        }
      }

      function handleIdeaPaneFocusOut(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        saveIdeaPaneRecord(input);
      }

      function findIdeaRecord(id) {
        return state.records.find(function (record) {
          return record.id === id && record.type === "idea";
        }) || null;
      }

      function restoreIdeaRecordOriginalUpdatedAt(record, input) {
        if (!record || !input) {
          return;
        }

        const originalUpdatedAt = input.dataset.originalUpdatedAt;
        if (isValidDate(originalUpdatedAt)) {
          record.updatedAt = new Date(originalUpdatedAt).toISOString();
          return;
        }

        delete record.updatedAt;
      }

      function getActiveIdeaPaneDraft() {
        if (!ideaPane || !document.activeElement || !document.activeElement.closest) {
          return null;
        }

        const input = document.activeElement.closest('[data-role="idea-pane-text"]');
        if (!input || !ideaPane.contains(input)) {
          return null;
        }

        const id = input.dataset.id || "";
        if (!id) {
          return null;
        }

        const value = String(input.value || "");
        const originalValue = typeof input.dataset.originalValue === "string"
          ? input.dataset.originalValue
          : value;
        const record = findIdeaRecord(id);
        const originalUpdatedAt = normalizeDateTime(input.dataset.originalUpdatedAt) || "";
        const draftUpdatedAt = normalizeDateTime(input.dataset.draftUpdatedAt)
          || normalizeDateTime(record && record.updatedAt)
          || new Date().toISOString();

        return {
          id: id,
          value: value,
          originalValue: originalValue,
          originalUpdatedAt: originalUpdatedAt,
          dirty: value !== originalValue,
          updatedAt: draftUpdatedAt,
          selectionStart: typeof input.selectionStart === "number" ? input.selectionStart : value.length,
          selectionEnd: typeof input.selectionEnd === "number" ? input.selectionEnd : value.length,
          selectionDirection: typeof input.selectionDirection === "string" ? input.selectionDirection : "none"
        };
      }

      function hasActiveDirtyIdeaPaneDraft() {
        const draft = getActiveIdeaPaneDraft();
        return Boolean(draft && draft.dirty);
      }

      function applyIdeaPaneDraftToRecords(records, draft) {
        if (!draft || !draft.dirty || !Array.isArray(records)) {
          return false;
        }

        const record = records.find(function (item) {
          return item && item.id === draft.id && item.type === "idea";
        });
        if (!record) {
          return false;
        }

        const nextText = String(draft.value || "");
        const updatedAt = normalizeDateTime(draft.updatedAt) || new Date().toISOString();
        let changed = record.text !== nextText;
        record.text = nextText;
        if (!isValidDate(record.updatedAt)
          || new Date(record.updatedAt).getTime() < new Date(updatedAt).getTime()) {
          record.updatedAt = updatedAt;
          changed = true;
        }
        return changed;
      }

      function restoreIdeaPaneDraft(draft) {
        if (!draft || !ideaPane) {
          return;
        }

        const input = ideaPane.querySelector('[data-role="idea-pane-text"][data-id="' + cssEscape(draft.id) + '"]');
        if (!input) {
          return;
        }

        if (draft.dirty && input.value !== draft.value) {
          input.value = draft.value;
        }
        if (draft.dirty) {
          input.dataset.originalValue = draft.originalValue;
          input.dataset.originalUpdatedAt = draft.originalUpdatedAt || "";
          if (draft.updatedAt) {
            input.dataset.draftUpdatedAt = draft.updatedAt;
          }
        } else {
          const record = findIdeaRecord(draft.id);
          input.dataset.originalValue = input.value;
          input.dataset.originalUpdatedAt = record && isValidDate(record.updatedAt)
            ? new Date(record.updatedAt).toISOString()
            : "";
          delete input.dataset.draftUpdatedAt;
        }
        autoSizeIdeaInput(input);

        requestAnimationFrame(function () {
          try {
            input.focus({ preventScroll: true });
          } catch (error) {
            input.focus();
          }
          const valueLength = String(input.value || "").length;
          const start = Math.min(Math.max(Number(draft.selectionStart) || 0, 0), valueLength);
          const end = Math.min(Math.max(Number(draft.selectionEnd) || start, 0), valueLength);
          try {
            input.setSelectionRange(start, end, draft.selectionDirection || "none");
          } catch (error) {
            input.setSelectionRange(start, end);
          }
        });
      }

      function patchIdeaTextInList(record) {
        if (!record) {
          return;
        }

        const item = recordList.querySelector('.item[data-id="' + cssEscape(record.id) + '"]');
        if (!item) {
          return;
        }

        const textNode = item.querySelector(".item-text");
        if (textNode) {
          textNode.innerHTML = renderDisplayTextHtml(record);
        }

        const lineNode = item.querySelector(".item-line");
        if (lineNode) {
          lineNode.title = buildItemTitle(record);
        }
      }

      function saveIdeaPaneRecord(input) {
        const record = findIdeaRecord(input.dataset.id || "");
        if (!record) {
          return;
        }

        const previousText = typeof input.dataset.originalValue === "string"
          ? input.dataset.originalValue
          : record.text;
        const nextText = String(input.value || "");
        const trimmedNext = nextText.trim();

        if (!trimmedNext) {
          record.text = previousText;
          restoreIdeaRecordOriginalUpdatedAt(record, input);
          input.value = previousText;
          delete input.dataset.draftUpdatedAt;
          persist();
          patchIdeaTextInList(record);
          setStatus("想法内容不能为空。");
          return;
        }

        const changed = trimmedNext !== String(previousText || "").trim();
        if (!changed) {
          const currentText = record.text;
          const currentUpdatedAt = normalizeDateTime(record.updatedAt);
          record.text = nextText;
          restoreIdeaRecordOriginalUpdatedAt(record, input);
          const restoredUpdatedAt = normalizeDateTime(record.updatedAt);
          input.dataset.originalValue = nextText;
          input.dataset.originalUpdatedAt = restoredUpdatedAt;
          delete input.dataset.draftUpdatedAt;
          if (currentText !== nextText || currentUpdatedAt !== restoredUpdatedAt) {
            persist();
            patchIdeaTextInList(record);
          }
          return;
        }

        record.text = nextText;
        const now = new Date().toISOString();
        record.updatedAt = now;
        pushHistory(record, "edited", now);
        input.dataset.originalValue = nextText;
        input.dataset.originalUpdatedAt = now;
        delete input.dataset.draftUpdatedAt;
        persist();
        render();
        setStatus("想法已更新。");
      }

      function addRecord() {
        const rawText = quickInput.value || "";
        const text = rawText.trim();
        const explicitEventAt = normalizeDateTime(quickEventAt.value);
        const manualType = quickType.value;
        const contextualType = manualType === "auto" && ["todo", "meeting", "deadline", "idea", "journal"].includes(state.filter) ? state.filter : "";
        const now = new Date().toISOString();

        if (!text) {
          setStatus("先写一点内容。");
          focusQuickInput();
          return;
        }

        const parsed = inferTypeAndText(text, explicitEventAt, manualType, contextualType);
        const record = {
          id: createId(),
          text: parsed.text,
          type: parsed.type,
          createdAt: now,
          eventAt: parsed.eventAt,
          recurrence: parsed.recurrence,
          ignoredConflictKeys: [],
          history: [],
          recurrenceCompletions: [],
          prepared: false,
          completed: false,
          updatedAt: now
        };
        const typeLock = normalizeRecordType(parsed.typeLock)
          || resolveNewRecordTypeLock(parsed.type, manualType, contextualType);
        if (typeLock) {
          record.typeLock = typeLock;
        }
        pushHistory(record, "created", now);

        state.records.unshift(record);
        state.editingId = null;
        persist();
        quickInput.value = "";
        quickEventAt.value = "";
        quickType.value = "auto";
        toggleComposerAdvanced(false);
        render();
        focusQuickInput();
        setStatus(CREATE_STATUS_MESSAGES[parsed.type] || "已保存。");
      }

      function toggleRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (record.type === "journal") {
          setStatus("日记不需要标记完成。");
          return;
        }

        if (isAutoCompletionPending(record)) {
          confirmAutoComplete(id);
          return;
        }

        const now = new Date().toISOString();
        let historyAction = "";

        if (isRecurringRecord(record) && !record.completed) {
          if (supportsPreparedState(record) && !record.prepared) {
            record.prepared = true;
            record.updatedAt = now;
            pushHistory(record, "prepared", now);
            persist();
            render();
            return;
          }

          if (completeAndAdvanceRecurringRecord(record, now)) {
            persist();
            render();
            setStatus("已完成本次，已显示下一次。");
            return;
          }
        }

        if (supportsPreparedState(record)) {
          if (!record.prepared && !record.completed) {
            record.prepared = true;
            historyAction = "prepared";
          } else if (record.prepared && !record.completed) {
            record.prepared = false;
            record.completed = true;
            clearAutoCompleteState(record);
            historyAction = "completed";
          } else {
            record.prepared = false;
            record.completed = false;
            clearAutoCompleteState(record);
            historyAction = "reopened";
          }
        } else {
          record.completed = !record.completed;
          clearAutoCompleteState(record);
          historyAction = record.completed ? "completed" : "reopened";
        }
        record.updatedAt = now;
        pushHistory(record, historyAction, now);
        persist();
        render();
      }

      async function deleteRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (isRecordDeleteLocked(record)) {
          setStatus(getRecordReadOnlyMessage(record));
          return;
        }

        const deleteMode = await chooseDeleteMode();
        if (!deleteMode) {
          return;
        }

        const deletedAt = new Date().toISOString();
        if (deleteMode === "archive" && !archiveDeletedRecord(record, deletedAt)) {
          setStatus("删除归档失败，记录未删除。");
          return;
        }
        if (deleteMode === "purge" && !archivePurgedRecord(record, deletedAt)) {
          setStatus("删除标记失败，记录未删除。");
          return;
        }

        const gTeacherDeleted = record.type === "journal" && isGTeacherRecord(record);
        if (gTeacherDeleted) {
          rememberGTeacherFeedback(record, "deleted", deletedAt);
        }
        state.records = state.records.filter(function (item) {
          return item.id !== id;
        });
        if (state.editingId === id) {
          state.editingId = null;
        }
        persist();
        render();
        if (gTeacherDeleted) {
          setStatus(deleteMode === "archive"
            ? "已删除；完整记录已保留在 JSON，并记为G老师最不喜欢。"
            : "已删除；仅保留删除标记，并记为G老师最不喜欢。");
          return;
        }
        setStatus(deleteMode === "archive" ? "已删除；完整记录已保留在 JSON。" : "已删除；仅保留无正文删除标记用于同步。");
      }

      function chooseDeleteMode() {
        if (!deleteDialog) {
          return Promise.resolve(window.confirm("从 JSON 里完全删除这条记录吗？") ? "purge" : "archive");
        }

        if (deleteDialogResolve) {
          closeDeleteDialog("");
        }

        deleteDialogPreviousFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
        deleteDialog.hidden = false;

        requestAnimationFrame(function () {
          if (deleteArchiveButton) {
            deleteArchiveButton.focus();
          }
        });

        return new Promise(function (resolve) {
          deleteDialogResolve = resolve;
        });
      }

      function handleDeleteDialogClick(event) {
        const target = event.target.closest("[data-delete-mode]");
        if (!target || !deleteDialog.contains(target)) {
          return;
        }

        const mode = target.dataset.deleteMode;
        closeDeleteDialog(mode === "archive" || mode === "purge" ? mode : "");
      }

      function handleDeleteDialogKeydown(event) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeDeleteDialog("");
        }
      }

      function closeDeleteDialog(mode) {
        const resolve = deleteDialogResolve;
        deleteDialogResolve = null;
        if (deleteDialog) {
          deleteDialog.hidden = true;
        }

        const previousFocus = deleteDialogPreviousFocus;
        deleteDialogPreviousFocus = null;
        if (previousFocus && document.contains(previousFocus)) {
          previousFocus.focus();
        }

        if (resolve) {
          resolve(mode);
        }
      }

      function confirmAutoComplete(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        const now = new Date().toISOString();
        if (completeAndAdvanceRecurringRecord(record, now)) {
          persist();
          render();
          setStatus("已确认本次，已显示下一次。");
          return;
        }

        record.prepared = false;
        record.completed = true;
        clearAutoCompleteState(record);
        record.updatedAt = now;
        pushHistory(record, "completed", now);
        persist();
        render();
        setStatus("已确认自动完成。");
      }

      function saveEditedRecord(id) {
        const item = recordList.querySelector('.item[data-id="' + cssEscape(id) + '"]');
        if (!item) {
          return;
        }

        const textField = item.querySelector('[data-role="edit-inline-text"]');

        if (!textField) {
          return;
        }

        const text = (textField.value || "").trim();
        if (!text) {
          state.editingId = null;
          render();
          setStatus("内容不能为空，已取消修改。");
          return;
        }

        const record = state.records.find(function (entry) {
          return entry.id === id;
        });
        if (!record) {
          return;
        }

        if (isRecordEditLocked(record)) {
          state.editingId = null;
          render();
          setStatus(getRecordEditLockedMessage(record));
          return;
        }

        if (text === String(record.text || "").trim()) {
          state.editingId = null;
          render();
          return;
        }

        const updated = inferUpdateFromText(text, record);
        const changed = record.text !== updated.text
          || record.type !== updated.type
          || record.eventAt !== updated.eventAt
          || !recurrencesEqual(record.recurrence, updated.recurrence)
          || getRecordTypeLock(record) !== normalizeRecordType(updated.typeLock);
        record.text = updated.text;
        record.type = updated.type;
        record.eventAt = updated.eventAt;
        record.recurrence = updated.recurrence;
        if (normalizeRecordType(updated.typeLock)) {
          record.typeLock = normalizeRecordType(updated.typeLock);
        } else {
          delete record.typeLock;
        }
        record.ignoredConflictKeys = [];
        clearAutoCompleteState(record);
        if (updated.type === "journal") {
          record.completed = false;
          record.prepared = false;
        }
        if (!supportsPreparedState(updated)) {
          record.prepared = false;
        }
        record.updatedAt = new Date().toISOString();
        if (changed) {
          pushHistory(record, "edited", record.updatedAt);
        }

        state.editingId = null;
        persist();
        render();
        setStatus("已更新。");
      }

      function exportRecords() {
        const exportRecords = state.remote.temporary
          ? state.records.filter(function (record) {
            return !isRecordHiddenByTemporaryPrivacy(record);
          })
          : state.records;
        const exportDeletedRecords = state.remote.temporary
          ? state.deletedRecords.filter(function (entry) {
            return !isRecordHiddenByTemporaryPrivacy(entry && entry.record);
          })
          : state.deletedRecords;
        const payload = buildRecordsPayload({ exportedAt: new Date().toISOString() }, exportRecords, exportDeletedRecords);

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const stamp = formatFileStamp(new Date());
        link.href = url;
        link.download = "minimal-records-" + stamp + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("已导出 JSON。");
      }

      function importRecords(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = function (loadEvent) {
          try {
            const raw = String(loadEvent.target.result || "");
            const payload = parseRecordsEnvelope(raw);
            const normalized = payload.records;
            const ok = window.confirm("导入会覆盖当前本地数据，是否继续？");
            if (!ok) {
              importFile.value = "";
              return;
            }

            state.records = normalized;
            state.deletedRecords = payload.deletedRecords;
            state.recurrenceCompletionArchive = payload.recurrenceCompletionArchive;
            state.journalStats = payload.journalStats;
            state.editingId = null;
            persist();
            render();
            setStatus("已导入 " + normalized.length + " 条记录。");
          } catch (error) {
            console.error(error);
            setStatus("导入失败，请检查 JSON 文件。");
          } finally {
            importFile.value = "";
          }
        };

        reader.readAsText(file, "utf-8");
      }

      async function createSyncFile() {
        if (!ensureFileSyncSupported()) {
          return;
        }

        try {
          if (state.sync.handle) {
            const permissionGranted = await requestSyncPermission("readwrite");
            if (!permissionGranted) {
              setStatus("云盘备份需要授权。");
              return;
            }

            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("云盘备份写入失败，已保存在当前浏览器。");
              return;
            }

            await storeSyncHandle(state.sync.handle);
            setStatus(state.remote.enabled ? "已覆盖当前云盘备份。" : "已覆盖当前同步文件。");
            return;
          }

          if (state.remote.enabled) {
            setStatus("为避免云盘生成编号副本，请用“连接备份”选择已有的 " + DEFAULT_SYNC_FILE_NAME + "。");
            return;
          }

          const handle = await window.showSaveFilePicker({
            id: SYNC_FILE_PICKER_ID,
            suggestedName: DEFAULT_SYNC_FILE_NAME,
            types: getJsonFilePickerTypes(),
            excludeAcceptAllOption: false
          });

          if (await rejectInvalidSyncHandle(handle)) {
            return;
          }

          await setSyncHandle(handle, false);
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus(state.remote.enabled ? "云盘备份需要授权。" : "同步文件需要授权。");
            return;
          }

          const ok = await writeCurrentRecordsToSyncFile();
          if (!ok) {
            setStatus(state.remote.enabled ? "云盘备份写入失败，已保存在当前浏览器。" : "同步文件写入失败，已保存在当前浏览器。");
            return;
          }

          await storeSyncHandle(handle);
          if (!state.remote.enabled) {
            startSyncPolling();
          }
          setStatus(state.remote.enabled ? "已新建云盘备份文件。" : "已新建并连接同步文件。");
        } catch (error) {
          if (error && error.name === "AbortError") {
            return;
          }

          console.error(error);
          state.sync.error = "新建同步文件失败";
          updateStorageStatus();
          setStatus("新建同步文件失败。");
        }
      }

      async function connectSyncFile() {
        if (!ensureFileSyncSupported()) {
          return;
        }

        try {
          if (state.sync.handle && state.sync.permissionNeeded) {
            await authorizeStoredSyncFile();
            return;
          }

          const handles = await window.showOpenFilePicker({
            id: SYNC_FILE_PICKER_ID,
            multiple: false,
            types: getJsonFilePickerTypes(),
            excludeAcceptAllOption: false
          });
          const handle = handles && handles[0];
          if (!handle) {
            return;
          }
          if (await rejectInvalidSyncHandle(handle, { preserveExistingHandle: true })) {
            return;
          }

          await setSyncHandle(handle, false);
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("同步文件需要授权。");
            return;
          }

          if (state.remote.enabled) {
            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("同步文件写入失败，已保存在当前浏览器。");
              return;
            }
            setStatus("已连接云盘备份并写入当前记录。");
          } else {
            const result = await loadRecordsFromSyncFile();
            if (result === "empty") {
              const ok = await writeCurrentRecordsToSyncFile();
              if (!ok) {
                setStatus("同步文件写入失败，已保存在当前浏览器。");
                return;
              }
              setStatus("同步文件为空，已写入当前记录。");
            } else if (result === "loaded") {
              setStatus("已读取同步文件。");
            }
          }
          await storeSyncHandle(handle);
          if (!state.remote.enabled) {
            startSyncPolling();
          }
        } catch (error) {
          if (error && error.name === "AbortError") {
            return;
          }

          console.error(error);
          state.sync.error = "连接同步文件失败";
          state.sync.handle = null;
          state.sync.fileName = "";
          state.sync.permissionNeeded = false;
          updateStorageStatus();
          setStatus("连接同步文件失败。");
        }
      }

      async function authorizeStoredSyncFile() {
        if (!state.sync.handle) {
          await connectSyncFile();
          return;
        }

        try {
          setStatus("请在浏览器提示里选择每次访问都允许。");
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("未获得同步文件授权。");
            return;
          }

          if (state.remote.enabled) {
            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("同步文件写入失败，已保存在当前浏览器。");
              return;
            }
            setStatus("云盘备份已授权并写入当前记录。");
          } else {
            const result = await loadRecordsFromSyncFile();
            if (result === "empty") {
              const ok = await writeCurrentRecordsToSyncFile();
              if (!ok) {
                setStatus("同步文件写入失败，已保存在当前浏览器。");
                return;
              }
              setStatus("同步文件为空，已写入当前记录。");
            } else if (result === "loaded") {
              setStatus("已读取同步文件。");
            } else {
              setStatus("同步文件已授权。");
            }
            startSyncPolling();
          }
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件授权失败";
          updateStorageStatus();
          setStatus("同步文件授权失败。");
        }
      }

      async function restoreStoredSyncFile(options) {
        const opts = Object.assign({
          readRecords: true
        }, options || {});

        if (!state.sync.supported) {
          updateStorageStatus();
          return;
        }

        try {
          const handle = await readStoredSyncHandle();
          if (!handle) {
            updateStorageStatus();
            return;
          }
          if (await rejectInvalidSyncHandle(handle, { clearStoredHandle: true })) {
            return;
          }

          await setSyncHandle(handle, false);
          const hasPermission = await querySyncPermission("readwrite");
          if (!hasPermission) {
            state.sync.permissionNeeded = true;
            updateStorageStatus();
            return;
          }

          if (!opts.readRecords) {
            try {
              const file = await state.sync.handle.getFile();
              state.sync.lastModified = file.lastModified || 0;
              state.sync.error = "";
            } catch (error) {
              console.error(error);
              state.sync.error = "云盘备份读取失败";
            }
            updateStorageStatus();
            return;
          }

          const result = await loadRecordsFromSyncFile();
          if (result === "empty") {
            await writeCurrentRecordsToSyncFile();
            setStatus("同步文件为空，已写入当前记录。");
          } else if (result === "loaded") {
            setStatus("已读取同步文件。");
          }
          startSyncPolling();
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件恢复失败";
          state.sync.handle = null;
          state.sync.fileName = "";
          state.sync.permissionNeeded = false;
          updateStorageStatus();
        }
      }

      function resetFileSyncState() {
        state.sync.handle = null;
        state.sync.fileName = "";
        state.sync.permissionNeeded = false;
        state.sync.lastModified = 0;
        state.sync.lastWriteAt = "";
        state.sync.writeInFlight = false;
        state.sync.writeQueued = false;
        state.sync.error = "";
        window.clearTimeout(syncWriteTimer);
        window.clearInterval(syncPollTimer);
        syncWriteTimer = null;
        syncPollTimer = null;
      }

      async function setSyncHandle(handle, shouldStore) {
        state.sync.handle = handle;
        state.sync.fileName = handle && handle.name ? handle.name : DEFAULT_SYNC_FILE_NAME;
        state.sync.permissionNeeded = false;
        state.sync.error = "";
        state.sync.lastModified = 0;

        if (shouldStore) {
          await storeSyncHandle(handle);
        }

        updateStorageStatus();
      }

      async function loadRecordsFromSyncFile() {
        if (!state.sync.handle) {
          return "missing";
        }

        const hasPermission = await querySyncPermission("read");
        if (!hasPermission) {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return "permission";
        }

        const file = await state.sync.handle.getFile();
        const raw = await file.text();
        if (hasActiveDirtyInlineEditDraft()) {
          return "editing";
        }
        state.sync.lastModified = file.lastModified || 0;
        const activeIdeaDraft = getActiveIdeaPaneDraft();

        if (!raw.trim()) {
          state.sync.error = "";
          updateStorageStatus();
          return "empty";
        }

        const payload = parseRecordsEnvelope(raw);
        const localPayload = getRecordsPayloadSnapshot();
        applyIdeaPaneDraftToRecords(localPayload.records, activeIdeaDraft);
        const mergedPayload = mergeRecordsPayloads(localPayload, payload);
        applyIdeaPaneDraftToRecords(mergedPayload.records, activeIdeaDraft);
        const fileNeedsMergedWrite = !recordsPayloadContentEqual(payload, mergedPayload)
          || hasDeprecatedAutoCompletionPayloadFields(raw);
        state.records = mergedPayload.records;
        state.deletedRecords = mergedPayload.deletedRecords;
        state.recurrenceCompletionArchive = mergedPayload.recurrenceCompletionArchive;
        state.journalStats = mergedPayload.journalStats;
        state.localPayloadAt = fileNeedsMergedWrite ? state.localPayloadAt : (payload.payloadAt || state.localPayloadAt);
        reconcileEditingStateAfterRecordsUpdate();
        state.sync.permissionNeeded = false;
        state.sync.error = "";
        saveLocalRecords(fileNeedsMergedWrite ? {} : {
          payloadSavedAt: payload.savedAt,
          payloadSyncedAt: payload.syncedAt
        });
        if (fileNeedsMergedWrite) {
          queueSyncFileWrite();
        }
        render();
        updateStorageStatus();
        return "loaded";
      }

      async function writeCurrentRecordsToSyncFile() {
        if (!state.sync.handle) {
          return false;
        }
        if (await rejectInvalidSyncHandle(state.sync.handle, { clearStoredHandle: true })) {
          return false;
        }

        const hasPermission = await querySyncPermission("readwrite");
        if (!hasPermission) {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }

        state.sync.writeInFlight = true;
        updateStorageStatus();

        try {
          const writable = await state.sync.handle.createWritable();
          await writable.write(JSON.stringify(buildRecordsPayload(), null, 2));
          await writable.close();

          const file = await state.sync.handle.getFile();
          state.sync.lastModified = file.lastModified || Date.now();
          state.sync.lastWriteAt = new Date().toISOString();
          state.sync.permissionNeeded = false;
          state.sync.error = "";
          updateStorageStatus();
          return true;
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件写入失败";
          updateStorageStatus();
          return false;
        } finally {
          state.sync.writeInFlight = false;
          updateStorageStatus();
        }
      }

      function queueSyncFileWrite() {
        if (!state.sync.handle) {
          return;
        }

        state.sync.writeQueued = true;
        window.clearTimeout(syncWriteTimer);
        syncWriteTimer = window.setTimeout(function () {
          syncWriteTimer = null;
          writeQueuedSyncFile();
        }, 500);
        updateStorageStatus();
      }

      async function writeQueuedSyncFile() {
        if (!state.sync.handle || state.sync.writeInFlight) {
          return;
        }
        if (hasActiveDirtyIdeaPaneDraft()) {
          state.sync.writeQueued = true;
          window.clearTimeout(syncWriteTimer);
          syncWriteTimer = window.setTimeout(function () {
            syncWriteTimer = null;
            writeQueuedSyncFile();
          }, 1000);
          updateStorageStatus();
          return;
        }

        while (state.sync.writeQueued) {
          if (hasActiveDirtyIdeaPaneDraft()) {
            window.clearTimeout(syncWriteTimer);
            syncWriteTimer = window.setTimeout(function () {
              syncWriteTimer = null;
              writeQueuedSyncFile();
            }, 1000);
            updateStorageStatus();
            return;
          }
          state.sync.writeQueued = false;
          const ok = await writeCurrentRecordsToSyncFile();
          if (!ok) {
            if (!state.sync.handle) {
              return;
            }
            setStatus("同步文件写入失败，已保存在当前浏览器。");
            return;
          }
        }
      }

      function startSyncPolling() {
        window.clearInterval(syncPollTimer);
        if (!state.sync.handle) {
          return;
        }

        syncPollTimer = window.setInterval(checkForSyncFileChanges, SYNC_POLL_INTERVAL);
      }

      async function checkForSyncFileChanges() {
        if (!state.sync.handle || state.sync.writeInFlight || state.sync.writeQueued) {
          return;
        }
        if (hasActiveDirtyIdeaPaneDraft() || hasActiveDirtyInlineEditDraft()) {
          return;
        }

        try {
          const hasPermission = await querySyncPermission("read");
          if (!hasPermission) {
            state.sync.permissionNeeded = true;
            updateStorageStatus();
            return;
          }

          const file = await state.sync.handle.getFile();
          const latestModified = file.lastModified || 0;
          if (!latestModified) {
            return;
          }

          if (!state.sync.lastModified) {
            state.sync.lastModified = latestModified;
            updateStorageStatus();
            return;
          }

          if (latestModified !== state.sync.lastModified) {
            const result = await loadRecordsFromSyncFile();
            if (result === "loaded") {
              setStatus("已从同步文件更新。");
            }
          }
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件读取失败";
          updateStorageStatus();
        }
      }

      function ensureFileSyncSupported() {
        if (state.sync.supported) {
          return true;
        }

        setStatus("当前浏览器不支持同步文件，请用 Chrome 或 Edge 打开。");
        return false;
      }

      function getJsonFilePickerTypes() {
        return [{
          description: "Minimal Notes JSON",
          accept: {
            "application/json": [".json"]
          }
        }];
      }

      function getSyncHandleFileName(handle) {
        return handle && typeof handle.name === "string" ? handle.name : "";
      }

      function isCanonicalSyncFileHandle(handle) {
        return getSyncHandleFileName(handle).toLowerCase() === DEFAULT_SYNC_FILE_NAME.toLowerCase();
      }

      function getInvalidSyncFileMessage(fileName) {
        const name = fileName || "未命名文件";
        if (GENERATED_SYNC_COPY_FILE_NAME_PATTERN.test(name)) {
          return "已拒绝编号副本：" + name + "。请先把云盘里唯一的备份整理为 " + DEFAULT_SYNC_FILE_NAME + "，再用“连接备份”选择它。";
        }

        return "备份文件名必须是 " + DEFAULT_SYNC_FILE_NAME + "，当前选择的是：" + name + "。";
      }

      async function rejectInvalidSyncHandle(handle, options) {
        if (isCanonicalSyncFileHandle(handle)) {
          return false;
        }

        const opts = options || {};
        const fileName = getSyncHandleFileName(handle);
        if (!opts.preserveExistingHandle) {
          resetFileSyncState();
        }
        if (opts.clearStoredHandle) {
          await deleteStoredSyncFileHandle();
        }
        updateStorageStatus();
        setStatus(getInvalidSyncFileMessage(fileName));
        return true;
      }

      async function querySyncPermission(mode) {
        if (!state.sync.handle || typeof state.sync.handle.queryPermission !== "function") {
          return true;
        }

        try {
          return await state.sync.handle.queryPermission({ mode: mode }) === "granted";
        } catch (error) {
          console.error(error);
          return false;
        }
      }

      async function requestSyncPermission(mode) {
        if (!state.sync.handle) {
          return false;
        }

        if (await querySyncPermission(mode)) {
          state.sync.permissionNeeded = false;
          updateStorageStatus();
          return true;
        }

        if (typeof state.sync.handle.requestPermission !== "function") {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }

        try {
          const status = await state.sync.handle.requestPermission({ mode: mode });
          const granted = status === "granted";
          state.sync.permissionNeeded = !granted;
          updateStorageStatus();
          return granted;
        } catch (error) {
          console.error(error);
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }
      }

      async function openSyncDb() {
        return new Promise(function (resolve, reject) {
          const request = window.indexedDB.open(SYNC_DB_NAME, 1);

          request.onupgradeneeded = function () {
            const db = request.result;
            if (!db.objectStoreNames.contains(SYNC_DB_STORE)) {
              db.createObjectStore(SYNC_DB_STORE);
            }
          };

          request.onsuccess = function () {
            resolve(request.result);
          };

          request.onerror = function () {
            reject(request.error);
          };
        });
      }

      async function storeSyncHandle(handle) {
        const db = await openSyncDb();
        return new Promise(function (resolve, reject) {
          const transaction = db.transaction(SYNC_DB_STORE, "readwrite");
          transaction.objectStore(SYNC_DB_STORE).put(handle, SYNC_FILE_HANDLE_KEY);

          transaction.oncomplete = function () {
            db.close();
            resolve();
          };

          transaction.onerror = function () {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function readStoredSyncHandle() {
        const db = await openSyncDb();
        return new Promise(function (resolve, reject) {
          const transaction = db.transaction(SYNC_DB_STORE, "readonly");
          const request = transaction.objectStore(SYNC_DB_STORE).get(SYNC_FILE_HANDLE_KEY);
          let handle = null;

          request.onsuccess = function () {
            handle = request.result || null;
          };

          transaction.oncomplete = function () {
            db.close();
            resolve(handle);
          };

          transaction.onerror = function () {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function deleteStoredSyncFileHandle() {
        if (!window.indexedDB) {
          return;
        }

        await new Promise(function (resolve) {
          const request = window.indexedDB.deleteDatabase(SYNC_DB_NAME);
          request.onsuccess = resolve;
          request.onerror = resolve;
          request.onblocked = resolve;
        });
      }

      function toggleRemoteSyncPanel(forceOpen) {
        state.remote.panelOpen = typeof forceOpen === "boolean" ? forceOpen : !state.remote.panelOpen;
        remoteSyncPanel.hidden = !state.remote.panelOpen;
        populateRemoteSyncPanel();

      function populateRemoteSyncPanel() {
        remoteRepoInput.value = state.remote.repo || DEFAULT_REMOTE_REPO;
        remoteBranchInput.value = state.remote.branch || DEFAULT_REMOTE_BRANCH;
        remotePathInput.value = state.remote.path || DEFAULT_REMOTE_PATH;
        remoteTokenInput.value = "";
        remoteTokenInput.placeholder = state.remote.token
          ? (state.remote.temporary ? "临时 token 已启用，留空不变" : "token 已保存，留空不变")
          : "GitHub token";
      }

      function loadRemoteSyncSettings() {
        try {
          const raw = localStorage.getItem(REMOTE_SYNC_STORAGE_KEY);
          if (!raw) {
            return;
          }

          const saved = JSON.parse(raw);
          const repo = normalizeRemoteRepo(saved.repo || "");
          const branch = normalizeRemoteBranch(saved.branch || "");
          let path = normalizeRemotePath(saved.path || "");
          if (path === LEGACY_REMOTE_PATH) {
            path = DEFAULT_REMOTE_PATH;
          }
          const token = typeof saved.token === "string" ? saved.token.trim() : "";
          if (!repo || !path || !token) {
            return;
          }
          if (isProtectedRemoteWritePath(path)) {
            console.warn("Stored GitHub sync path points to a protected private file and was ignored.");
            return;
          }

          state.remote.enabled = true;
          state.remote.repo = repo;
          state.remote.branch = branch || DEFAULT_REMOTE_BRANCH;
          state.remote.path = path;
          state.remote.format = saved.format === "v3" ? "v3" : "v4";
          state.remote.token = token;
          state.remote.sha = typeof saved.sha === "string" ? saved.sha : "";
          state.remote.etag = typeof saved.etag === "string" ? saved.etag : "";
          state.remote.manifestSha = typeof saved.manifestSha === "string" ? saved.manifestSha : "";
          state.remote.manifestEtag = typeof saved.manifestEtag === "string" ? saved.manifestEtag : "";
          state.remote.hotSha = typeof saved.hotSha === "string" ? saved.hotSha : "";
          state.remote.hotEtag = typeof saved.hotEtag === "string" ? saved.hotEtag : "";
          state.remote.lastSyncAt = typeof saved.lastSyncAt === "string" ? saved.lastSyncAt : "";
          state.remote.lastPayloadAt = typeof saved.lastPayloadAt === "string" ? saved.lastPayloadAt : "";
          // A stale SHA only describes the response immediately preceding a
          // successful write in this page session. Persisting it can make a
          // later, legitimate cross-device update look stale forever.
          state.remote.staleSha = "";
          state.remote.pushLocalNext = Boolean(saved.pushLocalNext);
          state.remote.temporary = false;
          state.remote.temporaryStartedAt = "";
        } catch (error) {
          console.error(error);
        }
      }

      function saveRemoteSyncSettingsToLocal() {
        if (!state.remote.enabled || state.remote.temporary) {
          localStorage.removeItem(REMOTE_SYNC_STORAGE_KEY);
          return;
        }

        localStorage.setItem(REMOTE_SYNC_STORAGE_KEY, JSON.stringify({
          repo: state.remote.repo,
          branch: state.remote.branch,
          path: state.remote.path,
          format: state.remote.format,
          token: state.remote.token,
          sha: state.remote.sha,
          etag: state.remote.etag,
          manifestSha: state.remote.manifestSha,
          manifestEtag: state.remote.manifestEtag,
          hotSha: state.remote.hotSha,
          hotEtag: state.remote.hotEtag,
          lastSyncAt: state.remote.lastSyncAt,
          lastPayloadAt: state.remote.lastPayloadAt,
          pushLocalNext: Boolean(state.remote.pushLocalNext)
        }));
      }

      async function saveRemoteSyncSettings() {
        await applyRemoteSyncSettings({ temporary: false });
      }

      async function startTemporaryRemoteSync() {
        await applyRemoteSyncSettings({ temporary: true });
      }

      async function applyRemoteSyncSettings(options) {
        const opts = options || {};
        const repo = normalizeRemoteRepo(remoteRepoInput.value);
        const branch = normalizeRemoteBranch(remoteBranchInput.value);
        const path = normalizeRemotePath(remotePathInput.value);
        const inputToken = (remoteTokenInput.value || "").trim();
        const fallbackToken = state.remote.temporary
          ? (opts.temporary ? state.remote.token : "")
          : state.remote.token;
        const token = inputToken || fallbackToken;

        if (!repo || !path || !token) {
          setStatus("请填写 GitHub 仓库、路径和 token。");
          return;
        }
        if (isProtectedRemoteWritePath(path)) {
          setStatus("私有词表不能作为主数据同步文件。");
          return;
        }

        state.remote.enabled = true;
        state.remote.repo = repo;
        state.remote.branch = branch || DEFAULT_REMOTE_BRANCH;
        state.remote.path = path;
        state.remote.format = path.endsWith("/manifest.json") ? "v4" : "v3";
        state.remote.token = token;
        state.remote.sha = "";
        state.remote.etag = "";
        state.remote.manifestSha = "";
        state.remote.manifestEtag = "";
        state.remote.hotSha = "";
        state.remote.hotEtag = "";
        state.remote.manifest = null;
        state.remote.hot = null;
        state.remote.manifestSha = "";
        state.remote.manifestEtag = "";
        state.remote.hotSha = "";
        state.remote.hotEtag = "";
        state.remote.manifest = null;
        state.remote.hot = null;
        state.remote.lastSyncAt = "";
        state.remote.lastPayloadAt = "";
        state.remote.staleSha = "";
        state.remote.pushLocalNext = false;
        state.remote.checkedThisSession = false;
        state.remote.error = "";
        state.remote.temporary = Boolean(opts.temporary);
        state.remote.temporaryStartedAt = state.remote.temporary
          ? (state.remote.temporaryStartedAt || new Date().toISOString())
          : "";
        state.sessionOnly = Boolean(opts.temporary);
        state.remote.panelOpen = false;
        remoteSyncPanel.hidden = true;
        if (state.sessionOnly) {
          localStorage.removeItem(STORAGE_KEY);
        }
        saveRemoteSyncSettingsToLocal();
        populateRemoteSyncPanel();
        updateStorageStatus();
        await startRemoteSync(true);
        await loadHealthSummary();
        setStatus(state.remote.temporary ? "已开启临时同步，过往日记已隐藏。" : "已保存 GitHub 同步。");
      }

      function clearRemoteSyncSettings() {

      async function startRemoteSync(runNow) {
        window.clearTimeout(remotePollTimer);
        remotePollTimer = null;
        if (!state.remote.enabled) {
          return;
        }

        if (runNow) {
          await syncRemoteRecords({ createIfMissing: true });
        }

        scheduleRemoteSyncPoll();
      }

      function getRemoteSyncPollInterval() {
        return document.visibilityState === "hidden"
          ? REMOTE_SYNC_HIDDEN_INTERVAL
          : REMOTE_SYNC_VISIBLE_INTERVAL;
      }

      function scheduleRemoteSyncPoll() {
        window.clearTimeout(remotePollTimer);
        remotePollTimer = null;
        if (!state.remote.enabled) {
          return;
        }

        remotePollTimer = window.setTimeout(async function () {
          remotePollTimer = null;
          try {
            await syncRemoteRecords({
              silent: true,
              conditional: true,
              refreshHealthSummary: false,
              refreshJournalPrivateHighlights: false
            });
          } finally {
            scheduleRemoteSyncPoll();
          }
        }, getRemoteSyncPollInterval());
      }

      function handleRemoteSyncFocus() {
        if (!state.remote.enabled || document.visibilityState === "hidden") {
          return;
        }
        if (state.remote.writeQueued) {
          flushPendingRemoteWrite();
          return;
        }

        syncRemoteRecords({ silent: true, conditional: true }).finally(function () {
          scheduleRemoteSyncPoll();
        });
      }

      function handleRemoteSyncVisibilityChange() {
        scheduleRemoteSyncPoll();
        if (document.visibilityState === "hidden") {
          flushPendingRemoteWrite();
          return;
        }
        handleRemoteSyncFocus();
      }

      function flushPendingRemoteWrite() {
        if (!state.remote.enabled
          || !state.remote.writeQueued
          || state.remote.writeInFlight
          || state.remote.readInFlight) {
          return;
        }

        window.clearTimeout(remoteWriteTimer);
        remoteWriteTimer = null;
        writeQueuedRemote().finally(function () {
          scheduleRemoteSyncPoll();
        });
      }

      async function syncRemoteRecords(options) {
        const opts = options || {};
        if (!state.remote.enabled) {
          toggleRemoteSyncPanel(true);
          setStatus("请先设置 GitHub 同步。");
          return;
        }

        if (state.remote.readInFlight || state.remote.writeInFlight || state.remote.writeQueued) {
          if (!opts.silent) {
            setStatus("GitHub 同步正在进行。");
          }
          return;
        }
        if (hasActiveDirtyIdeaPaneDraft() || hasActiveDirtyInlineEditDraft()) {
          updateStorageStatus();
          if (!opts.silent) {
            setStatus("正在编辑，离开输入框后再同步。");
          }
          return;
        }

        try {
          state.remote.readInFlight = true;
          state.remote.readProgressVisible = !opts.silent;
          updateStorageStatus();

          if (state.remote.pushLocalNext) {
            const ok = await writeCurrentRecordsToRemote();
            if (ok && !opts.silent) {
              setStatus("已将本地恢复结果写回 GitHub。");
            } else if (!ok && !opts.silent) {
              setStatus(state.remote.error + "。");
            }
            return;
          }

          const revisionBeforeFetch = state.recordsRevision;
          const recordsBeforeFetch = getRecordsSnapshot();
          const result = await fetchRemoteRecords({ conditional: opts.conditional !== false });
          if (hasActiveDirtyInlineEditDraft()) {
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("编辑尚未保存，已延后应用 GitHub 更新。");
            }
            return;
          }
          if (revisionBeforeFetch !== state.recordsRevision
            || recordsBeforeFetch !== getRecordsSnapshot()
            || state.remote.pushLocalNext
            || state.remote.writeInFlight
            || state.remote.writeQueued) {
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("本地有新改动，已跳过 GitHub 旧数据。");
            }
            return;
          }

          if (result.notModified) {
            state.remote.lastSyncAt = new Date().toISOString();
            state.remote.checkedThisSession = true;
            state.remote.error = "";
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 已是最新。");
            }
            return;
          }

          if (result.missing) {
            if (opts.createIfMissing
              || state.records.length
              || state.deletedRecords.length
              || state.recurrenceCompletionArchive.length
              || hasJournalStats(state.journalStats)) {
              const ok = await writeCurrentRecordsToRemote();
              if (ok && !opts.silent) {
                setStatus("已创建 GitHub 数据文件。");
              } else if (!ok && !opts.silent) {
                setStatus(state.remote.error + "。");
              }
              return;
            }

            if (!opts.silent) {
              setStatus("GitHub 数据文件不存在。");
            }
            return;
          }

          state.remote.etag = result.etag || state.remote.etag;
          state.remote.format = result.format || state.remote.format;
          state.remote.manifestSha = result.manifestSha || state.remote.manifestSha;
          state.remote.manifestEtag = result.manifestEtag || state.remote.manifestEtag;
          state.remote.hotSha = result.hotSha || state.remote.hotSha;
          state.remote.hotEtag = result.hotEtag || state.remote.hotEtag;

          if (isStaleRemoteResult(result)) {
            // Skip a known pre-write response once. If GitHub returns it
            // again, the normal merge path below repairs it without trusting
            // cross-device payload timestamps.
            state.remote.staleSha = "";
            state.remote.error = "";
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 刚返回了写入前的数据，已跳过一次并会重试。");
            }
            return;
          }

          const recordsChanged = !recordsEqual(state.records, result.records);
          const deletedRecordsChanged = !deletedRecordsEqual(state.deletedRecords, result.deletedRecords);
          const archiveChanged = !recurrenceCompletionArchivesEqual(
            state.recurrenceCompletionArchive,
            result.recurrenceCompletionArchive
          );
          const journalStatsChanged = !journalStatsEqual(state.journalStats, result.journalStats);
          if (!recordsChanged && !deletedRecordsChanged && !archiveChanged && !journalStatsChanged) {
            state.remote.sha = result.sha;
            state.remote.lastSyncAt = new Date().toISOString();
            state.remote.lastPayloadAt = result.payloadAt || state.remote.lastPayloadAt;
            state.remote.staleSha = "";
            state.remote.checkedThisSession = true;
            state.remote.error = "";
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 已是最新。");
            }
            return;
          }

          if ((recordsChanged || deletedRecordsChanged || archiveChanged || journalStatsChanged)
            && !state.remote.lastSyncAt
            && state.records.length
            && result.records.length
            && !window.confirm("GitHub 数据会与当前本地内容合并，是否继续？")) {
            state.remote.etag = "";
            state.remote.manifestEtag = "";
            state.remote.hotEtag = "";
            setStatus("已取消 GitHub 同步。");
            return;
          }

          const activeIdeaDraft = getActiveIdeaPaneDraft();
          const localPayload = getRecordsPayloadSnapshot();
          applyIdeaPaneDraftToRecords(localPayload.records, activeIdeaDraft);
          const mergedPayload = mergeRecordsPayloads(localPayload, result);
          applyIdeaPaneDraftToRecords(mergedPayload.records, activeIdeaDraft);
          const localNeedsMerge = !recordsPayloadContentEqual(localPayload, mergedPayload);
          const remoteNeedsMerge = !recordsPayloadContentEqual(result, mergedPayload)
            || Boolean(result.needsSanitizedWrite);

          state.remote.sha = result.sha;
          state.remote.lastSyncAt = new Date().toISOString();
          state.remote.lastPayloadAt = remoteNeedsMerge
            ? new Date().toISOString()
            : (result.payloadAt || state.remote.lastPayloadAt);
          state.remote.staleSha = "";
          state.remote.checkedThisSession = !remoteNeedsMerge;
          state.remote.error = "";

          if (localNeedsMerge) {
            state.records = mergedPayload.records;
            state.deletedRecords = mergedPayload.deletedRecords;
            state.recurrenceCompletionArchive = mergedPayload.recurrenceCompletionArchive;
            state.journalStats = mergedPayload.journalStats;
            reconcileEditingStateAfterRecordsUpdate();
            saveLocalRecords(remoteNeedsMerge ? {} : {
              payloadSavedAt: result.savedAt,
              payloadSyncedAt: result.syncedAt
            });
            queueSyncFileWrite();
          }

          saveRemoteSyncSettingsToLocal();
          if (localNeedsMerge) {
            render();
          }
          updateStorageStatus();

          if (remoteNeedsMerge) {
            state.remote.pushLocalNext = true;
            saveRemoteSyncSettingsToLocal();
            queueRemoteWrite();
            if (!opts.silent) {
              setStatus("已合并 GitHub 和本地记录，并准备写回 GitHub。");
            }
            return;
          }

          if (!opts.silent) {
            setStatus("已从 GitHub 同步。");
          }
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 同步失败", error);
          updateStorageStatus();
          if (!opts.silent) {
            setStatus(state.remote.error + "。");
          }
        } finally {
          state.remote.readInFlight = false;
          state.remote.readProgressVisible = false;
          updateStorageStatus();
          if (opts.refreshHealthSummary !== false && state.remote.enabled) {
            await loadHealthSummary();
          }
          if (opts.refreshJournalPrivateHighlights !== false) {
            await loadJournalPrivateHighlights();
          }
        }
      }

      async function fetchRemoteRecords(options) {
        const opts = options || {};
        if (state.remote.path.endsWith("/manifest.json")) {
          return fetchRemoteV4Records(opts);
        }
        return fetchRemoteLegacyRecords(state.remote.path, opts);
      }

      async function fetchRemoteJsonFile(pathValue, options) {
        const opts = options || {};
        const headers = getRemoteHeaders(false);
        if (opts.conditional !== false && state.remote.checkedThisSession && opts.etag) {
          headers["If-None-Match"] = opts.etag;
        }
        const response = await fetch(getRemotePathContentsUrl(pathValue, true, opts.ref), {
          headers: headers,
          cache: "no-store"
        });
        if (response.status === 304) {
          return { notModified: true, missing: false, sha: opts.sha || "", etag: opts.etag || "" };
        }
        if (response.status === 404) {
          return { notModified: false, missing: true, sha: "", etag: "" };
        }
        if (!response.ok) {
          throw await createRemoteHttpError(response, "GitHub 读取失败");
        }
        const data = await response.json();
        const text = decodeBase64Utf8(String(data.content || ""));
        return {
          notModified: false,
          missing: false,
          value: JSON.parse(text),
          text: text,
          sha: typeof data.sha === "string" ? data.sha : "",
          etag: response.headers.get("ETag") || ""
        };
      }

      async function fetchRemoteV4Records(options) {
        const opts = options || {};
        let manifestResult = await fetchRemoteJsonFile(state.remote.path, {
          conditional: opts.conditional,
          etag: state.remote.manifestEtag,
          sha: state.remote.manifestSha
        });
        if (manifestResult.missing) {
          state.remote.format = "v3";
          return fetchRemoteLegacyRecords(LEGACY_REMOTE_PATH, opts);
        }
        if (manifestResult.notModified && !state.remote.manifest) {
          manifestResult = await fetchRemoteJsonFile(state.remote.path, { conditional: false });
        }
        const manifest = manifestResult.notModified ? state.remote.manifest : manifestResult.value;
        if (!manifest || manifest.version !== 4 || !manifest.hot || !manifest.hot.path) {
          throw new Error("GitHub v4 manifest 格式不正确");
        }
        let hotResult = await fetchRemoteJsonFile(manifest.hot.path, {
          conditional: opts.conditional,
          etag: state.remote.hotEtag,
          sha: state.remote.hotSha
        });
        if (hotResult.notModified && !state.remote.hot) {
          hotResult = await fetchRemoteJsonFile(manifest.hot.path, { conditional: false });
        }
        if (hotResult.missing) {
          throw new Error("GitHub v4 hot.json 不存在");
        }
        const hot = hotResult.notModified ? state.remote.hot : hotResult.value;
        if (!hot || hot.version !== 4 || hot.generation !== manifest.generation) {
          throw new Error("GitHub v4 manifest 与 hot.json 不一致");
        }
        state.remote.format = "v4";
        state.remote.manifest = manifest;
        state.remote.hot = hot;
        state.remote.manifestSha = manifestResult.sha || state.remote.manifestSha;
        state.remote.manifestEtag = manifestResult.etag || state.remote.manifestEtag;
        state.remote.hotSha = hotResult.sha || state.remote.hotSha;
        state.remote.hotEtag = hotResult.etag || state.remote.hotEtag;
        state.remote.sha = state.remote.hotSha;
        state.remote.etag = state.remote.hotEtag;
        if (manifestResult.notModified && hotResult.notModified) {
          return { notModified: true, missing: false, sha: state.remote.hotSha, format: "v4" };
        }
        const payload = RECORDS_STORE.payloadFromV4Hot(hot);
        return Object.assign({}, payload, {
          missing: false,
          sha: state.remote.hotSha,
          etag: state.remote.hotEtag,
          manifestSha: state.remote.manifestSha,
          manifestEtag: state.remote.manifestEtag,
          hotSha: state.remote.hotSha,
          hotEtag: state.remote.hotEtag,
          format: "v4",
          needsSanitizedWrite: false,
          payloadAt: getPayloadTimestamp(payload)
        });
      }

      async function fetchRemoteLegacyRecords(pathValue, options) {
        const opts = options || {};
        const headers = getRemoteHeaders(false);
        if (opts.conditional !== false && state.remote.checkedThisSession && state.remote.etag) {
          headers["If-None-Match"] = state.remote.etag;
        }
        const response = await fetch(getRemotePathContentsUrl(pathValue, true), {
          headers: headers,
          cache: "no-store"
        });

        if (response.status === 304) {
          return {
            notModified: true,
            missing: false,
            sha: state.remote.sha,
            format: "v3"
          };
        }

        if (response.status === 404) {
          state.remote.etag = "";
          return {
            missing: true,
            records: [],
            deletedRecords: [],
            recurrenceCompletionArchive: [],
            journalStats: {},
            sha: "",
            needsSanitizedWrite: false,
            format: "v3"
          };
        }

        if (!response.ok) {
          throw await createRemoteHttpError(response, "GitHub 读取失败");
        }

        const data = await response.json();
        const text = decodeBase64Utf8(String(data.content || ""));
        const payload = parseRecordsEnvelope(text);
        return {
          missing: false,
          records: payload.records,
          deletedRecords: payload.deletedRecords,
          recurrenceCompletionArchive: payload.recurrenceCompletionArchive,
          journalStats: payload.journalStats,
          sha: typeof data.sha === "string" ? data.sha : "",
          savedAt: payload.savedAt,
          syncedAt: payload.syncedAt,
          payloadAt: payload.payloadAt,
          etag: response.headers.get("ETag") || "",
          needsSanitizedWrite: hasDeprecatedAutoCompletionPayloadFields(text),
          format: "v3"
        };
      }

      async function loadJournalPrivateHighlights() {

          if (signature === state.journalPrivateHighlights.signature) {
            state.journalPrivateHighlights.error = "";

          state.journalPrivateHighlights = Object.assign({}, normalized, {

          });
