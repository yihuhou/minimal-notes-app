<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Notes</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='6' width='48' height='52' rx='10' fill='%23ffffff' stroke='%23151515' stroke-width='4'/%3E%3Cpath d='M19 22l7 7-7 7' fill='none' stroke='%23151515' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M31 40h14' stroke='%23777777' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M31 24h14M31 32h10' stroke='%23c7c7c2' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f6f4;
      --bg-deep: #f1f1ee;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --panel-soft: #fafaf8;
      --border: rgba(17, 17, 17, 0.08);
      --border-strong: rgba(17, 17, 17, 0.14);
      --text: #171717;
      --text-soft: #696969;
      --text-faint: #9a9a95;
      --accent: #151515;
      --accent-soft: #f1f1ed;
      --shadow: 0 8px 24px rgba(17, 17, 17, 0.04);
      --shadow-soft: 0 4px 12px rgba(17, 17, 17, 0.03);
      --radius-lg: 18px;
      --focus: #171717;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Aptos", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
    }

    [hidden] {
      display: none !important;
    }

    .title-block h1,
    .counter,
    .composer textarea,
    .search input,
    .item-text,
    .item-meta,
    .badge,
    .segmented button,
    .ghost,
    .primary,
    .icon-btn,
    .item-edit textarea,
    .item-edit input,
    .item-edit select {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .app {
      max-width: 1540px;
      margin: 0 auto;
      padding: 18px 18px 36px;
    }

    .workspace {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
      flex: 1 1 980px;
      max-width: 980px;
    }

    .idea-pane {
      min-width: 0;
      flex: 0 0 min(460px, 36vw);
      width: min(460px, 36vw);
      display: none;
    }

    .workspace.has-ideas .idea-pane {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .idea-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      padding: 14px 14px 12px;
    }

    .idea-card-head,
    .idea-card-meta,
    .idea-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .idea-card-head {
      margin-bottom: 10px;
    }

    .idea-card-label,
    .idea-card-hint,
    .idea-card-empty,
    .idea-card textarea {
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
    }

    .idea-card-label {
      font-size: 12px;
      color: var(--text-soft);
    }

    .idea-card-hint,
    .idea-card-foot {
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.6;
    }

    .idea-card-foot {
      justify-content: flex-end;
    }

    .idea-card-meta {
      margin-bottom: 10px;
    }

    .idea-card textarea {
      width: 100%;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      outline: none;
      resize: none;
      overflow-y: hidden;
      font-size: 14px;
      line-height: 1.78;
      color: var(--text);
      display: block;
    }

    .idea-card-editor {
      min-height: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfbfa;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .idea-card-editor:focus-within {
      background: #ffffff;
      border-color: var(--border-strong);
    }

    .idea-card-empty {
      padding: 18px 0 6px;
      color: var(--text-faint);
      font-size: 13px;
      line-height: 1.7;
    }

    .idea-card-note {
      margin: 0;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 22px 24px 14px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      display: none;
    }

    .title-block h1 {
      margin: 0;
      max-width: none;
      font-family: "Cascadia Mono", "SFMono-Regular", "Menlo", "Consolas", "Microsoft YaHei UI", monospace;
      font-size: 32px;
      line-height: 1.12;
      font-weight: 650;
      letter-spacing: 0;
    }

    .title-block p {
      max-width: 36rem;
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
    }

    .counter {
      min-width: 150px;
      align-self: start;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      box-shadow: none;
      text-align: right;
      color: var(--text);
    }

    .counter strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
    }

    .counter span {
      display: block;
      margin-top: 4px;
      color: var(--text-soft);
      font-size: 11px;
      letter-spacing: 0;
      text-transform: none;
    }

    .composer {
      padding: 12px 24px 10px;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }

    .composer-card {
      padding: 14px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: none;
    }

    .composer textarea,
    .search input,
    .item-inline-input,
    .item-edit textarea,
    .item-edit input,
    .item-edit select,
    .composer select,
    .composer input[type="datetime-local"],
    .manual-datetime-input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      background: #fafaf8;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition:
        border-color 0.15s ease,
        background-color 0.15s ease;
    }

    .composer textarea,
    .item-edit textarea {
      min-height: 72px;
      resize: vertical;
      line-height: 1.58;
    }

    .composer textarea {
      min-height: 88px;
      background: #fbfbfa;
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 14px;
    }

    .composer textarea::placeholder,
    .search input::placeholder,
    .item-inline-input::placeholder,
    .item-edit textarea::placeholder,
    .item-edit input::placeholder {
      color: #a1a19c;
    }

    .composer textarea:focus,
    .search input:focus,
    .item-inline-input:focus,
    .item-edit textarea:focus,
    .item-edit input:focus,
    .item-edit select:focus,
    .composer select:focus,
    .composer input[type="datetime-local"]:focus,
    .manual-datetime-input:focus {
      border-color: var(--border-strong);
      background: #fff;
      box-shadow: none;
    }

    .composer-bar,
    .composer-actions,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .composer-bar,
    .toolbar {
      margin-top: 10px;
    }

    .composer-bar {
      justify-content: space-between;
      gap: 10px;
    }

    .composer-actions {
      flex: 0 0 auto;
      gap: 6px;
      margin-left: auto;
      justify-content: flex-end;
    }

    .sync-action {
      min-width: 82px;
      font-size: 12px;
      white-space: nowrap;
    }

    .sync-action.attention {
      color: var(--text);
      background: var(--accent-soft);
      border-color: var(--border-strong);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px 8px;
      gap: 12px;
    }

    .toolbar-main,
    .toolbar-side {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .toolbar-side {
      justify-content: flex-end;
    }

    .search {
      min-width: 220px;
      flex: 1 1 240px;
    }

    .search input {
      background: #fafaf8;
      font-size: 13px;
    }

    select {
      appearance: none;
      padding-right: 44px;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(90, 90, 90, 0.9) 50%),
        linear-gradient(135deg, rgba(90, 90, 90, 0.9) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 3px),
        calc(100% - 14px) calc(50% - 3px);
      background-size: 6px 6px;
      background-repeat: no-repeat;
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      opacity: 0.55;
    }

    input[type="datetime-local"] {
      width: 100%;
      min-width: 0;
      min-inline-size: 0;
      max-width: 100%;
      max-inline-size: 100%;
    }

    .manual-datetime-input {
      justify-self: stretch;
      min-width: 0;
      min-inline-size: 0;
      max-width: 100%;
      max-inline-size: 100%;
      text-align: left;
    }

    .segmented {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0;
      background: transparent;
      border: 0;
    }

    .segmented button,
    .ghost,
    .primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition:
        background-color 0.15s ease,
        color 0.15s ease,
        border-color 0.15s ease;
    }

    .segmented button {
      color: var(--text-soft);
      background: transparent;
      font-size: 12px;
      letter-spacing: 0;
    }

    .segmented button.active {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .segmented button:not(.active):hover,
    .ghost:hover {
      background: #f7f7f4;
    }

    .ghost {
      background: transparent;
      color: var(--text-soft);
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      box-shadow: none;
    }

    .primary:hover {
      background: #222222;
    }

    .icon-only {
      width: 32px;
      min-width: 32px;
      padding: 0;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }

    .icon-only.active {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .meta-note {
      font-size: 11px;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      line-height: 1.45;
    }

    .composer-advanced {
      display: grid;
      grid-template-columns: minmax(140px, 170px) minmax(0, 220px) repeat(5, auto);
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .composer-advanced > * {
      min-width: 0;
      max-width: 100%;
    }

    .composer-advanced[hidden] {
      display: none !important;
    }

    .composer-advanced .ghost {
      min-width: 96px;
    }

    .backup-restore-action {
      color: #7a5b18;
    }

    .backup-auth-action.authorized,
    .backup-auth-action:disabled {
      color: var(--text-faint);
      background: transparent;
      border-color: var(--border);
      cursor: default;
    }

    .remote-sync-panel {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(90px, 130px) minmax(150px, 1fr) minmax(180px, 1.2fr) auto auto;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fbfbfa;
    }

    .remote-sync-panel[hidden] {
      display: none !important;
    }

    .remote-sync-panel input {
      min-width: 0;
      width: 100%;
      font-size: 12px;
      background: #ffffff;
    }

    .list-wrap {
      padding: 0 24px 14px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 280px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      background: #ffffff;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      position: relative;
      transition: background-color 0.12s ease;
    }

    .item + .item {
      border-top: 1px solid rgba(17, 17, 17, 0.06);
    }

    .item:hover,
    .item:focus-within {
      background: #fafaf8;
    }

    .item.completed {
      background: #fafaf8;
    }

    .item.idea .toggle {
      opacity: 0.42;
    }

    .item.idea:hover .toggle,
    .item.idea:focus-within .toggle {
      opacity: 0.82;
    }

    .item.upcoming {
      background: #f7f7f4;
      box-shadow: inset 2px 0 0 rgba(17, 17, 17, 0.16);
      color: var(--text);
    }

    .toggle {
      margin-top: 2px;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1.4px solid var(--border-strong);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      flex-shrink: 0;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .toggle.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .toggle.partial {
      border-color: #b7bcc8;
      background: #ffffff;
      color: #707784;
      font-size: 14px;
      line-height: 1;
    }

    .toggle:hover {
      transform: none;
    }

    .toggle:focus-visible,
    .icon-btn:focus-visible,
    .segmented button:focus-visible,
    .ghost:focus-visible,
    .primary:focus-visible {
      outline: 2px solid rgba(17, 17, 17, 0.18);
      outline-offset: 2px;
    }

    .item-main {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .item-line {
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-width: 0;
      cursor: text;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .item-line:hover .item-text {
      color: #111111;
    }

    .badge,
    .code-token {
      flex: 0 0 auto;
    }

    .code-token {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 6px;
      font-size: 10px;
      color: #5f6880;
      background: #f4f6fa;
      border: 1px solid #e3e8f0;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-size: 10px;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .token-time {
      color: #47556f;
      background: #f3f5f8;
      border-color: #e1e6ee;
    }

    .token-muted {
      color: #8a8a84;
      background: #f7f7f4;
      border-color: #ecece6;
    }

    .token-repeat {
      color: #4c6657;
      background: rgba(76, 102, 87, 0.08);
      border-color: rgba(76, 102, 87, 0.16);
    }

    .token-warning {
      color: #8a5c16;
      background: rgba(138, 92, 22, 0.08);
      border-color: rgba(138, 92, 22, 0.14);
    }

    .token-prepared {
      color: #5e6370;
      background: #f5f5f2;
      border-color: #e7e8e2;
    }

    .token-auto {
      color: #6e727d;
      background: #f4f4f1;
      border-color: #e5e5de;
    }

    .token-action {
      cursor: pointer;
      background: #ffffff;
    }

    .token-action:hover,
    .token-action:focus-visible {
      background: #f5f5f2;
      border-color: #d9dbd3;
      outline: none;
    }

    .conflict-warning {
      cursor: pointer;
    }

    .conflict-warning:hover,
    .conflict-warning:focus-visible {
      background: rgba(138, 92, 22, 0.12);
      border-color: rgba(138, 92, 22, 0.22);
      outline: none;
    }

    .code-inline-time,
    .code-inline-date,
    .code-inline-keyword,
    .code-inline-location {
      border-radius: 4px;
      padding: 0 2px;
    }

    .code-inline-time,
    .code-inline-date {
      color: #415a7a;
      background: rgba(65, 90, 122, 0.08);
    }

    .code-inline-keyword {
      color: #795b18;
      background: rgba(121, 91, 24, 0.08);
    }

    .code-inline-repeat {
      color: #4c6657;
      background: rgba(76, 102, 87, 0.08);
    }

    .code-inline-location {
      color: #4f6253;
      background: rgba(79, 98, 83, 0.08);
    }

    .badge.strong {
      background: var(--accent-soft);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .item-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1 1 auto;
    }

    .completed .item-text {
      text-decoration: line-through;
      color: var(--text-soft);
      text-decoration-thickness: 1px;
      text-decoration-color: rgba(17, 17, 17, 0.22);
    }

    .item-actions {
      display: flex;
      gap: 2px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      opacity: 0.28;
      transition: opacity 0.12s ease;
    }

    .item:hover .item-actions,
    .item:focus-within .item-actions {
      opacity: 1;
    }

    .icon-btn {
      min-height: 26px;
      padding: 0 8px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-soft);
    }

    .icon-btn:hover {
      background: #f3f3f0;
      color: var(--text);
    }

    .icon-btn.danger:hover {
      background: #f3f3f0;
      color: var(--text);
    }

    .item-inline-edit {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 8px;
      width: 100%;
      min-width: 0;
    }

    .item-inline-input {
      width: 100%;
      min-width: 0;
      min-height: 30px;
      padding: 4px 8px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: #ffffff;
      outline: none;
      line-height: 1.5;
      resize: vertical;
      overflow-y: hidden;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--text-faint);
      background: #fbfbfa;
      border: 1px dashed var(--border);
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
    }

    .footer {
      padding: 0 24px 18px;
      border-top: 0;
      padding-top: 8px;
      color: var(--text-faint);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item.upcoming .item-text,
    .item.upcoming .icon-btn:hover,
    .item.upcoming .icon-btn.danger:hover {
      color: var(--text);
    }

    .item.upcoming .badge {
      background: transparent;
      border-color: var(--border);
      color: var(--text-soft);
    }

    .item.upcoming .badge.strong {
      background: var(--accent-soft);
      border-color: var(--border-strong);
      color: var(--text);
    }

    .item.upcoming .toggle {
      background: #ffffff;
      border-color: var(--border-strong);
      color: var(--text);
    }

    .item.upcoming .toggle.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .item.upcoming .toggle.partial {
      background: #ffffff;
      border-color: #b7bcc8;
      color: #707784;
    }

    .item.upcoming .icon-btn {
      background: transparent;
      border-color: transparent;
      color: var(--text-soft);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);

    @media (max-width: 980px) {
      .workspace {
        display: block;
      }

      .shell {

      .composer textarea,

      .composer-advanced {

      }

      #quickEventAt {

      .composer-advanced .ghost,
      .composer-advanced .primary {
        min-width: 0;
        min-height: 36px;

      .remote-sync-panel {

      }

      .item {
        grid-template-columns: 24px minmax(0, 1fr) 32px;
        align-items: start;
        gap: 8px;
      }

      .toggle {
        width: 22px;
        height: 22px;
        margin-top: 2px;
      }

      .item-main {
        width: 100%;
        align-items: flex-start;
      }

      .item-line {
        width: 100%;
        grid-template-columns: minmax(0, 1fr);

      .item-text {

      .badge,

      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 0 0 calc(18px + env(safe-area-inset-bottom));
      }

      .shell {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .header,
      .composer,
      .toolbar,

        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        padding-top: 14px;

      .title-block h1 {
        font-size: 24px;

      .title-block p {

      .counter {

      }

      .composer,
      .toolbar,
      .list-wrap {
        padding-bottom: 12px;
      }

      .composer {
        padding-top: 10px;
      }

      .composer-card,
      .empty {
        border-radius: 12px;
      }

      .composer-card {
        padding: 10px;
      }

      .composer textarea {
        min-height: 66px;

      }

      .composer-bar {
        align-items: center;
      }

      .composer-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .meta-note {
        flex: 1 1 100%;
        font-size: 10px;
      }

      .search {
        min-width: 0;
        flex-basis: 100%;
      }

      .search input {
        min-height: 42px;
      }

      .toolbar-side .ghost {
        flex: 1 1 calc(50% - 5px);
        justify-content: center;
      }

      .segmented {
        gap: 3px;
        flex-wrap: nowrap;
        width: 100%;
        overflow-x: auto;

      }

      .segmented button {
        flex: 0 0 auto;
        min-height: 40px;

      }

      .segmented::-webkit-scrollbar {

      .list {
        min-height: 220px;
        border-radius: 12px;
      }

      .item-line,
      .item-inline-edit {
        gap: 6px;
      }

      .item {
        padding: 10px 8px 9px;
      }

      .item-text {
        width: 100%;
      }

      .item-inline-edit {

    @media (max-width: 980px) and (orientation: landscape) {
      .app {
        padding: 8px 8px calc(12px + env(safe-area-inset-bottom));
      }

      .shell {
        border-radius: 18px;
      }

      .header,
      .composer,
      .toolbar,
      .list-wrap,
      .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        padding-top: 10px;
        padding-bottom: 8px;
      }

      .title-block h1 {
        font-size: 22px;
      }

      .title-block p {
        display: none;
      }

      .counter {

        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: stretch;

      }

        min-height: 52px;

      }

        width: auto;
        flex: 1 1 220px;
        justify-content: flex-end;

      }

        min-height: 34px;
        padding: 0 9px;

        font-size: 12px;
      }

        flex: 1 1 220px;
        min-width: 180px;
      }

        min-height: 36px;
      }

      }

      .item {

        padding-bottom: 8px;
      }

      .item-text {

      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="workspace" class="workspace">
    <section class="shell" aria-label="极简个人记录工具">
      <header class="header">
        <div class="title-block">
          <h1>极简记录</h1>
          <p>像记事本一样记下待办、日程、截止和想法。打开就能写。</p>
        </div>
        <div class="counter" aria-live="polite">
          <strong id="openCount">0</strong>
          <span>未完成事项 · 不含想法</span>
        </div>
      </header>

      <section class="composer" aria-label="快速输入区">
        <div class="composer-card">
          <label class="sr-only" for="quickInput">记录内容</label>
          <textarea id="quickInput" placeholder="写下一件事、一场会，或一个突然冒出来的想法。"></textarea>
          <div class="composer-bar">
            <div class="meta-note">
              <span>Enter 保存。默认自动识别时间和类型；需要时再展开手动选项。</span>
              <span id="statusText">仅保存在当前浏览器。</span>
            </div>
            <div class="composer-actions">
              <button id="syncActionButton" class="ghost sync-action" type="button">连接同步</button>
              <button id="backupAuthButton" class="ghost sync-action backup-auth-action" type="button" hidden>授权备份</button>
              <button id="quickMoreButton" class="ghost icon-only" type="button" aria-label="展开手动选项" aria-expanded="false" title="展开手动选项">⋯</button>
              <button id="addButton" class="primary icon-only" type="button" aria-label="新增记录" title="新增记录">+</button>
            </div>
          </div>
          <div id="composerAdvanced" class="composer-advanced" hidden>
            <label class="sr-only" for="quickType">类型</label>
            <select id="quickType" title="类型">
              <option value="auto">自动判断</option>
              <option value="todo">待办</option>
              <option value="meeting">日程</option>
              <option value="deadline">截止</option>
              <option value="idea">想法</option>
            </select>
            <label class="sr-only" for="quickEventAt">事件时间</label>
            <input id="quickEventAt" class="manual-datetime-input" type="datetime-local" autocomplete="off" title="事件时间">
            <button id="exportButton" class="ghost" type="button">导出 JSON</button>
            <button id="importButton" class="ghost" type="button">导入 JSON</button>
            <button id="createSyncButton" class="ghost" type="button">新建同步文件</button>
            <button id="connectSyncButton" class="ghost" type="button">连接同步文件</button>
            <button id="cloudRestoreButton" class="ghost backup-restore-action" type="button" hidden>从备份恢复</button>
            <button id="remoteSyncButton" class="ghost" type="button">GitHub 同步</button>
            <div id="remoteSyncPanel" class="remote-sync-panel" hidden>
              <label class="sr-only" for="remoteRepoInput">GitHub 仓库</label>
              <input id="remoteRepoInput" type="text" autocomplete="off" spellcheck="false" placeholder="owner/repo">
              <label class="sr-only" for="remoteBranchInput">GitHub 分支</label>
              <input id="remoteBranchInput" type="text" autocomplete="off" spellcheck="false" placeholder="main">
              <label class="sr-only" for="remotePathInput">数据文件路径</label>
              <input id="remotePathInput" type="text" autocomplete="off" spellcheck="false" placeholder="minimal-notes-records.json">
              <label class="sr-only" for="remoteTokenInput">GitHub Token</label>
              <input id="remoteTokenInput" type="password" autocomplete="off" spellcheck="false" placeholder="GitHub token">
              <button id="saveRemoteSyncButton" class="primary" type="button">保存同步</button>
              <button id="clearRemoteSyncButton" class="ghost" type="button">关闭同步</button>
            </div>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="筛选与搜索">
        <div class="toolbar-main">
          <div class="segmented" id="filters" role="tablist" aria-label="记录筛选">
            <button type="button" data-filter="all" class="active" aria-pressed="true">事项</button>
            <button type="button" data-filter="todo" aria-pressed="false">待办</button>
            <button type="button" data-filter="meeting" aria-pressed="false">日程</button>
            <button type="button" data-filter="deadline" aria-pressed="false">截止</button>
            <button type="button" data-filter="idea" aria-pressed="false">想法</button>
            <button type="button" data-filter="completed" aria-pressed="false">已完成</button>
          </div>
        </div>
        <div class="toolbar-side">
          <div class="search">
            <label class="sr-only" for="searchInput">搜索</label>
            <input id="searchInput" type="search" placeholder="搜索内容">
          </div>
          <input id="importFile" class="sr-only" type="file" accept="application/json,.json">
        </div>
      </section>

      <section class="list-wrap">
        <div id="recordList" class="list" aria-live="polite"></div>
      </section>

      <footer class="footer">
        <span>GitHub 用作主同步；云盘 JSON 仅作为电脑端备份。</span>
        <span id="summaryText">0 条记录</span>
      </footer>
    </section>
    <aside id="ideaPane" class="idea-pane" aria-live="polite"></aside>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      const STORAGE_KEY = "minimal-record-tool-v1";
      const SYNC_DB_NAME = "minimal-notes-sync-v1";
      const SYNC_DB_STORE = "handles";
      const SYNC_FILE_HANDLE_KEY = "records";
      const DEFAULT_SYNC_FILE_NAME = "minimal-notes-records.json";
      const SYNC_POLL_INTERVAL = 12000;
      const REMOTE_SYNC_STORAGE_KEY = "minimal-notes-github-sync-v1";
      const DEFAULT_REMOTE_REPO = "yihuhou/minimal-notes";
      const DEFAULT_REMOTE_BRANCH = "main";
      const DEFAULT_REMOTE_PATH = "minimal-notes-records.json";
      const REMOTE_SYNC_INTERVAL = 15000;
      const SUPPORTS_FILE_SYNC = Boolean(
        window.isSecureContext
        && window.indexedDB
        && window.showOpenFilePicker
        && window.showSaveFilePicker
      );
      const SUPPORTS_REMOTE_SYNC = Boolean(window.fetch && window.localStorage && window.TextEncoder && window.TextDecoder);
      const TYPE_LABELS = {
        todo: "待办",
        meeting: "日程",
        deadline: "截止",
        idea: "想法"
      };
      const initialLocalPayload = loadLocalRecordsEnvelope();

      const state = {
        records: initialLocalPayload.records,
        recordsRevision: 0,
        localPayloadAt: initialLocalPayload.payloadAt,
        filter: "all",
        search: "",
        editingId: null,
        composing: false,
        composerExpanded: false,
        sync: {
          supported: SUPPORTS_FILE_SYNC,
          handle: null,
          fileName: "",
          permissionNeeded: false,
          lastModified: 0,
          lastWriteAt: "",
          writeInFlight: false,
          writeQueued: false,
          error: ""
        },
        remote: {
          supported: SUPPORTS_REMOTE_SYNC,
          enabled: false,
          repo: DEFAULT_REMOTE_REPO,
          branch: DEFAULT_REMOTE_BRANCH,
          path: DEFAULT_REMOTE_PATH,
          token: "",
          sha: "",
          lastSyncAt: "",
          lastPayloadAt: "",
          staleSha: "",
          pushLocalNext: false,
          writeInFlight: false,
          writeQueued: false,
          panelOpen: false,
          error: ""
        }
      };

      const quickInput = document.getElementById("quickInput");
      const quickType = document.getElementById("quickType");
      const quickEventAt = document.getElementById("quickEventAt");
      const addButton = document.getElementById("addButton");
      const quickMoreButton = document.getElementById("quickMoreButton");
      const composerAdvanced = document.getElementById("composerAdvanced");
      const filters = document.getElementById("filters");
      const searchInput = document.getElementById("searchInput");
      const recordList = document.getElementById("recordList");
      const ideaPane = document.getElementById("ideaPane");
      const workspace = document.getElementById("workspace");
      const openCount = document.getElementById("openCount");
      const summaryText = document.getElementById("summaryText");
      const statusText = document.getElementById("statusText");
      const syncActionButton = document.getElementById("syncActionButton");
      const backupAuthButton = document.getElementById("backupAuthButton");
      const cloudRestoreButton = document.getElementById("cloudRestoreButton");
      const exportButton = document.getElementById("exportButton");
      const importButton = document.getElementById("importButton");
      const createSyncButton = document.getElementById("createSyncButton");
      const connectSyncButton = document.getElementById("connectSyncButton");
      const remoteSyncButton = document.getElementById("remoteSyncButton");
      const remoteSyncPanel = document.getElementById("remoteSyncPanel");
      const remoteRepoInput = document.getElementById("remoteRepoInput");
      const remoteBranchInput = document.getElementById("remoteBranchInput");
      const remotePathInput = document.getElementById("remotePathInput");
      const remoteTokenInput = document.getElementById("remoteTokenInput");
      const saveRemoteSyncButton = document.getElementById("saveRemoteSyncButton");
      const clearRemoteSyncButton = document.getElementById("clearRemoteSyncButton");
      const importFile = document.getElementById("importFile");

      let statusTimer = null;
      let syncPollTimer = null;
      let syncWriteTimer = null;
      let remotePollTimer = null;
      let remoteWriteTimer = null;

      bindEvents();
      loadRemoteSyncSettings();
      populateRemoteSyncPanel();
      render();
      updateStorageStatus();
      restoreStoredSyncFile({ readRecords: !state.remote.enabled }).then(function () {
        startRemoteSync(true);
      });
      focusQuickInput();

      function bindEvents() {
        quickInput.addEventListener("compositionstart", function () {
          state.composing = true;
        });

        quickInput.addEventListener("compositionend", function () {
          state.composing = false;
        });

        quickInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter" && !event.shiftKey && !event.isComposing && !state.composing) {
            event.preventDefault();
            addRecord();
          }
        });

        addButton.addEventListener("click", addRecord);
        syncActionButton.addEventListener("click", handleSyncAction);
        backupAuthButton.addEventListener("click", handleBackupAuthAction);
        cloudRestoreButton.addEventListener("click", restoreRecordsFromCloudBackup);
        quickMoreButton.addEventListener("click", function () {
          toggleComposerAdvanced();
        });

        filters.addEventListener("click", function (event) {
          const button = event.target.closest("button[data-filter]");
          if (!button) {
            return;
          }

          state.filter = button.dataset.filter;
          render();
        });

        searchInput.addEventListener("input", function (event) {
          state.search = event.target.value.trim();
          render();
        });

        recordList.addEventListener("click", handleListClick);
        recordList.addEventListener("keydown", handleListKeydown);
        recordList.addEventListener("input", handleListInput);
        recordList.addEventListener("focusout", handleListFocusOut);
        ideaPane.addEventListener("focusin", handleIdeaPaneFocusIn);
        ideaPane.addEventListener("input", handleIdeaPaneInput);
        ideaPane.addEventListener("keydown", handleIdeaPaneKeydown);
        ideaPane.addEventListener("focusout", handleIdeaPaneFocusOut);

        exportButton.addEventListener("click", exportRecords);
        importButton.addEventListener("click", function () {
          importFile.click();
        });
        createSyncButton.addEventListener("click", createSyncFile);
        connectSyncButton.addEventListener("click", connectSyncFile);
        remoteSyncButton.addEventListener("click", function () {
          toggleRemoteSyncPanel();
        });
        saveRemoteSyncButton.addEventListener("click", saveRemoteSyncSettings);
        clearRemoteSyncButton.addEventListener("click", clearRemoteSyncSettings);
        importFile.addEventListener("change", importRecords);

        document.addEventListener("keydown", function (event) {
          const target = event.target;
          const tagName = target && target.tagName ? target.tagName.toLowerCase() : "";
          const isTypingTarget = tagName === "input" || tagName === "textarea" || tagName === "select" || target.isContentEditable;

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
            event.preventDefault();
            focusQuickInput();
          }

          if (!isTypingTarget && event.key === "/") {
            event.preventDefault();
            searchInput.focus();
            searchInput.select();
          }
        });
      }

      function toggleComposerAdvanced(forceExpanded) {
        state.composerExpanded = typeof forceExpanded === "boolean" ? forceExpanded : !state.composerExpanded;
        composerAdvanced.hidden = !state.composerExpanded;
        quickMoreButton.setAttribute("aria-expanded", String(state.composerExpanded));
        quickMoreButton.classList.toggle("active", state.composerExpanded);
      }

      async function handleSyncAction() {
        if (state.remote.enabled) {
          await syncRemoteRecords();
          return;
        }

        if (!state.sync.supported) {
          toggleRemoteSyncPanel(true);
          setStatus("请填写 GitHub 同步设置。");
          return;
        }

        if (!state.sync.handle) {
          await connectSyncFile();
          return;
        }

        if (state.sync.permissionNeeded || state.sync.error) {
          await authorizeStoredSyncFile();
          return;
        }

        await checkForSyncFileChanges();
        setStatus("已检查同步文件。");
      }

      async function handleBackupAuthAction() {
        if (!state.sync.handle) {
          setStatus("还没有连接云盘备份文件。");
          return;
        }

        await authorizeStoredSyncFile();
      }

      async function restoreRecordsFromCloudBackup() {
        if (!state.sync.handle) {
          setStatus("还没有连接云盘备份文件。");
          return;
        }

        const ok = window.confirm("从云盘备份恢复会用备份内容覆盖当前本地记录，并随后写回 GitHub。是否继续？");
        if (!ok) {
          setStatus("已取消恢复备份。");
          return;
        }

        try {
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("云盘备份需要授权。");
            return;
          }

          const result = await loadRecordsFromSyncFile();
          if (result === "empty") {
            setStatus("云盘备份文件为空。");
            return;
          }

          if (result === "loaded") {
            state.remote.pushLocalNext = Boolean(state.remote.enabled);
            if (state.remote.pushLocalNext) {
              saveRemoteSyncSettingsToLocal();
              queueRemoteWrite();
            }
            setStatus("已从云盘备份恢复。");
            return;
          }

          setStatus("无法读取云盘备份。");
        } catch (error) {
          console.error(error);
          state.sync.error = "云盘备份恢复失败";
          updateStorageStatus();
          setStatus("云盘备份恢复失败。");
        }
      }

      function handleListClick(event) {
        const actionTarget = event.target.closest("[data-action]");
        if (!actionTarget) {
          return;
        }

        const action = actionTarget.dataset.action;
        const id = actionTarget.dataset.id;
        if (!id) {
          return;
        }

        if (action === "toggle") {
          toggleRecord(id);
          return;
        }

        if (action === "delete") {
          deleteRecord(id);
          return;
        }

        if (action === "ignore-conflict") {
          ignoreConflict(id, actionTarget.dataset.conflictKey || "");
          return;
        }

        if (action === "confirm-auto-complete") {
          confirmAutoComplete(id);
          return;
        }

        if (action === "revert-auto-complete") {
          revertAutoComplete(id);
          return;
        }

        if (action === "open-edit") {
          state.editingId = id;
          render();
          focusEditField(id);
          return;
        }

        if (action === "cancel") {
          state.editingId = null;
          render();
          return;
        }

        if (action === "save") {
          saveEditedRecord(id);
        }
      }

      function handleListKeydown(event) {
        const directActionTarget = event.target.closest("[data-action]");
        if (directActionTarget && directActionTarget.dataset.action && directActionTarget.dataset.action !== "open-edit") {
          return;
        }

        const openEditTarget = event.target.closest('[data-action="open-edit"]');
        if (openEditTarget && (event.key === "Enter" || event.key === " ")) {
          event.preventDefault();
          const id = openEditTarget.dataset.id;
          if (id) {
            state.editingId = id;
            render();
            focusEditField(id);
          }
          return;
        }

        const editBox = event.target.closest(".item-inline-edit");
        if (!editBox) {
          return;
        }

        const item = event.target.closest(".item");
        if (!item) {
          return;
        }

        const id = item.dataset.id;
        if (!id) {
          return;
        }

        if (event.key === "Escape") {
          event.preventDefault();
          state.editingId = null;
          render();
          return;
        }

        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          saveEditedRecord(id);
        }
      }

      function handleListInput(event) {
        const input = event.target.closest('[data-role="edit-inline-text"]');
        if (!input) {
          return;
        }

        autoSizeInlineEditInput(input);
      }

      function handleListFocusOut(event) {
        if (event.target.getAttribute("data-role") !== "edit-inline-text") {
          return;
        }

        const currentItem = event.target.closest(".item");
        const nextItem = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest(".item") : null;
        if (currentItem && nextItem && currentItem === nextItem) {
          return;
        }

        const id = currentItem ? currentItem.dataset.id : "";
        if (id) {
          saveEditedRecord(id);
        }
      }

      function handleIdeaPaneFocusIn(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        input.dataset.originalValue = input.value;
        autoSizeIdeaInput(input);
      }

      function handleIdeaPaneInput(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        const record = findIdeaRecord(input.dataset.id || "");
        if (!record) {
          return;
        }

        record.text = input.value;
        autoSizeIdeaInput(input);
        persist();
        patchIdeaTextInList(record);
      }

      function handleIdeaPaneKeydown(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          event.preventDefault();
          input.blur();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          const originalValue = input.dataset.originalValue;
          if (typeof originalValue === "string") {
            input.value = originalValue;
          }
          input.blur();
        }
      }

      function handleIdeaPaneFocusOut(event) {
        const input = event.target.closest('[data-role="idea-pane-text"]');
        if (!input) {
          return;
        }

        saveIdeaPaneRecord(input);
      }

      function findIdeaRecord(id) {
        return state.records.find(function (record) {
          return record.id === id && record.type === "idea";
        }) || null;
      }

      function patchIdeaTextInList(record) {
        if (!record) {
          return;
        }

        const item = recordList.querySelector('.item[data-id="' + cssEscape(record.id) + '"]');
        if (!item) {
          return;
        }

        const textNode = item.querySelector(".item-text");
        if (textNode) {
          textNode.innerHTML = highlightRecordText(getDisplayText(record));
        }

        const lineNode = item.querySelector(".item-line");
        if (lineNode) {
          lineNode.title = buildItemTitle(record);
        }
      }

      function saveIdeaPaneRecord(input) {
        const record = findIdeaRecord(input.dataset.id || "");
        if (!record) {
          return;
        }

        const previousText = typeof input.dataset.originalValue === "string"
          ? input.dataset.originalValue
          : record.text;
        const nextText = String(input.value || "");
        const trimmedNext = nextText.trim();

        if (!trimmedNext) {
          record.text = previousText;
          input.value = previousText;
          persist();
          patchIdeaTextInList(record);
          setStatus("想法内容不能为空。");
          return;
        }

        record.text = nextText;
        const changed = trimmedNext !== String(previousText || "").trim();
        if (changed) {
          const now = new Date().toISOString();
          record.updatedAt = now;
          pushHistory(record, "edited", now);
          input.dataset.originalValue = nextText;
          persist();
          render();
          setStatus("想法已更新。");
          return;
        }

        input.dataset.originalValue = nextText;
        persist();
        patchIdeaTextInList(record);
      }

      function addRecord() {
        const rawText = quickInput.value || "";
        const text = rawText.trim();
        const explicitEventAt = normalizeDateTime(quickEventAt.value);
        const manualType = quickType.value;
        const now = new Date().toISOString();

        if (!text) {
          setStatus("先写一点内容。");
          focusQuickInput();
          return;
        }

        const parsed = inferTypeAndText(text, explicitEventAt, manualType);
        const record = {
          id: createId(),
          text: parsed.text,
          type: parsed.type,
          createdAt: now,
          eventAt: parsed.eventAt,
          recurrence: parsed.recurrence,
          ignoredConflictKeys: [],
          history: [],
          autoCompleteState: "",
          autoCompleteRef: "",
          autoCompletedAt: "",
          prepared: false,
          completed: false,
          updatedAt: now
        };
        pushHistory(record, "created", now);

        state.records.unshift(record);
        state.editingId = null;
        persist();
        quickInput.value = "";
        quickEventAt.value = "";
        quickType.value = "auto";
        toggleComposerAdvanced(false);
        render();
        focusQuickInput();
        setStatus("已保存。");
      }

      function toggleRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        if (isAutoCompletionPending(record)) {
          confirmAutoComplete(id);
          return;
        }

        const now = new Date().toISOString();
        let historyAction = "";

        if (isRecurringRecord(record) && !record.completed) {
          if (supportsPreparedState(record) && !record.prepared) {
            record.prepared = true;
            record.updatedAt = now;
            pushHistory(record, "prepared", now);
            persist();
            render();
            return;
          }

          if (completeAndAdvanceRecurringRecord(record, now)) {
            persist();
            render();
            setStatus("已完成本次，已显示下一次。");
            return;
          }
        }

        if (supportsPreparedState(record)) {
          if (!record.prepared && !record.completed) {
            record.prepared = true;
            historyAction = "prepared";
          } else if (record.prepared && !record.completed) {
            record.prepared = false;
            record.completed = true;
            clearAutoCompleteState(record);
            historyAction = "completed";
          } else {
            record.prepared = false;
            record.completed = false;
            clearAutoCompleteState(record);
            historyAction = "reopened";
          }
        } else {
          record.completed = !record.completed;
          clearAutoCompleteState(record);
          historyAction = record.completed ? "completed" : "reopened";
        }
        record.updatedAt = now;
        pushHistory(record, historyAction, now);
        persist();
        render();
      }

      function deleteRecord(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        const ok = window.confirm("确定删除这条记录吗？");
        if (!ok) {
          return;
        }

        state.records = state.records.filter(function (item) {
          return item.id !== id;
        });
        if (state.editingId === id) {
          state.editingId = null;
        }
        persist();
        render();
        setStatus("已删除。");
      }

      function confirmAutoComplete(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        const now = new Date().toISOString();
        if (completeAndAdvanceRecurringRecord(record, now)) {
          persist();
          render();
          setStatus("已确认本次，已显示下一次。");
          return;
        }

        record.prepared = false;
        record.completed = true;
        clearAutoCompleteState(record);
        record.updatedAt = now;
        pushHistory(record, "completed", now);
        persist();
        render();
        setStatus("已确认自动完成。");
      }

      function revertAutoComplete(id) {
        const record = state.records.find(function (item) {
          return item.id === id;
        });
        if (!record) {
          return;
        }

        const now = new Date().toISOString();
        record.autoCompleteState = "reverted";
        record.autoCompleteRef = getAutoCompleteRef(record);
        record.updatedAt = now;
        pushHistory(record, "auto_reverted", now);
        persist();
        render();
        setStatus("已恢复为未完成。");
      }

      function saveEditedRecord(id) {
        const item = recordList.querySelector('.item[data-id="' + cssEscape(id) + '"]');
        if (!item) {
          return;
        }

        const textField = item.querySelector('[data-role="edit-inline-text"]');

        if (!textField) {
          return;
        }

        const text = (textField.value || "").trim();
        if (!text) {
          state.editingId = null;
          render();
          setStatus("内容不能为空，已取消修改。");
          return;
        }

        const record = state.records.find(function (entry) {
          return entry.id === id;
        });
        if (!record) {
          return;
        }

        const updated = inferUpdateFromText(text, record);
        const changed = record.text !== updated.text
          || record.type !== updated.type
          || record.eventAt !== updated.eventAt
          || !recurrencesEqual(record.recurrence, updated.recurrence);
        record.text = updated.text;
        record.type = updated.type;
        record.eventAt = updated.eventAt;
        record.recurrence = updated.recurrence;
        record.ignoredConflictKeys = [];
        clearAutoCompleteState(record);
        if (!supportsPreparedState(updated)) {
          record.prepared = false;
        }
        record.updatedAt = new Date().toISOString();
        if (changed) {
          pushHistory(record, "edited", record.updatedAt);
        }

        state.editingId = null;
        persist();
        render();
        setStatus("已更新。");
      }

      function exportRecords() {
        const payload = buildRecordsPayload({ exportedAt: new Date().toISOString() });

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const stamp = formatFileStamp(new Date());
        link.href = url;
        link.download = "minimal-records-" + stamp + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("已导出 JSON。");
      }

      function importRecords(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = function (loadEvent) {
          try {
            const raw = String(loadEvent.target.result || "");
            const normalized = parseRecordsPayload(raw);
            const ok = window.confirm("导入会覆盖当前本地数据，是否继续？");
            if (!ok) {
              importFile.value = "";
              return;
            }

            state.records = normalized.sort(sortRecords);
            state.editingId = null;
            persist();
            render();
            setStatus("已导入 " + normalized.length + " 条记录。");
          } catch (error) {
            console.error(error);
            setStatus("导入失败，请检查 JSON 文件。");
          } finally {
            importFile.value = "";
          }
        };

        reader.readAsText(file, "utf-8");
      }

      async function createSyncFile() {
        if (!ensureFileSyncSupported()) {
          return;
        }

        try {
          if (state.sync.handle) {
            const permissionGranted = await requestSyncPermission("readwrite");
            if (!permissionGranted) {
              setStatus("云盘备份需要授权。");
              return;
            }

            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("云盘备份写入失败，已保存在当前浏览器。");
              return;
            }

            await storeSyncHandle(state.sync.handle);
            setStatus(state.remote.enabled ? "已覆盖当前云盘备份。" : "已覆盖当前同步文件。");
            return;
          }

          const handle = await window.showSaveFilePicker({
            suggestedName: DEFAULT_SYNC_FILE_NAME,
            types: getJsonFilePickerTypes(),
            excludeAcceptAllOption: false
          });

          await setSyncHandle(handle, false);
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus(state.remote.enabled ? "云盘备份需要授权。" : "同步文件需要授权。");
            return;
          }

          const ok = await writeCurrentRecordsToSyncFile();
          if (!ok) {
            setStatus(state.remote.enabled ? "云盘备份写入失败，已保存在当前浏览器。" : "同步文件写入失败，已保存在当前浏览器。");
            return;
          }

          await storeSyncHandle(handle);
          if (!state.remote.enabled) {
            startSyncPolling();
          }
          setStatus(state.remote.enabled ? "已新建云盘备份文件。" : "已新建并连接同步文件。");
        } catch (error) {
          if (error && error.name === "AbortError") {
            return;
          }

          console.error(error);
          state.sync.error = "新建同步文件失败";
          updateStorageStatus();
          setStatus("新建同步文件失败。");
        }
      }

      async function connectSyncFile() {
        if (!ensureFileSyncSupported()) {
          return;
        }

        try {
          if (state.sync.handle && state.sync.permissionNeeded) {
            await authorizeStoredSyncFile();
            return;
          }

          const handles = await window.showOpenFilePicker({
            multiple: false,
            types: getJsonFilePickerTypes(),
            excludeAcceptAllOption: false
          });
          const handle = handles && handles[0];
          if (!handle) {
            return;
          }

          await setSyncHandle(handle, false);
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("同步文件需要授权。");
            return;
          }

          if (state.remote.enabled) {
            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("同步文件写入失败，已保存在当前浏览器。");
              return;
            }
            setStatus("已连接云盘备份并写入当前记录。");
          } else {
            const result = await loadRecordsFromSyncFile();
            if (result === "empty") {
              const ok = await writeCurrentRecordsToSyncFile();
              if (!ok) {
                setStatus("同步文件写入失败，已保存在当前浏览器。");
                return;
              }
              setStatus("同步文件为空，已写入当前记录。");
            } else if (result === "loaded") {
              setStatus("已读取同步文件。");
            }
          }
          await storeSyncHandle(handle);
          if (!state.remote.enabled) {
            startSyncPolling();
          }
        } catch (error) {
          if (error && error.name === "AbortError") {
            return;
          }

          console.error(error);
          state.sync.error = "连接同步文件失败";
          state.sync.handle = null;
          state.sync.fileName = "";
          state.sync.permissionNeeded = false;
          updateStorageStatus();
          setStatus("连接同步文件失败。");
        }
      }

      async function authorizeStoredSyncFile() {
        if (!state.sync.handle) {
          await connectSyncFile();
          return;
        }

        try {
          setStatus("请在浏览器提示里选择每次访问都允许。");
          const permissionGranted = await requestSyncPermission("readwrite");
          if (!permissionGranted) {
            setStatus("未获得同步文件授权。");
            return;
          }

          if (state.remote.enabled) {
            const ok = await writeCurrentRecordsToSyncFile();
            if (!ok) {
              setStatus("同步文件写入失败，已保存在当前浏览器。");
              return;
            }
            setStatus("云盘备份已授权并写入当前记录。");
          } else {
            const result = await loadRecordsFromSyncFile();
            if (result === "empty") {
              const ok = await writeCurrentRecordsToSyncFile();
              if (!ok) {
                setStatus("同步文件写入失败，已保存在当前浏览器。");
                return;
              }
              setStatus("同步文件为空，已写入当前记录。");
            } else if (result === "loaded") {
              setStatus("已读取同步文件。");
            } else {
              setStatus("同步文件已授权。");
            }
            startSyncPolling();
          }
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件授权失败";
          updateStorageStatus();
          setStatus("同步文件授权失败。");
        }
      }

      async function restoreStoredSyncFile(options) {
        const opts = Object.assign({
          readRecords: true
        }, options || {});

        if (!state.sync.supported) {
          updateStorageStatus();
          return;
        }

        try {
          const handle = await readStoredSyncHandle();
          if (!handle) {
            updateStorageStatus();
            return;
          }

          await setSyncHandle(handle, false);
          const hasPermission = await querySyncPermission("readwrite");
          if (!hasPermission) {
            state.sync.permissionNeeded = true;
            updateStorageStatus();
            return;
          }

          if (!opts.readRecords) {
            try {
              const file = await state.sync.handle.getFile();
              state.sync.lastModified = file.lastModified || 0;
              state.sync.error = "";
            } catch (error) {
              console.error(error);
              state.sync.error = "云盘备份读取失败";
            }
            updateStorageStatus();
            return;
          }

          const result = await loadRecordsFromSyncFile();
          if (result === "empty") {
            await writeCurrentRecordsToSyncFile();
            setStatus("同步文件为空，已写入当前记录。");
          } else if (result === "loaded") {
            setStatus("已读取同步文件。");
          }
          startSyncPolling();
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件恢复失败";
          state.sync.handle = null;
          state.sync.fileName = "";
          state.sync.permissionNeeded = false;
          updateStorageStatus();
        }
      }

      async function setSyncHandle(handle, shouldStore) {
        state.sync.handle = handle;
        state.sync.fileName = handle && handle.name ? handle.name : DEFAULT_SYNC_FILE_NAME;
        state.sync.permissionNeeded = false;
        state.sync.error = "";
        state.sync.lastModified = 0;

        if (shouldStore) {
          await storeSyncHandle(handle);
        }

        updateStorageStatus();
      }

      async function loadRecordsFromSyncFile() {
        if (!state.sync.handle) {
          return "missing";
        }

        const hasPermission = await querySyncPermission("read");
        if (!hasPermission) {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return "permission";
        }

        const file = await state.sync.handle.getFile();
        const raw = await file.text();
        state.sync.lastModified = file.lastModified || 0;

        if (!raw.trim()) {
          state.sync.error = "";
          updateStorageStatus();
          return "empty";
        }

        const payload = parseRecordsEnvelope(raw);
        state.records = payload.records;
        state.localPayloadAt = payload.payloadAt || state.localPayloadAt;
        state.editingId = null;
        state.sync.permissionNeeded = false;
        state.sync.error = "";
        saveLocalRecords({
          payloadSavedAt: payload.savedAt,
          payloadSyncedAt: payload.syncedAt
        });
        render();
        updateStorageStatus();
        return "loaded";
      }

      async function writeCurrentRecordsToSyncFile() {
        if (!state.sync.handle) {
          return false;
        }

        const hasPermission = await querySyncPermission("readwrite");
        if (!hasPermission) {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }

        state.sync.writeInFlight = true;
        updateStorageStatus();

        try {
          const writable = await state.sync.handle.createWritable();
          await writable.write(JSON.stringify(buildRecordsPayload(), null, 2));
          await writable.close();

          const file = await state.sync.handle.getFile();
          state.sync.lastModified = file.lastModified || Date.now();
          state.sync.lastWriteAt = new Date().toISOString();
          state.sync.permissionNeeded = false;
          state.sync.error = "";
          updateStorageStatus();
          return true;
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件写入失败";
          updateStorageStatus();
          return false;
        } finally {
          state.sync.writeInFlight = false;
          updateStorageStatus();
        }
      }

      function queueSyncFileWrite() {
        if (!state.sync.handle) {
          return;
        }

        state.sync.writeQueued = true;
        window.clearTimeout(syncWriteTimer);
        syncWriteTimer = window.setTimeout(function () {
          syncWriteTimer = null;
          writeQueuedSyncFile();
        }, 500);
        updateStorageStatus();
      }

      async function writeQueuedSyncFile() {
        if (!state.sync.handle || state.sync.writeInFlight) {
          return;
        }

        while (state.sync.writeQueued) {
          state.sync.writeQueued = false;
          const ok = await writeCurrentRecordsToSyncFile();
          if (!ok) {
            setStatus("同步文件写入失败，已保存在当前浏览器。");
            return;
          }
        }
      }

      function startSyncPolling() {
        window.clearInterval(syncPollTimer);
        if (!state.sync.handle) {
          return;
        }

        syncPollTimer = window.setInterval(checkForSyncFileChanges, SYNC_POLL_INTERVAL);
      }

      async function checkForSyncFileChanges() {
        if (!state.sync.handle || state.sync.writeInFlight || state.sync.writeQueued) {
          return;
        }

        try {
          const hasPermission = await querySyncPermission("read");
          if (!hasPermission) {
            state.sync.permissionNeeded = true;
            updateStorageStatus();
            return;
          }

          const file = await state.sync.handle.getFile();
          const latestModified = file.lastModified || 0;
          if (!latestModified) {
            return;
          }

          if (!state.sync.lastModified) {
            state.sync.lastModified = latestModified;
            updateStorageStatus();
            return;
          }

          if (latestModified !== state.sync.lastModified) {
            await loadRecordsFromSyncFile();
            setStatus("已从同步文件更新。");
          }
        } catch (error) {
          console.error(error);
          state.sync.error = "同步文件读取失败";
          updateStorageStatus();
        }
      }

      function ensureFileSyncSupported() {
        if (state.sync.supported) {
          return true;
        }

        setStatus("当前浏览器不支持同步文件，请用 Chrome 或 Edge 打开。");
        return false;
      }

      function getJsonFilePickerTypes() {
        return [{
          description: "Minimal Notes JSON",
          accept: {
            "application/json": [".json"]
          }
        }];
      }

      async function querySyncPermission(mode) {
        if (!state.sync.handle || typeof state.sync.handle.queryPermission !== "function") {
          return true;
        }

        try {
          return await state.sync.handle.queryPermission({ mode: mode }) === "granted";
        } catch (error) {
          console.error(error);
          return false;
        }
      }

      async function requestSyncPermission(mode) {
        if (!state.sync.handle) {
          return false;
        }

        if (await querySyncPermission(mode)) {
          state.sync.permissionNeeded = false;
          updateStorageStatus();
          return true;
        }

        if (typeof state.sync.handle.requestPermission !== "function") {
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }

        try {
          const status = await state.sync.handle.requestPermission({ mode: mode });
          const granted = status === "granted";
          state.sync.permissionNeeded = !granted;
          updateStorageStatus();
          return granted;
        } catch (error) {
          console.error(error);
          state.sync.permissionNeeded = true;
          updateStorageStatus();
          return false;
        }
      }

      async function openSyncDb() {
        return new Promise(function (resolve, reject) {
          const request = window.indexedDB.open(SYNC_DB_NAME, 1);

          request.onupgradeneeded = function () {
            const db = request.result;
            if (!db.objectStoreNames.contains(SYNC_DB_STORE)) {
              db.createObjectStore(SYNC_DB_STORE);
            }
          };

          request.onsuccess = function () {
            resolve(request.result);
          };

          request.onerror = function () {
            reject(request.error);
          };
        });
      }

      async function storeSyncHandle(handle) {
        const db = await openSyncDb();
        return new Promise(function (resolve, reject) {
          const transaction = db.transaction(SYNC_DB_STORE, "readwrite");
          transaction.objectStore(SYNC_DB_STORE).put(handle, SYNC_FILE_HANDLE_KEY);

          transaction.oncomplete = function () {
            db.close();
            resolve();
          };

          transaction.onerror = function () {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function readStoredSyncHandle() {
        const db = await openSyncDb();
        return new Promise(function (resolve, reject) {
          const transaction = db.transaction(SYNC_DB_STORE, "readonly");
          const request = transaction.objectStore(SYNC_DB_STORE).get(SYNC_FILE_HANDLE_KEY);
          let handle = null;

          request.onsuccess = function () {
            handle = request.result || null;
          };

          transaction.oncomplete = function () {
            db.close();
            resolve(handle);
          };

          transaction.onerror = function () {
            db.close();
            reject(transaction.error);
          };
        });
      }

      function toggleRemoteSyncPanel(forceOpen) {
        state.remote.panelOpen = typeof forceOpen === "boolean" ? forceOpen : !state.remote.panelOpen;
        remoteSyncPanel.hidden = !state.remote.panelOpen;
        populateRemoteSyncPanel();
      }

      function populateRemoteSyncPanel() {
        remoteRepoInput.value = state.remote.repo || DEFAULT_REMOTE_REPO;
        remoteBranchInput.value = state.remote.branch || DEFAULT_REMOTE_BRANCH;
        remotePathInput.value = state.remote.path || DEFAULT_REMOTE_PATH;
        remoteTokenInput.value = "";
        remoteTokenInput.placeholder = state.remote.token ? "token 已保存，留空不变" : "GitHub token";
      }

      function loadRemoteSyncSettings() {
        try {
          const raw = localStorage.getItem(REMOTE_SYNC_STORAGE_KEY);
          if (!raw) {
            return;
          }

          const saved = JSON.parse(raw);
          const repo = normalizeRemoteRepo(saved.repo || "");
          const branch = normalizeRemoteBranch(saved.branch || "");
          const path = normalizeRemotePath(saved.path || "");
          const token = typeof saved.token === "string" ? saved.token.trim() : "";
          if (!repo || !path || !token) {
            return;
          }

          state.remote.enabled = true;
          state.remote.repo = repo;
          state.remote.branch = branch || DEFAULT_REMOTE_BRANCH;
          state.remote.path = path;
          state.remote.token = token;
          state.remote.sha = typeof saved.sha === "string" ? saved.sha : "";
          state.remote.lastSyncAt = typeof saved.lastSyncAt === "string" ? saved.lastSyncAt : "";
          state.remote.lastPayloadAt = typeof saved.lastPayloadAt === "string" ? saved.lastPayloadAt : "";
          state.remote.staleSha = typeof saved.staleSha === "string" ? saved.staleSha : "";
          state.remote.pushLocalNext = Boolean(saved.pushLocalNext);
        } catch (error) {
          console.error(error);
        }
      }

      function saveRemoteSyncSettingsToLocal() {
        if (!state.remote.enabled) {
          localStorage.removeItem(REMOTE_SYNC_STORAGE_KEY);
          return;
        }

        localStorage.setItem(REMOTE_SYNC_STORAGE_KEY, JSON.stringify({
          repo: state.remote.repo,
          branch: state.remote.branch,
          path: state.remote.path,
          token: state.remote.token,
          sha: state.remote.sha,
          lastSyncAt: state.remote.lastSyncAt,
          lastPayloadAt: state.remote.lastPayloadAt,
          staleSha: state.remote.staleSha,
          pushLocalNext: Boolean(state.remote.pushLocalNext)
        }));
      }

      async function saveRemoteSyncSettings() {
        const repo = normalizeRemoteRepo(remoteRepoInput.value);
        const branch = normalizeRemoteBranch(remoteBranchInput.value);
        const path = normalizeRemotePath(remotePathInput.value);
        const token = (remoteTokenInput.value || "").trim() || state.remote.token;

        if (!repo || !path || !token) {
          setStatus("请填写 GitHub 仓库、路径和 token。");
          return;
        }

        state.remote.enabled = true;
        state.remote.repo = repo;
        state.remote.branch = branch || DEFAULT_REMOTE_BRANCH;
        state.remote.path = path;
        state.remote.token = token;
        state.remote.sha = "";
        state.remote.lastSyncAt = "";
        state.remote.lastPayloadAt = "";
        state.remote.staleSha = "";
        state.remote.pushLocalNext = false;
        state.remote.error = "";
        state.remote.panelOpen = false;
        remoteSyncPanel.hidden = true;
        saveRemoteSyncSettingsToLocal();
        populateRemoteSyncPanel();
        updateStorageStatus();
        await startRemoteSync(true);
      }

      function clearRemoteSyncSettings() {
        const ok = window.confirm("关闭 GitHub 同步只会清除本浏览器保存的 token，不会删除 GitHub 上的数据文件。是否继续？");
        if (!ok) {
          return;
        }

        state.remote.enabled = false;
        state.remote.token = "";
        state.remote.sha = "";
        state.remote.lastSyncAt = "";
        state.remote.lastPayloadAt = "";
        state.remote.staleSha = "";
        state.remote.pushLocalNext = false;
        state.remote.error = "";
        state.remote.writeQueued = false;
        window.clearTimeout(remoteWriteTimer);
        window.clearInterval(remotePollTimer);
        remoteWriteTimer = null;
        remotePollTimer = null;
        saveRemoteSyncSettingsToLocal();
        populateRemoteSyncPanel();
        updateStorageStatus();
        setStatus("已关闭 GitHub 同步。");
      }

      async function startRemoteSync(runNow) {
        window.clearInterval(remotePollTimer);
        if (!state.remote.enabled) {
          return;
        }

        if (runNow) {
          await syncRemoteRecords({ createIfMissing: true });
        }

        remotePollTimer = window.setInterval(function () {
          syncRemoteRecords({ silent: true });
        }, REMOTE_SYNC_INTERVAL);
      }

      async function syncRemoteRecords(options) {
        if (!state.remote.enabled) {
          toggleRemoteSyncPanel(true);
          setStatus("请先设置 GitHub 同步。");
          return;
        }

        if (state.remote.writeInFlight || state.remote.writeQueued) {
          setStatus("GitHub 同步正在进行。");
          return;
        }

        const opts = options || {};

        try {
          state.remote.error = "";
          updateStorageStatus();

          if (state.remote.pushLocalNext) {
            const ok = await writeCurrentRecordsToRemote();
            if (ok && !opts.silent) {
              setStatus("已将本地恢复结果写回 GitHub。");
            } else if (!ok && !opts.silent) {
              setStatus(state.remote.error + "。");
            }
            return;
          }

          const revisionBeforeFetch = state.recordsRevision;
          const recordsBeforeFetch = getRecordsSnapshot();
          const result = await fetchRemoteRecords();
          if (revisionBeforeFetch !== state.recordsRevision
            || recordsBeforeFetch !== getRecordsSnapshot()
            || state.remote.pushLocalNext
            || state.remote.writeInFlight
            || state.remote.writeQueued) {
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("本地有新改动，已跳过 GitHub 旧数据。");
            }
            return;
          }

          if (result.missing) {
            if (opts.createIfMissing || state.records.length) {
              const ok = await writeCurrentRecordsToRemote();
              if (ok && !opts.silent) {
                setStatus("已创建 GitHub 数据文件。");
              } else if (!ok && !opts.silent) {
                setStatus(state.remote.error + "。");
              }
              return;
            }

            if (!opts.silent) {
              setStatus("GitHub 数据文件不存在。");
            }
            return;
          }

          if (isStaleRemoteResult(result)) {
            state.remote.staleSha = result.sha || state.remote.staleSha;
            state.remote.error = "";
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 返回了旧数据，已跳过。");
            }
            return;
          }

          const recordsChanged = !recordsEqual(state.records, result.records);
          if (recordsChanged && isRemoteOlderThanLocal(result)) {
            state.remote.sha = result.sha || state.remote.sha;
            state.remote.lastSyncAt = new Date().toISOString();
            state.remote.lastPayloadAt = state.localPayloadAt || state.remote.lastPayloadAt;
            state.remote.staleSha = result.sha || state.remote.staleSha;
            state.remote.error = "";
            state.remote.pushLocalNext = true;
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            queueRemoteWrite();
            if (!opts.silent) {
              setStatus("GitHub 数据比本地旧，已保留本地并准备写回。");
            }
            return;
          }

          state.remote.sha = result.sha;
          state.remote.lastSyncAt = new Date().toISOString();
          state.remote.lastPayloadAt = result.payloadAt || state.remote.lastPayloadAt;
          state.remote.staleSha = "";
          state.remote.error = "";

          if (!recordsChanged) {
            saveRemoteSyncSettingsToLocal();
            updateStorageStatus();
            if (!opts.silent) {
              setStatus("GitHub 已是最新。");
            }
            return;
          }

          if (recordsChanged
            && !state.remote.lastSyncAt
            && state.records.length
            && result.records.length
            && !window.confirm("GitHub 数据会覆盖当前本地内容，是否继续？")) {
            setStatus("已取消 GitHub 同步。");
            return;
          }

          state.records = result.records;
          state.editingId = null;
          saveLocalRecords({
            payloadSavedAt: result.savedAt,
            payloadSyncedAt: result.syncedAt
          });
          queueSyncFileWrite();
          saveRemoteSyncSettingsToLocal();
          render();
          updateStorageStatus();

          if (!opts.silent) {
            setStatus("已从 GitHub 同步。");
          }
        } catch (error) {
          console.error(error);
          state.remote.error = formatRemoteError("GitHub 同步失败", error);
          updateStorageStatus();
          if (!opts.silent) {
            setStatus(state.remote.error + "。");
          }
        }
      }

      async function fetchRemoteRecords() {
        const response = await fetch(getRemoteContentsUrl(true), {
          headers: getRemoteHeaders(false)
        });

        if (response.status === 404) {
          return {
            missing: true,
            records: [],
            sha: ""
          };
        }

        if (!response.ok) {
          throw await createRemoteHttpError(response, "GitHub 读取失败");
        }

        const data = await response.json();
